# Spring profile used only when running integration tests.
# Activated via @ActiveProfiles("test") on AbstractIntegrationTest.

# JWT secret needed at startup by JwtAuthFilter.
# Value is fake but valid Base64 (>= 32 bytes when decoded) for HS256.
jwt.secret=dGVzdC1zZWNyZXQtdGVzdC1zZWNyZXQtdGVzdC1zZWNyZXQtdGVzdC1zZWNyZXQ=

# Spring AI starter refuses to start without a key. ChatClient is mocked
# in tests (see AbstractIntegrationTest), so this value is never actually
# sent anywhere.
spring.ai.anthropic.api-key=test-dummy-key

# GoogleIdTokenVerifier bean needs a client-id at startup even though the
# verifier is mocked in tests (see AbstractIntegrationTest).
google.client-id=test-dummy-client-id

spring.mail.host=localhost
spring.mail.port=3025
spring.mail.properties.mail.smtp.auth=false
app.base-url=http://localhost
app.mail.from=test@experimate.test

# VAPID keys — public RFC 8292 Appendix A example keys, safe to commit.
# PushService is a real bean so valid EC P-256 keys are required.
# PushGateway is mocked in AbstractIntegrationTest so no push HTTP calls are made.
push.vapid.public-key=BCVxsr7N_eNgVRqvHtD0zTZsEc6-VV-JvLexhqUzORcxaOzi6-AYWXvTBHm4bjyPjs7Vd8pZGH6SRpkNtoIAiw4
push.vapid.private-key=***REMOVED***
push.vapid.subject=mailto:test@test.com

# Datasource URL/username/password are NOT set here.
# AbstractIntegrationTest uses @ServiceConnection — Spring Boot reads the
# PostgreSQLContainer at runtime and wires the datasource automatically.
