spring.application.name=ExperiMate
spring.profiles.active=local

# Database
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.jpa.open-in-view=false

# JWT
jwt.expiration=300000
refresh-token.expiration=604800000

# Static resource caching (1 day — browser won't re-download CSS/JS on every page)
spring.web.resources.cache.period=86400
spring.web.resources.cache.cachecontrol.max-age=86400

# File upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.profile-photos-dir=./uploads/profile-photos

# Spring AI / Anthropic
spring.ai.anthropic.chat.options.model=claude-sonnet-4-6
spring.ai.anthropic.chat.options.max-tokens=1024
spring.ai.anthropic.chat.options.temperature=0.7
