spring.application.name=ExperiMate
spring.profiles.active=local

# Database
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.jpa.open-in-view=false

# JWT
jwt.expiration=300000
refresh-token.expiration=604800000

# Static resource caching — content-hash fingerprinting means URL changes when file changes,
# so the browser always gets fresh JS/CSS after a deploy, even with long max-age
spring.web.resources.chain.enabled=true
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**
spring.web.resources.cache.period=86400

# Email tokens
verification-token.expiration=86400000
password-reset-token.expiration=3600000

# File upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.profile-photos-dir=./uploads/profile-photos
app.upload.partner-logos-dir=./uploads/partner-logos
app.upload.promoted-ad-images-dir=./uploads/promoted-ad-images

# Spring AI / Anthropic
spring.ai.anthropic.chat.options.model=claude-sonnet-4-6
spring.ai.anthropic.chat.options.max-tokens=1024
spring.ai.anthropic.chat.options.temperature=0.7
