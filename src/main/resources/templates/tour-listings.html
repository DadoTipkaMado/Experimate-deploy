<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Listings — Experimate</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        .listings-header {
            padding: 22px 18px 18px;
            border-bottom: 1px solid var(--border);
        }
        .listings-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 14px 18px 32px;
        }
        .listing-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: border-color var(--t-base), transform var(--t-base);
        }
        .listing-card:hover {
            border-color: var(--border-2);
            transform: translateY(-2px);
        }
        .listing-card--reserved {
            opacity: 0.5;
            pointer-events: none;
        }
        .listing-card__head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
        }
        .listing-card__city {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 17px;
            color: var(--text);
            letter-spacing: -0.01em;
        }
        .listing-card__date {
            font-size: 10px;
            color: var(--text-2);
            letter-spacing: 0.06em;
            white-space: nowrap;
            flex-shrink: 0;
            padding-top: 3px;
        }
        .listing-card__host {
            font-size: 10px;
            color: var(--accent);
            letter-spacing: 0.06em;
        }
        .listing-card__desc {
            font-size: 11px;
            color: rgba(239,239,239,0.55);
            line-height: 1.65;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .listing-card__foot {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .listing-card__status {
            font-size: 9px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-3);
        }
        .listing-card__status--available { color: var(--accent); }
.listings-empty {
            display: flex; flex-direction: column; align-items: center;
            padding: 60px 24px; gap: 12px; text-align: center;
        }
        .listings-empty__icon { font-size: 36px; opacity: 0.2; }
        .listings-empty__title { font-family: var(--font-display); font-weight: 700; font-size: 15px; color: var(--text-2); }
        .listings-empty__sub { font-size: 11px; color: var(--text-3); line-height: 1.6; max-width: 220px; }
    </style>
</head>
<body>
<div class="app-shell">

    <div th:replace="~{fragments/topbar :: topbar}"></div>

    <main class="page-content">
        <div class="listings-header">
            <div class="page-title">Experiences</div>
            <div class="page-subtitle">Find a local guide for your next adventure</div>
        </div>

        <div class="listings-list">

            <th:block th:if="${listings != null and !listings.isEmpty()}">
                <div th:each="listing : ${listings}"
                     th:classappend="${listing.reserved} ? ' listing-card--reserved'"
                     class="listing-card anim-fade-up"
                     th:attr="data-listing-id=${listing.id}">
                    <div class="listing-card__head">
                        <div>
                            <div class="listing-card__city" th:text="${listing.city}">City</div>
                            <div class="listing-card__host">
                                by <span th:text="${listing.host.firstName + ' ' + listing.host.lastName}">Host</span>
                                · @<span th:text="${listing.host.username}">username</span>
                            </div>
                        </div>
                        <div class="listing-card__date"
                             th:text="${#temporals.format(listing.meetingDate, 'dd MMM · HH:mm')}">
                            01 JAN · 10:00
                        </div>
                    </div>
                    <div class="listing-card__desc" th:text="${listing.tourDescription}">Description.</div>
                    <div class="listing-card__foot">
                        <div th:if="${listing.reserved}" class="listing-card__status">Already reserved</div>
                        <div th:unless="${listing.reserved}" class="listing-card__status listing-card__status--available">Available</div>
                        <button th:if="${!listing.reserved and currentUserId != null}"
                                class="btn btn--primary"
                                style="height: 36px; font-size: 10px;"
                                th:data-listing-id="${listing.id}"
                                th:data-guest-id="${currentUserId}"
                                onclick="reserveListing(this)">Reserve</button>
                        <div th:if="${!listing.reserved and currentUserId == null}"
                             class="listing-card__status">
                          <a th:href="@{/login}" style="color: var(--accent);">Login to reserve</a>
                        </div>
                    </div>
                </div>
            </th:block>

            <th:block th:unless="${listings != null and !listings.isEmpty()}">
                <div class="listings-empty">
                    <div class="listings-empty__icon">🗺️</div>
                    <div class="listings-empty__title">No listings yet</div>
                    <div class="listings-empty__sub">Be the first to create a tour listing and start hosting.</div>
                </div>
            </th:block>

        </div>
    </main>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/api.js}"></script>
<script>
    function reserveListing(btn) {
        const listingId = parseInt(btn.dataset.listingId, 10);
        const guestId   = parseInt(btn.dataset.guestId, 10);
        btn.disabled = true;
        ReservationAPI.create({ guestId, tourListingId: listingId })
            .then(() => {
                showToast('Reserved! Refresh to see updated status.');
                btn.textContent = 'Reserved';
                btn.classList.remove('btn--primary');
            })
            .catch(err => {
                showToast(err.message);
                btn.disabled = false;
            });
    }
</script>
</body>
</html>
