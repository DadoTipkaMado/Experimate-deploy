<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <title>Login — Experimate</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); }
    .auth-card {
      width: min(360px, 92vw);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      display: flex; flex-direction: column; gap: 20px;
    }
    .auth-logo { font-family: var(--font-display); font-weight: 800; font-size: 22px; color: var(--text); letter-spacing: -0.02em; }
    .auth-logo span { color: var(--accent); }
    .auth-title { font-family: var(--font-display); font-weight: 700; font-size: 17px; color: var(--text); }
    .auth-subtitle { font-size: 11px; color: var(--text-3); letter-spacing: 0.04em; margin-top: 4px; }
    .auth-field { display: flex; flex-direction: column; gap: 6px; }
    .auth-field label { font-size: 10px; color: var(--text-2); letter-spacing: 0.08em; text-transform: uppercase; }
    .auth-field input {
      background: var(--surface-2);
      border: 1px solid var(--border-2);
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      width: 100%; box-sizing: border-box;
      transition: border-color var(--t-fast);
    }
    .auth-field input:focus { outline: none; border-color: var(--accent-border); }
    .auth-error {
      background: rgba(255,80,80,0.08);
      border: 1px solid rgba(255,80,80,0.2);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 11px; color: rgba(255,100,100,0.9);
      letter-spacing: 0.03em;
    }
    .auth-footer { font-size: 11px; color: var(--text-3); text-align: center; }
    .auth-footer a { color: var(--accent); text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div>
      <div class="auth-logo">Experi<span>mate</span></div>
    </div>
    <div>
      <div class="auth-title">Welcome back</div>
      <div class="auth-subtitle">Sign in to continue</div>
    </div>

    <div id="auth-error" class="auth-error" style="display:none;"></div>

    <form id="login-form" style="display: flex; flex-direction: column; gap: 14px;">
      <div class="auth-field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required>
      </div>
      <div class="auth-field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn--primary" style="height: 44px; margin-top: 4px;">Sign in</button>
    </form>

    <div class="auth-footer">
      <a href="/forgot-password">Forgot password?</a>
    </div>
    <div class="auth-footer">
      Don't have an account? <a href="/register">Register</a>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const errorEl = document.getElementById('auth-error');
      errorEl.style.display = 'none';

      try {
        const res = await AuthAPI.login(
          document.getElementById('username').value,
          document.getElementById('password').value
        );
        Auth.saveToken(res.token);
        if (res.id) {
          Auth.saveUserId(res.id);
        } else {
          const users = await UserAPI.getAll();
          const me = users.find(u => u.username === Auth.getUsername());
          if (me) Auth.saveUserId(me.id);
        }
        window.location.href = '/map';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
