<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <title>Login — Experimate</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      height: unset !important;
      overflow: unset !important;
      background: #0a0a0a !important;
    }

    body {
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      min-height: 100vh !important;
      color: #efefef !important;
      color-scheme: dark;
    }

    /* ── Orb background ── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
      animation: drift linear infinite;
    }
    .orb-1 {
      width: 420px; height: 420px;
      background: #00c9a7;
      top: -120px; left: -100px;
      animation-duration: 18s;
    }
    .orb-2 {
      width: 320px; height: 320px;
      background: #ff6b35;
      bottom: -80px; right: -60px;
      animation-duration: 24s;
      animation-delay: -8s;
    }
    .orb-3 {
      width: 200px; height: 200px;
      background: #00c9a7;
      bottom: 30%; left: 10%;
      opacity: 0.08;
      animation-duration: 30s;
      animation-delay: -14s;
    }

    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); }
      33%  { transform: translate(30px, -20px) scale(1.05); }
      66%  { transform: translate(-20px, 30px) scale(0.97); }
      100% { transform: translate(0, 0) scale(1); }
    }

    /* ── Card ── */
    .auth-card {
      position: relative;
      width: min(380px, 92vw);
      background: rgba(20, 20, 20, 0.72);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid #222;
      border-radius: 20px;
      padding: 36px 32px;
      display: flex;
      flex-direction: column;
      gap: 22px;
      box-shadow: 0 0 0 1px rgba(0,201,167,0.06), 0 32px 64px rgba(0,0,0,0.5);
      animation: card-in 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes card-in {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Logo ── */
    .auth-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 30px;
      color: #efefef;
      letter-spacing: -0.03em;
    }
    .auth-logo span { color: #00c9a7; }

    .auth-tagline {
      font-size: 14px;
      color: #888;
      margin-top: 6px;
      letter-spacing: 0.01em;
    }

    /* ── Headings ── */
    .auth-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 20px;
      color: #efefef;
    }
    .auth-subtitle {
      font-size: 13px;
      color: #555;
      letter-spacing: 0.04em;
      margin-top: 4px;
    }

    /* ── Fields ── */
    .auth-field { display: flex; flex-direction: column; gap: 6px; }
    .auth-field label {
      font-size: 11px;
      color: #888;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .auth-field input {
      background: #1c1c1c;
      border: 1px solid #2e2e2e;
      border-radius: 8px;
      padding: 12px 14px;
      color: #efefef;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      width: 100%;
      transition: border-color 0.14s ease, box-shadow 0.14s ease;
    }
    .auth-field input:focus {
      outline: none;
      border-color: #00c9a7;
      box-shadow: 0 0 0 3px rgba(0,201,167,0.12);
    }

    /* ── Error ── */
    .auth-error {
      background: rgba(255,80,80,0.08);
      border: 1px solid rgba(255,80,80,0.2);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 11px;
      color: rgba(255,100,100,0.9);
      letter-spacing: 0.03em;
    }

    /* ── Button ── */
    .btn-signin {
      position: relative;
      height: 46px;
      margin-top: 4px;
      overflow: hidden;
      background: #00c9a7 !important;
      color: #000 !important;
    }
    .btn-signin::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      animation: shimmer 3s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%   { left: -100%; }
      50%  { left: 150%; }
      100% { left: 150%; }
    }

    /* ── Footer links ── */
    .auth-footer { font-size: 13px; color: #555; text-align: center; }
    .auth-footer a { color: #00c9a7; text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }

    /* ── Divider ── */
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #444;
      font-size: 11px;
      letter-spacing: 0.08em;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #222;
    }
  </style>
</head>
<body>
  <!-- Background orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="auth-card">
    <div>
      <div class="auth-logo">Experi<span>Mate</span></div>
      <div class="auth-tagline">meet locals. get experiences.</div>
    </div>

    <div>
      <div class="auth-title">Welcome back</div>
      <div class="auth-subtitle">Sign in to continue</div>
    </div>

    <div id="auth-error" class="auth-error" style="display:none;"></div>

    <form id="login-form" style="display: flex; flex-direction: column; gap: 14px;">
      <div class="auth-field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required>
      </div>
      <div class="auth-field">
        <label for="password">Password</label>
        <div style="position:relative;">
          <input type="password" id="password" name="password" autocomplete="current-password" required style="padding-right:42px;">
          <button type="button" id="pw-toggle" onclick="togglePw()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#555;padding:0;display:flex;">
            <svg id="pw-eye" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button type="submit" id="signin-btn" class="btn btn--primary btn-signin">Sign in</button>
    </form>

    <div class="auth-footer">
      <a href="/forgot-password">Forgot password?</a>
    </div>
    <div class="auth-footer">
      Don't have an account? <a href="/register">Register</a>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    function togglePw() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
      document.getElementById('pw-eye').style.opacity = input.type === 'text' ? '1' : '0.45';
    }

    // Auto-redirect if already logged in (or refresh token still valid)
    (async function () {
      // Don't auto-redirect after an explicit logout — prevents refresh-cookie loop
      if (sessionStorage.getItem('explicit_logout')) {
        sessionStorage.removeItem('explicit_logout');
        return;
      }
      // Try existing JWT first
      const userId = Auth.getUserId();
      if (userId && Auth.getToken()) {
        try {
          const result = await UserAPI.getById(userId);
          if (result) { window.location.href = '/map'; return; }
        } catch { /* fall through to refresh */ }
      }
      // No valid JWT — try refresh cookie
      try {
        const refreshRes = await fetch('/api/auth/refresh', { method: 'POST', credentials: 'include' });
        if (!refreshRes.ok) return;
        const { token } = await refreshRes.json();
        Auth.saveToken(token);
        const users = await UserAPI.getAll();
        const uid = users?.find(u => u.username === Auth.getUsername())?.id ?? null;
        if (uid) {
          Auth.saveUserId(uid);
          const me = await UserAPI.getById(uid).catch(() => null);
          if (me) {
            if (me.profilePhotoUrl) localStorage.setItem('photo_' + uid, UserAPI.photoUrl(me.profilePhotoUrl));
            else localStorage.removeItem('photo_' + uid);
            const initials = ((me.firstName?.[0] ?? '') + (me.lastName?.[0] ?? '')).toUpperCase() || me.username?.[0]?.toUpperCase() || '?';
            const hue = (me.username ?? '').split('').reduce((a, c) => a + c.charCodeAt(0), 0) % 360;
            localStorage.setItem('user_initials', initials);
            localStorage.setItem('user_hue', hue);
          }
        }
        window.location.href = '/map';
      } catch { /* stay on login */ }
    })();

    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const errorEl = document.getElementById('auth-error');
      const btn = document.getElementById('signin-btn');
      errorEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const res = await AuthAPI.login(
          document.getElementById('username').value,
          document.getElementById('password').value
        );
        Auth.saveToken(res.token);
        let uid = res.id || null;
        if (!uid) {
          const users = await UserAPI.getAll();
          uid = users?.find(u => u.username === Auth.getUsername())?.id ?? null;
        }
        if (uid) {
          Auth.saveUserId(uid);
          const me = await UserAPI.getById(uid).catch(() => null);
          if (me) {
            if (me.profilePhotoUrl) localStorage.setItem('photo_' + uid, UserAPI.photoUrl(me.profilePhotoUrl));
            else localStorage.removeItem('photo_' + uid);
            const initials = ((me.firstName?.[0] ?? '') + (me.lastName?.[0] ?? '')).toUpperCase() || me.username?.[0]?.toUpperCase() || '?';
            const hue = (me.username ?? '').split('').reduce((a, c) => a + c.charCodeAt(0), 0) % 360;
            localStorage.setItem('user_initials', initials);
            localStorage.setItem('user_hue', hue);
          }
        }
        btn.textContent = 'Welcome back ✓';
        window.location.href = '/map';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
