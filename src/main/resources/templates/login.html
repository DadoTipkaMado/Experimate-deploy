<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="robots" content="noindex, nofollow">
  <title>Login — Experimate</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      height: unset !important;
      overflow: unset !important;
      background: var(--bg, #0a0a0a) !important;
    }

    body {
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      min-height: 100vh !important;
      color: var(--text, #efefef) !important;
      color-scheme: dark;
    }

    /* ── Orb background ── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
      animation: drift linear infinite;
    }
    .orb-1 {
      width: 420px; height: 420px;
      background: var(--accent, #00c9a7);
      top: -120px; left: -100px;
      animation-duration: 18s;
    }
    .orb-2 {
      width: 320px; height: 320px;
      background: var(--warm, #ff6b35);
      bottom: -80px; right: -60px;
      animation-duration: 24s;
      animation-delay: -8s;
    }
    .orb-3 {
      width: 200px; height: 200px;
      background: var(--accent, #00c9a7);
      bottom: 30%; left: 10%;
      opacity: 0.08;
      animation-duration: 30s;
      animation-delay: -14s;
    }

    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); }
      33%  { transform: translate(30px, -20px) scale(1.05); }
      66%  { transform: translate(-20px, 30px) scale(0.97); }
      100% { transform: translate(0, 0) scale(1); }
    }

    /* ── Card ── */
    .auth-card {
      position: relative;
      width: min(380px, 92vw);
      background: linear-gradient(160deg, rgba(26,26,26,0.93) 0%, rgba(12,12,12,0.88) 100%);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border: 1px solid rgba(255,255,255,0.08);
      border-top-color: rgba(255,255,255,0.15);
      border-bottom-color: rgba(0,0,0,0.55);
      border-radius: 22px;
      padding: 36px 32px;
      display: flex;
      flex-direction: column;
      gap: 22px;
      box-shadow:
        inset 0 1.5px 0 rgba(255,255,255,0.13),
        inset 0 -1px 0 rgba(0,0,0,0.45),
        0 0 0 1px rgba(0,201,167,0.07),
        0 40px 80px rgba(0,0,0,0.65),
        0 12px 28px rgba(0,0,0,0.45);
      animation: card-in 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes card-in {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Logo ── */
    .auth-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 30px;
      color: var(--text, #efefef);
      letter-spacing: -0.03em;
    }
    .auth-logo span { color: var(--accent, #00c9a7); }

    .auth-tagline {
      font-size: 14px;
      color: var(--text-3, #999);
      margin-top: 6px;
      letter-spacing: 0.01em;
    }

    /* ── Headings ── */
    .auth-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 20px;
      color: var(--text, #efefef);
    }
    .auth-subtitle {
      font-size: 13px;
      color: var(--text-3, #777);
      letter-spacing: 0.04em;
      margin-top: 4px;
    }

    /* ── Fields ── */
    .auth-field { display: flex; flex-direction: column; gap: 6px; }
    .auth-field label {
      font-size: 11px;
      color: var(--text-3, #999);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .auth-field input {
      background: rgba(0,0,0,0.32);
      border: 1px solid rgba(255,255,255,0.07);
      border-top-color: rgba(0,0,0,0.45);
      border-bottom-color: rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 13px 16px;
      color: var(--text, #efefef);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      width: 100%;
      box-shadow: inset 0 1px 4px rgba(0,0,0,0.4);
      transition: border-color 0.14s ease, box-shadow 0.14s ease;
    }
    .auth-field input:focus {
      outline: none;
      border-color: rgba(0,201,167,0.5);
      border-top-color: rgba(0,201,167,0.3);
      box-shadow: inset 0 1px 4px rgba(0,0,0,0.25), 0 0 0 3px rgba(0,201,167,0.12);
    }

    /* ── Error ── */
    .auth-error {
      background: rgba(255,80,80,0.08);
      border: 1px solid rgba(255,80,80,0.2);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 11px;
      color: rgba(255,100,100,0.9);
      letter-spacing: 0.03em;
    }

    /* ── Button ── */
    .btn-signin {
      position: relative;
      height: 46px;
      margin-top: 4px;
      overflow: hidden;
      background: var(--accent, #00c9a7) !important;
      color: #000 !important;
    }
    .btn-signin::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      animation: shimmer 3s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%   { left: -100%; }
      50%  { left: 150%; }
      100% { left: 150%; }
    }

    /* ── Footer links ── */
    .auth-footer { font-size: 13px; color: var(--text-3, #777); text-align: center; }
    .auth-footer a { color: var(--accent, #00c9a7); text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }

    /* ── Divider ── */
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-3, #666);
      font-size: 11px;
      letter-spacing: 0.08em;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border, #222);
    }

    /* ── Google button ── */
    .btn-google {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      height: 46px; border-radius: var(--radius-pill, 999px);
      border: 1px solid var(--border-2, #2e2e2e);
      background: var(--surface, #1c1c1c); color: var(--text-2, #ccc);
      font-family: 'DM Mono', monospace; font-size: 13px; letter-spacing: 0.04em;
      cursor: pointer; transition: border-color 0.14s, opacity 0.14s; width: 100%;
    }
    .btn-google:hover { border-color: var(--accent, #00c9a7); }
    .btn-google:disabled { cursor: not-allowed; opacity: 0.4; }
  </style>
</head>
<body>
  <!-- Background orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="auth-card">
    <div>
      <div class="auth-logo">Experi<span>Mate</span></div>
      <div class="auth-tagline">meet locals. get experiences.</div>
    </div>

    <div>
      <div class="auth-title">Welcome back</div>
      <div class="auth-subtitle">Sign in to continue</div>
    </div>

    <div id="auth-error" class="auth-error" style="display:none;"></div>

    <form id="login-form" style="display: flex; flex-direction: column; gap: 14px;">
      <div class="auth-field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required>
      </div>
      <div class="auth-field">
        <label for="password">Password</label>
        <div style="position:relative;">
          <input type="password" id="password" name="password" autocomplete="current-password" required style="padding-right:42px;">
          <button type="button" id="pw-toggle" onclick="togglePw()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-3,#555);padding:0;display:flex;">
            <svg id="pw-eye" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button type="submit" id="signin-btn" class="btn btn--primary btn-signin">Sign in</button>
    </form>

    <div class="auth-divider">or</div>

    <button class="btn-google" id="google-btn" onclick="signInWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Sign in with Google
    </button>

    <div class="auth-footer">
      <a href="/forgot-password">Forgot password?</a>
    </div>
    <a href="/register" class="auth-register-link">
      New here? <strong style="color:var(--accent,#00c9a7);margin-left:5px;">Create an account →</strong>
    </a>
  </div>

  <script src="https://accounts.google.com/gsi/client" async></script>
  <script src="/js/api.js"></script>
  <script>
    let _googleClientId = null;
    fetch('/api/auth/google-client-id').then(r => r.ok ? r.text() : null).then(id => {
      _googleClientId = id ? id.trim().replace(/"/g, '') : null;
      if (!_googleClientId) document.getElementById('google-btn').disabled = true;
    }).catch(() => { document.getElementById('google-btn').disabled = true; });

    function signInWithGoogle() {
      if (!_googleClientId) return;
      const btn = document.getElementById('google-btn');
      btn.disabled = true;
      btn.textContent = 'Opening Google…';
      google.accounts.id.initialize({
        client_id: _googleClientId,
        callback: _handleGoogleCredential,
        auto_select: false,
      });
      google.accounts.id.prompt(notification => {
        if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
          google.accounts.id.renderButton(btn, { type: 'standard', theme: 'filled_black', size: 'large', width: 320 });
        }
      });
    }

    async function _handleGoogleCredential(response) {
      const errorEl = document.getElementById('auth-error');
      errorEl.style.display = 'none';
      try {
        const res = await fetch('/api/auth/google', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ idToken: response.credential }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Google sign-in failed.');
        if (data.status === 'LOGGED_IN') {
          Auth.saveToken(data.accessToken);
          window.location.href = '/map';
        } else if (data.status === 'REGISTRATION_REQUIRED') {
          sessionStorage.setItem('google_profile', JSON.stringify({
            ...data.googleProfile,
            idToken: response.credential,
          }));
          window.location.href = '/register?google=1';
        }
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
        const btn = document.getElementById('google-btn');
        btn.disabled = false;
        btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 48 48">…</svg> Continue with Google`;
      }
    }

    function togglePw() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
      document.getElementById('pw-eye').style.opacity = input.type === 'text' ? '1' : '0.45';
    }

    // Auto-redirect if already logged in (or refresh token still valid)
    (async function () {
      // Don't auto-redirect after an explicit logout — prevents refresh-cookie loop
      if (sessionStorage.getItem('explicit_logout')) {
        sessionStorage.removeItem('explicit_logout');
        return;
      }
      // Try existing JWT first
      const userId = Auth.getUserId();
      if (userId && Auth.getToken()) {
        try {
          const result = await UserAPI.getById(userId);
          if (result) {
            _cacheUser(result, userId);
            window.location.href = '/map';
            return;
          }
        } catch { /* fall through to refresh */ }
      }
      // No valid JWT — try refresh cookie
      try {
        const refreshRes = await fetch('/api/auth/refresh', { method: 'POST', credentials: 'include' });
        if (!refreshRes.ok) return;
        const { token } = await refreshRes.json();
        Auth.saveToken(token);
        const users = await UserAPI.getAll();
        const uid = users?.find(u => u.username === Auth.getUsername())?.id ?? null;
        if (uid) {
          Auth.saveUserId(uid);
          const me = await UserAPI.getById(uid).catch(() => null);
          if (me) _cacheUser(me, uid);
        }
        window.location.href = '/map';
      } catch { /* stay on login */ }
    })();

    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const errorEl = document.getElementById('auth-error');
      const btn = document.getElementById('signin-btn');
      errorEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const res = await AuthAPI.login(
          document.getElementById('username').value,
          document.getElementById('password').value
        );
        Auth.saveToken(res.token);
        let uid = res.id || null;
        if (!uid) {
          const users = await UserAPI.getAll();
          uid = users?.find(u => u.username === Auth.getUsername())?.id ?? null;
        }
        if (uid) {
          Auth.saveUserId(uid);
          const me = await UserAPI.getById(uid).catch(() => null);
          if (me) _cacheUser(me, uid);
        }
        btn.textContent = 'Welcome back ✓';
        window.location.href = '/map';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
