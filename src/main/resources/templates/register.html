<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="description" content="Join ExperiMate and start meeting locals or hosting experiences in your city.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Sign Up — ExperiMate">
  <meta property="og:description" content="Join ExperiMate and start meeting locals or hosting experiences in your city.">
  <meta property="og:image" content="/images/og-card.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <title>Register — Experimate</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" th:href="@{/icons/apple-touch-icon.png}">
  <style>

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      height: unset !important;
      overflow: unset !important;
      background: var(--bg, #0a0a0a) !important;
    }
    body {
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      min-height: 100vh !important;
      color: var(--text, #efefef) !important;
      color-scheme: dark;
      padding: 32px 0;
    }

    .orb { position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.24; pointer-events: none; animation: drift linear infinite; }
    .orb-1 { width: 500px; height: 500px; background: var(--accent, var(--accent)); top: -180px; right: -100px; animation-duration: 22s; }
    .orb-2 { width: 300px; height: 300px; background: var(--warm, var(--warm)); bottom: -60px; left: -60px; animation-duration: 28s; animation-delay: -10s; }
    .orb-3 { width: 180px; height: 180px; background: var(--warm, var(--warm)); top: 40%; right: -40px; opacity: 0.10; animation-duration: 34s; animation-delay: -18s; }
    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); }
      33%  { transform: translate(20px, -15px) scale(1.04); }
      66%  { transform: translate(-15px, 20px) scale(0.97); }
      100% { transform: translate(0, 0) scale(1); }
    }

    .auth-card {
      position: relative;
      width: min(400px, 92vw);
      background: linear-gradient(160deg, rgba(26,26,26,0.93) 0%, rgba(12,12,12,0.88) 100%);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border: 1px solid rgba(255,255,255,0.08);
      border-top-color: var(--accent-a25);
      border-bottom-color: rgba(0,0,0,0.55);
      border-radius: 22px;
      padding: 36px 32px;
      display: flex; flex-direction: column; gap: 20px;
      box-shadow:
        inset 0 1.5px 0 rgba(255,255,255,0.13),
        inset 0 -1px 0 rgba(0,0,0,0.45),
        0 0 0 1px var(--accent-a07),
        0 40px 80px rgba(0,0,0,0.65),
        0 12px 28px rgba(0,0,0,0.45);
      animation: card-in 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes card-in {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .auth-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 26px; color: var(--text, #efefef); letter-spacing: -0.03em; }
    .auth-logo span { color: var(--accent, var(--accent)); }
    .auth-tagline { font-size: 13px; color: var(--text-3, #666); margin-top: 5px; }
    .auth-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 19px; color: var(--text, #efefef); }
    .auth-subtitle { font-size: 13px; color: var(--text-3, #777); margin-top: 4px; }

    .auth-field { display: flex; flex-direction: column; gap: 6px; }
    .auth-field label { font-size: 11px; color: var(--text-3, #999); letter-spacing: 0.08em; text-transform: uppercase; }
    .auth-field input, .auth-field textarea {
      background: rgba(0,0,0,0.32);
      border: 1px solid rgba(255,255,255,0.07);
      border-top-color: rgba(0,0,0,0.45);
      border-bottom-color: rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 13px 16px;
      color: var(--text, #efefef);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      width: 100%;
      box-shadow: inset 0 1px 4px rgba(0,0,0,0.4);
      transition: border-color 0.14s ease, box-shadow 0.14s ease;
      color-scheme: dark;
    }
    .auth-field input:focus, .auth-field textarea:focus {
      outline: none;
      border-color: var(--accent-a50);
      border-top-color: var(--accent-a30);
      box-shadow: inset 0 1px 4px rgba(0,0,0,0.25), 0 0 0 3px var(--accent-a12);
    }
    .auth-field textarea { resize: vertical; min-height: 80px; line-height: 1.6; padding-right: 14px; }
    .auth-field__hint { font-size: 10px; color: var(--text-3, #666); letter-spacing: 0.03em; }
    .auth-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* Password strength */
    .pw-strength { display: flex; gap: 4px; margin-top: 2px; }
    .pw-strength__bar { flex: 1; height: 3px; border-radius: 2px; background: var(--border-2, #2e2e2e); transition: background 0.2s ease; }
    .pw-strength__bar--weak   { background: #ff4444; }
    .pw-strength__bar--fair   { background: #ff9944; }
    .pw-strength__bar--good   { background: #44bb44; }
    .pw-strength__bar--strong { background: var(--accent, var(--accent)); }
    .pw-strength__label { font-size: 10px; color: var(--text-3, #777); margin-top: 2px; letter-spacing: 0.04em; }

    /* Bio counter */
    .bio-counter { font-size: 10px; color: var(--text-3, #666); text-align: right; margin-top: 2px; }
    .bio-counter--warn { color: #ff9944; }

    .auth-error {
      background: rgba(255,80,80,0.08); border: 1px solid rgba(255,80,80,0.2);
      border-radius: 10px; padding: 10px 14px;
      font-size: 11px; color: rgba(255,100,100,0.9); letter-spacing: 0.03em;
    }

    .auth-footer { font-size: 13px; color: var(--text-3, #777); text-align: center; }
    .auth-footer a { color: var(--accent, var(--accent)); text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }

    .btn-register {
      position: relative;
      height: 46px; margin-top: 4px; overflow: hidden;
      background: var(--accent, var(--accent)) !important; color: #000 !important;
    }
    .btn-register::after {
      content: '';
      position: absolute;
      top: 0; left: -100%; width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      animation: shimmer 3s ease-in-out infinite;
    }
    @keyframes shimmer { 0% { left: -100%; } 50% { left: 150%; } 100% { left: 150%; } }
    .btn-register:disabled { opacity: 0.6; cursor: not-allowed; }

    .auth-field input.input--error { border-color: rgba(255,80,80,0.5) !important; box-shadow: 0 0 0 3px rgba(255,80,80,0.08) !important; }
    .field-error { font-size: 10px; color: rgba(255,100,100,0.85); margin-top: 3px; display: none; }
    .field-error--visible { display: block; }

    /* ── Divider ── */
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-3, #666);
      font-size: 11px;
      letter-spacing: 0.08em;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border, #222);
    }

    /* ── Google button ── */
    .btn-google {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      height: 46px; border-radius: var(--radius-pill, 999px);
      border: 1px solid var(--border-2, #2e2e2e);
      background: var(--surface, #1c1c1c); color: var(--text-2, #ccc);
      font-family: 'DM Mono', monospace; font-size: 13px; letter-spacing: 0.04em;
      cursor: pointer; transition: border-color 0.14s, opacity 0.14s; width: 100%;
    }
    .btn-google:hover { border-color: var(--accent, var(--accent)); }
    .btn-google:disabled { cursor: not-allowed; opacity: 0.4; }
    /* Google's real button, rendered transparent on top so the user's click
       lands on it directly (first-click OAuth) while our styled button shows. */
    .btn-google-wrap { position: relative; }
    .btn-google-overlay {
      position: absolute; inset: 0; overflow: hidden;
      opacity: 0; border-radius: var(--radius-pill, 999px);
    }
    .btn-google-overlay > div { transform: scale(2); transform-origin: top left; }

    /* ── Google sync modal ── */
    .gsync-backdrop {
      position: fixed; inset: 0; z-index: 9000;
      background: rgba(0,0,0,0.88); backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: center; padding: 20px;
      animation: gsync-in .22s ease;
    }
    @keyframes gsync-in { from { opacity: 0; } to { opacity: 1; } }
    .gsync-card {
      background: linear-gradient(160deg, rgba(22,22,22,0.97) 0%, rgba(10,10,10,0.95) 100%);
      border: 1px solid rgba(255,255,255,0.07);
      border-top: 2px solid var(--accent-a35);
      border-radius: 22px; padding: 28px 22px 22px;
      width: min(340px, 100%);
      box-shadow: 0 40px 80px rgba(0,0,0,0.85), 0 8px 24px rgba(0,0,0,0.5);
      animation: gsync-card-in .35s cubic-bezier(.16,1,.3,1);
    }
    @keyframes gsync-card-in { from { opacity: 0; transform: translateY(16px) scale(.97); } to { opacity: 1; transform: none; } }
    .gsync-avatar {
      width: 62px; height: 62px; border-radius: 50%; margin: 0 auto 16px;
      border: 2px solid var(--accent-a30); overflow: hidden;
      background: #1c1c1c; display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-family: 'Syne', sans-serif; font-weight: 800; color: var(--accent);
    }
    .gsync-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .gsync-title {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 17px;
      color: #f2f2f2; text-align: center; letter-spacing: -0.02em; margin-bottom: 4px;
    }
    .gsync-sub {
      font-size: 11px; color: rgba(239,239,239,0.4); text-align: center;
      font-family: 'DM Mono', monospace; letter-spacing: 0.04em; margin-bottom: 20px; line-height: 1.6;
    }
    .gsync-items { display: flex; flex-direction: column; gap: 7px; margin-bottom: 20px; }
    .gsync-item {
      display: flex; align-items: center; gap: 12px; cursor: pointer;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 11px; padding: 10px 12px;
      transition: background .12s, border-color .12s;
    }
    .gsync-item:has(input:checked) { background: var(--accent-a06); border-color: var(--accent-a22); }
    .gsync-item input[type="checkbox"] { width: 15px; height: 15px; accent-color: var(--accent); flex-shrink: 0; cursor: pointer; }
    .gsync-item__label { font-size: 10px; color: rgba(239,239,239,0.4); font-family: 'DM Mono', monospace; letter-spacing: 0.06em; text-transform: uppercase; min-width: 46px; }
    .gsync-item__value { font-size: 13px; color: #f2f2f2; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .gsync-btn {
      width: 100%; height: 46px; background: var(--accent); color: #000; border: none;
      border-radius: 40px; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 800;
      cursor: pointer; margin-bottom: 11px; transition: transform .1s, box-shadow .1s;
    }
    .gsync-btn:hover { transform: scale(1.02); box-shadow: 0 6px 20px var(--accent-a35); }
    .gsync-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; box-shadow: none; }
    .gsync-skip {
      width: 100%; background: none; border: none; cursor: pointer;
      color: rgba(239,239,239,0.28); font-size: 11px; letter-spacing: 0.08em;
      font-family: 'DM Mono', monospace; transition: color .14s;
    }
    .gsync-skip:hover { color: rgba(239,239,239,0.5); }
  </style>
</head>

<!-- Apply the saved theme before paint. Pre-auth pages have no shared
     topbar/navbar fragment, so they carry their own copy of the theme-init snippet. -->
<script>(function(){var m={'teal-light':'theme-light','warm-light':'theme-warm','warm-dark':'theme-warm-dark','light':'theme-light','warm':'theme-warm'};var c=m[localStorage.getItem('theme')||'warm-light'];if(c)document.body.classList.add(c);})();</script>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="auth-card">
    <div>
      <div class="auth-logo">Experi<span>Mate</span></div>
      <div class="auth-tagline">meet locals. get experiences.</div>
    </div>
    <div>
      <div class="auth-title">Create account</div>
      <div class="auth-subtitle">Join and start hosting experiences</div>
    </div>

    <div id="auth-error" class="auth-error" style="display:none;"></div>

    <form id="register-form" style="display: flex; flex-direction: column; gap: 14px;">

      <div class="auth-row">
        <div class="auth-field">
          <label for="firstName">First name</label>
          <input type="text" id="firstName" name="firstName" required>
          <span class="field-error" id="err-firstName">Required.</span>
        </div>
        <div class="auth-field">
          <label for="lastName">Last name</label>
          <input type="text" id="lastName" name="lastName" required>
          <span class="field-error" id="err-lastName">Required.</span>
        </div>
      </div>

      <div class="auth-field">
        <label for="dateOfBirth">Date of birth</label>
        <input type="text" id="dateOfBirth" name="dateOfBirth" placeholder="DD/MM/YYYY" autocomplete="off" required
          onclick="(function(el){const t=new Date();t.setFullYear(t.getFullYear()-18);t.setHours(0,0,0,0);DatePicker.open(el,{max:t});})(this)">
        <span class="auth-field__hint">Type or click to pick · Must be 18 or older</span>
        <span class="field-error" id="err-dob"></span>
      </div>

      <div class="auth-field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" placeholder="your@email.com" required>
        <span class="auth-field__hint">Used for account verification and recovery</span>
        <span class="field-error" id="err-email"></span>
      </div>

      <div class="auth-field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" minlength="4" maxlength="15" autocomplete="username" required>
        <span class="auth-field__hint">4–15 characters</span>
        <span class="field-error" id="err-username"></span>
      </div>

      <div class="auth-field">
        <label for="password">Password</label>
        <div style="position:relative;">
          <input type="password" id="password" name="password" autocomplete="new-password" required style="padding-right:42px;" oninput="updateStrength(this.value)">
          <button type="button" onclick="togglePw('password','eye1')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-3,#555);padding:0;display:flex;">
            <svg id="eye1" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="opacity:0.45"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="pw-strength">
          <div class="pw-strength__bar" id="s1"></div>
          <div class="pw-strength__bar" id="s2"></div>
          <div class="pw-strength__bar" id="s3"></div>
          <div class="pw-strength__bar" id="s4"></div>
        </div>
        <span class="pw-strength__label" id="pw-label"></span>
      </div>

      <div class="auth-field">
        <label for="confirmPassword">Confirm password</label>
        <div style="position:relative;">
          <input type="password" id="confirmPassword" name="confirmPassword" autocomplete="new-password" required style="padding-right:42px;">
          <button type="button" onclick="togglePw('confirmPassword','eye2')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#555;padding:0;display:flex;">
            <svg id="eye2" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="opacity:0.45"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <span class="field-error" id="err-confirm">Passwords don't match.</span>
      </div>

      <button type="submit" id="register-btn" class="btn btn--primary btn-register">Create account</button>
    </form>

    <div class="auth-divider">or</div>

    <div class="btn-google-wrap">
      <button class="btn-google" id="google-btn" type="button" tabindex="-1" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continue with Google
      </button>
      <div class="btn-google-overlay" id="google-overlay"></div>
    </div>

    <div class="auth-footer">
      Already have an account? <a href="/login">Sign in</a>
    </div>
  </div>

  <script>
    function fieldErr(errId, inputEl, msg) {
      const err = document.getElementById(errId);
      if (msg) {
        err.textContent = msg;
        err.classList.add('field-error--visible');
        inputEl.classList.add('input--error');
      } else {
        err.classList.remove('field-error--visible');
        inputEl.classList.remove('input--error');
      }
    }

    function togglePw(inputId, eyeId) {
      const input = document.getElementById(inputId);
      input.type = input.type === 'password' ? 'text' : 'password';
      document.getElementById(eyeId).style.opacity = input.type === 'text' ? '1' : '0.45';
    }

    function updateStrength(val) {
      const bars = ['s1','s2','s3','s4'].map(id => document.getElementById(id));
      const label = document.getElementById('pw-label');
      bars.forEach(b => b.className = 'pw-strength__bar');
      if (!val) { label.textContent = ''; return; }
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const levels = ['weak','fair','good','strong'];
      const labels = ['Weak','Fair','Good','Strong'];
      for (let i = 0; i < score; i++) bars[i].classList.add('pw-strength__bar--' + levels[score - 1]);
      label.textContent = score > 0 ? labels[score - 1] : '';
      label.style.color = ['#ff4444','#ff9944','#44bb44','var(--accent)'][score - 1] || '#555';
    }

    document.addEventListener('DOMContentLoaded', () => {
      // ── Inline blur validation ──
      document.getElementById('firstName').addEventListener('blur', function() {
        fieldErr('err-firstName', this, this.value.trim() ? null : 'Required.');
      });
      document.getElementById('lastName').addEventListener('blur', function() {
        fieldErr('err-lastName', this, this.value.trim() ? null : 'Required.');
      });
      document.getElementById('username').addEventListener('blur', function() {
        const v = this.value.trim();
        fieldErr('err-username', this, v.length < 4 ? 'At least 4 characters.' : v.length > 15 ? 'Max 15 characters.' : null);
      });
      document.getElementById('username').addEventListener('input', function() {
        fieldErr('err-username', this, null);
      });
      (function() {
        const dob = document.getElementById('dateOfBirth');
        dob.addEventListener('change', function() {
          const val = this.value.trim();
          if (!val) { fieldErr('err-dob', this, 'Required.'); return; }
          const parts = val.split('/');
          if (parts.length !== 3 || parts[2].length !== 4) { fieldErr('err-dob', this, 'Use DD/MM/YYYY.'); return; }
          const d = new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
          if (isNaN(d.getTime())) { fieldErr('err-dob', this, 'Invalid date.'); return; }
          const today = new Date();
          let age = today.getFullYear() - d.getFullYear();
          const mn = today.getMonth() - d.getMonth();
          if (mn < 0 || (mn === 0 && today.getDate() < d.getDate())) age--;
          fieldErr('err-dob', this, age < 18 ? 'You must be 18 or older.' : null);
        });
      })();
      document.getElementById('confirmPassword').addEventListener('blur', function() {
        const match = this.value === document.getElementById('password').value;
        fieldErr('err-confirm', this, match || !this.value ? null : "Passwords don't match.");
      });
      document.getElementById('confirmPassword').addEventListener('input', function() {
        if (!this.value) return;
        const match = this.value === document.getElementById('password').value;
        fieldErr('err-confirm', this, match ? null : "Passwords don't match.");
      });

      document.getElementById('register-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const errorEl = document.getElementById('auth-error');
        const btn = document.getElementById('register-btn');
        errorEl.style.display = 'none';

        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        if (password !== confirmPassword) {
          errorEl.textContent = 'Passwords do not match';
          errorEl.style.display = 'block';
          return;
        }

        const dobRaw = document.getElementById('dateOfBirth').value.trim();
        const dobParts = dobRaw.split('/');
        if (dobParts.length !== 3 || dobParts[2].length !== 4 || dobParts.some(p => !p)) {
          errorEl.textContent = 'Please enter your date of birth in DD/MM/YYYY format.';
          errorEl.style.display = 'block';
          document.getElementById('dateOfBirth').focus();
          return;
        }
        const [dd, mm, yyyy] = dobParts;
        const dob = `${yyyy}-${mm.padStart(2,'0')}-${dd.padStart(2,'0')}`;
        const birthDate = new Date(parseInt(yyyy), parseInt(mm) - 1, parseInt(dd));
        const today = new Date();
        let age = today.getFullYear() - birthDate.getFullYear();
        const m = today.getMonth() - birthDate.getMonth();
        if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) age--;
        if (age < 18) {
          errorEl.textContent = 'You must be 18 or older to register.';
          errorEl.style.display = 'block';
          return;
        }

        const username = document.getElementById('username').value;
        btn.disabled = true;
        btn.textContent = 'Creating account...';

        try {
          await UserAPI.create({
            firstName: document.getElementById('firstName').value,
            lastName: document.getElementById('lastName').value,
            dateOfBirth: dob,
            idNumber: crypto.randomUUID(), // TODO: remove when backend makes idNumber optional or generates it server-side
            username,
            password,
            email: document.getElementById('email').value.trim(),
          });
          // Account created — now auto-login. A 403 here means email not yet verified.
          let loginRes;
          try {
            loginRes = await AuthAPI.login(username, password);
          } catch (loginErr) {
            if ((loginErr.message || '').toLowerCase().includes('verif')) {
              window.location.href = '/login?pending_verification=1';
              return;
            }
            throw loginErr;
          }
          Auth.saveToken(loginRes.token);
          const users = await UserAPI.getAll();
          const me = users.find(u => u.username === Auth.getUsername());
          if (me) {
            Auth.saveUserId(me.id);
            const fn = document.getElementById('firstName').value;
            const ln = document.getElementById('lastName').value;
            const initials = ((fn[0] ?? '') + (ln[0] ?? '')).toUpperCase();
            const hue = username.split('').reduce((a, c) => a + c.charCodeAt(0), 0) % 360;
            localStorage.setItem('user_initials', initials);
            localStorage.setItem('user_hue', hue);
          }
          btn.textContent = 'Welcome ✓';
          window.location.href = '/onboarding';
        } catch (err) {
          errorEl.textContent = err.message || 'Something went wrong — please try again.';
          errorEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Create account';
        }
      });

      // Pre-fill from Google profile if coming from Google sign-in flow
      const googleProfile = sessionStorage.getItem('google_profile');
      if (googleProfile) {
        try {
          const p = JSON.parse(googleProfile);
          if (p.firstName) document.getElementById('firstName').value = p.firstName;
          if (p.lastName)  document.getElementById('lastName').value  = p.lastName;
          if (p.email)     document.getElementById('email').value     = p.email;
        } catch (_) {}
      }
    });
  </script>

  <!-- ── Google sign-up (mirrors /login) ───────────────────────────── -->
  <script>
    // Reusable button content so resets don't lose the Google icon.
    const GOOGLE_BTN_HTML =
      `<svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg> Continue with Google`;

    // Google sign-in returns an ID token, which the only GIS API that opens the
    // account chooser on the FIRST click is renderButton (One Tap / prompt() is
    // routinely suppressed, which is what forced the old double-click). So we
    // render Google's real button and overlay it, transparent, on top of our
    // styled button — the user's click lands on Google's button directly.
    // Init must run once both the async GSI script and the client id are ready;
    // _maybeInitGoogle fires from whichever lands last and is idempotent.
    let _googleClientId = null;
    let _googleReady    = false;
    function _maybeInitGoogle() {
      if (_googleReady || !_googleClientId || !window.google?.accounts?.id) return;
      _googleReady = true;
      google.accounts.id.initialize({
        client_id: _googleClientId,
        callback: _handleGoogleCredential,
        auto_select: false,
        use_fedcm_for_prompt: true,
      });
      google.accounts.id.renderButton(document.getElementById('google-overlay'),
        { type: 'standard', theme: 'outline', size: 'large', width: 360 });
    }
    window.onGoogleLibraryLoad = _maybeInitGoogle;
    fetch('/api/auth/google-client-id').then(r => r.ok ? r.text() : null).then(id => {
      _googleClientId = id ? id.trim().replace(/"/g, '') : null;
      if (!_googleClientId) document.getElementById('google-btn').disabled = true;
      else _maybeInitGoogle();
    }).catch(() => { document.getElementById('google-btn').disabled = true; });

    function _decodeGoogleToken(token) {
      try { return JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/'))); }
      catch { return {}; }
    }

    // Offer to copy name + photo from Google into the freshly logged-in account.
    function _showGoogleSyncModal(idToken) {
      const gp        = _decodeGoogleToken(idToken);
      const firstName = gp.given_name  || '';
      const lastName  = gp.family_name || '';
      const picture   = gp.picture ? gp.picture.replace(/=s\d+-c/, '=s256-c') : null;

      if (!firstName && !lastName && !picture) { enterApp(); return; }

      const initials  = ((firstName[0] || '') + (lastName[0] || '')).toUpperCase() || 'G';
      const avatarHtml = picture
        ? `<img src="${picture}" alt="" onerror="this.style.display='none';this.parentElement.textContent='${initials}'">`
        : initials;

      const items = [];
      if (firstName || lastName) items.push(`
        <label class="gsync-item">
          <input type="checkbox" id="gsync-name" checked>
          <span class="gsync-item__label">Name</span>
          <span class="gsync-item__value">${[firstName, lastName].filter(Boolean).join(' ')}</span>
        </label>`);
      if (picture) items.push(`
        <label class="gsync-item">
          <input type="checkbox" id="gsync-photo" checked>
          <span class="gsync-item__label">Photo</span>
          <span class="gsync-item__value">Google profile photo</span>
        </label>`);

      const backdrop = document.createElement('div');
      backdrop.className = 'gsync-backdrop';
      backdrop.innerHTML = `
        <div class="gsync-card">
          <div class="gsync-avatar">${avatarHtml}</div>
          <div class="gsync-title">Sync Google profile?</div>
          <div class="gsync-sub">Update your ExperiMate profile<br>with your Google account data</div>
          <div class="gsync-items">${items.join('')}</div>
          <button class="gsync-btn" id="gsync-confirm">Sync selected</button>
          <button class="gsync-skip" id="gsync-skip">Skip for now</button>
        </div>`;
      document.body.appendChild(backdrop);

      backdrop.querySelector('#gsync-skip').addEventListener('click', () => {
        backdrop.remove(); enterApp();
      });

      backdrop.querySelector('#gsync-confirm').addEventListener('click', async () => {
        const btn = backdrop.querySelector('#gsync-confirm');
        btn.disabled = true; btn.textContent = 'Syncing…';
        const syncName  = backdrop.querySelector('#gsync-name')?.checked;
        const syncPhoto = backdrop.querySelector('#gsync-photo')?.checked;
        try {
          const user   = await UserAPI.getByUsername(Auth.getUsername());
          const userId = user.id;
          Auth.saveUserId(userId);
          if (syncName && (firstName || lastName)) {
            await UserAPI.update(userId, {
              firstName: firstName || user.firstName,
              lastName:  lastName  || user.lastName,
              username:  user.username,
              bio:       user.bio || null,
            });
          }
          if (syncPhoto && picture) {
            try {
              const blob    = await fetch(picture).then(r => r.blob());
              const updated = await UserAPI.uploadPhoto(userId, blob);
              if (updated?.profilePhotoUrl) localStorage.setItem('photo_' + userId, UserAPI.photoUrl(updated.profilePhotoUrl));
            } catch (_) {}
          }
        } catch (_) {}
        enterApp();
      });
    }

    async function _handleGoogleCredential(response) {
      const errorEl = document.getElementById('auth-error');
      errorEl.style.display = 'none';
      try {
        const res = await fetch('/api/auth/google', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ idToken: response.credential }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Google sign-in failed.');
        if (data.status === 'LOGGED_IN') {
          // Account already exists — log straight in, same as the login screen.
          Auth.saveToken(data.accessToken);
          if (typeof Notification !== 'undefined' && Notification.permission === 'default') {
            Notification.requestPermission().then(p => { if (p === 'granted' && typeof subscribeToPush === 'function') subscribeToPush(); });
          }
          _showGoogleSyncModal(response.credential);
        } else if (data.status === 'REGISTRATION_REQUIRED') {
          // New user — pre-fill the form in place so they finish signing up here.
          const p = data.googleProfile || {};
          if (p.firstName) document.getElementById('firstName').value = p.firstName;
          if (p.lastName)  document.getElementById('lastName').value  = p.lastName;
          if (p.email)     document.getElementById('email').value     = p.email;
          const btn = document.getElementById('google-btn');
          btn.disabled = false;
          btn.innerHTML = GOOGLE_BTN_HTML;
          document.getElementById('dateOfBirth').focus();
          if (typeof showToast === 'function') showToast('Google connected — just fill in the rest to finish.', 'success');
        }
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
        const btn = document.getElementById('google-btn');
        btn.disabled = false;
        btn.innerHTML = GOOGLE_BTN_HTML;
      }
    }
  </script>
