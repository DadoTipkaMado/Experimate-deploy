<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="description" content="Join the ExperiMate community. Connect with travellers and locals, share experiences, and discover what's happening near you.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Community — ExperiMate">
  <meta property="og:description" content="Connect with travellers and locals, share experiences, and discover what's happening near you.">
  <meta property="og:image" content="/icons/icon.svg">
  <title>Community — Experimate</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <style>
    /* ── Search header ── */
    .cm-header {
      position: sticky; top: 0; z-index: 10;
      background: var(--bg); border-bottom: 1px solid var(--border);
      padding: 14px 16px 12px;
    }
    .cm-header__title { font-family: var(--font-display); font-weight: 800; font-size: 22px; color: var(--text); letter-spacing: -0.02em; margin-bottom: 10px; }
    .cm-search {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface); border: 1px solid var(--border-2);
      border-radius: var(--radius-pill); padding: 0 16px; height: 42px;
      transition: border-color 0.14s, box-shadow 0.14s;
    }
    .cm-search:focus-within { border-color: var(--accent-border); box-shadow: 0 0 0 3px rgba(0,201,167,0.1); }
    .cm-search input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-size: 14px; font-family: inherit;
    }
    .cm-search input::placeholder { color: var(--text-3); }

    /* ── Section label ── */
    .cm-section {
      padding: 18px 16px 8px;
      font-size: 10px; color: var(--text-3); letter-spacing: 0.1em; text-transform: uppercase;
      display: flex; align-items: center; gap: 10px;
    }
    .cm-section::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── User list ── */
    .cm-list { padding: 0 16px; display: flex; flex-direction: column; gap: 2px; }

    /* ── User card ── */
    .cm-card {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 14px; border-radius: var(--radius);
      cursor: pointer; transition: background 0.12s;
      text-decoration: none; color: inherit;
      position: relative;
    }
    .cm-card:hover { background: var(--surface); }
    .cm-card:active { background: var(--surface-2); }

    .cm-card__avatar {
      width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0;
      overflow: hidden; position: relative;
    }
    .cm-card__avatar img { width: 100%; height: 100%; object-fit: cover; }

    .cm-card__info { flex: 1; min-width: 0; }
    .cm-card__name {
      font-family: var(--font-display); font-weight: 700; font-size: 14px;
      color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .cm-card__handle { font-size: 12px; color: var(--text-3); margin-top: 1px; }
    .cm-card__bio {
      font-size: 11px; color: var(--text-2); margin-top: 3px; line-height: 1.4;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .cm-card__rating {
      font-size: 11px; color: var(--accent); font-family: var(--font-mono);
      letter-spacing: 0.04em; flex-shrink: 0;
    }

    .cm-card__heart {
      width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer;
      color: var(--text-3); transition: color 0.14s, background 0.14s;
    }
    .cm-card__heart:hover { background: var(--surface-2); }
    .cm-card__heart--active { color: #ff4d6d; }
    .cm-card__heart svg { pointer-events: none; }

    /* ── Liked row (horizontal scroll) ── */
    .cm-liked-row {
      display: flex; gap: 16px; padding: 4px 16px 8px;
      overflow-x: auto; scrollbar-width: none;
    }
    .cm-liked-row::-webkit-scrollbar { display: none; }

    .cm-liked-chip {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      flex-shrink: 0; cursor: pointer; text-decoration: none;
    }
    .cm-liked-chip__ring {
      width: 58px; height: 58px; border-radius: 50%; padding: 2px;
      background: linear-gradient(135deg, var(--accent), var(--warm));
    }
    .cm-liked-chip__inner {
      width: 100%; height: 100%; border-radius: 50%; overflow: hidden;
      border: 2px solid var(--bg);
    }
    .cm-liked-chip__inner img { width: 100%; height: 100%; object-fit: cover; }
    .cm-liked-chip__name {
      font-size: 10px; color: var(--text-2); text-align: center;
      white-space: nowrap; max-width: 62px; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── Empty states ── */
    .cm-empty {
      text-align: center; padding: 40px 24px;
      color: var(--text-3); font-size: 13px; line-height: 1.6;
    }
    .cm-empty__icon { font-size: 32px; margin-bottom: 10px; opacity: 0.4; }

    /* ── Skeleton ── */
    .cm-skeleton-card {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 14px;
    }
  </style>
</head>
<body>
<div class="app-shell">
  <div th:replace="~{fragments/topbar :: topbar}"></div>

  <main class="page-content">

    <div class="cm-header">
      <div class="cm-header__title">Community</div>
      <div class="cm-search">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="cm-search-input" placeholder="Search people..." autocomplete="off" autocorrect="off">
      </div>
    </div>

    <!-- Liked users -->
    <div id="cm-liked-section" style="display:none;">
      <div class="cm-section">Liked</div>
      <div class="cm-liked-row" id="cm-liked-row"></div>
    </div>

    <!-- Results -->
    <div id="cm-results-section">
      <div class="cm-section" id="cm-results-label">People</div>
      <div class="cm-list" id="cm-list">
        <!-- skeletons -->
        <div class="cm-skeleton-card">
          <div class="skeleton" style="width:52px;height:52px;border-radius:50%;flex-shrink:0;"></div>
          <div style="flex:1;display:flex;flex-direction:column;gap:6px;">
            <div class="skeleton skeleton-line" style="width:40%;height:13px;"></div>
            <div class="skeleton skeleton-line" style="width:55%;height:11px;"></div>
          </div>
        </div>
        <div class="cm-skeleton-card">
          <div class="skeleton" style="width:52px;height:52px;border-radius:50%;flex-shrink:0;"></div>
          <div style="flex:1;display:flex;flex-direction:column;gap:6px;">
            <div class="skeleton skeleton-line" style="width:50%;height:13px;"></div>
            <div class="skeleton skeleton-line" style="width:35%;height:11px;"></div>
          </div>
        </div>
        <div class="cm-skeleton-card">
          <div class="skeleton" style="width:52px;height:52px;border-radius:50%;flex-shrink:0;"></div>
          <div style="flex:1;display:flex;flex-direction:column;gap:6px;">
            <div class="skeleton skeleton-line" style="width:45%;height:13px;"></div>
            <div class="skeleton skeleton-line" style="width:60%;height:11px;"></div>
          </div>
        </div>
      </div>
    </div>

  </main>

  <div th:replace="~{fragments/navbar :: navbar}"></div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/api.js}"></script>
<script>
(function() {
  let _allUsers  = [];
  let _liked     = new Set(JSON.parse(localStorage.getItem('liked_users') || '[]'));
  let _myUsername = typeof Auth !== 'undefined' ? Auth.getUsername() : null;

  const searchInput  = document.getElementById('cm-search-input');
  const listEl       = document.getElementById('cm-list');
  const labelEl      = document.getElementById('cm-results-label');
  const likedSection = document.getElementById('cm-liked-section');
  const likedRow     = document.getElementById('cm-liked-row');

  function saveLiked() {
    localStorage.setItem('liked_users', JSON.stringify([..._liked]));
  }

  function toggleLike(username, btn) {
    if (_liked.has(username)) {
      _liked.delete(username);
      btn.classList.remove('cm-card__heart--active');
      btn.querySelector('svg').setAttribute('fill', 'none');
    } else {
      _liked.add(username);
      btn.classList.add('cm-card__heart--active');
      btn.querySelector('svg').setAttribute('fill', 'currentColor');
    }
    saveLiked();
    renderLiked();
  }

  function heartSvg(filled) {
    return `<svg width="16" height="16" viewBox="0 0 24 24" fill="${filled ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
  }

  function avatarHtml(user, size) {
    if (typeof userAvatar === 'function') return userAvatar(user.username, size, user);
    const initials = ((user.firstName?.[0] ?? '') + (user.lastName?.[0] ?? '')).toUpperCase() || user.username?.[0]?.toUpperCase() || '?';
    const hue = (user.username || '').split('').reduce((a, c) => a + c.charCodeAt(0), 0) % 360;
    return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:hsl(${hue},55%,32%);display:flex;align-items:center;justify-content:center;font-size:${Math.round(size*0.35)}px;font-weight:700;color:#fff;font-family:var(--font-display);">${initials}</div>`;
  }

  function renderCard(user) {
    const isLiked = _liked.has(user.username);
    const rating  = user.rating > 0 ? `★ ${user.rating.toFixed(1)}` : '';
    const div = document.createElement('div');
    div.className = 'cm-card';
    div.innerHTML = `
      <div class="cm-card__avatar">${avatarHtml(user, 52)}</div>
      <div class="cm-card__info">
        <div class="cm-card__name">${escapeHtml(user.firstName + ' ' + user.lastName)}</div>
        <div class="cm-card__handle">@${escapeHtml(user.username)}${rating ? ` · <span style="color:var(--accent)">${rating}</span>` : ''}</div>
        ${user.bio ? `<div class="cm-card__bio">${escapeHtml(user.bio)}</div>` : ''}
      </div>
      <button class="cm-card__heart${isLiked ? ' cm-card__heart--active' : ''}" title="${isLiked ? 'Unlike' : 'Like'}" data-username="${escapeHtml(user.username)}">${heartSvg(isLiked)}</button>
    `;
    div.querySelector('.cm-card__heart').addEventListener('click', function(e) {
      e.preventDefault(); e.stopPropagation();
      toggleLike(user.username, this);
    });
    div.addEventListener('click', () => { window.location.href = `/profile/${encodeURIComponent(user.username)}`; });
    return div;
  }

  function renderLiked() {
    const likedUsers = _allUsers.filter(u => _liked.has(u.username));
    if (likedUsers.length === 0) { likedSection.style.display = 'none'; return; }
    likedSection.style.display = '';
    likedRow.innerHTML = likedUsers.map(u => `
      <a class="cm-liked-chip" href="/profile/${encodeURIComponent(u.username)}">
        <div class="cm-liked-chip__ring">
          <div class="cm-liked-chip__inner">${avatarHtml(u, 54)}</div>
        </div>
        <div class="cm-liked-chip__name">${escapeHtml(u.firstName)}</div>
      </a>
    `).join('');
  }

  function renderList(users) {
    listEl.innerHTML = '';
    if (users.length === 0) {
      listEl.innerHTML = `<div class="cm-empty"><div class="cm-empty__icon">🔍</div>No people found.</div>`;
      return;
    }
    users.forEach(u => listEl.appendChild(renderCard(u)));
  }

  function filter(query) {
    const q = query.trim().toLowerCase();
    if (!q) {
      labelEl.textContent = 'People';
      renderList(_allUsers);
      return;
    }
    const results = _allUsers.filter(u =>
      (u.firstName + ' ' + u.lastName).toLowerCase().includes(q) ||
      u.username.toLowerCase().includes(q) ||
      (u.bio || '').toLowerCase().includes(q)
    );
    labelEl.textContent = `Results for "${query.trim()}"`;
    renderList(results);
  }

  searchInput.addEventListener('input', function() { filter(this.value); });

  UserAPI.getAll().then(users => {
    _allUsers = (users || []).filter(u => u.username !== _myUsername);
    renderList(_allUsers);
    renderLiked();
  }).catch(() => {
    listEl.innerHTML = `<div class="cm-empty"><div class="cm-empty__icon">⚠️</div>Could not load people — check your connection.</div>`;
  });
})();
</script>
</body>
</html>
