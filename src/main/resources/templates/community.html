<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <title>Community — Experimate</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    .community-header { padding: 22px 18px 18px; border-bottom: 1px solid var(--border); }
    .community-soon {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 80px 32px; gap: 14px; text-align: center;
    }
    .community-soon__icon { font-size: 40px; opacity: 0.2; }
    .community-soon__title { font-family: var(--font-display); font-weight: 700; font-size: 16px; color: var(--text-2); }
    .community-soon__sub { font-size: 11px; color: var(--text-3); line-height: 1.7; max-width: 240px; }
  </style>
</head>
<body>
<div class="app-shell">

  <div th:replace="~{fragments/topbar :: topbar}"></div>

  <main class="page-content">
    <div class="community-header">
      <div class="page-title">Community</div>
      <div class="page-subtitle">Connect with people who share your interests</div>
    </div>

    <div class="community-soon">
      <div class="community-soon__icon">🏘️</div>
      <div class="community-soon__title">Communities coming soon</div>
      <div class="community-soon__sub">Join interest-based groups, discover local events, and meet like-minded travellers.</div>
    </div>
  </main>

  <div th:replace="~{fragments/navbar :: navbar}"></div>

</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
