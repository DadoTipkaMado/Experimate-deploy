<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <title>Edit Profile — Experimate</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <style>
    .edit-header { padding: 22px 18px 18px; border-bottom: 1px solid var(--border); }
    .edit-form { display: flex; flex-direction: column; gap: 18px; padding: 20px 18px 40px; }
    .form-field { display: flex; flex-direction: column; gap: 7px; }
    .form-field label { font-size: 10px; color: var(--text-2); letter-spacing: 0.08em; text-transform: uppercase; }
    .form-field input, .form-field textarea {
      background: var(--surface);
      border: 1px solid var(--border-2);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      width: 100%; box-sizing: border-box;
      transition: border-color var(--t-fast);
    }
    .form-field input:focus, .form-field textarea:focus { outline: none; border-color: var(--accent-border); }
    .form-field textarea { resize: vertical; min-height: 100px; line-height: 1.65; }
    .form-field__hint { font-size: 9px; color: var(--text-3); letter-spacing: 0.04em; }
    .form-divider { border: none; border-top: 1px solid var(--border); margin: 4px 0; }
    .form-error {
      background: rgba(255,80,80,0.08);
      border: 1px solid rgba(255,80,80,0.2);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 11px; color: rgba(255,100,100,0.9);
    }
    .form-actions { display: flex; gap: 10px; }
    .form-actions .btn { flex: 1; height: 46px; }
    .photo-picker { display: flex; flex-direction: column; gap: 10px; }
    .photo-picker__preview { width: 76px; height: 76px; border-radius: 50%; background: var(--surface-2); border: 2px dashed var(--border-2); display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; transition: border-color var(--t-fast); position: relative; }
    .photo-picker__preview:hover { border-color: var(--accent-border); }
    .photo-picker__preview img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .photo-picker__label { font-size: 11px; color: var(--accent); cursor: pointer; letter-spacing: 0.04em; }
    .photo-picker__label:hover { text-decoration: underline; }
    .photo-picker__remove { font-size: 10px; color: rgba(255,80,80,0.6); cursor: pointer; letter-spacing: 0.04em; display: none; }
    .photo-picker__remove:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="app-shell">

  <div th:replace="~{fragments/topbar :: topbar}"></div>

  <main class="page-content">
    <div class="edit-header">
      <div class="page-title">Edit Profile</div>
      <div class="page-subtitle">Update your username, photo, or bio</div>
    </div>

    <form id="edit-form" class="edit-form">

      <div id="form-error" class="form-error" style="display:none;"></div>

      <div class="form-field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username"
               minlength="4" maxlength="15" autocomplete="username" required>
        <span class="form-field__hint">4–15 characters</span>
      </div>

      <div class="form-field">
        <label for="bio">Bio <span style="color: var(--text-3);">(optional)</span></label>
        <textarea id="bio" name="bio" maxlength="200"
                  placeholder="Tell other travellers about yourself..."></textarea>
        <span class="form-field__hint">Max 200 characters</span>
      </div>

      <div class="form-field">
        <label>Profile photo <span style="color: var(--text-3);">(optional)</span></label>
        <div class="photo-picker">
          <div class="photo-picker__preview" id="photo-preview" onclick="document.getElementById('photo-file').click()">
            <span id="photo-initials" style="font-family:var(--font-display);font-weight:800;font-size:28px;"></span>
          </div>
          <input type="file" id="photo-file" accept="image/png,image/jpeg,image/webp" style="display:none;" onchange="handlePhotoSelect(this)">
          <div style="display:flex;flex-direction:column;gap:4px;">
            <span class="photo-picker__label" onclick="document.getElementById('photo-file').click()">Change photo</span>
            <span class="photo-picker__remove" id="photo-remove" onclick="removePhoto()">Remove photo</span>
          </div>
        </div>
        <span class="form-field__hint" id="photo-hint">Photo is saved to your profile</span>
      </div>

      <div class="form-actions">
        <a href="/account" class="btn btn--ghost">Cancel</a>
        <button type="submit" class="btn btn--primary">Save</button>
      </div>

    </form>
  </main>

  <div th:replace="~{fragments/navbar :: navbar}"></div>

</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/api.js}"></script>
<script>
  const userId = Auth.getUserId();
  if (!userId) window.location.href = '/login';

  let pendingPhotoBlob = null;  // canvas-compressed blob ready to upload
  let removePhotoFlag  = false;
  let currentPhotoUrl  = null;

  UserAPI.getById(userId).then(user => {
    document.getElementById('username').value = user.username ?? '';
    document.getElementById('bio').value      = user.bio ?? '';

    currentPhotoUrl = UserAPI.photoUrl(user.profilePhotoUrl);
    if (currentPhotoUrl) {
      showPhotoPreview(currentPhotoUrl);
    } else {
      const initials = ((user.firstName?.[0] ?? '') + (user.lastName?.[0] ?? '')).toUpperCase() || '?';
      const hue = (user.username ?? '').split('').reduce((acc, c) => acc + c.charCodeAt(0), 0) % 360;
      const preview = document.getElementById('photo-preview');
      preview.style.background = `hsl(${hue},35%,22%)`;
      preview.style.borderStyle = 'solid';
      preview.style.borderColor = `hsl(${hue},40%,35%)`;
      const initialsEl = document.getElementById('photo-initials');
      initialsEl.textContent = initials;
      initialsEl.style.color = `hsl(${hue},60%,72%)`;
    }
  });

  function showPhotoPreview(src) {
    const preview = document.getElementById('photo-preview');
    preview.style.borderStyle = 'solid';
    preview.style.borderColor = 'var(--accent-border)';
    preview.innerHTML = `<img src="${src}" alt="Profile photo">`;
    document.getElementById('photo-remove').style.display = '';
    document.getElementById('photo-hint').textContent = 'Photo will be saved when you click Save';
  }

  function handlePhotoSelect(input) {
    const file = input.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) {
      showToast('Image too large — max 5 MB');
      input.value = '';
      return;
    }
    removePhotoFlag = false;
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const MAX = 800;
        let { width, height } = img;
        if (width > MAX || height > MAX) {
          if (width > height) { height = Math.round(height * MAX / width); width = MAX; }
          else { width = Math.round(width * MAX / height); height = MAX; }
        }
        const canvas = document.createElement('canvas');
        canvas.width  = width;
        canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        canvas.toBlob(blob => {
          pendingPhotoBlob = blob;
          showPhotoPreview(URL.createObjectURL(blob));
          document.getElementById('photo-hint').textContent =
            `Photo ready — ${Math.round(blob.size / 1024)} KB`;
        }, 'image/jpeg', 0.82);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function removePhoto() {
    pendingPhotoBlob = null;
    removePhotoFlag  = true;
    document.getElementById('photo-remove').style.display = 'none';
    document.getElementById('photo-file').value = '';
    const preview = document.getElementById('photo-preview');
    const initials = localStorage.getItem('user_initials') || '?';
    const hue      = localStorage.getItem('user_hue') || 0;
    preview.style.background    = `hsl(${hue},35%,22%)`;
    preview.style.borderStyle   = 'dashed';
    preview.style.borderColor   = 'var(--border-2)';
    preview.innerHTML = `<span id="photo-initials" style="font-family:var(--font-display);font-weight:800;font-size:28px;color:hsl(${hue},60%,72%);">${initials}</span>`;
    document.getElementById('photo-hint').textContent = 'Photo removed';
  }

  document.getElementById('edit-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const errorEl = document.getElementById('form-error');
    errorEl.style.display = 'none';

    const btn = document.querySelector('#edit-form button[type="submit"]');
    btn.disabled = true; btn.textContent = 'Saving...';
    try {
      await UserAPI.update(userId, {
        username: document.getElementById('username').value,
        bio:      document.getElementById('bio').value || null,
      });

      if (pendingPhotoBlob) {
        const updated = await UserAPI.uploadPhoto(userId, pendingPhotoBlob);
        // Sync new server URL to localStorage for topbar
        if (updated?.profilePhotoUrl) localStorage.setItem('photo_' + userId, UserAPI.photoUrl(updated.profilePhotoUrl));
      } else if (removePhotoFlag) {
        localStorage.removeItem('photo_' + userId);
      }

      btn.textContent = 'Saved ✓';
      showToast('Profile saved!');
      setTimeout(() => window.location.href = '/account', 800);
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Save';
    }
  });
</script>
</body>
</html>
