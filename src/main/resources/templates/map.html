<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="description" content="Find local experiences near you on the ExperiMate map. Explore venues, meets, and guides in any city.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Explore the Map — ExperiMate">
  <meta property="og:description" content="Find local experiences near you. Explore venues, meets, and local guides on the interactive map.">
  <meta property="og:image" content="/images/og-card.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <title>Map — Experimate</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <style>
    #page-map-content {
      position: relative;
      height: 100%;
      overflow: hidden;
    }
    #map {
      position: absolute;
      inset: 0;
      z-index: 1;
    }
    .leaflet-container { background: #0a0a0a; }
    .leaflet-control-attribution { display: none; }
    .leaflet-control-zoom { display: none; }
    .map-overlay {
      position: absolute;
      z-index: 10;
      pointer-events: none;
    }
    .map-overlay--interactive { pointer-events: all; }
    .map-geo-search { top: 12px; left: 12px; right: 12px; }
    .map-filters { top: 62px; left: 12px; right: 12px; display: flex; flex-direction: column; gap: 6px; }
    .map-filters__pills {
      display: flex; gap: 5px;
    }
    .map-filters__pills .pill {
      flex: 1; min-width: 0;
      padding: 5px 8px;
      font-size: 9.5px;
      letter-spacing: 0.05em;
      justify-content: center;
      white-space: nowrap;
    }
    .map-geo-search .search-bar {
      background: rgba(10,10,10,0.88);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-color: rgba(255,255,255,0.07);
      border-top-color: rgba(255,255,255,0.14);
      border-bottom-color: rgba(0,0,0,0.45);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.09),
        0 4px 24px rgba(0,0,0,0.45);
    }
    .map-geo-search .search-bar:focus-within {
      border-color: rgba(0,201,167,0.35);
      border-top-color: rgba(0,201,167,0.5);
    }
    .map-filters .pill {
      background: rgba(10,10,10,0.88);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-color: rgba(255,255,255,0.07);
      border-top-color: rgba(255,255,255,0.13);
      border-bottom-color: rgba(0,0,0,0.4);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        0 2px 12px rgba(0,0,0,0.45);
    }
    /* Bottom-right control cluster: legend → [locate] [+FAB] */
    .map-controls {
      position: absolute; bottom: 80px; right: 14px; z-index: 10;
      display: flex; flex-direction: column; align-items: flex-end; gap: 8px;
    }
    .map-controls-row { display: flex; align-items: center; gap: 8px; }
    .map-legend {
      background: rgba(10,10,10,0.90);
      border: 1px solid rgba(255,255,255,0.07);
      border-top-color: rgba(255,255,255,0.13);
      border-bottom-color: rgba(0,0,0,0.45);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      display: flex; flex-direction: column; gap: 6px;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 4px 16px rgba(0,0,0,0.5);
    }
    .map-legend__row {
      display: flex; align-items: center; gap: 7px;
      font-size: 10px; color: var(--text-2);
      letter-spacing: 0.06em; white-space: nowrap;
    }
    .map-legend__dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .map-legend__dot--event { background: var(--warm); opacity: 0.7; }
    .map-locate {
      width: 44px; height: 44px; flex-shrink: 0;
      background: rgba(10,10,10,0.75); border: 1px solid var(--border-2);
      border-radius: 12px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: opacity var(--t-fast);
    }
    .map-locate:hover { opacity: 0.75; }
    .map-locate svg path { stroke: #07dcb8e0; fill: none; }
    .map-locate svg circle { fill: #07dcb8e0; stroke: none; }
    .map-fab {
      height: 44px; flex-shrink: 0;
      background: var(--accent); border-radius: 22px;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 0 16px 0 12px; text-decoration: none;
      font-size: 20px; font-weight: 700; line-height: 1; color: #000;
      box-shadow: 0 4px 20px rgba(0,201,167,0.35);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      white-space: nowrap;
    }
    .map-fab__label { font-family: var(--font-display); font-size: 11px; font-weight: 700; letter-spacing: 0.04em; display: none; }
    @media (max-width: 1024px) { .map-fab { padding: 0; width: 44px; border-radius: 12px; } }
    @media (min-width: 1025px) { .map-fab__label { display: inline; } }
    .map-fab:hover { transform: scale(1.04); box-shadow: 0 6px 28px rgba(0,201,167,0.5); }
    .map-pin {
      width: 14px; height: 14px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      border: 2px solid;
      position: relative; cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .map-pin:hover { transform: rotate(-45deg) scale(1.3); }
    .map-pin::after {
      content: ''; position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 5px; height: 5px; border-radius: 50%;
    }
    .map-pin--event {
      background: rgba(255,107,53,0.25);
      border-color: var(--warm);
      box-shadow: 0 0 8px rgba(255,107,53,0.3);
    }
    .map-pin--event::after { background: var(--warm); }
    .map-pin--my-meet {
      background: rgba(168,85,247,0.25);
      border-color: #a855f7;
      box-shadow: 0 0 8px rgba(168,85,247,0.35);
    }
    .map-pin--my-meet::after { background: #a855f7; }
    @keyframes pin-pulse {
      0%, 100% { box-shadow: 0 0 8px rgba(245,158,11,0.4); }
      50%       { box-shadow: 0 0 18px rgba(245,158,11,0.85), 0 0 28px rgba(245,158,11,0.3); }
    }
    .map-pin--due-soon {
      background: rgba(245,158,11,0.25);
      border-color: #f59e0b;
      animation: pin-pulse 1.4s ease-in-out infinite;
    }
    .map-pin--due-soon::after { background: #f59e0b; }
    .map-legend__dot--my-meet  { background: #a855f7; opacity: 0.8; }
    .map-legend__dot--due-soon { background: #f59e0b; opacity: 0.8; }
    .user-location-pin {
      width: 35px; height: 35px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      background: rgba(0,201,167,0.25);
      border: 2px solid #00c9a7;
      position: relative; cursor: pointer;
      animation: loc-pulse 2.2s ease-out infinite;
    }
    .user-location-pin::after {
      content: ''; position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 13px; height: 13px; border-radius: 50%;
      background: #00c9a7;
    }
    .dark-popup .leaflet-popup-content-wrapper {
      background: var(--surface);
      border: 1px solid var(--border-2);
      border-radius: var(--radius-sm);
      color: var(--text); font-family: var(--font-mono);
      font-size: 12px; padding: 0;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    .dark-popup .leaflet-popup-content { margin: 10px 14px; line-height: 1.5; }
    .dark-popup .leaflet-popup-tip-container { display: none; }
    .dark-popup .leaflet-popup-close-button { color: var(--text-3); font-size: 16px; padding: 4px 8px; }
    .dark-popup .leaflet-popup-close-button:hover { color: var(--text); }
    .popup-name { font-family: var(--font-display); font-weight: 700; font-size: 20px; color: var(--text); margin-bottom: 4px; }
    .popup-type { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-2); }
    .popup-type--gem   { color: var(--accent); }
    .popup-type--event { color: var(--warm); }
    .popup-host { font-size: 14px; color: var(--text-2); margin-top: 2px; }
    .popup-date { font-size: 13px; color: var(--text-3); margin-top: 1px; letter-spacing: 0.03em; }
    .popup-desc { font-size: 13px; color: var(--text-2); line-height: 1.6; margin-top: 4px; overflow-wrap: break-word; word-break: break-word; }
    .popup-status { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
    .popup-status__dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .popup-status__label { font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; }
    .popup-action { display: flex; align-items: center; justify-content: center; height: 48px; border-radius: var(--radius-pill); border: none; background: var(--accent); color: #000; font-family: var(--font-mono); font-size: 14px; font-weight: 700; letter-spacing: 0.06em; text-decoration: none; text-align: center; box-shadow: 0 0 14px rgba(0,201,167,0.35), 0 2px 8px rgba(0,0,0,0.3); transition: opacity var(--t-fast); }
    .popup-action:hover { opacity: 0.85; }
    @media (max-width: 1024px) {
      .map-popup-card__footer { justify-content: center; padding: 16px 24px 24px; }
      .popup-action { width: 85%; }
    }
    @media (min-width: 1025px) {
      .map-popup-card__footer { justify-content: flex-end; }
      .popup-action { width: 160px; }
    }
    /* ── Venue bottom strip (Google Maps style) ── */
    .map-venues-strip {
      bottom: 62px; left: 0; right: 0;
      display: flex; flex-direction: column; align-items: center;
      padding: 0 12px;
    }
    .map-venues-strip__handle {
      background: rgba(10,10,10,0.92);
      border: 1px solid rgba(255,255,255,0.1); border-bottom: none;
      border-radius: 10px 10px 0 0;
      padding: 3px 22px 1px;
      cursor: pointer; color: var(--text-3); font-size: 11px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.15s; user-select: none;
    }
    .map-venues-strip__handle:hover { color: var(--text); }
    .map-venues-strip__chevron { display: inline-block; transition: transform 0.22s; }
    .map-venues-strip--collapsed .map-venues-strip__chevron { transform: rotate(180deg); }
    .map-venues-strip--collapsed .map-venues-strip__inner { display: none; }
    .map-venues-strip--collapsed .map-venues-strip__handle {
      border-radius: 10px; border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .map-venues-strip__inner {
      display: flex; gap: 4px;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 22px; padding: 7px 10px;
      box-shadow: 0 6px 28px rgba(0,0,0,0.5);
      overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none;
      max-width: 100%;
    }
    .map-venues-strip__inner::-webkit-scrollbar { display: none; }

    /* Category button */
    .vcat-btn {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 7px 11px; border-radius: 14px; min-width: 54px;
      background: none; border: 1.5px solid transparent;
      cursor: pointer; color: var(--text-3);
      transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.15s;
      flex-shrink: 0;
    }
    .vcat-btn:hover { background: rgba(255,255,255,0.06); color: var(--text-2); }
    .vcat-btn__icon { font-size: 20px; line-height: 1; transition: transform 0.15s; }
    .vcat-btn__label {
      font-size: 8.5px; letter-spacing: 0.07em; text-transform: uppercase;
      font-family: var(--font-mono); white-space: nowrap; line-height: 1;
    }
    .vcat-btn__dot { width: 5px; height: 5px; border-radius: 50%; opacity: 0.35; transition: opacity 0.15s, box-shadow 0.15s; }

    /* Active state — uses CSS custom property set per-button */
    .vcat-btn--active {
      border-color: var(--vcat-color, #00c9a7);
      background: color-mix(in srgb, var(--vcat-color, #00c9a7) 14%, transparent);
      color: #fff;
    }
    .vcat-btn--active .vcat-btn__icon { transform: scale(1.15); }
    .vcat-btn--active .vcat-btn__dot  { opacity: 1; box-shadow: 0 0 7px var(--vcat-color, #00c9a7); }

    /* ── POI venue pins ── */
    .poi-pin {
      width: 10px; height: 10px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.6);
      box-shadow: 0 1px 6px rgba(0,0,0,0.5);
      cursor: pointer; transition: transform 0.12s;
    }
    .poi-pin:hover { transform: scale(1.6); }

    /* ── Legend venue section ── */
    .map-legend__section {
      font-size: 9px; color: var(--text-3); letter-spacing: 0.1em;
      text-transform: uppercase; padding-top: 4px;
      border-top: 1px solid rgba(255,255,255,0.08); margin-top: 2px;
    }

    /* Cluster styling */
    .marker-cluster { background: rgba(0,201,167,0.15) !important; border: 1px solid rgba(0,201,167,0.4) !important; }
    .marker-cluster div { background: rgba(0,201,167,0.85) !important; color: #000 !important; font-family: var(--font-display) !important; font-weight: 700 !important; font-size: 12px !important; }
    .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large { background: rgba(0,201,167,0.15) !important; }

    /* ── Bottom sheet popup ── */
    .map-bs {
      position: absolute; inset: 0; z-index: 20; pointer-events: none;
    }
    .map-bs__backdrop {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.38);
      opacity: 0; transition: opacity 0.3s ease;
      pointer-events: none;
    }
    .map-bs__card {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(180deg, var(--surface-2) 0%, var(--surface) 45%, #0a0c0c 100%);
      border-radius: 20px 20px 0 0;
      border-top: 1px solid rgba(255,255,255,0.12);
      border-left: 1px solid rgba(255,255,255,0.06);
      border-right: 1px solid rgba(255,255,255,0.06);
      box-shadow:
        inset 0 1.5px 0 rgba(255,255,255,0.11),
        0 -8px 40px rgba(0,0,0,0.65),
        0 -2px 12px rgba(0,0,0,0.4);
      transform: translateY(100%);
      transition: transform 0.38s cubic-bezier(0.16,1,0.3,1);
      max-height: 68vh;
      display: flex; flex-direction: column;
      pointer-events: none;
    }
    .map-bs--open { pointer-events: all; }
    .map-bs--open .map-bs__backdrop { opacity: 1; pointer-events: all; }
    .map-bs--open .map-bs__card     { transform: translateY(0); pointer-events: all; }

    .map-bs__handle-area {
      display: flex; justify-content: center; align-items: center;
      padding: 12px 0 8px; cursor: pointer; flex-shrink: 0;
    }
    .map-bs__handle {
      width: 36px; height: 4px; border-radius: 2px;
      background: var(--border-2);
    }
    .map-bs__body {
      padding: 4px 24px 16px; display: flex; flex-direction: column;
      gap: 12px; overflow-y: auto; overflow-x: hidden; flex: 1;
    }
    .map-bs__footer { padding: 0 24px 28px; flex-shrink: 0; }

    /* ── Venue dropdown ── */
    .map-venue-dropdown {
      display: none;
      flex-direction: column;
      background: rgba(10,10,10,0.94);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-2);
      border-radius: var(--radius-sm);
      overflow: hidden;
      box-shadow: 0 8px 28px rgba(0,0,0,0.55);
      min-width: 160px;
    }
    .map-venue-dropdown--open { display: flex; }
    .map-venue-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      background: none; border: none; cursor: pointer;
      color: var(--text-2); font-size: 13px; font-family: var(--font-mono);
      text-align: left; transition: background 0.14s, color 0.14s;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .map-venue-item:last-child { border-bottom: none; }
    .map-venue-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .map-venue-item.pill--active {
      background: color-mix(in srgb, var(--vcat-color) 15%, transparent);
      color: var(--vcat-color);
    }

    /* ── Date range filter — drops below chip strip ── */
    .map-date-panel {
      background: rgba(10,10,10,0.92);
      border: 1px solid var(--border-2); border-radius: var(--radius-sm);
      padding: 10px 12px;
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.5);
      display: none; flex-direction: column; gap: 8px;
    }
    .map-date-panel--open { display: flex; }
    .map-date-panel__rows { display: flex; gap: 8px; align-items: center; }
    .map-date-panel__row { display: flex; align-items: center; gap: 6px; flex: 1; }
    .map-date-panel__label {
      font-size: 9px; color: var(--text-3); letter-spacing: 0.1em;
      text-transform: uppercase; flex-shrink: 0;
    }
    .map-date-panel__sep { color: var(--text-3); font-size: 12px; flex-shrink: 0; }
    .map-date-panel input[type="date"] {
      flex: 1; background: var(--surface-2); border: 1px solid var(--border-2);
      border-radius: 7px; padding: 6px 8px;
      color: var(--text); font-family: var(--font-mono); font-size: 11px;
      outline: none; transition: border-color 0.14s;
      color-scheme: dark; min-width: 0;
    }
    .map-date-panel input[type="date"]:focus { border-color: var(--accent-border); }
    .map-date-panel__actions { display: flex; gap: 6px; }
    .map-date-panel__actions button {
      flex: 1; height: 30px; border-radius: 7px;
      font-size: 10px; letter-spacing: 0.07em; font-family: var(--font-mono);
      cursor: pointer; border: none; font-weight: 600;
    }
    .map-date-panel__apply { background: var(--accent); color: #000; }
    .map-date-panel__clear { background: var(--surface-2); color: var(--text-2); border: 1px solid var(--border-2); }

    /* ── Legend collapsible ── */
    .map-legend { cursor: pointer; user-select: none; }
    .map-legend__header {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 9px; color: var(--text-3); letter-spacing: 0.1em; text-transform: uppercase;
      margin-bottom: 6px;
    }
    .map-legend__chevron { transition: transform 0.2s; font-size: 10px; }
    .map-legend--collapsed .map-legend__chevron { transform: rotate(180deg); }
    .map-legend--collapsed .map-legend__rows { display: none; }

    /* ── Pulsing user location ── */
    @keyframes loc-pulse {
      0%   { box-shadow: 0 0 0 0 rgba(0,201,167,0.55), 0 0 20px rgba(0,201,167,0.7); }
      65%  { box-shadow: 0 0 0 16px rgba(0,201,167,0), 0 0 20px rgba(0,201,167,0.5); }
      100% { box-shadow: 0 0 0 0 rgba(0,201,167,0), 0 0 20px rgba(0,201,167,0.7); }
    }

    /* ── Light / Warm mode overrides ── */
    body.light-mode .map-legend,
    body.warm-mode  .map-legend {
      backdrop-filter: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.75), 0 3px 14px rgba(18,18,30,0.10), 0 1px 4px rgba(18,18,30,0.06);
    }
    body.light-mode .map-legend {
      background: rgba(253,252,248,0.97);
      border-color: rgba(0,0,0,0.09);
      border-top-color: rgba(255,255,255,0.90);
      border-bottom-color: rgba(0,0,0,0.10);
    }
    body.warm-mode  .map-legend {
      background: rgba(246,246,251,0.97);
      border-color: rgba(0,0,0,0.08);
      border-top-color: rgba(255,255,255,0.85);
      border-bottom-color: rgba(0,0,0,0.09);
    }
    body.light-mode .map-geo-search .search-bar {
      background: rgba(253,252,248,0.97);
      border-color: rgba(0,0,0,0.09);
      border-top-color: rgba(255,255,255,0.90);
      border-bottom-color: rgba(0,0,0,0.10);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.75), 0 3px 16px rgba(20,15,5,0.10);
    }
    body.warm-mode  .map-geo-search .search-bar {
      background: rgba(246,246,251,0.97);
      border-color: rgba(0,0,0,0.08);
      border-top-color: rgba(255,255,255,0.85);
      border-bottom-color: rgba(0,0,0,0.09);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.75), 0 3px 16px rgba(18,18,30,0.09);
    }
    body.light-mode .map-filters .pill {
      background: rgba(253,252,248,0.97);
      border-color: rgba(0,0,0,0.09);
      border-top-color: rgba(255,255,255,0.90);
      border-bottom-color: rgba(0,0,0,0.10);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.75), 0 2px 10px rgba(20,15,5,0.08);
    }
    body.warm-mode  .map-filters .pill {
      background: rgba(246,246,251,0.97);
      border-color: rgba(0,0,0,0.08);
      border-top-color: rgba(255,255,255,0.85);
      border-bottom-color: rgba(0,0,0,0.09);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.75), 0 2px 10px rgba(18,18,30,0.08);
    }

  </style>
</head>
<body>
<div class="app-shell">

  <div th:replace="~{fragments/topbar :: topbar}"></div>

  <main class="page-content page-content--overflow-hidden">
    <div id="page-map-content">

      <div id="map"></div>

      <!-- Bottom sheet popup -->
      <div id="map-bottom-sheet" class="map-bs">
        <div class="map-bs__backdrop" onclick="closeMapPopup()"></div>
        <div class="map-bs__card">
          <div class="map-bs__handle-area" onclick="closeMapPopup()">
            <div class="map-bs__handle"></div>
          </div>
          <div class="map-bs__body" id="map-popup-body"></div>
          <div class="map-bs__footer" id="map-popup-footer"></div>
        </div>
      </div>

      <div class="map-overlay map-overlay--interactive map-filters">
        <div class="map-filters__pills">
          <div class="pill pill--active" onclick="togglePill(this)">Events</div>
          <div class="pill" id="pill-available" onclick="togglePill(this); mapFilterAvailable()">Available</div>
          <div class="pill" id="pill-date" onclick="toggleDatePanel(this)">📅 Date</div>
          <div class="pill" id="pill-venues" onclick="toggleVenueDropdown(this)">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="vertical-align:middle;margin-right:4px;flex-shrink:0;"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="20" y2="12"/><line x1="12" y1="18" x2="20" y2="18"/></svg>Filters
          </div>
        </div>

        <!-- Venue dropdown — shows meets near these venue types -->
        <div class="map-venue-dropdown" id="map-venue-dropdown">
          <button class="map-venue-item" style="--vcat-color:#f97316" onclick="togglePoiFilter(this,'food')">
            <span>🍽️</span><span>Food &amp; Drink</span>
          </button>
          <button class="map-venue-item" style="--vcat-color:#f59e0b" onclick="togglePoiFilter(this,'coffee')">
            <span>☕</span><span>Coffee</span>
          </button>
          <button class="map-venue-item" style="--vcat-color:#ef4444" onclick="togglePoiFilter(this,'nightlife')">
            <span>🍺</span><span>Bars &amp; Nightlife</span>
          </button>
          <button class="map-venue-item" style="--vcat-color:#8b5cf6" onclick="togglePoiFilter(this,'culture')">
            <span>🏛️</span><span>Culture</span>
          </button>
          <button class="map-venue-item" style="--vcat-color:#22c55e" onclick="togglePoiFilter(this,'outdoors')">
            <span>🌿</span><span>Parks &amp; Outdoors</span>
          </button>
          <button class="map-venue-item" style="--vcat-color:#06b6d4" onclick="togglePoiFilter(this,'sports')">
            <span>🏟️</span><span>Sports</span>
          </button>
          <button class="map-venue-item" style="--vcat-color:#f472b6" onclick="togglePoiFilter(this,'arts')">
            <span>🎭</span><span>Arts &amp; Theatre</span>
          </button>
          <button class="map-venue-item" style="--vcat-color:#a16207" onclick="togglePoiFilter(this,'history')">
            <span>🏰</span><span>History</span>
          </button>
          <button class="map-venue-item" style="--vcat-color:#10b981" onclick="togglePoiFilter(this,'market')">
            <span>🛒</span><span>Markets</span>
          </button>
        </div>
        <div class="map-date-panel" id="map-date-panel">
          <div class="map-date-panel__rows">
            <div class="map-date-panel__row">
              <span class="map-date-panel__label">From</span>
              <input type="date" id="date-from">
            </div>
            <span class="map-date-panel__sep">→</span>
            <div class="map-date-panel__row">
              <span class="map-date-panel__label">To</span>
              <input type="date" id="date-to">
            </div>
          </div>
          <div class="map-date-panel__actions">
            <button class="map-date-panel__apply" onclick="applyDateFilter()">Apply</button>
            <button class="map-date-panel__clear" onclick="clearDateFilter()">Clear</button>
          </div>
        </div>
      </div>


      <div class="map-overlay map-overlay--interactive map-geo-search">
        <div class="search-bar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
          </svg>
          <input type="text" id="map-geo-input" placeholder="Fly to a city..." autocomplete="off">
        </div>
      </div>

      <div class="map-controls map-overlay--interactive">
        <div class="map-legend" id="map-legend" onclick="toggleLegend()">
          <div class="map-legend__header">
            Legend <span class="map-legend__chevron">▴</span>
          </div>
          <div class="map-legend__rows">
            <div class="map-legend__row"><div class="map-legend__dot map-legend__dot--event"></div>Open listing</div>
            <div class="map-legend__row"><div class="map-legend__dot map-legend__dot--my-meet"></div>Going</div>
            <div class="map-legend__row"><div class="map-legend__dot map-legend__dot--due-soon"></div>Due soon</div>
            <div id="legend-venues"></div>
          </div>
        </div>
        <div class="map-controls-row">
          <button class="map-locate" onclick="centerOnUser()" title="My location">
            <svg width="22" height="22" viewBox="0 0 24 24" stroke="#07dcb8e0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 20C16.4183 20 20 16.4183 20 12M12 20C7.58172 20 4 16.4183 4 12M12 20V22M20 12C20 7.58172 16.4183 4 12 4M20 12H22M12 4C7.58172 4 4 7.58172 4 12M12 4V2M4 12H2M13 12C13 12.5523 12.5523 13 12 13C11.4477 13 11 12.5523 11 12C11 11.4477 11.4477 11 12 11C12.5523 11 13 11.4477 13 12Z" fill="none"/>
              <circle cx="12" cy="12" r="1" fill="#00c9a7" stroke="none"/>
            </svg>
          </button>
          <a href="/listings/new" class="map-fab">
            <span style="font-size:20px;line-height:1;">+</span>
            <span class="map-fab__label">New Meet</span>
          </a>
        </div>
      </div>

    </div>
  </main>

  <div th:replace="~{fragments/navbar :: navbar}"></div>


</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/api.js}"></script>
<script th:src="@{/js/map.js}"></script>
<script th:src="@{/js/tour.js}"></script>
</body>
</html>
