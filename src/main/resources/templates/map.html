<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <title>Map — Experimate</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <style>
    #page-map-content {
      position: relative;
      height: 100%;
      overflow: hidden;
    }
    #map {
      position: absolute;
      inset: 0;
      z-index: 1;
    }
    .leaflet-container { background: #0a0a0a; }
    .leaflet-control-attribution { display: none; }
    .leaflet-control-zoom { display: none; }
    .map-overlay {
      position: absolute;
      z-index: 10;
      pointer-events: none;
    }
    .map-overlay--interactive { pointer-events: all; }
    .map-geo-search { top: 12px; left: 12px; right: 12px; }
    .map-filters { top: 62px; left: 12px; display: flex; gap: 6px; }
    .map-geo-search .search-bar {
      background: rgba(10,10,10,0.88);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-color: var(--border-2);
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }
    .map-geo-search .search-bar:focus-within { border-color: rgba(255,255,255,0.18); }
    .map-filters .pill {
      background: rgba(10,10,10,0.88);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .map-legend {
      bottom: 108px; right: 12px;
      background: rgba(10,10,10,0.90);
      border: 1px solid var(--border-2);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      display: flex; flex-direction: column; gap: 6px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .map-legend__row {
      display: flex; align-items: center; gap: 7px;
      font-size: 10px; color: var(--text-2);
      letter-spacing: 0.06em; white-space: nowrap;
    }
    .map-legend__dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .map-legend__dot--gem   { background: var(--accent); opacity: 0.7; }
    .map-legend__dot--event { background: var(--warm);   opacity: 0.7; }
    .map-fab {
      position: absolute;
      bottom: 10px; right: 14px;
      z-index: 10;
      height: 44px;
      background: var(--accent);
      border-radius: 22px;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 0 16px 0 12px;
      text-decoration: none;
      font-size: 20px; font-weight: 700; line-height: 1; color: #000;
      box-shadow: 0 4px 20px rgba(0,201,167,0.35);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      white-space: nowrap;
    }
    .map-fab__label { font-family: var(--font-display); font-size: 11px; font-weight: 700; letter-spacing: 0.04em; }
    .map-fab:hover { transform: scale(1.04); box-shadow: 0 6px 28px rgba(0,201,167,0.5); }
    .map-pin {
      width: 14px; height: 14px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      border: 2px solid;
      position: relative; cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .map-pin:hover { transform: rotate(-45deg) scale(1.3); }
    .map-pin::after {
      content: ''; position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 5px; height: 5px; border-radius: 50%;
    }
    .map-pin--gem {
      background: rgba(0,201,167,0.25);
      border-color: var(--accent);
      box-shadow: 0 0 8px rgba(0,201,167,0.3);
    }
    .map-pin--gem::after { background: var(--accent); }
    .map-pin--event {
      background: rgba(255,107,53,0.25);
      border-color: var(--warm);
      box-shadow: 0 0 8px rgba(255,107,53,0.3);
    }
    .map-pin--event::after { background: var(--warm); }
    .dark-popup .leaflet-popup-content-wrapper {
      background: var(--surface);
      border: 1px solid var(--border-2);
      border-radius: var(--radius-sm);
      color: var(--text); font-family: var(--font-mono);
      font-size: 12px; padding: 0;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    .dark-popup .leaflet-popup-content { margin: 10px 14px; line-height: 1.5; }
    .dark-popup .leaflet-popup-tip-container { display: none; }
    .dark-popup .leaflet-popup-close-button { color: var(--text-3); font-size: 16px; padding: 4px 8px; }
    .dark-popup .leaflet-popup-close-button:hover { color: var(--text); }
    .popup-name { font-family: var(--font-display); font-weight: 700; font-size: 13px; color: var(--text); margin-bottom: 4px; }
    .popup-type { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-2); }
    .popup-type--gem   { color: var(--accent); }
    .popup-type--event { color: var(--warm); }
    .popup-host { font-size: 10px; color: var(--text-2); margin-top: 2px; }
    .popup-date { font-size: 9px; color: var(--text-3); margin-top: 1px; letter-spacing: 0.03em; }
    .popup-status { display: flex; align-items: center; gap: 5px; margin-top: 6px; }
    .popup-status__dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .popup-status__label { font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; }
    .popup-action { display: flex; align-items: center; justify-content: center; padding: 3% 5%; border-radius: var(--radius-pill); border: none; background: var(--accent); color: #fff; text-shadow: 0 1px 8px rgba(0,0,0,0.55); font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; text-decoration: none; text-align: center; box-shadow: 0 0 14px rgba(0,201,167,0.45), 0 2px 8px rgba(0,0,0,0.3); transition: opacity var(--t-fast); }
    .popup-action:hover { opacity: 0.85; }
    @media (max-width: 1024px) {
      .map-popup-card__footer { justify-content: center; padding: 3% 4%; }
      .popup-action { width: 85%; height: 85%; }
    }
    @media (min-width: 1025px) {
      .map-popup-card__footer { justify-content: flex-end; }
      .popup-action { width: 150px; height: 50px; padding: 0; }
    }
    /* Cluster styling */
    .marker-cluster { background: rgba(0,201,167,0.15) !important; border: 1px solid rgba(0,201,167,0.4) !important; }
    .marker-cluster div { background: rgba(0,201,167,0.85) !important; color: #000 !important; font-family: var(--font-display) !important; font-weight: 700 !important; font-size: 12px !important; }
    .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large { background: rgba(0,201,167,0.15) !important; }

    /* Centered map popup overlay */
    .map-popup-overlay {
      position: absolute; inset: 0; z-index: 20;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(1.3px);
      -webkit-backdrop-filter: blur(1.3px);
      background: rgba(0,0,0,0.5);
    }
    .map-popup-card {
      width: 85%; height: 85%;
      background: var(--bg);
      border-radius: var(--radius);
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      display: flex; flex-direction: column;
      position: relative;
    }
    .map-popup-card::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: inherit; padding: 1.5px;
      background: linear-gradient(to bottom, #00c9a7 0%, rgba(0,201,167,0) 90%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none; z-index: 2;
    }
    .map-popup-card::after {
      content: '';
      position: absolute; inset: -4px;
      border-radius: inherit;
      background: linear-gradient(to bottom, rgba(0,201,167,0.35) 0%, rgba(0,201,167,0) 85%);
      filter: blur(10px);
      pointer-events: none; z-index: -1;
    }
    .map-popup-card__close {
      position: absolute; top: 10px; right: 16px;
      background: none; border: none;
      color: #fff; font-size: 18px; cursor: pointer; z-index: 1;
    }
    .map-popup-card__close:hover { color: rgba(255,255,255,0.6); }
    .map-popup-card__body { padding: 18px; display: flex; flex-direction: column; gap: 10px; flex: 1; overflow-y: auto; }
    .map-popup-card__footer { padding: 2% 4%; flex: 0 0 13%; display: flex; align-items: center; }

  </style>
</head>
<body>
<div class="app-shell">

  <div th:replace="~{fragments/topbar :: topbar}"></div>

  <main class="page-content page-content--overflow-hidden">
    <div id="page-map-content">

      <div id="map"></div>

      <div id="map-popup-overlay" class="map-popup-overlay map-overlay--interactive" style="display:none;" onclick="if(event.target===this) closeMapPopup()">
        <div class="map-popup-card">
          <button class="map-popup-card__close" onclick="closeMapPopup()">✕</button>
          <div class="map-popup-card__body" id="map-popup-body"></div>
          <div class="map-popup-card__footer" id="map-popup-footer"></div>
        </div>
      </div>

<div class="map-overlay map-overlay--interactive map-filters">
        <div class="pill pill--active" onclick="togglePill(this); mapFilterToggle('gems')">Gems</div>
        <div class="pill pill--active" onclick="togglePill(this); mapFilterToggle('events')">Events</div>
        <div class="pill" id="pill-available" onclick="togglePill(this); mapFilterAvailable()">Available only</div>
      </div>

      <div class="map-overlay map-overlay--interactive map-geo-search">
        <div class="search-bar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
          </svg>
          <input type="text" id="map-geo-input" placeholder="Fly to a city..." autocomplete="off">
        </div>
      </div>

      <a href="/listings/new" class="map-fab">
        <span style="font-size:20px;line-height:1;">+</span>
        <span class="map-fab__label">New Meet</span>
      </a>

    </div>
  </main>

  <div th:replace="~{fragments/navbar :: navbar}"></div>


</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/api.js}"></script>
<script th:src="@{/js/map.js}"></script>
<script th:src="@{/js/websocket.js}"></script>
<script th:src="@{/js/tour.js}"></script>
</body>
</html>
