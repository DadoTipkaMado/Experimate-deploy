<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <title>Map — Experimate</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <style>
    #page-map-content {
      position: relative;
      height: 100%;
      overflow: hidden;
    }
    #map {
      position: absolute;
      inset: 0;
      z-index: 1;
    }
    .leaflet-container { background: #0a0a0a; }
    .leaflet-control-attribution { display: none; }
    .map-overlay {
      position: absolute;
      z-index: 10;
      pointer-events: none;
    }
    .map-overlay--interactive { pointer-events: all; }
    .map-search { top: 12px; left: 12px; right: 12px; }
    .map-search .search-bar {
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-color: var(--border-2);
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    .map-search .search-bar:focus-within { border-color: var(--accent-border); }
    .map-filters { top: 62px; left: 12px; display: flex; gap: 6px; }
    .map-filters .pill {
      background: rgba(10,10,10,0.88);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .map-legend {
      bottom: 108px; right: 12px;
      background: rgba(10,10,10,0.90);
      border: 1px solid var(--border-2);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      display: flex; flex-direction: column; gap: 6px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .map-legend__row {
      display: flex; align-items: center; gap: 7px;
      font-size: 10px; color: var(--text-2);
      letter-spacing: 0.06em; white-space: nowrap;
    }
    .map-legend__dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .map-legend__dot--gem   { background: var(--accent); opacity: 0.7; }
    .map-legend__dot--event { background: var(--warm);   opacity: 0.7; }
    .map-fab {
      position: absolute;
      bottom: 108px; right: 14px;
      z-index: 10;
      height: 44px;
      background: var(--accent);
      border-radius: 22px;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 0 16px 0 12px;
      text-decoration: none;
      font-size: 20px; font-weight: 700; line-height: 1; color: #000;
      box-shadow: 0 4px 20px rgba(0,201,167,0.35);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      white-space: nowrap;
    }
    .map-fab__label { font-family: var(--font-display); font-size: 11px; font-weight: 700; letter-spacing: 0.04em; }
    .map-fab:hover { transform: scale(1.04); box-shadow: 0 6px 28px rgba(0,201,167,0.5); }
    .map-pin {
      width: 14px; height: 14px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      border: 2px solid;
      position: relative; cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .map-pin:hover { transform: rotate(-45deg) scale(1.3); }
    .map-pin::after {
      content: ''; position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 5px; height: 5px; border-radius: 50%;
    }
    .map-pin--gem {
      background: rgba(0,201,167,0.25);
      border-color: var(--accent);
      box-shadow: 0 0 8px rgba(0,201,167,0.3);
    }
    .map-pin--gem::after { background: var(--accent); }
    .map-pin--event {
      background: rgba(255,107,53,0.25);
      border-color: var(--warm);
      box-shadow: 0 0 8px rgba(255,107,53,0.3);
    }
    .map-pin--event::after { background: var(--warm); }
    .dark-popup .leaflet-popup-content-wrapper {
      background: var(--surface);
      border: 1px solid var(--border-2);
      border-radius: var(--radius-sm);
      color: var(--text); font-family: var(--font-mono);
      font-size: 12px; padding: 0;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    .dark-popup .leaflet-popup-content { margin: 10px 14px; line-height: 1.5; }
    .dark-popup .leaflet-popup-tip-container { display: none; }
    .dark-popup .leaflet-popup-close-button { color: var(--text-3); font-size: 16px; padding: 4px 8px; }
    .dark-popup .leaflet-popup-close-button:hover { color: var(--text); }
    .popup-name { font-family: var(--font-display); font-weight: 700; font-size: 13px; color: var(--text); margin-bottom: 4px; }
    .popup-type { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-2); }
    .popup-type--gem   { color: var(--accent); }
    .popup-type--event { color: var(--warm); }
    .popup-host { font-size: 10px; color: var(--text-2); margin-top: 2px; }
    .popup-date { font-size: 9px; color: var(--text-3); margin-top: 1px; letter-spacing: 0.03em; }
    .popup-status { display: flex; align-items: center; gap: 5px; margin-top: 6px; }
    .popup-status__dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .popup-status__label { font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; }
    .popup-action { display: block; margin-top: 10px; padding: 6px 12px; border-radius: var(--radius-pill); border: 1px solid var(--accent-border); background: var(--accent-dim); color: var(--accent); font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; text-decoration: none; text-align: center; transition: background var(--t-fast), color var(--t-fast); }
    .popup-action:hover { background: var(--accent); color: #000; }
    /* Cluster styling */
    .marker-cluster { background: rgba(0,201,167,0.15) !important; border: 1px solid rgba(0,201,167,0.4) !important; }
    .marker-cluster div { background: rgba(0,201,167,0.85) !important; color: #000 !important; font-family: var(--font-display) !important; font-weight: 700 !important; font-size: 12px !important; }
    .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large { background: rgba(0,201,167,0.15) !important; }

    /* ── Match results panel ── */
    .match-panel {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 500;
      background: var(--bg); border-top: 1px solid var(--border-2);
      border-radius: 16px 16px 0 0;
      max-height: 68vh; display: flex; flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
      will-change: transform;
    }
    .match-panel--open { transform: translateY(0); }
    .match-panel__grip {
      width: 36px; height: 4px; border-radius: 2px;
      background: var(--border-2); margin: 10px auto 0; flex-shrink: 0; cursor: pointer;
    }
    .match-panel__header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px 10px; flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }
    .match-panel__title {
      font-family: var(--font-display); font-weight: 700;
      font-size: 13px; color: var(--text);
    }
    .match-panel__close {
      background: none; border: none; color: var(--text-3);
      font-size: 20px; line-height: 1; cursor: pointer; padding: 0 2px;
      transition: color 0.15s;
    }
    .match-panel__close:hover { color: var(--text); }
    .match-panel__list {
      overflow-y: auto; flex: 1;
      padding: 10px 12px 90px;
      display: flex; flex-direction: column; gap: 10px;
    }

    /* ── Match card ── */
    .match-card {
      display: flex; gap: 12px; padding: 12px 12px 10px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }
    .match-card__avatar {
      width: 48px; height: 48px; border-radius: 50%; flex-shrink: 0;
      overflow: hidden; display: flex; align-items: center; justify-content: center;
      object-fit: cover;
    }
    .match-card__body { flex: 1; min-width: 0; }
    .match-card__top {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 8px; margin-bottom: 2px;
    }
    .match-card__name {
      font-family: var(--font-display); font-weight: 700;
      font-size: 13px; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .match-card__handle { font-size: 10px; color: var(--text-3); margin-bottom: 5px; }
    .match-card__pct {
      font-size: 10px; color: var(--accent);
      background: var(--accent-dim); border: 1px solid var(--accent-border);
      border-radius: var(--radius-pill); padding: 2px 8px;
      white-space: nowrap; flex-shrink: 0; letter-spacing: 0.04em;
    }
    .match-card__city { font-size: 10px; color: var(--text-2); margin-bottom: 5px; letter-spacing: 0.02em; }
    .match-card__bio {
      font-size: 11px; color: var(--text-2); line-height: 1.55; margin-bottom: 10px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .match-card__actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .match-card__explain-btn {
      background: none; border: 1px solid var(--border-2);
      border-radius: var(--radius-pill); padding: 5px 12px;
      font-size: 10px; color: var(--text-2); cursor: pointer;
      font-family: var(--font-mono); letter-spacing: 0.04em;
      transition: border-color 0.15s, color 0.15s; white-space: nowrap;
    }
    .match-card__explain-btn:hover { border-color: var(--accent-border); color: var(--accent); }
    .match-card__explain-area {
      overflow: hidden; max-height: 0; opacity: 0;
      transition: max-height 0.28s ease, opacity 0.2s ease, margin-top 0.2s ease;
      margin-top: 0;
    }
    .match-card__explain-area--open { max-height: 240px; opacity: 1; margin-top: 10px; }
    .match-card__explain-text {
      font-size: 11px; color: var(--text-2); line-height: 1.8;
      padding: 10px 12px; background: var(--surface-2);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
    }

    /* ── Backdrop ── */
    .match-panel-backdrop {
      position: fixed; inset: 0; z-index: 490;
      background: rgba(0,0,0,0.55); opacity: 0; pointer-events: none;
      transition: opacity 0.26s;
    }
    .match-panel-backdrop--visible { opacity: 1; pointer-events: all; }

    /* ── Search bar AI badge ── */
    .map-search .search-ai-badge { margin-left: 4px; }
  </style>
</head>
<body>
<div class="app-shell">

  <div th:replace="~{fragments/topbar :: topbar}"></div>

  <main class="page-content page-content--overflow-hidden">
    <div id="page-map-content">

      <div id="map"></div>

      <div class="map-overlay map-overlay--interactive map-search">
        <div class="search-bar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="2" stroke-linecap="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="map-search-input" placeholder="Find someone curious, or search a city..." autocomplete="off">
          <span class="search-ai-badge">AI</span>
        </div>
      </div>

      <div class="map-overlay map-overlay--interactive map-filters">
        <div class="pill pill--active" onclick="togglePill(this); mapFilterToggle('gems')">Gems</div>
        <div class="pill pill--active" onclick="togglePill(this); mapFilterToggle('events')">Events</div>
        <div class="pill" id="pill-available" onclick="togglePill(this); mapFilterAvailable()">Available only</div>
      </div>

      <a href="/listings/new" class="map-fab">
        <span style="font-size:20px;line-height:1;">+</span>
        <span class="map-fab__label">Host</span>
      </a>

    </div>
  </main>

  <div th:replace="~{fragments/navbar :: navbar}"></div>

  <!-- Match results panel (slides up on AI search) -->
  <div class="match-panel" id="match-panel">
    <div class="match-panel__grip" onclick="closeMatchPanel()"></div>
    <div class="match-panel__header">
      <div class="match-panel__title" id="match-panel-title">Matches</div>
      <button class="match-panel__close" onclick="closeMatchPanel()" aria-label="Close">&#x2715;</button>
    </div>
    <div class="match-panel__list" id="match-panel-list"></div>
  </div>
  <div class="match-panel-backdrop" id="match-panel-backdrop" onclick="closeMatchPanel()"></div>

</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/api.js}"></script>
<script th:src="@{/js/map.js}"></script>
<script th:src="@{/js/websocket.js}"></script>
<script th:src="@{/js/tour.js}"></script>
</body>
</html>
