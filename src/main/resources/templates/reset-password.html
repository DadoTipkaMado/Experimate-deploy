<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="robots" content="noindex, nofollow">
  <title>New Password — Experimate</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <style>
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #020505 !important; --surface: #141414 !important;
        --surface-2: #1c1c1c !important; --border: #2a2a2a !important;
        --border-2: #333333 !important; --text: #f2f2f2 !important;
        --text-2: #c0c0c0 !important; --text-3: #909090 !important;
        --accent: #00c9a7 !important; --warm: #ff6b35 !important;
        --accent-dim: rgba(0,201,167,0.12) !important;
        --accent-border: rgba(0,201,167,0.3) !important;
      }
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: unset !important; overflow: unset !important; background: var(--bg) !important; }
    body { display: flex !important; align-items: center !important; justify-content: center !important; min-height: 100vh !important; color: var(--text) !important; color-scheme: dark; padding: 32px 0; }

    .orb { position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.22; pointer-events: none; animation: drift linear infinite; }
    .orb-1 { width: 400px; height: 400px; background: var(--accent); top: -100px; left: -80px; animation-duration: 20s; }
    .orb-2 { width: 260px; height: 260px; background: var(--warm); bottom: -60px; right: -40px; animation-duration: 26s; animation-delay: -9s; }
    @keyframes drift { 0% { transform: translate(0,0) scale(1); } 33% { transform: translate(20px,-15px) scale(1.04); } 66% { transform: translate(-15px,20px) scale(0.97); } 100% { transform: translate(0,0) scale(1); } }

    .auth-card {
      position: relative; width: min(380px, 92vw);
      background: linear-gradient(160deg, rgba(26,26,26,0.93) 0%, rgba(12,12,12,0.88) 100%);
      backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
      border: 1px solid rgba(255,255,255,0.08);
      border-top-color: rgba(0,201,167,0.25);
      border-bottom-color: rgba(0,0,0,0.55);
      border-radius: 22px; padding: 36px 32px;
      display: flex; flex-direction: column; gap: 20px;
      box-shadow:
        inset 0 1.5px 0 rgba(255,255,255,0.13),
        inset 0 -1px 0 rgba(0,0,0,0.45),
        0 0 0 1px rgba(0,201,167,0.07),
        0 40px 80px rgba(0,0,0,0.65),
        0 12px 28px rgba(0,0,0,0.45);
      animation: card-in 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes card-in { from { opacity:0; transform:translateY(24px) scale(0.97); } to { opacity:1; transform:translateY(0) scale(1); } }

    .auth-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 26px; color: var(--text); letter-spacing: -0.03em; }
    .auth-logo span { color: var(--accent); }
    .auth-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 19px; color: var(--text); }
    .auth-subtitle { font-size: 13px; color: var(--text-2); margin-top: 4px; line-height: 1.6; }
    .auth-field { display: flex; flex-direction: column; gap: 6px; }
    .auth-field label { font-size: 11px; color: var(--text-2); letter-spacing: 0.08em; text-transform: uppercase; }
    .auth-field input {
      background: rgba(0,0,0,0.32);
      border: 1px solid rgba(255,255,255,0.07);
      border-top-color: rgba(0,0,0,0.45);
      border-bottom-color: rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 13px 16px; color: var(--text); font-family: var(--font-mono);
      font-size: 13px; width: 100%;
      color-scheme: dark;
      box-shadow: inset 0 1px 4px rgba(0,0,0,0.4);
      transition: border-color 0.14s ease, box-shadow 0.14s ease;
    }
    .auth-field input:focus {
      outline: none;
      border-color: rgba(0,201,167,0.5);
      border-top-color: rgba(0,201,167,0.3);
      box-shadow: inset 0 1px 4px rgba(0,0,0,0.25), 0 0 0 3px rgba(0,201,167,0.12);
    }
    .auth-field input.input--error { border-color: rgba(255,80,80,0.5); }
    .auth-error { background: rgba(255,80,80,0.08); border: 1px solid rgba(255,80,80,0.2); border-radius: 10px; padding: 10px 14px; font-size: 11px; color: rgba(255,100,100,0.9); display: none; }
    .auth-success { background: var(--accent-dim); border: 1px solid var(--accent-border); border-radius: 10px; padding: 13px 16px; font-size: 13px; color: var(--accent); display: none; }
    .auth-footer { font-size: 13px; color: var(--text-2); text-align: center; }
    .auth-footer a { color: var(--accent); text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }
    .btn-confirm { height: 46px; margin-top: 4px; background: var(--accent) !important; color: #000 !important; }
    .btn-confirm:disabled { opacity: 0.6; cursor: not-allowed; }

    .strength-bar { height: 3px; border-radius: 2px; margin-top: 6px; background: var(--border-2); overflow: hidden; }
    .strength-bar__fill { height: 100%; border-radius: 2px; width: 0; transition: width 0.2s ease, background 0.2s ease; }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="auth-card">
    <div>
      <div class="auth-logo">Experi<span>Mate</span></div>
    </div>
    <div>
      <div class="auth-title">Set new password</div>
      <div class="auth-subtitle">Choose a strong password for your account.</div>
    </div>

    <div class="auth-error" id="error-msg"></div>
    <div class="auth-success" id="success-msg"></div>

    <form id="confirm-form" style="display: flex; flex-direction: column; gap: 14px;" novalidate>
      <div class="auth-field">
        <label for="newPassword">New password</label>
        <input type="password" id="newPassword" name="newPassword" autocomplete="new-password" required>
        <div class="strength-bar"><div class="strength-bar__fill" id="strength-fill"></div></div>
      </div>

      <div class="auth-field">
        <label for="confirmPassword">Repeat password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" autocomplete="new-password" required>
      </div>

      <button type="submit" id="confirm-btn" class="btn btn--primary btn-confirm">Set password</button>
    </form>

    <div class="auth-footer">
      <a href="/login">← Back to sign in</a>
    </div>
  </div>

  <script>
    (function() {
      const params  = new URLSearchParams(window.location.search);
      const token   = params.get('token');
      const errorEl = document.getElementById('error-msg');
      const successEl = document.getElementById('success-msg');
      const form    = document.getElementById('confirm-form');
      const btn     = document.getElementById('confirm-btn');

      if (!token) {
        errorEl.textContent = 'Invalid or missing reset link. Please request a new one.';
        errorEl.style.display = 'block';
        form.style.display = 'none';
      }

      // ── Password strength indicator ───────────────────────────────
      document.getElementById('newPassword').addEventListener('input', function() {
        const v = this.value;
        const fill = document.getElementById('strength-fill');
        let score = 0;
        if (v.length >= 8)  score++;
        if (/[A-Z]/.test(v)) score++;
        if (/[0-9]/.test(v)) score++;
        if (/[^A-Za-z0-9]/.test(v)) score++;
        const pct   = score * 25;
        const color = score <= 1 ? '#ff5050' : score === 2 ? '#f5a623' : score === 3 ? '#f0d000' : 'var(--accent)';
        fill.style.width      = pct + '%';
        fill.style.background = color;
      });

      function showError(msg) {
        errorEl.textContent    = msg;
        errorEl.style.display  = 'block';
        successEl.style.display = 'none';
      }

      function showSuccess() {
        successEl.textContent   = 'Password updated! Redirecting to sign in…';
        successEl.style.display = 'block';
        errorEl.style.display   = 'none';
        form.style.display      = 'none';
        setTimeout(() => { window.location.href = '/login'; }, 2500);
      }

      form.addEventListener('submit', async function(e) {
        e.preventDefault();
        errorEl.style.display = 'none';

        const newPassword = document.getElementById('newPassword').value;
        const confirm     = document.getElementById('confirmPassword').value;

        if (newPassword.length < 8) {
          showError('Password must be at least 8 characters.');
          document.getElementById('newPassword').classList.add('input--error');
          return;
        }
        document.getElementById('newPassword').classList.remove('input--error');

        if (newPassword !== confirm) {
          showError('Passwords do not match.');
          document.getElementById('confirmPassword').classList.add('input--error');
          return;
        }
        document.getElementById('confirmPassword').classList.remove('input--error');

        btn.disabled    = true;
        btn.textContent = 'Saving…';

        try {
          const res = await fetch('/api/auth/password-reset/confirm', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ token, newPassword }),
          });

          if (res.status === 204 || res.ok) {
            showSuccess();
            return;
          }

          const data = await res.json().catch(() => ({}));
          throw new Error(data.message || 'Reset link has expired or is invalid. Please request a new one.');
        } catch (err) {
          showError(err.message);
          btn.disabled    = false;
          btn.textContent = 'Set password';
        }
      });
    })();
  </script>
</body>
</html>
