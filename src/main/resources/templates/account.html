<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>Account — Experimate</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <style>
    .account-hero { padding: 28px 18px 22px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; gap: 10px; position: relative; overflow: hidden; }
    .account-hero::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 300px; height: 200px; background: radial-gradient(ellipse, rgba(0,201,167,0.08) 0%, transparent 70%); pointer-events: none; }
    .account-hero__avatar { width: 76px; height: 76px; border-radius: 50%; background: var(--surface-2); border: 2px solid var(--border-2); display: flex; align-items: center; justify-content: center; font-size: 30px; position: relative; z-index: 1; }
    .account-hero__name { font-family: var(--font-display); font-weight: 800; font-size: 22px; position: relative; z-index: 1; letter-spacing: -0.01em; }
    .account-hero__handle { font-size: 11px; color: var(--text-2); letter-spacing: 0.08em; position: relative; z-index: 1; margin-top: -4px; }
    .account-hero__rating { padding: 5px 14px; border-radius: var(--radius-pill); background: var(--accent-dim); border: 1px solid var(--accent-border); font-size: 12px; color: var(--accent); letter-spacing: 0.06em; position: relative; z-index: 1; }
    .acc-section { padding: 18px 18px 4px; border-bottom: 1px solid var(--border); }
    .acc-section:last-of-type { border-bottom: none; }
    .bio-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; font-size: 11px; line-height: 1.75; color: rgba(239,239,239,0.65); margin-bottom: 14px; }
    .logout-btn { display: block; width: 100%; height: 44px; border-radius: var(--radius-pill); background: transparent; border: 1px solid var(--border); color: var(--text-3); font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; margin-bottom: 18px; transition: border-color var(--t-base), color var(--t-base); }
    .logout-btn:hover { border-color: rgba(255,80,80,0.3); color: rgba(255,80,80,0.7); }
    .new-listing-link { display: block; width: 100%; height: 44px; border-radius: var(--radius-pill); background: var(--surface); border: 1px solid var(--border-2); color: var(--text); font-family: var(--font-display); font-weight: 600; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; margin-bottom: 10px; text-decoration: none; display: flex; align-items: center; justify-content: center; transition: background var(--t-base), border-color var(--t-base), color var(--t-base); }
    .new-listing-link:hover { background: var(--surface-2); border-color: var(--accent-border); color: var(--accent); }
    .req-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; }
    .req-card__meta { font-size: 11px; color: var(--text-2); }
    .req-card__name { font-family: var(--font-display); font-weight: 700; font-size: 14px; color: var(--text); }
    .req-card__city { font-size: 11px; color: var(--accent); letter-spacing: 0.05em; }
    .req-card__actions { display: flex; gap: 8px; margin-top: 4px; }
    .req-btn { flex: 1; height: 36px; border-radius: var(--radius-pill); font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; border: 1px solid; transition: background var(--t-base), color var(--t-base); }
    .req-btn--accept { background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent); }
    .req-btn--accept:hover { background: var(--accent); color: #000; }
    .req-btn--decline { background: transparent; border-color: var(--border-2); color: var(--text-3); }
    .req-btn--decline:hover { border-color: rgba(255,80,80,0.3); color: rgba(255,80,80,0.7); }
    .req-status-badge { display: inline-block; padding: 2px 10px; border-radius: var(--radius-pill); font-size: 10px; font-family: var(--font-mono); letter-spacing: 0.08em; text-transform: uppercase; }
    .req-status-badge--accepted { background: var(--accent-dim); border: 1px solid var(--accent-border); color: var(--accent); }
    .req-status-badge--declined { background: rgba(255,80,80,0.08); border: 1px solid rgba(255,80,80,0.2); color: rgba(255,80,80,0.6); }
    .req-empty { font-size: 12px; color: var(--text-3); padding: 8px 0 12px; }
  </style>
</head>
<body>
<div class="app-shell">

  <div th:replace="~{fragments/topbar :: topbar}"></div>

  <main class="page-content">

    <div class="account-hero" id="account-hero">
      <div class="account-hero__avatar" id="account-avatar" style="background:var(--surface-2);overflow:hidden;"></div>
      <div id="account-name-wrap" style="display:flex;flex-direction:column;align-items:center;gap:6px;width:100%;">
        <div class="skeleton skeleton-line skeleton-line--lg" style="width:140px;" id="account-name-sk"></div>
        <div class="skeleton skeleton-line skeleton-line--sm" style="width:90px;" id="account-handle-sk"></div>
        <div class="skeleton skeleton-line" style="width:70px;height:26px;border-radius:20px;" id="account-rating-sk"></div>
      </div>
      <div id="account-name" style="display:none;font-family:var(--font-display);font-weight:800;font-size:22px;letter-spacing:-0.01em;"></div>
      <div id="account-handle" style="display:none;font-size:11px;color:var(--text-2);letter-spacing:0.08em;margin-top:-4px;"></div>
      <div class="account-hero__rating" id="account-rating-badge" style="display:none;">★ <span id="account-rating">0.0</span></div>
      <div id="account-stats" style="display:none;gap:24px;margin-top:4px;">
        <div style="text-align:center;">
          <div style="font-family:var(--font-display);font-weight:800;font-size:20px;color:var(--text);" id="stat-total">0</div>
          <div style="font-size:9px;color:var(--text-3);letter-spacing:0.08em;text-transform:uppercase;margin-top:2px;">Tours</div>
        </div>
        <div style="text-align:center;">
          <div style="font-family:var(--font-display);font-weight:800;font-size:20px;color:var(--accent);" id="stat-active">0</div>
          <div style="font-size:9px;color:var(--text-3);letter-spacing:0.08em;text-transform:uppercase;margin-top:2px;">Active</div>
        </div>
      </div>
    </div>

    <!-- Profile completeness nudge — shown by JS when fields are missing -->
    <div id="profile-nudge" style="display:none;margin:10px 18px 0;padding:10px 14px;background:rgba(255,107,53,0.06);border:1px solid rgba(255,107,53,0.2);border-radius:var(--radius-sm);font-size:10px;color:var(--warm);line-height:1.6;letter-spacing:0.03em;"></div>

    <div class="acc-section" style="padding-bottom:14px;">
      <div class="section-label" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        Bio
        <a href="/account/edit" style="font-size:10px;color:var(--accent);text-decoration:none;letter-spacing:0.06em;">Edit</a>
      </div>
      <div id="account-bio" style="font-size:11px;line-height:1.7;color:var(--text-3);">No bio set.</div>
    </div>


    <div class="acc-section">
      <a href="/requests" id="requests-link" style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);text-decoration:none;transition:border-color var(--t-fast);">
        <div>
          <div style="font-family:var(--font-display);font-weight:700;font-size:13px;color:var(--text);">Booking Requests</div>
          <div style="font-size:10px;color:var(--text-3);margin-top:2px;">View and manage incoming tour requests</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span id="requests-badge" style="display:none;background:var(--accent-dim);border:1px solid var(--accent-border);color:var(--accent);font-family:var(--font-mono);font-size:10px;padding:2px 8px;border-radius:var(--radius-pill);letter-spacing:0.06em;"></span>
          <span style="color:var(--text-3);font-size:16px;">›</span>
        </div>
      </a>
    </div>

    <div class="acc-section">
      <a href="/ratings" style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);text-decoration:none;transition:border-color var(--t-fast);">
        <div>
          <div style="font-family:var(--font-display);font-weight:700;font-size:13px;color:var(--text);">Ratings</div>
          <div style="font-size:10px;color:var(--text-3);margin-top:2px;">View ratings and reviews</div>
        </div>
        <span style="color:var(--text-3);font-size:16px;">›</span>
      </a>
    </div>

    <div style="padding: 18px 18px 8px;">
      <a href="/account/edit" class="new-listing-link">Edit Profile</a>
      <button onclick="Auth.logout()" class="logout-btn" style="margin-top: 10px;">Log out</button>
    </div>

  </main>

  <div th:replace="~{fragments/navbar :: navbar}"></div>

</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/api.js}"></script>
<script>
  function loadAccount() {
    const userId = Auth.getUserId();
    if (!userId) { window.location.href = '/login'; return; }

    Promise.all([UserAPI.getById(userId), TourListingAPI.getAll()]).then(([user, listings]) => {
      // Swap skeletons for real data
      ['account-name-sk','account-handle-sk','account-rating-sk'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = 'none';
      });
      const nameEl   = document.getElementById('account-name');
      const handleEl = document.getElementById('account-handle');
      const ratingEl = document.getElementById('account-rating-badge');
      nameEl.textContent   = user.firstName + ' ' + user.lastName;
      handleEl.textContent = '@' + user.username;
      document.getElementById('account-rating').textContent = user.rating ?? '0.0';
      nameEl.style.display   = '';
      handleEl.style.display = '';
      ratingEl.style.display = '';

      const bioEl = document.getElementById('account-bio');
      bioEl.textContent = user.bio || 'No bio set.';
      bioEl.style.color = user.bio ? 'rgba(239,239,239,0.65)' : 'var(--text-3)';

      // Cache initials for topbar
      const initials = ((user.firstName?.[0] ?? '') + (user.lastName?.[0] ?? '')).toUpperCase() || '?';
      const hue = (user.username ?? '').split('').reduce((acc, c) => acc + c.charCodeAt(0), 0) % 360;
      localStorage.setItem('user_initials', initials);
      localStorage.setItem('user_hue', hue);

      // Host stats
      const myListings = (listings || []).filter(l => l.host && l.host.username === user.username);
      const activeCount = myListings.filter(l => !l.reserved).length;
      document.getElementById('stat-total').textContent  = myListings.length;
      document.getElementById('stat-active').textContent = activeCount;
      document.getElementById('account-stats').style.display = 'flex';

      // Avatar: photo URL from API, then localStorage fallback; keep localStorage in sync for topbar
      const avatarEl = document.getElementById('account-avatar');
      const storedPhoto = localStorage.getItem('photo_' + userId);
      const photoUrl = user.profilePhotoUrl || storedPhoto;
      if (user.profilePhotoUrl) localStorage.setItem('photo_' + userId, user.profilePhotoUrl);
      else if (!user.profilePhotoUrl && !storedPhoto) localStorage.removeItem('photo_' + userId);
      if (photoUrl) {
        avatarEl.innerHTML = `<img src="${photoUrl}" alt="Profile" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
      } else {
        const initials = ((user.firstName?.[0] ?? '') + (user.lastName?.[0] ?? '')).toUpperCase() || '?';
        const hue = (user.username ?? '').split('').reduce((acc, c) => acc + c.charCodeAt(0), 0) % 360;
        avatarEl.style.background = `hsl(${hue},35%,22%)`;
        avatarEl.style.border = `2px solid hsl(${hue},40%,35%)`;
        avatarEl.innerHTML = `<span style="font-family:var(--font-display);font-weight:800;font-size:28px;color:hsl(${hue},60%,72%);">${initials}</span>`;
      }

      // Profile completeness nudge
      const missing = [];
      if (!photoUrl)   missing.push('profile photo');
      if (!user.bio)   missing.push('bio');
      if (missing.length) {
        const nudge = document.getElementById('profile-nudge');
        nudge.innerHTML = `
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;">
            <div>
              <div style="font-weight:700;letter-spacing:0.08em;text-transform:uppercase;font-size:9px;margin-bottom:4px;">Profile incomplete</div>
              Add ${missing.join(' and ')} to build trust with other locals.
            </div>
            <a href="/account/edit" style="flex-shrink:0;font-size:10px;color:var(--warm);text-decoration:none;font-weight:700;letter-spacing:0.06em;white-space:nowrap;">Edit →</a>
          </div>`;
        nudge.style.display = '';
      }
    });
  }

loadAccount();

  async function loadRequestsBadge() {
    try {
      const username = Auth.getUsername();
      const requests = await BookingRequestAPI.getAll();
      const pending = (requests || []).filter(r =>
        r.status === 'PENDING' && r.tourListing?.host?.username === username
      );
      if (pending.length > 0) {
        const badge = document.getElementById('requests-badge');
        badge.textContent = pending.length;
        badge.style.display = '';
      }
    } catch(e) { /* badge is optional, fail silently */ }
  }

  loadRequestsBadge();
</script>
</body>
</html>
