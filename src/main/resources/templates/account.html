<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <title>Account — Experimate</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <style>
    .account-hero { padding: 28px 18px 22px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; gap: 10px; position: relative; overflow: hidden; }
    .account-hero::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 300px; height: 200px; background: radial-gradient(ellipse, rgba(0,201,167,0.08) 0%, transparent 70%); pointer-events: none; }
    .account-hero__avatar { width: 76px; height: 76px; border-radius: 50%; background: var(--surface-2); border: 2px solid var(--border-2); display: flex; align-items: center; justify-content: center; font-size: 30px; position: relative; z-index: 1; }
    .account-hero__name { font-family: var(--font-display); font-weight: 800; font-size: 22px; position: relative; z-index: 1; letter-spacing: -0.01em; }
    .account-hero__handle { font-size: 11px; color: var(--text-2); letter-spacing: 0.08em; position: relative; z-index: 1; margin-top: -4px; }
    .account-hero__rating { padding: 5px 14px; border-radius: var(--radius-pill); background: var(--accent-dim); border: 1px solid var(--accent-border); font-size: 12px; color: var(--accent); letter-spacing: 0.06em; position: relative; z-index: 1; }
    .acc-section { padding: 18px 18px 4px; border-bottom: 1px solid var(--border); }
    .acc-section:last-of-type { border-bottom: none; }
    .bio-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; font-size: 11px; line-height: 1.75; color: var(--text-2); margin-bottom: 14px; }
    .acc-stats { display: flex; gap: 0; margin-top: 8px; width: 100%; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
    .acc-stat { flex: 1; text-align: center; padding: 12px 8px; border-right: 1px solid var(--border); }
    .acc-stat:last-child { border-right: none; }
    .acc-stat__num { font-family: var(--font-display); font-weight: 800; font-size: 22px; color: var(--text); line-height: 1; }
    .acc-stat__num--accent { color: var(--accent); }
    .acc-stat__label { font-size: 9px; color: var(--text-3); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 3px; }
    .acc-link-card { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); text-decoration: none; transition: border-color var(--t-fast); }
    .acc-link-card:hover { border-color: var(--border-2); }
    .acc-link-card__left { display: flex; align-items: center; gap: 12px; }
    .acc-link-card__icon { width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center; background: var(--surface-2); border: 1px solid var(--border-2); color: var(--text-2); flex-shrink: 0; }
    .logout-btn { display: block; width: 100%; height: 44px; border-radius: var(--radius-pill); background: transparent; border: 1px solid var(--border); color: var(--text-3); font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; margin-top: 16px; margin-bottom: 18px; transition: border-color var(--t-base), color var(--t-base); }
    .logout-btn:hover { border-color: rgba(255,80,80,0.3); color: rgba(255,80,80,0.7); }
    .new-listing-link { display: block; width: 100%; height: 44px; border-radius: var(--radius-pill); background: var(--surface); border: 1px solid var(--border-2); color: var(--text); font-family: var(--font-display); font-weight: 600; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; margin-bottom: 10px; text-decoration: none; display: flex; align-items: center; justify-content: center; transition: background var(--t-base), border-color var(--t-base), color var(--t-base); }
    .new-listing-link:hover { background: var(--surface-2); border-color: var(--accent-border); color: var(--accent); }
    .req-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; }
    .req-card__meta { font-size: 11px; color: var(--text-2); }
    .req-card__name { font-family: var(--font-display); font-weight: 700; font-size: 14px; color: var(--text); }
    .req-card__city { font-size: 11px; color: var(--accent); letter-spacing: 0.05em; }
    .req-card__actions { display: flex; gap: 8px; margin-top: 4px; }
    .req-btn { flex: 1; height: 36px; border-radius: var(--radius-pill); font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; border: 1px solid; transition: background var(--t-base), color var(--t-base); }
    .req-btn--accept { background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent); }
    .req-btn--accept:hover { background: var(--accent); color: #000; }
    .req-btn--decline { background: transparent; border-color: var(--border-2); color: var(--text-3); }
    .req-btn--decline:hover { border-color: rgba(255,80,80,0.3); color: rgba(255,80,80,0.7); }
    .req-status-badge { display: inline-block; padding: 2px 10px; border-radius: var(--radius-pill); font-size: 10px; font-family: var(--font-mono); letter-spacing: 0.08em; text-transform: uppercase; }
    .req-status-badge--accepted { background: var(--accent-dim); border: 1px solid var(--accent-border); color: var(--accent); }
    .req-status-badge--declined { background: rgba(255,80,80,0.08); border: 1px solid rgba(255,80,80,0.2); color: rgba(255,80,80,0.6); }
    .req-empty { font-size: 12px; color: var(--text-3); padding: 8px 0 12px; }

    /* ── Account tabs ── */
    .acc-tab-bar { display: flex; border-bottom: 1px solid var(--border); padding: 0 18px; gap: 0; flex-shrink: 0; }
    .acc-tab { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-3); padding: 11px 16px; cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: color var(--t-base), border-color var(--t-base); user-select: none; }
    .acc-tab:hover { color: var(--text-2); }
    .acc-tab--active { color: var(--accent); border-bottom-color: var(--accent); }
    .acc-tab-panel { display: none; }
    .acc-tab-panel--active { display: block; }

    /* ── Memory grid ── */
    .memory-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 16px 18px 32px; }
    .memory-card {
      border-radius: var(--radius); overflow: hidden; cursor: pointer;
      background: var(--surface); border: 1px solid var(--border);
      display: flex; flex-direction: column;
      transition: border-color var(--t-base), transform var(--t-base);
    }
    .memory-card:hover { border-color: var(--border-2); transform: translateY(-2px); }
    .memory-card__photo { aspect-ratio: 1; background: var(--surface-2); position: relative; overflow: hidden; }
    .memory-card__photo img { width: 100%; height: 100%; object-fit: cover; }
    .memory-card__body { padding: 10px; }
    .memory-card__city { font-family: var(--font-display); font-weight: 700; font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .memory-card__date { font-size: 9px; color: var(--text-3); letter-spacing: 0.06em; margin-top: 2px; }

    /* ── Memory modal ── */
    .memory-modal {
      display: none; position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.88); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      align-items: flex-end; justify-content: center;
    }
    .memory-modal--visible { display: flex; }
    .memory-modal__sheet {
      background: var(--surface); border-radius: 20px 20px 0 0;
      border: 1px solid var(--border-2); border-bottom: none;
      width: 100%; max-width: 480px; max-height: 85dvh;
      overflow-y: auto; padding: 20px 20px 40px;
      animation: slideUp 0.32s cubic-bezier(0.32,0.72,0,1) both;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .memory-modal__handle { width: 36px; height: 3px; background: var(--border-3); border-radius: 2px; margin: 0 auto 18px; }
    .memory-modal__photo { width: 100%; aspect-ratio: 4/3; border-radius: var(--radius-sm); background: var(--surface-2); overflow: hidden; margin-bottom: 16px; }
    .memory-modal__photo img { width: 100%; height: 100%; object-fit: cover; }
    .memory-empty {
      display: flex; flex-direction: column; align-items: center;
      padding: 48px 24px; gap: 12px; text-align: center;
    }
    .memory-empty__icon { width: 52px; height: 52px; border-radius: 14px; background: var(--surface-2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--text-3); }
  </style>
</head>
<body>
<div class="app-shell">

  <div th:replace="~{fragments/topbar :: topbar}"></div>

  <main class="page-content">

    <div class="account-hero" id="account-hero">
      <div class="account-hero__avatar" id="account-avatar" style="background:var(--surface-2);overflow:hidden;"></div>
      <div id="account-name-wrap" style="display:flex;flex-direction:column;align-items:center;gap:6px;width:100%;">
        <div class="skeleton skeleton-line skeleton-line--lg" style="width:140px;" id="account-name-sk"></div>
        <div class="skeleton skeleton-line skeleton-line--sm" style="width:90px;" id="account-handle-sk"></div>
        <div class="skeleton skeleton-line" style="width:70px;height:26px;border-radius:20px;" id="account-rating-sk"></div>
      </div>
      <div id="account-name" style="display:none;font-family:var(--font-display);font-weight:800;font-size:22px;letter-spacing:-0.01em;"></div>
      <div id="account-handle" style="display:none;font-size:11px;color:var(--text-2);letter-spacing:0.08em;margin-top:-4px;"></div>
      <div class="account-hero__rating" id="account-rating-badge" style="display:none;"><span style="font-size:2em;line-height:1;">★</span> <span id="account-rating">0.0</span></div>
      <div id="account-stats" class="acc-stats" style="display:none;">
        <div class="acc-stat">
          <div class="acc-stat__num" id="stat-total">0</div>
          <div class="acc-stat__label">Total Meets</div>
        </div>
        <div class="acc-stat">
          <div class="acc-stat__num acc-stat__num--accent" id="stat-active">0</div>
          <div class="acc-stat__label">Currently Listed</div>
        </div>
      </div>
    </div>

    <!-- Tab bar -->
    <div class="acc-tab-bar">
      <div class="acc-tab acc-tab--active" onclick="switchAccTab('overview', this)">Overview</div>
      <div class="acc-tab" onclick="switchAccTab('memories', this)">Memories <span style="font-family:var(--font-mono);font-size:8px;font-weight:400;color:var(--text-3);font-style:italic;">(soon)</span></div>
    </div>

    <!-- OVERVIEW TAB -->
    <div id="acc-tab-overview" class="acc-tab-panel acc-tab-panel--active">

    <div class="acc-section" style="padding-bottom:14px;">
      <div class="section-label" style="margin-bottom:8px;">Bio</div>
      <div id="account-bio" style="font-size:11px;line-height:1.7;color:var(--text-3);">No bio set.</div>
    </div>


    <!-- Available to meet toggle — localStorage only until David adds the field -->
    <div class="acc-section" style="padding-bottom:14px;" id="available-section">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
        <div>
          <div style="font-family:var(--font-display);font-weight:700;font-size:13px;color:var(--text);">Available to meet <span style="font-family:var(--font-mono);font-size:10px;font-weight:400;color:var(--text-3);font-style:italic;">(feature coming soon...)</span></div>
          <div style="font-size:10px;color:var(--text-3);margin-top:2px;">Let others know you're open to meetups right now</div>
        </div>
        <button id="avail-toggle" onclick="toggleAvailability()" style="
          width:44px;height:26px;border-radius:13px;border:none;cursor:pointer;
          position:relative;transition:background var(--t-base);flex-shrink:0;
          background:var(--border-2);">
          <span id="avail-knob" style="
            position:absolute;top:3px;left:3px;
            width:20px;height:20px;border-radius:50%;
            background:#fff;transition:transform var(--t-base);
            display:block;"></span>
        </button>
      </div>
    </div>

    <div class="acc-section" style="padding-bottom:14px;">
      <div style="display:flex;flex-direction:column;gap:8px;">
        <a href="/requests" id="requests-link" class="acc-link-card">
          <div class="acc-link-card__left">
            <div class="acc-link-card__icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
            </div>
            <div>
              <div style="font-family:var(--font-display);font-weight:700;font-size:13px;color:var(--text);">Meet Requests</div>
              <div style="font-size:10px;color:var(--text-3);margin-top:2px;">View and manage incoming meet requests</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span id="requests-badge" style="display:none;background:var(--accent-dim);border:1px solid var(--accent-border);color:var(--accent);font-family:var(--font-mono);font-size:10px;padding:2px 8px;border-radius:var(--radius-pill);letter-spacing:0.06em;"></span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
          </div>
        </a>

        <a href="/ratings" class="acc-link-card">
          <div class="acc-link-card__left">
            <div class="acc-link-card__icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            </div>
            <div>
              <div style="font-family:var(--font-display);font-weight:700;font-size:13px;color:var(--text);">Ratings</div>
              <div style="font-size:10px;color:var(--text-3);margin-top:2px;">View ratings and reviews</div>
            </div>
          </div>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
        </a>

        <a href="/settings" class="acc-link-card">
          <div class="acc-link-card__left">
            <div class="acc-link-card__icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </div>
            <div>
              <div style="font-family:var(--font-display);font-weight:700;font-size:13px;color:var(--text);">Settings</div>
              <div style="font-size:10px;color:var(--text-3);margin-top:2px;">Theme, personality, account</div>
            </div>
          </div>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
        </a>
      </div>
    </div>

    <div class="acc-bottom">
      <button onclick="Auth.logout()" class="logout-btn">Log out</button>
    </div>

    </div><!-- /acc-tab-overview -->

    <!-- MEMORIES TAB -->
    <div id="acc-tab-memories" class="acc-tab-panel">
      <div id="memory-grid-wrap"></div>
    </div>

  </main>

  <!-- Memory detail modal -->
  <div class="memory-modal" id="memory-modal" onclick="closeMemoryModal(event)">
    <div class="memory-modal__sheet" id="memory-modal-sheet">
      <div class="memory-modal__handle"></div>
      <div class="memory-modal__photo" id="memory-modal-photo"></div>
      <div id="memory-modal-body"></div>
    </div>
  </div>

  <div th:replace="~{fragments/navbar :: navbar}"></div>

</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/api.js}"></script>
<script>
  function loadAccount() {
    const userId = Auth.getUserId();
    if (!userId) { window.location.href = '/login'; return; }

    Promise.all([UserAPI.getById(userId), TourListingAPI.getAll()]).then(([user, listings]) => {
      // Swap skeletons for real data
      ['account-name-sk','account-handle-sk','account-rating-sk'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = 'none';
      });
      const nameEl   = document.getElementById('account-name');
      const handleEl = document.getElementById('account-handle');
      const ratingEl = document.getElementById('account-rating-badge');
      nameEl.textContent   = user.firstName + ' ' + user.lastName;
      handleEl.textContent = '@' + user.username;
      document.getElementById('account-rating').textContent = user.rating ?? '0.0';
      nameEl.style.display   = '';
      handleEl.style.display = '';
      ratingEl.style.display = '';

      const bioEl = document.getElementById('account-bio');
      bioEl.textContent = user.bio || 'No bio set.';
      bioEl.style.color = user.bio ? 'var(--text-2)' : 'var(--text-3)';

      const initials = ((user.firstName?.[0] ?? '') + (user.lastName?.[0] ?? '')).toUpperCase() || '?';
      const hue = (user.username ?? '').split('').reduce((acc, c) => acc + c.charCodeAt(0), 0) % 360;
      localStorage.setItem('user_initials', initials);
      localStorage.setItem('user_hue', hue);

      // Host stats
      const myListings = (listings || []).filter(l => l.host && l.host.username === user.username);
      const activeCount = myListings.filter(l => !l.reserved).length;
      document.getElementById('stat-total').textContent  = myListings.length;
      document.getElementById('stat-active').textContent = activeCount;
      document.getElementById('account-stats').style.display = '';

      const avatarEl = document.getElementById('account-avatar');
      const photoUrl = UserAPI.photoUrl(user.profilePhotoUrl);
      if (photoUrl) localStorage.setItem('photo_' + userId, photoUrl);
      else localStorage.removeItem('photo_' + userId);
      if (typeof renderTopbarAvatar === 'function') renderTopbarAvatar();
      if (photoUrl) {
        avatarEl.innerHTML = `<img src="${photoUrl}" alt="Profile" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
      } else {
        avatarEl.style.background = `hsl(${hue},35%,22%)`;
        avatarEl.style.border = `2px solid hsl(${hue},40%,35%)`;
        avatarEl.innerHTML = `<span style="font-family:var(--font-display);font-weight:800;font-size:28px;color:hsl(${hue},60%,72%);">${initials}</span>`;
      }

      initAvailToggle(user.availableToMeet);
    });
  }

loadAccount();

  async function loadRequestsBadge() {
    try {
      const username = Auth.getUsername();
      const requests = await BookingRequestAPI.getAll();
      const pending = (requests || []).filter(r =>
        r.status === 'PENDING' && r.tourListing?.host?.username === username
      );
      localStorage.setItem('pending_requests', pending.length > 0 ? '1' : '0');
      if (pending.length > 0) {
        const badge = document.getElementById('requests-badge');
        badge.textContent = pending.length;
        badge.style.display = '';
      }
    } catch(e) { /* badge is optional, fail silently */ }
  }

  loadRequestsBadge();

  // Available to meet — reads from API if David has added the field (Issue #2), falls back to localStorage
  function initAvailToggle(apiValue) {
    const userId = Auth.getUserId();
    if (!userId) return;
    const section = document.getElementById('available-section');
    section.style.display = '';
    const toggle = document.getElementById('avail-toggle');
    const knob   = document.getElementById('avail-knob');

    let isAvail;
    if (apiValue !== undefined) {
      // David shipped availableToMeet — use server state and sync to localStorage
      isAvail = !!apiValue;
      localStorage.setItem('availableToMeet_' + userId, isAvail);
    } else {
      isAvail = localStorage.getItem('availableToMeet_' + userId) === 'true';
    }

    function applyState(val) {
      toggle.style.background = val ? 'var(--accent)' : 'var(--border-2)';
      knob.style.transform    = val ? 'translateX(18px)' : 'translateX(0)';
    }
    applyState(isAvail);

    window.toggleAvailability = function() {
      isAvail = !isAvail;
      localStorage.setItem('availableToMeet_' + userId, isAvail);
      applyState(isAvail);
      UserAPI.update(userId, { availableToMeet: isAvail }).catch(() => {});
      showToast(isAvail ? 'You\'re available to meet!' : 'Availability turned off', 'success');
    };
  }

  // ── Tab switching ─────────────────────────────
  function switchAccTab(name, el) {
    document.querySelectorAll('.acc-tab').forEach(t => t.classList.remove('acc-tab--active'));
    document.querySelectorAll('.acc-tab-panel').forEach(p => p.classList.remove('acc-tab-panel--active'));
    el.classList.add('acc-tab--active');
    document.getElementById('acc-tab-' + name).classList.add('acc-tab-panel--active');
    if (name === 'memories') renderMemories();
  }

  // ── Memories tab ──────────────────────────────
  let _memoriesRendered = false;
  function renderMemories() {
    if (_memoriesRendered) return;
    _memoriesRendered = true;
    const wrap = document.getElementById('memory-grid-wrap');
    const username = Auth.getUsername();
    if (!username) { wrap.innerHTML = '<div class="memory-empty"><div class="memory-empty__icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div></div>'; return; }

    // Show skeleton while loading
    wrap.innerHTML = `<div class="memory-grid">${Array(4).fill(`
      <div class="memory-card">
        <div class="memory-card__photo skeleton"></div>
        <div class="memory-card__body">
          <div class="skeleton skeleton-line" style="width:70%;height:12px;"></div>
          <div class="skeleton skeleton-line skeleton-line--sm" style="width:45%;margin-top:5px;"></div>
        </div>
      </div>`).join('')}</div>`;

    ReservationAPI.getMine().then(({ asGuest }) => {
      const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const past = (asGuest || [])
        .filter(r => r.status === 'COMPLETED' || r.status === 'CLOSED')
        .sort((a, b) => new Date(b.tourListing?.meetingDate) - new Date(a.tourListing?.meetingDate));

      if (!past.length) {
        wrap.innerHTML = `
          <div class="memory-empty">
            <div class="memory-empty__icon">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            </div>
            <div style="font-family:var(--font-display);font-weight:700;font-size:15px;color:var(--text-2);">No memories yet</div>
            <div style="font-size:11px;color:var(--text-3);line-height:1.6;max-width:220px;text-align:center;">Complete your first tour and your memories will appear here.</div>
            <a href="/tours" class="btn btn--primary" style="margin-top:8px;height:40px;padding:0 20px;font-size:11px;">Find a day →</a>
          </div>`;
        return;
      }

      wrap.innerHTML = `<div class="memory-grid">${past.map((r, i) => {
        const d = new Date(r.tourListing?.meetingDate);
        const dateStr = `${String(d.getDate()).padStart(2,'0')} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
        const city = r.tourListing?.city ?? 'Unknown';
        const host = r.tourListing?.host;
        const hostName = host ? host.firstName + ' ' + host.lastName : '?';
        const hue = (host?.username ?? city).split('').reduce((a,c) => a + c.charCodeAt(0), 0) % 360;
        return `
          <div class="memory-card anim-fade-up" style="animation-delay:${i*0.05}s" onclick="openMemory(${JSON.stringify({city, dateStr, hostName, hue}).replace(/"/g,'&quot;')})">
            <div class="memory-card__photo" style="background:linear-gradient(135deg,hsl(${hue},28%,14%) 0%,hsl(${hue},18%,22%) 100%);display:flex;align-items:center;justify-content:center;">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="hsl(${hue},50%,55%)" stroke-width="1.2" stroke-linecap="round" opacity="0.6"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            </div>
            <div class="memory-card__body">
              <div class="memory-card__city">${city}</div>
              <div class="memory-card__date">${dateStr}</div>
            </div>
          </div>`;
      }).join('')}</div>`;
    }).catch(() => {
      wrap.innerHTML = '<div style="padding:20px 18px;font-size:11px;color:var(--text-3);">Could not load memories.</div>';
    });
  }

  function openMemory(data) {
    const modal = document.getElementById('memory-modal');
    const hue = data.hue || 0;
    document.getElementById('memory-modal-photo').style.cssText =
      `background:linear-gradient(135deg,hsl(${hue},28%,14%) 0%,hsl(${hue},18%,22%) 100%);display:flex;align-items:center;justify-content:center;`;
    document.getElementById('memory-modal-photo').innerHTML =
      `<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="hsl(${hue},50%,55%)" stroke-width="1" stroke-linecap="round" opacity="0.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`;
    document.getElementById('memory-modal-body').innerHTML = `
      <div style="font-family:var(--font-display);font-weight:800;font-size:20px;color:var(--text);letter-spacing:-0.01em;margin-bottom:4px;">${data.city}</div>
      <div style="font-size:11px;color:var(--text-3);margin-bottom:12px;">${data.dateStr}</div>
      <div style="font-size:12px;color:var(--text-2);">with <span style="color:var(--text);font-weight:600;">${data.hostName}</span></div>`;
    modal.classList.add('memory-modal--visible');
  }

  function closeMemoryModal(e) {
    if (e.target === document.getElementById('memory-modal')) {
      document.getElementById('memory-modal').classList.remove('memory-modal--visible');
    }
  }
</script>
</body>
</html>
