<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <title>Account — Experimate</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <style>
    /* ── Hero ── */
    .account-hero {
      padding: 28px 20px 20px;
      display: flex; flex-direction: column; align-items: center; gap: 0;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .account-hero::before {
      content: ''; position: absolute; top: -60px; left: 50%; transform: translateX(-50%);
      width: 340px; height: 240px;
      background: radial-gradient(ellipse, rgba(0,201,167,0.07) 0%, transparent 65%);
      pointer-events: none;
    }

    /* Hamburger menu button */
    .acc-menu-btn {
      position: absolute; top: 16px; right: 16px;
      width: 36px; height: 36px; border-radius: 50%;
      background: transparent; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-2); z-index: 2;
      transition: color var(--t-fast), background var(--t-fast);
    }
    .acc-menu-btn:hover { color: var(--text); background: var(--surface-2); }

    /* Avatar */
    .acc-avatar {
      width: 88px; height: 88px; border-radius: 50%;
      background: var(--surface-2);
      box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
      display: flex; align-items: center; justify-content: center;
      position: relative; z-index: 1; overflow: hidden; flex-shrink: 0;
      margin-bottom: 12px;
    }
    .acc-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .acc-name {
      font-family: var(--font-display); font-weight: 800; font-size: 20px;
      letter-spacing: -0.01em; color: var(--text); margin-bottom: 2px; z-index: 1; position: relative;
    }
    .acc-handle {
      font-size: 12px; color: var(--text-3); letter-spacing: 0.05em;
      margin-bottom: 16px; z-index: 1; position: relative;
    }

    /* Stats row — Instagram style */
    .acc-stats-row {
      display: flex; width: 100%; max-width: 300px;
      margin-bottom: 16px; z-index: 1; position: relative;
    }
    .acc-stat-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .acc-stat-col + .acc-stat-col { border-left: 1px solid var(--border); }
    .acc-stat-col__num { font-family: var(--font-display); font-weight: 800; font-size: 20px; color: var(--text); line-height: 1; }
    .acc-stat-col__num--accent { color: var(--accent); }
    .acc-stat-col__label { font-size: 10px; color: var(--text-3); letter-spacing: 0.06em; text-transform: uppercase; }

    /* Edit profile button */
    .acc-edit-btn {
      display: flex; align-items: center; justify-content: center;
      width: 100%; height: 36px; border-radius: var(--radius-pill);
      border: 1px solid var(--border-2); background: var(--surface);
      color: var(--text); font-family: var(--font-display); font-weight: 700; font-size: 13px;
      text-decoration: none; cursor: pointer; z-index: 1; position: relative;
      transition: border-color var(--t-fast), background var(--t-fast);
    }
    .acc-edit-btn:hover { border-color: var(--accent-border); background: var(--surface-2); }

    /* ── Side drawer ── */
    .drawer-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0); z-index: 800;
      pointer-events: none; transition: background 0.25s;
    }
    .drawer-backdrop--open { background: rgba(0,0,0,0.55); pointer-events: all; }

    .drawer {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: 280px; max-width: 85vw;
      background: var(--surface); border-left: 1px solid var(--border-2);
      z-index: 801; display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.28s cubic-bezier(0.32,0.72,0,1);
      overflow-y: auto;
    }
    .drawer--open { transform: translateX(0); }

    .drawer__header {
      padding: 52px 20px 18px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 14px;
    }
    .drawer__avatar {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--surface-2); overflow: hidden; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .drawer__avatar img { width: 100%; height: 100%; object-fit: cover; }
    .drawer__name { font-family: var(--font-display); font-weight: 800; font-size: 15px; color: var(--text); }
    .drawer__handle { font-size: 11px; color: var(--text-3); margin-top: 2px; }

    .drawer__close {
      position: absolute; top: 14px; right: 14px;
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--surface-2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text-3);
      transition: color var(--t-fast), border-color var(--t-fast);
    }
    .drawer__close:hover { color: var(--text); border-color: var(--border-2); }

    .drawer__section { padding: 8px 0; border-bottom: 1px solid var(--border); }
    .drawer__section:last-child { border-bottom: none; }
    .drawer__section-label {
      font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--text-3); padding: 10px 20px 4px;
    }

    .drawer__item {
      display: flex; align-items: center; gap: 14px;
      padding: 13px 20px; color: var(--text); text-decoration: none; cursor: pointer;
      transition: background var(--t-fast), color var(--t-fast);
      border: none; background: none; width: 100%; text-align: left; font-size: 14px;
    }
    .drawer__item:hover { background: var(--surface-2); }
    .drawer__item--danger { color: rgba(255,75,75,0.8); }
    .drawer__item--danger:hover { background: rgba(255,50,50,0.06); color: rgba(255,75,75,1); }
    .drawer__item__icon {
      width: 34px; height: 34px; border-radius: 10px; flex-shrink: 0;
      background: var(--surface-2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center; color: var(--text-2);
    }
    .drawer__item--danger .drawer__item__icon {
      background: rgba(255,50,50,0.07); border-color: rgba(255,50,50,0.15); color: rgba(255,80,80,0.7);
    }
    .drawer__item__label { font-family: var(--font-display); font-weight: 700; font-size: 14px; }
    .drawer__item__sub { font-size: 10px; color: var(--text-3); margin-top: 1px; }

    /* ── Tabs ── */
    .acc-tab-bar { display: flex; border-bottom: 1px solid var(--border); padding: 0; flex-shrink: 0; }
    .acc-tab {
      flex: 1; text-align: center;
      font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-3); padding: 12px 0; cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: color var(--t-base), border-color var(--t-base); user-select: none;
    }
    .acc-tab:hover { color: var(--text-2); }
    .acc-tab--active { color: var(--accent); border-bottom-color: var(--accent); }
    .acc-tab-panel { display: none; }
    .acc-tab-panel--active { display: block; }

    /* ── Overview ── */
    .acc-section { padding: 16px 20px; border-bottom: 1px solid var(--border); }
    .acc-section:last-child { border-bottom: none; }


    /* ── Memory grid — 3-col Instagram ── */
    .memory-grid-insta {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px;
    }
    .memory-tile { aspect-ratio: 1; position: relative; cursor: pointer; overflow: hidden; background: var(--surface-2); }
    .memory-tile__bg { width: 100%; height: 100%; transition: transform 0.2s ease; }
    .memory-tile:active .memory-tile__bg { transform: scale(0.96); }
    .memory-tile__overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0); transition: background 0.2s;
      display: flex; align-items: flex-end; padding: 8px;
    }
    .memory-tile:hover .memory-tile__overlay { background: rgba(0,0,0,0.35); }
    .memory-tile__city {
      font-family: var(--font-display); font-weight: 700; font-size: 11px;
      color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.8);
      opacity: 0; transform: translateY(4px);
      transition: opacity 0.2s, transform 0.2s; width: 100%;
    }
    .memory-tile:hover .memory-tile__city { opacity: 1; transform: translateY(0); }

    /* ── Memory modal ── */
    .memory-modal {
      display: none; position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.88); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      align-items: flex-end; justify-content: center;
    }
    .memory-modal--visible { display: flex; }
    .memory-modal__sheet {
      background: var(--surface); border-radius: 20px 20px 0 0;
      border: 1px solid var(--border-2); border-bottom: none;
      width: 100%; max-width: 480px; max-height: 85dvh;
      overflow-y: auto; padding: 20px 20px 40px;
      animation: slideUp 0.32s cubic-bezier(0.32,0.72,0,1) both;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .memory-modal__handle { width: 36px; height: 3px; background: var(--border-3); border-radius: 2px; margin: 0 auto 18px; }
    .memory-modal__photo { width: 100%; aspect-ratio: 4/3; border-radius: var(--radius-sm); background: var(--surface-2); overflow: hidden; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; }
    .memory-empty {
      display: flex; flex-direction: column; align-items: center;
      padding: 56px 24px; gap: 12px; text-align: center;
    }
    .memory-empty__icon { width: 56px; height: 56px; border-radius: 16px; background: var(--surface-2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--text-3); }

    /* legacy req-cards */
    .req-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; }
    .req-btn { flex: 1; height: 36px; border-radius: var(--radius-pill); font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; border: 1px solid; transition: background var(--t-base), color var(--t-base); }
    .req-btn--accept { background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent); }
    .req-btn--accept:hover { background: var(--accent); color: #000; }
    .req-btn--decline { background: transparent; border-color: var(--border-2); color: var(--text-3); }
    .req-btn--decline:hover { border-color: rgba(255,80,80,0.3); color: rgba(255,80,80,0.7); }
    .req-status-badge { display: inline-block; padding: 2px 10px; border-radius: var(--radius-pill); font-size: 10px; font-family: var(--font-mono); letter-spacing: 0.08em; text-transform: uppercase; }
    .req-status-badge--accepted { background: var(--accent-dim); border: 1px solid var(--accent-border); color: var(--accent); }
    .req-status-badge--declined { background: rgba(255,80,80,0.08); border: 1px solid rgba(255,80,80,0.2); color: rgba(255,80,80,0.6); }
  </style>
</head>
<body>
<div class="app-shell">

  <div th:replace="~{fragments/topbar :: topbar}"></div>

  <main class="page-content">

    <!-- ── Hero ── -->
    <div class="account-hero">

      <!-- Hamburger -->
      <button class="acc-menu-btn" onclick="openDrawer()" aria-label="Menu">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

      <div class="acc-avatar" id="account-avatar"></div>

      <div id="account-name-sk" class="skeleton skeleton-line skeleton-line--lg" style="width:130px;margin-bottom:6px;"></div>
      <div id="account-handle-sk" class="skeleton skeleton-line skeleton-line--sm" style="width:90px;margin-bottom:16px;"></div>

      <div id="account-name" class="acc-name" style="display:none;"></div>
      <div id="account-handle" class="acc-handle" style="display:none;"></div>

      <div class="acc-stats-row" id="account-stats" style="display:none;">
        <div class="acc-stat-col">
          <div class="acc-stat-col__num" id="stat-total">0</div>
          <div class="acc-stat-col__label">Meets</div>
        </div>
        <div class="acc-stat-col">
          <div class="acc-stat-col__num acc-stat-col__num--accent">★ <span id="account-rating">0.0</span></div>
          <div class="acc-stat-col__label">Rating</div>
        </div>
        <div class="acc-stat-col">
          <div class="acc-stat-col__num" id="stat-active">0</div>
          <div class="acc-stat-col__label">Active</div>
        </div>
      </div>

      <a href="/account/edit" class="acc-edit-btn" id="acc-edit-btn" style="display:none;">Edit Profile</a>

      <div id="account-rating-badge" style="display:none;"></div>
    </div>

    <!-- ── Tabs ── -->
    <div class="acc-tab-bar">
      <div class="acc-tab acc-tab--active" onclick="switchAccTab('overview', this)">Overview</div>
      <div class="acc-tab" onclick="switchAccTab('memories', this)">Memories</div>
    </div>

    <!-- ── OVERVIEW TAB ── -->
    <div id="acc-tab-overview" class="acc-tab-panel acc-tab-panel--active">

      <div class="acc-section">
        <div id="account-bio" style="font-size:13px;line-height:1.75;color:var(--text-3);">No bio set.</div>
      </div>


    </div><!-- /overview -->

    <!-- ── MEMORIES TAB ── -->
    <div id="acc-tab-memories" class="acc-tab-panel">
      <div id="memory-grid-wrap"></div>
    </div>

  </main>

  <!-- ── Side drawer ── -->
  <div class="drawer-backdrop" id="drawer-backdrop" onclick="closeDrawer()"></div>
  <div class="drawer" id="drawer">

    <button class="drawer__close" onclick="closeDrawer()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>

    <div class="drawer__header">
      <div class="drawer__avatar" id="drawer-avatar"></div>
      <div>
        <div class="drawer__name" id="drawer-name">—</div>
        <div class="drawer__handle" id="drawer-handle">—</div>
      </div>
    </div>

    <div class="drawer__section">
      <a href="/tours" class="drawer__item">
        <div class="drawer__item__icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </div>
        <div>
          <div class="drawer__item__label">My Listings</div>
          <div class="drawer__item__sub">Meets you're hosting</div>
        </div>
      </a>
      <a href="/requests" class="drawer__item">
        <div class="drawer__item__icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </div>
        <div>
          <div class="drawer__item__label">Requests</div>
          <div class="drawer__item__sub">Join requests from guests</div>
        </div>
      </a>
      <a href="/ratings" class="drawer__item">
        <div class="drawer__item__icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </div>
        <div>
          <div class="drawer__item__label">Ratings</div>
          <div class="drawer__item__sub">Reviews and references</div>
        </div>
      </a>
      <a href="/explore" class="drawer__item">
        <div class="drawer__item__icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </div>
        <div>
          <div class="drawer__item__label">Explore</div>
          <div class="drawer__item__sub">Find meets near you</div>
        </div>
      </a>
    </div>

    <div class="drawer__section">
      <a href="/settings" class="drawer__item">
        <div class="drawer__item__icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </div>
        <div>
          <div class="drawer__item__label">Settings</div>
          <div class="drawer__item__sub">Theme, privacy, account</div>
        </div>
      </a>
    </div>

    <div class="drawer__section">
      <button class="drawer__item drawer__item--danger" onclick="Auth.logout()">
        <div class="drawer__item__icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </div>
        <div class="drawer__item__label">Log out</div>
      </button>
    </div>

  </div>

  <!-- Memory modal -->
  <div class="memory-modal" id="memory-modal" onclick="closeMemoryModal(event)">
    <div class="memory-modal__sheet">
      <div class="memory-modal__handle"></div>
      <div class="memory-modal__photo" id="memory-modal-photo"></div>
      <div id="memory-modal-body"></div>
    </div>
  </div>

  <div th:replace="~{fragments/navbar :: navbar}"></div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/api.js}"></script>
<script>
  // ── Drawer ────────────────────────────────────
  function openDrawer() {
    document.getElementById('drawer').classList.add('drawer--open');
    document.getElementById('drawer-backdrop').classList.add('drawer-backdrop--open');
    document.body.style.overflow = 'hidden';
  }
  function closeDrawer() {
    document.getElementById('drawer').classList.remove('drawer--open');
    document.getElementById('drawer-backdrop').classList.remove('drawer-backdrop--open');
    document.body.style.overflow = '';
  }

  // ── Account load ──────────────────────────────
  function loadAccount() {
    const userId = Auth.getUserId();
    if (!userId) { window.location.href = '/login'; return; }

    Promise.all([UserAPI.getById(userId), TourListingAPI.getMine({ size: 1000 })]).then(([user, listings]) => {
      ['account-name-sk','account-handle-sk'].forEach(id => {
        const el = document.getElementById(id); if (el) el.style.display = 'none';
      });

      const fullName = user.firstName + ' ' + user.lastName;
      const handle   = '@' + user.username;

      document.getElementById('account-name').textContent = fullName;
      document.getElementById('account-handle').textContent = handle;
      document.getElementById('account-rating').textContent = (user.rating ?? 0).toFixed(1);
      document.getElementById('account-name').style.display = '';
      document.getElementById('account-handle').style.display = '';

      // Populate drawer header
      document.getElementById('drawer-name').textContent = fullName;
      document.getElementById('drawer-handle').textContent = handle;

      const bioEl = document.getElementById('account-bio');
      bioEl.textContent = user.bio || 'No bio set.';
      bioEl.style.color = user.bio ? 'var(--text-2)' : 'var(--text-3)';

      const initials = ((user.firstName?.[0] ?? '') + (user.lastName?.[0] ?? '')).toUpperCase() || '?';
      const hue = (user.username ?? '').split('').reduce((acc, c) => acc + c.charCodeAt(0), 0) % 360;
      localStorage.setItem('user_initials', initials);
      localStorage.setItem('user_hue', hue);

      const myListings = listings || [];
      const activeCount = myListings.filter(l => (l.currentGuestCount ?? 0) < (l.maxGuests ?? 1)).length;
      document.getElementById('stat-total').textContent  = myListings.length;
      document.getElementById('stat-active').textContent = activeCount;
      document.getElementById('account-stats').style.display = '';
      document.getElementById('acc-edit-btn').style.display  = '';

      // Render avatars (hero + drawer)
      const photoUrl = UserAPI.photoUrl(user.profilePhotoUrl);
      if (photoUrl) localStorage.setItem('photo_' + userId, photoUrl);
      else localStorage.removeItem('photo_' + userId);
      if (typeof renderTopbarAvatar === 'function') renderTopbarAvatar();

      function renderAvatar(el, size) {
        if (photoUrl) {
          el.innerHTML = `<img src="${photoUrl}" alt="Profile">`;
        } else {
          el.style.background = `hsl(${hue},35%,22%)`;
          el.style.boxShadow  = size === 'lg'
            ? `0 0 0 2px var(--bg), 0 0 0 4px hsl(${hue},50%,45%)`
            : 'none';
          el.innerHTML = `<span style="font-family:var(--font-display);font-weight:800;font-size:${size === 'lg' ? 32 : 18}px;color:hsl(${hue},60%,72%);">${initials}</span>`;
        }
      }
      renderAvatar(document.getElementById('account-avatar'), 'lg');
      renderAvatar(document.getElementById('drawer-avatar'), 'sm');

    });
  }

  loadAccount();

  function switchAccTab(name, el) {
    document.querySelectorAll('.acc-tab').forEach(t => t.classList.remove('acc-tab--active'));
    document.querySelectorAll('.acc-tab-panel').forEach(p => p.classList.remove('acc-tab-panel--active'));
    el.classList.add('acc-tab--active');
    document.getElementById('acc-tab-' + name).classList.add('acc-tab-panel--active');
    if (name === 'memories') renderMemories();
  }

  // ── Memories ──────────────────────────────────
  let _memoriesRendered = false;
  function renderMemories() {
    if (_memoriesRendered) return;
    _memoriesRendered = true;
    const wrap = document.getElementById('memory-grid-wrap');
    wrap.innerHTML = `<div class="memory-grid-insta">${Array(6).fill(
      `<div class="memory-tile"><div class="memory-tile__bg skeleton" style="width:100%;height:100%;"></div></div>`
    ).join('')}</div>`;

    ReservationAPI.getMine({ filter: 'joined', timeframe: 'past', size: 100 }).then(page => {
      const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const past = (page.content || [])
        .filter(r => r.status === 'COMPLETED' || r.status === 'CLOSED')
        .sort((a, b) => new Date(b.tourListing?.meetingDate) - new Date(a.tourListing?.meetingDate));

      if (!past.length) {
        wrap.innerHTML = `
          <div class="memory-empty">
            <div class="memory-empty__icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></div>
            <div style="font-family:var(--font-display);font-weight:700;font-size:16px;color:var(--text-2);">No memories yet</div>
            <div style="font-size:12px;color:var(--text-3);line-height:1.6;max-width:220px;">Complete your first tour and it'll appear here.</div>
            <a href="/tours" class="btn btn--primary" style="margin-top:8px;height:40px;padding:0 24px;font-size:12px;">Find a day →</a>
          </div>`;
        return;
      }

      wrap.innerHTML = `<div class="memory-grid-insta">${past.map((r, i) => {
        const d = new Date(r.tourListing?.meetingDate);
        const dateStr = `${String(d.getDate()).padStart(2,'0')} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
        const city = r.tourListing?.city ?? 'Unknown';
        const host = r.tourListing?.host;
        const hostName = host ? host.firstName + ' ' + host.lastName : '?';
        const hue = (host?.username ?? city).split('').reduce((a,c) => a + c.charCodeAt(0), 0) % 360;
        const data = JSON.stringify({city, dateStr, hostName, hue}).replace(/"/g,'&quot;');
        return `
          <div class="memory-tile anim-fade-up" style="animation-delay:${i*0.04}s" onclick="openMemory(${data})">
            <div class="memory-tile__bg" style="background:linear-gradient(135deg,hsl(${hue},30%,12%) 0%,hsl(${hue},20%,22%) 100%);display:flex;align-items:center;justify-content:center;width:100%;height:100%;">
              <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="hsl(${hue},50%,55%)" stroke-width="1.2" stroke-linecap="round" opacity="0.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            </div>
            <div class="memory-tile__overlay"><div class="memory-tile__city">${city}</div></div>
          </div>`;
      }).join('')}</div>`;
    }).catch(() => {
      wrap.innerHTML = '<div style="padding:24px 20px;font-size:12px;color:var(--text-3);">Could not load memories.</div>';
    });
  }

  function openMemory(data) {
    const hue = data.hue || 0;
    const photoEl = document.getElementById('memory-modal-photo');
    photoEl.style.cssText = `background:linear-gradient(135deg,hsl(${hue},28%,14%) 0%,hsl(${hue},18%,22%) 100%);display:flex;align-items:center;justify-content:center;`;
    photoEl.innerHTML = `<svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="hsl(${hue},50%,55%)" stroke-width="1" stroke-linecap="round" opacity="0.45"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`;
    document.getElementById('memory-modal-body').innerHTML = `
      <div style="font-family:var(--font-display);font-weight:800;font-size:22px;color:var(--text);letter-spacing:-0.01em;margin-bottom:4px;">${data.city}</div>
      <div style="font-size:12px;color:var(--text-3);margin-bottom:14px;">${data.dateStr}</div>
      <div style="font-size:13px;color:var(--text-2);">with <span style="color:var(--text);font-weight:600;">${data.hostName}</span></div>`;
    document.getElementById('memory-modal').classList.add('memory-modal--visible');
  }

  function closeMemoryModal(e) {
    if (e.target === document.getElementById('memory-modal'))
      document.getElementById('memory-modal').classList.remove('memory-modal--visible');
  }
</script>
</body>
</html>
