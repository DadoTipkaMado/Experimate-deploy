<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>Account — Experimate</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <style>
    .account-hero { padding: 28px 18px 22px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; gap: 10px; position: relative; overflow: hidden; }
    .account-hero::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 300px; height: 200px; background: radial-gradient(ellipse, rgba(0,201,167,0.08) 0%, transparent 70%); pointer-events: none; }
    .account-hero__avatar { width: 76px; height: 76px; border-radius: 50%; background: var(--surface-2); border: 2px solid var(--border-2); display: flex; align-items: center; justify-content: center; font-size: 30px; position: relative; z-index: 1; }
    .account-hero__name { font-family: var(--font-display); font-weight: 800; font-size: 22px; position: relative; z-index: 1; letter-spacing: -0.01em; }
    .account-hero__handle { font-size: 11px; color: var(--text-2); letter-spacing: 0.08em; position: relative; z-index: 1; margin-top: -4px; }
    .account-hero__rating { padding: 5px 14px; border-radius: var(--radius-pill); background: var(--accent-dim); border: 1px solid var(--accent-border); font-size: 12px; color: var(--accent); letter-spacing: 0.06em; position: relative; z-index: 1; }
    .acc-section { padding: 18px 18px 4px; border-bottom: 1px solid var(--border); }
    .acc-section:last-of-type { border-bottom: none; }
    .bio-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; font-size: 11px; line-height: 1.75; color: rgba(239,239,239,0.65); margin-bottom: 14px; }
    .logout-btn { display: block; width: 100%; height: 44px; border-radius: var(--radius-pill); background: transparent; border: 1px solid var(--border); color: var(--text-3); font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; margin-bottom: 18px; transition: border-color var(--t-base), color var(--t-base); }
    .logout-btn:hover { border-color: rgba(255,80,80,0.3); color: rgba(255,80,80,0.7); }
    .new-listing-link { display: block; width: 100%; height: 44px; border-radius: var(--radius-pill); background: var(--surface); border: 1px solid var(--border-2); color: var(--text); font-family: var(--font-display); font-weight: 600; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; margin-bottom: 10px; text-decoration: none; display: flex; align-items: center; justify-content: center; transition: background var(--t-base), border-color var(--t-base), color var(--t-base); }
    .new-listing-link:hover { background: var(--surface-2); border-color: var(--accent-border); color: var(--accent); }
  </style>
</head>
<body>
<div class="app-shell">

  <div th:replace="~{fragments/topbar :: topbar}"></div>

  <main class="page-content">

    <div class="account-hero" id="account-hero">
      <div class="account-hero__avatar" id="account-avatar"><span>👤</span></div>
      <div id="account-name-wrap" style="display:flex;flex-direction:column;align-items:center;gap:6px;width:100%;">
        <div class="skeleton skeleton-line skeleton-line--lg" style="width:140px;" id="account-name-sk"></div>
        <div class="skeleton skeleton-line skeleton-line--sm" style="width:90px;" id="account-handle-sk"></div>
        <div class="skeleton skeleton-line" style="width:70px;height:26px;border-radius:20px;" id="account-rating-sk"></div>
      </div>
      <div id="account-name" style="display:none;font-family:var(--font-display);font-weight:800;font-size:22px;letter-spacing:-0.01em;"></div>
      <div id="account-handle" style="display:none;font-size:11px;color:var(--text-2);letter-spacing:0.08em;margin-top:-4px;"></div>
      <div class="account-hero__rating" id="account-rating-badge" style="display:none;">★ <span id="account-rating">0.0</span></div>
    </div>

    <div class="acc-section">
      <div class="section-label" style="display:flex;align-items:center;justify-content:space-between;">
        Bio
        <a href="/account/edit" style="font-size:10px;color:var(--accent);text-decoration:none;letter-spacing:0.06em;">Edit</a>
      </div>
      <div class="bio-box" id="account-bio" style="color: var(--text-3);">No bio set.</div>
    </div>


    <div style="padding: 18px 18px 8px;">
      <a href="/account/edit" class="new-listing-link">Edit Profile</a>
      <button onclick="Auth.logout()" class="logout-btn" style="margin-top: 10px;">Log out</button>
    </div>

  </main>

  <div th:replace="~{fragments/navbar :: navbar}"></div>

</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/api.js}"></script>
<script>
  function loadAccount() {
    const userId = Auth.getUserId();
    if (!userId) { window.location.href = '/login'; return; }

    UserAPI.getById(userId).then(user => {
      // Swap skeletons for real data
      ['account-name-sk','account-handle-sk','account-rating-sk'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = 'none';
      });
      const nameEl   = document.getElementById('account-name');
      const handleEl = document.getElementById('account-handle');
      const ratingEl = document.getElementById('account-rating-badge');
      nameEl.textContent   = user.firstName + ' ' + user.lastName;
      handleEl.textContent = '@' + user.username;
      document.getElementById('account-rating').textContent = user.rating ?? '0.0';
      nameEl.style.display   = '';
      handleEl.style.display = '';
      ratingEl.style.display = '';

      document.getElementById('account-bio').textContent = user.bio || 'No bio set.';
      document.getElementById('account-bio').style.color = user.bio ? '' : 'var(--text-3)';

      if (user.profilePhotoUrl) {
        document.getElementById('account-avatar').innerHTML =
          `<img src="${user.profilePhotoUrl}" alt="Profile" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
      }
    });
  }

loadAccount();
</script>
</body>
</html>
