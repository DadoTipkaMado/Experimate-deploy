<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="description" content="Browse local experiences and meet guides in your city. Discover authentic tours by people who actually live there.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Discover Experiences — ExperiMate">
  <meta property="og:description" content="Browse local experiences and meet guides in your city. Discover authentic tours by people who actually live there.">
  <meta property="og:image" content="/images/og-card.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <title>Discover — Experimate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <style>
    /* explore = solid search header + full-screen TikTok-style snap feed */
    .page-content--explore { overflow: hidden; display: flex; flex-direction: column; }

    /* ── Sticky search / filter header (solid, follows theme) ── */
    .explore-hd {
      flex-shrink: 0;
      z-index: 20;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 12px 14px 10px;
    }

    .explore-search {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border-2);
      border-radius: var(--radius-pill);
      padding: 0 16px;
      height: 44px;
      margin-bottom: 8px;
      transition: border-color var(--t-fast), box-shadow var(--t-fast);
    }
    .explore-search:focus-within {
      border-color: var(--accent-border);
      box-shadow: 0 0 0 3px var(--accent-a08);
    }
    .explore-search input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 14px;
    }
    .explore-search input::placeholder { color: var(--text-3); }

    .explore-pills {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .explore-pills::-webkit-scrollbar { display: none; }

    .pill--ai.pill--active {
      background: linear-gradient(135deg, var(--accent-dim) 0%, rgba(168,85,247,0.12) 100%);
      border-color: var(--accent-border);
      color: var(--accent);
    }

    /* ── Snap feed: one reel per screen ── */
    .explore-feed {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      scroll-snap-type: y mandatory;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      background: var(--bg);
    }
    .explore-feed::-webkit-scrollbar { display: none; }
    #feed-loader { scroll-snap-align: none; }

    @keyframes reelEnter { from { opacity: 0; } to { opacity: 1; } }

    /* ── Reel ── */
    .reel {
      position: relative;
      height: 100%;
      width: 100%;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      animation: reelEnter 0.4s ease;
    }

    /* Gradient backdrop tinted by host hue, brightness follows theme */
    .reel__bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(135% 65% at 50% -8%, hsl(var(--card-hue, 160) 48% 22% / 0.7), transparent 60%),
        radial-gradient(120% 55% at 100% 108%, hsl(var(--card-hue, 160) 42% 17% / 0.55), transparent 55%),
        linear-gradient(180deg, var(--surface-2) 0%, var(--bg) 70%);
    }
    /* Bottom vignette so content stays legible (fallback, photo-less cards) */
    .reel__bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(95% 55% at 30% 100%, rgba(0,0,0,0.5), transparent 72%);
    }

    /* Host profile photo as the reel backdrop (sits above the hue fallback) */
    .reel__photo {
      position: absolute;
      inset: 0;
      z-index: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    /* Legibility scrim: opaque page colour at the bottom (where the name,
       status and action rail sit) fading to clear over the photo. var(--bg) is
       dark in dark themes and light in light/warm, so text contrast holds in
       every theme without per-theme overrides. */
    .reel__scrim {
      position: absolute;
      inset: 0;
      z-index: 1;
      background:
        linear-gradient(to top,
          var(--bg) 2%,
          color-mix(in srgb, var(--bg) 85%, transparent) 22%,
          color-mix(in srgb, var(--bg) 45%, transparent) 50%,
          transparent 80%),
        linear-gradient(to left,
          color-mix(in srgb, var(--bg) 42%, transparent) 0%,
          transparent 42%);
    }

    /* Fallback backdrop when the host has no profile photo: large host
       initials as a watermark over the hue gradient. */
    .reel__initials {
      position: absolute;
      inset: 0;
      z-index: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 150px;
      line-height: 1;
      color: hsl(var(--card-hue, 160) 55% 62% / 0.28);
      user-select: none;
      pointer-events: none;
    }

    /* ── Right action rail ── */
    .reel__rail {
      position: absolute;
      right: 12px;
      bottom: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      z-index: 3;
    }
    .reel__avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 18px;
      text-decoration: none;
      box-shadow:
        0 0 0 2.5px hsl(var(--card-hue, 160) 55% 50%),
        0 4px 12px rgba(0,0,0,0.45);
      transition: transform var(--t-fast);
    }
    .reel__avatar:active { transform: scale(0.93); }
    .reel__avatar img { width: 100%; height: 100%; object-fit: cover; }

    .reel__action {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.04em;
      -webkit-tap-highlight-color: transparent;
    }
    .reel__action:disabled { cursor: default; }
    .reel__action-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface-2);
      border: 1px solid var(--border-2);
      color: var(--text);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: transform var(--t-fast), background var(--t-fast);
    }
    .reel__action:not(:disabled):active .reel__action-icon { transform: scale(0.88); }
    .reel__action--join    .reel__action-icon { background: var(--accent); color: #000; border-color: transparent; }
    .reel__action--pending .reel__action-icon { background: rgba(255,153,68,0.15); color: #ff9944; border-color: rgba(255,153,68,0.30); }
    .reel__action--accepted .reel__action-icon { background: var(--accent-dim); color: var(--accent); border-color: var(--accent-border); }
    .reel__action--own     .reel__action-icon { background: var(--warm-dim); color: var(--warm); border-color: var(--warm-border); }
    .reel__action--full    .reel__action-icon { opacity: 0.5; }
    .reel__action--login   .reel__action-icon { background: var(--surface-2); color: var(--text-2); }

    /* ── Bottom-left content ── */
    .reel__content {
      position: relative;
      z-index: 2;
      padding: 0 86px 34px 20px;   /* right padding clears the action rail */
    }

    .reel__badge {
      display: inline-flex;
      align-items: center;
      height: 24px;
      padding: 0 12px;
      margin-bottom: 12px;
      border-radius: var(--radius-pill);
      font-size: 10px;
      font-family: var(--font-mono);
      letter-spacing: 0.09em;
      text-transform: uppercase;
      font-weight: 700;
    }
    .reel__badge--available { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent-a25); }
    .reel__badge--pending   { background: rgba(255,153,68,0.12); color: #ff9944; border: 1px solid rgba(255,153,68,0.28); }
    .reel__badge--accepted  { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent-border); }
    .reel__badge--own       { background: var(--warm-dim); color: var(--warm); border: 1px solid var(--warm-border); }
    .reel__badge--full      { background: var(--surface-2); color: var(--text-3); border: 1px solid var(--border-2); }

    .reel__host {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 23px;
      color: var(--text);
      line-height: 1.15;
      margin-bottom: 6px;
    }
    .reel__handle {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 13px;
      color: var(--text-2);
      margin-bottom: 13px;
    }
    .reel__city { display: inline-flex; align-items: center; gap: 4px; }
    .reel__desc {
      font-size: 14px;
      color: var(--text);
      line-height: 1.6;
      margin-bottom: 14px;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .reel__date {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-2);
      font-family: var(--font-mono);
    }
    .reel__spots { display: inline-flex; gap: 3px; }
    .reel__spot-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--surface-3);
    }
    .reel__spot-dot--taken { background: var(--accent); }

    /* ── Sponsored ad reel ── */
    .reel--ad .reel__bg {
      background:
        radial-gradient(135% 65% at 50% -8%, rgba(37,99,235,0.28), transparent 60%),
        linear-gradient(180deg, var(--surface-2) 0%, var(--bg) 70%);
    }
    .reel__ad-label {
      position: absolute;
      top: 16px;
      left: 20px;
      z-index: 2;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #60a5fa;
    }
    .reel__ad-img {
      position: absolute;
      inset: 0 0 auto 0;
      height: 52%;
      overflow: hidden;
      -webkit-mask-image: linear-gradient(180deg, #000 55%, transparent);
              mask-image: linear-gradient(180deg, #000 55%, transparent);
    }
    .reel__ad-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .reel__ad-title {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 22px;
      color: var(--text);
      line-height: 1.18;
      margin-bottom: 8px;
    }

    /* ── Light / warm theme: lighten the backdrop so token text stays readable ── */
    body.theme-light .reel__bg, body.theme-warm .reel__bg {
      background:
        radial-gradient(135% 65% at 50% -8%, hsl(var(--card-hue, 160) 58% 85% / 0.85), transparent 60%),
        radial-gradient(120% 55% at 100% 108%, hsl(var(--card-hue, 160) 52% 88% / 0.7), transparent 55%),
        linear-gradient(180deg, #ffffff 0%, var(--bg) 74%);
    }
    body.theme-light .reel__bg::after, body.theme-warm .reel__bg::after {
      background: radial-gradient(95% 55% at 30% 100%, rgba(0,0,0,0.05), transparent 72%);
    }
    body.theme-light .reel--ad .reel__bg, body.theme-warm .reel--ad .reel__bg {
      background:
        radial-gradient(135% 65% at 50% -8%, rgba(37,99,235,0.16), transparent 60%),
        linear-gradient(180deg, #ffffff 0%, var(--bg) 74%);
    }
    body.theme-light .reel__ad-label, body.theme-warm .reel__ad-label { color: #2563eb; }

    /* ── Empty state ── */
    .explore-empty {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 64px 32px;
      text-align: center;
    }
    .explore-empty__icon { font-size: 44px; opacity: 0.22; }
    .explore-empty__title {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 20px;
      color: var(--text-2);
    }
    .explore-empty__sub { font-size: 13px; color: var(--text-3); line-height: 1.65; max-width: 220px; }

    /* ── Skeleton reel ── */
    .reel-skel {
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 86px 34px 20px;
      background: linear-gradient(180deg, var(--surface-2) 0%, var(--bg) 70%);
    }
    .reel-skel__circle {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--surface-2);
      animation: skelPulse 1.4s ease infinite;
      margin-bottom: 16px;
    }
    .reel-skel__line {
      height: 14px;
      border-radius: 7px;
      background: var(--surface-2);
      animation: skelPulse 1.4s ease infinite;
      margin-bottom: 10px;
    }
    @keyframes skelPulse { 0%,100% { opacity: 0.4; } 50% { opacity: 0.8; } }
    @keyframes feedSpin  { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="app-shell">

  <div th:replace="~{fragments/topbar :: topbar}"></div>

  <main class="page-content page-content--explore">

    <!-- Solid search + filter header -->
    <div class="explore-hd" id="explore-hd">
      <div class="explore-search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="color:var(--text-3);flex-shrink:0;">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="explore-search-input" placeholder="City, host, or vibe…" autocomplete="off" spellcheck="false">
      </div>
      <div class="explore-pills">
        <div id="pill-available" class="pill" onclick="toggleAvailable(this)">Available</div>
        <div id="pill-ai" class="pill" onclick="toggleAiSearch(this)">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor" style="margin-right:4px;opacity:0.85;"><path d="M12 3c-1 3.5-3.5 6-7 7 3.5 1 6 3.5 7 7 1-3.5 3.5-6 7-7-3.5-1-6-3.5-7-7z"/></svg>AI Match
        </div>
      </div>
    </div>

    <!-- Snap feed -->
    <div id="listing-feed" class="explore-feed">
      <!-- Skeleton placeholder -->
      <div class="reel-skel">
        <div class="reel-skel__circle"></div>
        <div class="reel-skel__line" style="width:55%;height:22px;"></div>
        <div class="reel-skel__line" style="width:38%;"></div>
        <div class="reel-skel__line" style="width:80%;margin-top:8px;"></div>
        <div class="reel-skel__line" style="width:62%;"></div>
      </div>
    </div>

  </main>

  <div th:replace="~{fragments/navbar :: navbar}"></div>
</div>

<!-- AI Match panel -->
<div class="match-panel" id="match-panel">
  <div class="match-panel__grip" onclick="closeMatchPanel()"></div>
  <div class="match-panel__header">
    <div class="match-panel__title" id="match-panel-title">AI Matches</div>
    <button class="match-panel__close" onclick="closeMatchPanel()" aria-label="Close">&#x2715;</button>
  </div>
  <div class="match-panel__list" id="match-panel-list"></div>
</div>
<div class="match-panel-backdrop" id="match-panel-backdrop" onclick="closeMatchPanel()"></div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/api.js}"></script>
<script th:src="@{/js/explore.js}"></script>
</body>
</html>
