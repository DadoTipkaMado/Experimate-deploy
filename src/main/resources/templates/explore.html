<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <title>Explore — Experimate</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
</head>
<body>
<div class="app-shell">

  <div th:replace="~{fragments/topbar :: topbar}"></div>

  <main class="page-content page-content--explore">

    <div class="explore-header">
      <div class="search-bar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="explore-search-input" placeholder="Find someone curious and adventurous..." autocomplete="off">
        <span class="search-ai-badge">AI</span>
      </div>
      <div class="explore-filters">
        <div id="sort-personalized" class="pill" onclick="setExploreSort('personalized')">Personalized</div>
        <div id="sort-rating" class="pill pill--active" onclick="setExploreSort('rating')">Top rated</div>
        <div id="sort-name" class="pill" onclick="setExploreSort('name')">Name</div>
        <div id="sort-listings" class="pill" onclick="setExploreSort('listings')">Most activities</div>
        <div id="filter-saved" class="pill" onclick="toggleSavedFilter(this)">Saved ♥</div>
      </div>
    </div>

    <div id="explore-feed">
      <!-- Skeleton loading state -->
      <div class="explore-card" id="explore-sk1" style="background:var(--surface);">
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:0 16px 20px;">
          <div class="skeleton skeleton-line skeleton-line--lg" style="width:55%;margin-bottom:8px;"></div>
          <div class="skeleton skeleton-line skeleton-line--sm" style="width:35%;margin-bottom:14px;"></div>
          <div class="skeleton skeleton-line skeleton-line--w-full" style="margin-bottom:6px;"></div>
          <div class="skeleton skeleton-line skeleton-line--w-3q" style="margin-bottom:6px;"></div>
          <div class="skeleton skeleton-line skeleton-line--w-half" style="margin-bottom:18px;"></div>
          <div class="skeleton skeleton-line" style="width:100%;height:44px;border-radius:12px;"></div>
        </div>
      </div>
      <div class="explore-card" id="explore-sk2" style="background:var(--surface-2);">
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:0 16px 20px;">
          <div class="skeleton skeleton-line skeleton-line--lg" style="width:45%;margin-bottom:8px;"></div>
          <div class="skeleton skeleton-line skeleton-line--sm" style="width:30%;margin-bottom:14px;"></div>
          <div class="skeleton skeleton-line skeleton-line--w-full" style="margin-bottom:6px;"></div>
          <div class="skeleton skeleton-line skeleton-line--w-3q" style="margin-bottom:18px;"></div>
          <div class="skeleton skeleton-line" style="width:100%;height:44px;border-radius:12px;"></div>
        </div>
      </div>
    </div>

  </main>

  <div th:replace="~{fragments/navbar :: navbar}"></div>

</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<!-- Explain compatibility bottom sheet -->
<div class="bottom-sheet" id="explain-sheet">
  <div class="bottom-sheet__handle"></div>
  <div style="padding:20px 20px 40px;">
    <div style="font-family:var(--font-display);font-weight:700;font-size:16px;color:var(--text);margin-bottom:14px;" id="explain-sheet-title">Why you match</div>
    <div id="explain-sheet-body" style="font-size:13px;color:var(--text-2);line-height:1.8;min-height:40px;"></div>
  </div>
</div>
<div class="bottom-sheet-backdrop" id="explain-backdrop" onclick="closeExplainSheet()"></div>

<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/api.js}"></script>
<script th:src="@{/js/explore.js}"></script>
<script th:inline="none">
  // ── Saved locals ──────────────────────────────────────────────────
  function _getSaved() {
    try { return new Set(JSON.parse(localStorage.getItem('saved_locals') || '[]')); } catch { return new Set(); }
  }
  function _setSaved(set) {
    localStorage.setItem('saved_locals', JSON.stringify([...set]));
  }

  let _showSavedOnly  = false;
  var _currentQuery   = '';     // kept in sync by explore.js search handler

  function toggleSave(el) {
    const card   = el.closest('.explore-card');
    const username = card.dataset.username;
    const saved  = _getSaved();
    const isSaved = saved.has(username);
    isSaved ? saved.delete(username) : saved.add(username);
    _setSaved(saved);
    const nowSaved = !isSaved;
    el.classList.toggle('side-action--saved', nowSaved);
    const heart = el.querySelector('.save-heart');
    heart.setAttribute('fill',   nowSaved ? 'var(--warm)' : 'none');
    heart.setAttribute('stroke', nowSaved ? 'var(--warm)' : 'var(--text)');
    showToast(nowSaved ? 'Saved ' + card.dataset.name : 'Removed ' + card.dataset.name);
    if (_showSavedOnly && !nowSaved) card.style.display = 'none';
  }

  function toggleSavedFilter(el) {
    _showSavedOnly = !_showSavedOnly;
    el.classList.toggle('pill--active', _showSavedOnly);
    const saved = _getSaved();
    document.querySelectorAll('.explore-card').forEach(card => {
      card.style.display = (!_showSavedOnly || saved.has(card.dataset.username)) ? '' : 'none';
    });
    setCardHeights();
  }

  // ── Explain compatibility sheet ───────────────────────────────────
  async function showExplainSheet(userId, firstName) {
    const sheet  = document.getElementById('explain-sheet');
    const body   = document.getElementById('explain-sheet-body');
    document.getElementById('explain-sheet-title').textContent = `You & ${firstName}`;
    body.innerHTML = `
      <div class="skeleton" style="height:14px;border-radius:6px;margin-bottom:8px;width:88%"></div>
      <div class="skeleton" style="height:14px;border-radius:6px;margin-bottom:8px;width:72%"></div>
      <div class="skeleton" style="height:14px;border-radius:6px;width:55%"></div>`;
    sheet.classList.add('bottom-sheet--open');
    document.getElementById('explain-backdrop').classList.add('bottom-sheet-backdrop--visible');
    try {
      const res = await MatchAPI.explainMatch(userId, _currentQuery || null);
      body.textContent = res.explanation || 'No explanation available.';
    } catch {
      body.textContent = 'Could not load compatibility explanation — try again.';
    }
  }

  function closeExplainSheet() {
    document.getElementById('explain-sheet').classList.remove('bottom-sheet--open');
    document.getElementById('explain-backdrop').classList.remove('bottom-sheet-backdrop--visible');
  }

  // ── State ─────────────────────────────────────────────────────────
  let _exploreMatches = [];
  let _exploreSort    = 'personalized';

  // ── Sort pills ────────────────────────────────────────────────────
  function setExploreSort(val) {
    _exploreSort = val;
    ['rating','name','listings','personalized'].forEach(k => {
      const el = document.getElementById('sort-' + k);
      if (!el) return;
      el.classList.toggle('pill--active',        k === val && k !== 'personalized');
      el.classList.toggle('pill--personalized',  k === val && k === 'personalized');
    });
    // If personalized selected but nobody has a score, prompt quiz
    if (val === 'personalized' && _exploreMatches.every(m => m.compatibilityScore === null)) {
      showToast('Take the personality quiz first!', 'default');
      setTimeout(() => { window.location.href = '/onboarding'; }, 1200);
      return;
    }
    renderExploreSorted();
  }

  function renderExploreSorted() {
    renderExploreWithSort(_exploreMatches);
  }

  function renderExploreWithSort(matches, searchQuery) {
    let sorted = matches.slice();
    if (_exploreSort === 'name') {
      sorted.sort((a, b) => (a.firstName + ' ' + a.lastName).localeCompare(b.firstName + ' ' + b.lastName));
    } else if (_exploreSort === 'listings') {
      sorted.sort((a, b) => (b.activeListing ? 1 : 0) - (a.activeListing ? 1 : 0));
    } else if (_exploreSort === 'personalized') {
      sorted.sort((a, b) => {
        if (a.compatibilityScore == null && b.compatibilityScore == null) return 0;
        if (a.compatibilityScore == null) return 1;
        if (b.compatibilityScore == null) return -1;
        return b.compatibilityScore - a.compatibilityScore;
      });
    }
    // 'rating' — use backend order (no rating field in MatchResponse)
    renderExplore(sorted, searchQuery);
  }

  // ── HTML escaping helper ──────────────────────────────────────────
  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Render ────────────────────────────────────────────────────────
  function renderExplore(matches, searchQuery) {
    const feed = document.getElementById('explore-feed');
    if (!matches || matches.length === 0) {
      feed.innerHTML = searchQuery
        ? `<div class="explore-empty">
             <div class="explore-empty__icon">🔍</div>
             <div class="explore-empty__title">No results for "${esc(searchQuery)}"</div>
             <div class="explore-empty__sub">Try describing someone's personality or a place.</div>
           </div>`
        : `<div class="explore-empty">
             <div class="explore-empty__icon">🧭</div>
             <div class="explore-empty__title">You're one of the first here</div>
             <div class="explore-empty__sub">Other locals appear once they create a Day. In the meantime, complete your profile so you stand out.</div>
             <a href="/account/edit" class="btn btn--primary" style="margin-top:16px;height:42px;padding:0 24px;font-size:12px;">Complete my profile</a>
           </div>`;
      return;
    }

    feed.innerHTML = matches.map(m => {
      const initials   = ((m.firstName?.[0] ?? '') + (m.lastName?.[0] ?? '')).toUpperCase() || '?';
      const hue        = (m.username ?? '').split('').reduce((acc, c) => acc + c.charCodeAt(0), 0) % 360;
      const photoUrl   = UserAPI.photoUrl(m.profilePhotoUrl);
      const bgDiv      = photoUrl
        ? `<div class="explore-card__bg" style="background:hsl(${hue},22%,14%) url('${photoUrl}') center top / cover;"></div>`
        : `<div class="explore-card__bg" style="background:linear-gradient(160deg,hsl(${hue},28%,10%) 0%,hsl(${hue},18%,18%) 100%);display:flex;align-items:center;justify-content:center;">
             <div style="width:96px;height:96px;border-radius:50%;background:hsl(${hue},35%,22%);border:2px solid hsl(${hue},40%,35%);display:flex;align-items:center;justify-content:center;">
               <span style="font-family:var(--font-display);font-weight:800;font-size:34px;color:hsl(${hue},60%,72%);letter-spacing:-0.02em;">${initials}</span>
             </div>
           </div>`;

      const pct        = m.compatibilityScore;
      const listing    = m.activeListing;
      const cityBadge  = listing
        ? `<span style="font-size:9px;color:var(--accent);background:var(--accent-dim);border:1px solid var(--accent-border);border-radius:var(--radius-pill);padding:2px 9px;letter-spacing:0.06em;white-space:nowrap;">${esc(listing.city)}</span>`
        : '';
      const matchBadge = pct !== null
        ? `<div class="explore-card__match-pct" style="cursor:pointer;" title="Tap to see why you match" onclick="showExplainSheet(${m.userId}, '${esc(m.firstName)}')">${pct}% match ✦</div>`
        : '';
      const snippet    = listing?.descriptionSnippet
        ? `<div class="explore-card__why">✦ ${esc(listing.descriptionSnippet.length > 80 ? listing.descriptionSnippet.slice(0, 80) + '…' : listing.descriptionSnippet)}</div>`
        : '';
      const ctaHref    = listing ? `/tours?listing=${listing.id}` : `/profile/${m.username}`;
      const ctaLabel   = listing ? 'View Day' : 'View Profile';

      return `
      <div class="explore-card${pct !== null ? ' explore-card--personalized' : ''}"
           data-id="${m.userId}" data-name="${esc(m.firstName)} ${esc(m.lastName)}" data-username="${esc(m.username)}">
        ${bgDiv}
        <div class="explore-card__gradient"></div>
        ${matchBadge}
        <div class="explore-card__side">
          <div class="side-action" onclick="toggleSave(this)">
            <div class="side-action__icon">
              <svg class="save-heart" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="var(--text)" stroke-width="2" stroke-linecap="round">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
              </svg>
            </div>
            <div class="side-action__label">Save</div>
          </div>
        </div>
        <div class="explore-card__content">
          <div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:4px;">
            <a href="/profile/${m.username}" class="explore-card__name" style="margin-bottom:0;text-decoration:none;color:inherit;">${esc(m.firstName)} ${esc(m.lastName)}</a>
            ${cityBadge}
          </div>
          <div class="explore-card__handle">@${esc(m.username)}</div>
          ${snippet}
          <div class="explore-card__desc">${esc(m.bio ?? 'No bio yet.')}</div>
          <div class="explore-card__cta">
            <a href="${ctaHref}" class="btn btn--primary">${ctaLabel}</a>
          </div>
        </div>
      </div>`;
    }).join('');

    setCardHeights();
    initScrollHint();

    // Restore saved hearts
    const saved = _getSaved();
    document.querySelectorAll('.explore-card').forEach(card => {
      if (!saved.has(card.dataset.username)) return;
      const action = card.querySelector('.side-action');
      if (!action) return;
      action.classList.add('side-action--saved');
      const heart = action.querySelector('.save-heart');
      if (heart) { heart.setAttribute('fill','var(--warm)'); heart.setAttribute('stroke','var(--warm)'); }
    });
  }

  // ── Initial load ──────────────────────────────────────────────────
  MatchAPI.findMatches()
    .then(matches => {
      _exploreMatches = matches || [];
      renderExploreSorted();
    })
    .catch(() => renderExplore([]));
</script>
</body>
</html>
