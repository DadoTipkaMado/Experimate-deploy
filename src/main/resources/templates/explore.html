<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#000000">
  <meta name="description" content="Browse local experiences and meet guides in your city. Discover authentic tours by people who actually live there.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Discover Experiences — ExperiMate">
  <meta property="og:description" content="Browse local experiences and meet guides in your city. Discover authentic tours by people who actually live there.">
  <meta property="og:image" content="/images/og-card.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <title>Discover — Experimate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <style>
    /* ── Sticky search / filter header ── */
    .explore-hd {
      position: sticky;
      top: 0;
      z-index: 20;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 12px 14px 10px;
    }

    .explore-search {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border-2);
      border-radius: var(--radius-pill);
      padding: 0 14px;
      height: 42px;
      margin-bottom: 8px;
      transition: border-color var(--t-fast);
    }
    .explore-search:focus-within { border-color: var(--accent); }
    .explore-search input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 14px;
      font-family: var(--font-mono);
    }
    .explore-search input::placeholder { color: var(--text-3); }

    .explore-pills {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .explore-pills::-webkit-scrollbar { display: none; }

    .pill--ai.pill--active {
      background: linear-gradient(135deg, var(--accent-dim) 0%, rgba(168,85,247,0.12) 100%);
      border-color: var(--accent-border);
      color: var(--accent);
    }

    /* ── Card list ── */
    .explore-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 14px 14px 24px;
      background: #0a0c0c;
    }

    @keyframes cardEnter {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .explore-card {
      background: linear-gradient(170deg, var(--surface-2) 0%, var(--surface) 55%, #0f0f0f 100%);
      border: 1px solid var(--border-2);
      border-top-color: rgba(255,255,255,0.10);
      border-bottom-color: rgba(0,0,0,0.55);
      border-left: 3.5px solid hsl(var(--card-hue, 160), 55%, 42%);
      border-radius: 18px;
      padding: 18px 18px 16px 16px;
      cursor: pointer;
      box-shadow:
        inset 0 1.5px 0 rgba(255,255,255,0.13),
        inset 0 -1px 0 rgba(0,0,0,0.45),
        0 8px 20px rgba(0,0,0,0.55),
        0 2px 6px rgba(0,0,0,0.4);
      transition: box-shadow 0.22s ease, transform 0.22s ease, border-color 0.22s ease;
      -webkit-tap-highlight-color: transparent;
      animation: cardEnter 0.38s cubic-bezier(0.32,0.72,0,1) backwards;
    }
    .explore-card:hover {
      transform: translateY(-3px);
      border-left-color: hsl(var(--card-hue, 160), 70%, 55%);
      box-shadow:
        inset 0 1.5px 0 rgba(255,255,255,0.16),
        0 18px 44px rgba(0,0,0,0.65),
        0 6px 16px rgba(0,0,0,0.45),
        0 0 0 1px rgba(255,255,255,0.05);
    }
    .explore-card:active {
      background: linear-gradient(170deg, var(--surface-2) 0%, var(--surface) 100%);
      border-top-color: rgba(255,255,255,0.06);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.07),
        inset 0 2px 8px rgba(0,0,0,0.35);
      transform: translateY(1px);
    }

    .explore-card__top {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 12px;
    }

    .explore-card__avatar {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      flex-shrink: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 19px;
      box-shadow:
        0 0 0 2.5px hsl(var(--card-hue, 160), 45%, 32%),
        0 0 0 4.5px rgba(0,0,0,0.35),
        0 4px 12px rgba(0,0,0,0.4);
      transition: box-shadow 0.22s ease;
    }
    .explore-card:hover .explore-card__avatar {
      box-shadow:
        0 0 0 2.5px hsl(var(--card-hue, 160), 65%, 48%),
        0 0 0 4.5px rgba(0,0,0,0.35),
        0 4px 16px rgba(0,0,0,0.45);
    }
    .explore-card__avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .explore-card__meta { flex: 1; min-width: 0; }

    .explore-card__host {
      font-weight: 800;
      font-size: 17px;
      color: var(--text);
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }

    .explore-card__handle {
      font-size: 12px;
      color: var(--text-3);
      margin-bottom: 7px;
    }

    .explore-card__city {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--text-2);
      background: var(--surface-2);
      border-radius: var(--radius-pill);
      padding: 3px 10px;
    }

    .explore-card__badge {
      float: right;
      margin-left: 10px;
      height: 26px;
      padding: 0 13px;
      border-radius: var(--radius-pill);
      font-size: 10px;
      font-family: var(--font-mono);
      letter-spacing: 0.09em;
      text-transform: uppercase;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      flex-shrink: 0;
    }
    .explore-card__badge--available {
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid var(--accent-a25);
    }
    .explore-card__badge--pending {
      background: rgba(255,153,68,0.12);
      color: #ff9944;
      border: 1px solid rgba(255,153,68,0.28);
    }
    .explore-card__badge--accepted {
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid var(--accent-border);
    }
    .explore-card__badge--own {
      background: var(--warm-dim);
      color: var(--warm);
      border: 1px solid var(--warm-border);
    }
    .explore-card__badge--full {
      background: var(--surface-2);
      color: var(--text-3);
      border: 1px solid var(--border-2);
    }

    .explore-card__desc {
      font-size: 13.5px;
      color: var(--text-2);
      line-height: 1.65;
      margin-bottom: 14px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      border-left: 2px solid hsl(var(--card-hue, 160), 45%, 32%);
      padding-left: 10px;
    }

    .explore-card__footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .explore-card__date {
      font-size: 12px;
      color: var(--text-3);
      font-family: var(--font-mono);
    }

    .explore-card__join {
      height: 34px;
      padding: 0 20px;
      font-size: 11px;
      font-family: var(--font-mono);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      font-weight: 700;
      border-radius: var(--radius-pill);
      border: none;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity var(--t-fast), transform var(--t-fast);
    }
    .explore-card__join:active { transform: scale(0.93); }
    .explore-card__join--join { background: var(--accent); color: #000; }
    .explore-card__join--login { background: var(--surface-2); color: var(--text-2); border: 1px solid var(--border-2); }
    .explore-card__join--pending { background: rgba(255,153,68,0.12); color: #ff9944; border: 1px solid rgba(255,153,68,0.28); cursor: default; }
    .explore-card__join--accepted { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent-a28); cursor: default; }
    .explore-card__join--own { background: var(--warm-dim); color: var(--warm); border: 1px solid var(--warm-border); }
    .explore-card__join--full { background: var(--surface-2); color: var(--text-3); border: 1px solid var(--border-2); cursor: default; opacity: 0.6; }

    /* ── Empty state ── */
    .explore-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 64px 32px;
      text-align: center;
    }
    .explore-empty__icon { font-size: 44px; opacity: 0.22; }
    .explore-empty__title {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 20px;
      color: var(--text-2);
    }
    .explore-empty__sub { font-size: 13px; color: var(--text-3); line-height: 1.65; max-width: 220px; }

    /* ── Skeleton ── */
    .explore-skel {
      background: var(--surface);
      border: 1px solid var(--border-2);
      border-radius: 18px;
      padding: 18px;
    }
    .explore-skel__row { display: flex; gap: 14px; margin-bottom: 12px; }
    .explore-skel__circle {
      width: 50px; height: 50px; border-radius: 50%;
      background: var(--surface-2);
      animation: skelPulse 1.4s ease infinite;
      flex-shrink: 0;
    }
    .explore-skel__lines { flex: 1; display: flex; flex-direction: column; gap: 7px; padding-top: 5px; }
    .explore-skel__line {
      height: 12px; border-radius: 6px;
      background: var(--surface-2);
      animation: skelPulse 1.4s ease infinite;
    }
    @keyframes skelPulse { 0%,100% { opacity:0.4; } 50% { opacity:0.8; } }
    @keyframes feedSpin  { to { transform: rotate(360deg); } }

    /* ── Spots dots ── */
    .explore-card__spots {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-left: 10px;
    }
    .explore-card__spot-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--surface-3);
      transition: background 0.2s;
    }
    .explore-card__spot-dot--taken { background: var(--accent); }

    /* ── Spots dots ── */
    .explore-card__spots {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      margin-left: 8px;
      vertical-align: middle;
    }
    .explore-card__spot-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--surface-3);
      display: inline-block;
      transition: background var(--t-fast);
    }
    .explore-card__spot-dot--taken {
      background: var(--accent);
    }

    /* ── Touch device press states ── */
    @media (hover: none) {
      .explore-card:active {
        transform: translateY(2px) scale(0.985);
        border-left-color: hsl(var(--card-hue, 160), 70%, 55%);
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,0.07),
          inset 0 3px 10px rgba(0,0,0,0.45),
          0 0 0 2px hsl(var(--card-hue, 160), 45%, 28%);
      }
      .explore-card:active .explore-card__avatar {
        box-shadow:
          0 0 0 3px hsl(var(--card-hue, 160), 65%, 48%),
          0 0 0 5px rgba(0,0,0,0.35),
          0 4px 16px rgba(0,0,0,0.45);
      }
    }

    /* ── Light mode overrides ── */
    body.theme-light .explore-search {
      background: rgba(250,248,244,0.95);
      border-color: rgba(0,0,0,0.10);
    }
    body.theme-light .explore-search input { color: #0f0e0c; }
    body.theme-light .explore-search input::placeholder { color: rgba(0,0,0,0.30); }
    body.theme-light .explore-list { background: #eceae4; }
    body.theme-light .explore-card {
      background: linear-gradient(160deg, #fffefb 0%, #f9f7f2 60%, #f3f1eb 100%);
      border-color: rgba(0,0,0,0.09);
      border-top-color: rgba(255,255,255,0.98);
      border-bottom-color: rgba(0,0,0,0.12);
      border-left-color: hsl(var(--card-hue, 160), 55%, 38%);
      box-shadow:
        inset 0 1.5px 0 rgba(255,255,255,0.95),
        0 4px 18px rgba(0,0,0,0.09),
        0 1px 4px rgba(0,0,0,0.06);
    }
    body.theme-light .explore-card:hover {
      box-shadow:
        inset 0 1.5px 0 rgba(255,255,255,0.95),
        0 10px 32px rgba(0,0,0,0.13),
        0 3px 8px rgba(0,0,0,0.08);
      border-left-color: hsl(var(--card-hue, 160), 68%, 32%);
    }
    body.theme-light .explore-card:active {
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.6),
        inset 0 2px 6px rgba(0,0,0,0.08);
    }
    body.theme-light .explore-card__avatar {
      box-shadow:
        0 0 0 2.5px hsl(var(--card-hue, 160), 45%, 70%),
        0 0 0 4.5px rgba(255,255,255,0.6),
        0 4px 10px rgba(0,0,0,0.10);
    }
    body.theme-light .explore-card:hover .explore-card__avatar {
      box-shadow:
        0 0 0 2.5px hsl(var(--card-hue, 160), 60%, 52%),
        0 0 0 4.5px rgba(255,255,255,0.6),
        0 4px 14px rgba(0,0,0,0.12);
    }
    body.theme-light .explore-card__spot-dot { background: var(--border-3); }
    body.theme-light .explore-card__spot-dot--taken { background: var(--accent); }

    /* ── Sponsored ad card ── */
    .explore-ad {
      cursor: default;
      border-color: rgba(37,99,235,0.22);
      border-top-color: rgba(37,99,235,0.30);
      background: linear-gradient(145deg, rgba(37,99,235,0.06) 0%, var(--surface) 60%);
      position: relative;
    }
    .explore-ad__label {
      position: absolute; top: 10px; right: 12px;
      font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      color: rgba(96,165,250,0.7);
    }
    body.theme-light .explore-ad__label { color: rgba(37,99,235,0.5); }
    .explore-ad__img {
      width: calc(100% + 32px); margin: -16px -16px 14px;
      border-radius: 14px 14px 0 0; overflow: hidden;
      max-height: 140px;
    }
    .explore-ad__img img { width: 100%; height: 140px; object-fit: cover; display: block; }
    .explore-ad__body { flex: 1; min-width: 0; }
    .explore-ad__title {
      font-family: var(--font-display); font-weight: 700; font-size: 15px;
      color: var(--text); letter-spacing: -0.01em; margin-bottom: 5px;
    }
    .explore-ad__desc { font-size: 12px; color: var(--text-2); line-height: 1.6; }
    .explore-ad__footer { display: flex; justify-content: flex-end; margin-top: 12px; }
    .explore-ad--event { border-color: rgba(37,99,235,0.28); border-top-color: rgba(37,99,235,0.40); background: linear-gradient(145deg, rgba(37,99,235,0.10) 0%, var(--surface) 60%); }
    .explore-ad--event .explore-ad__label { color: #60a5fa; }
    body.theme-light .explore-ad--event .explore-ad__label { color: #2563eb; }
  </style>
</head>
<body>
<div class="app-shell">

  <div th:replace="~{fragments/topbar :: topbar}"></div>

  <main class="page-content">

    <!-- Sticky search + filter header -->
    <div class="explore-hd" id="explore-hd">
      <div class="explore-search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="color:var(--text-3);flex-shrink:0;">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="explore-search-input" placeholder="City, host, or vibe…" autocomplete="off" spellcheck="false">
      </div>
      <div class="explore-pills">
        <div id="pill-available" class="pill" onclick="toggleAvailable(this)">Available</div>
        <div id="pill-ai" class="pill" onclick="toggleAiSearch(this)">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor" style="margin-right:4px;opacity:0.85;"><path d="M12 3c-1 3.5-3.5 6-7 7 3.5 1 6 3.5 7 7 1-3.5 3.5-6 7-7-3.5-1-6-3.5-7-7z"/></svg>AI Match
        </div>
      </div>
    </div>

    <!-- Card list -->
    <div id="listing-feed" class="explore-list">
      <!-- Skeleton placeholders -->
      <div class="explore-skel">
        <div class="explore-skel__row">
          <div class="explore-skel__circle"></div>
          <div class="explore-skel__lines">
            <div class="explore-skel__line" style="width:52%;"></div>
            <div class="explore-skel__line" style="width:35%;"></div>
          </div>
        </div>
        <div class="explore-skel__line" style="width:90%;margin-bottom:6px;"></div>
        <div class="explore-skel__line" style="width:68%;"></div>
      </div>
      <div class="explore-skel">
        <div class="explore-skel__row">
          <div class="explore-skel__circle"></div>
          <div class="explore-skel__lines">
            <div class="explore-skel__line" style="width:46%;"></div>
            <div class="explore-skel__line" style="width:30%;"></div>
          </div>
        </div>
        <div class="explore-skel__line" style="width:85%;margin-bottom:6px;"></div>
        <div class="explore-skel__line" style="width:60%;"></div>
      </div>
      <div class="explore-skel">
        <div class="explore-skel__row">
          <div class="explore-skel__circle"></div>
          <div class="explore-skel__lines">
            <div class="explore-skel__line" style="width:58%;"></div>
            <div class="explore-skel__line" style="width:40%;"></div>
          </div>
        </div>
        <div class="explore-skel__line" style="width:88%;margin-bottom:6px;"></div>
        <div class="explore-skel__line" style="width:55%;"></div>
      </div>
    </div>

  </main>

  <div th:replace="~{fragments/navbar :: navbar}"></div>
</div>

<!-- AI Match panel -->
<div class="match-panel" id="match-panel">
  <div class="match-panel__grip" onclick="closeMatchPanel()"></div>
  <div class="match-panel__header">
    <div class="match-panel__title" id="match-panel-title">AI Matches</div>
    <button class="match-panel__close" onclick="closeMatchPanel()" aria-label="Close">&#x2715;</button>
  </div>
  <div class="match-panel__list" id="match-panel-list"></div>
</div>
<div class="match-panel-backdrop" id="match-panel-backdrop" onclick="closeMatchPanel()"></div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/api.js}"></script>
<script th:src="@{/js/explore.js}"></script>
</body>
</html>
