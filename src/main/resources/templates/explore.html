<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <title>Discover — Experimate</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <style>
    .explore-header {
      padding: 14px 16px 10px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0; z-index: 5;
    }
    .explore-header .search-bar { margin-bottom: 10px; }
    .explore-filters { display: flex; gap: 6px; flex-wrap: wrap; }

    /* ── Feed ── */
    .listing-feed {
      display: flex; flex-direction: column; gap: 10px;
      padding: 12px 16px 32px;
    }

    /* ── Feed card ── */
    .feed-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      display: flex; flex-direction: column;
      transition: border-color var(--t-base), transform var(--t-base);
    }
    .feed-card:hover { border-color: var(--border-2); transform: translateY(-2px); }
    .feed-card--available { border-left: 3px solid var(--accent); }
    .feed-card--pending   { border-left: 3px solid #ff9944; }
    .feed-card--reserved  { opacity: 0.55; }

    /* Hero banner */
    .feed-card__hero {
      position: relative; height: 80px; overflow: hidden; flex-shrink: 0;
      display: flex; align-items: center; padding: 0 16px; gap: 14px;
    }
    .feed-card__hero-bg {
      position: absolute; inset: -10px;
      background-size: cover; background-position: center;
      filter: blur(18px) brightness(0.25);
    }
    .feed-card__hero-avatar {
      position: relative; z-index: 2; width: 52px; height: 52px; border-radius: 50%;
      overflow: hidden; flex-shrink: 0;
      border: 2px solid rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
    }
    .feed-card__hero-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .feed-card__hero-info { position: relative; z-index: 2; min-width: 0; flex: 1; }
    .feed-card__city { font-family: var(--font-display); font-weight: 800; font-size: 20px; color: #fff; letter-spacing: -0.02em; line-height: 1.1; }
    .feed-card__host-name { font-size: 11px; color: rgba(255,255,255,0.6); letter-spacing: 0.04em; text-decoration: none; margin-top: 3px; display: block; }
    .feed-card__host-name:hover { color: rgba(255,255,255,0.9); }
    .feed-card__hero-date { position: relative; z-index: 2; text-align: right; flex-shrink: 0; }
    .feed-card__date { font-size: 10px; color: rgba(255,255,255,0.7); letter-spacing: 0.06em; white-space: nowrap; }
    .feed-card__time { font-size: 9px; color: rgba(255,255,255,0.4); letter-spacing: 0.04em; margin-top: 2px; }

    /* Card body */
    .feed-card__body { padding: 12px 16px 14px; display: flex; flex-direction: column; gap: 10px; }
    .feed-card__desc {
      font-size: 11px; color: var(--text-2); line-height: 1.65;
      overflow-wrap: break-word; word-break: break-word;
    }
    .feed-card__foot { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
    .feed-card__status { display: flex; align-items: center; gap: 6px; }
    .feed-card__dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .feed-card__label { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; }

    @keyframes feedSpin { to { transform: rotate(360deg); } }

    /* ── Empty state ── */
    .feed-empty {
      display: flex; flex-direction: column; align-items: center;
      padding: 60px 24px; gap: 12px; text-align: center;
    }
    .feed-empty__icon { font-size: 36px; opacity: 0.35; }
    .feed-empty__title { font-family: var(--font-display); font-weight: 700; font-size: 15px; color: var(--text-2); }
    .feed-empty__sub { font-size: 11px; color: var(--text-3); line-height: 1.6; max-width: 220px; }

    /* ── Light mode — flip hero from cinema-dark to warm-light ── */
    body.light-mode .feed-card__hero { background: var(--surface-2); }
    body.light-mode .feed-card__hero-bg { filter: blur(18px) brightness(1.1) saturate(0.5); opacity: 0.45; }
    body.light-mode .feed-card__city { color: var(--text); }
    body.light-mode .feed-card__host-name { color: var(--text-2); }
    body.light-mode .feed-card__host-name:hover { color: var(--text); }
    body.light-mode .feed-card__date { color: var(--text-2); }
    body.light-mode .feed-card__time { color: var(--text-3); }
    body.light-mode .feed-card__hero-avatar { border-color: rgba(0,0,0,0.12); }
  </style>
</head>
<body>
<div class="app-shell">

  <div th:replace="~{fragments/topbar :: topbar}"></div>

  <main class="page-content">

    <div class="explore-header">
      <div class="search-bar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="explore-search-input" placeholder="Search by city or host..." autocomplete="off">
      </div>
      <div class="explore-filters">
        <div id="pill-soonest" class="pill pill--active">Soonest</div>
        <div id="pill-available" class="pill" onclick="toggleAvailable(this)">Available only</div>
        <div id="pill-ai" class="pill" onclick="toggleAiSearch(this)">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle;margin-right:4px;"><path d="M12 3c-1 3.5-3.5 6-7 7 3.5 1 6 3.5 7 7 1-3.5 3.5-6 7-7-3.5-1-6-3.5-7-7z"/></svg>AI Match
        </div>
      </div>
    </div>

    <div id="listing-feed" class="listing-feed">
      <!-- Skeleton -->
      <div class="feed-card">
        <div style="display:flex;justify-content:space-between;gap:10px;">
          <div style="flex:1;display:flex;flex-direction:column;gap:6px;">
            <div class="skeleton skeleton-line skeleton-line--lg" style="width:45%;"></div>
            <div class="skeleton skeleton-line skeleton-line--sm" style="width:60%;"></div>
          </div>
          <div class="skeleton skeleton-line skeleton-line--sm" style="width:70px;"></div>
        </div>
        <div class="skeleton skeleton-line skeleton-line--w-full"></div>
        <div class="skeleton skeleton-line skeleton-line--w-3q"></div>
        <div style="display:flex;justify-content:space-between;margin-top:2px;">
          <div class="skeleton skeleton-line skeleton-line--sm" style="width:60px;"></div>
          <div class="skeleton skeleton-line" style="width:80px;height:32px;border-radius:20px;"></div>
        </div>
      </div>
      <div class="feed-card">
        <div style="display:flex;justify-content:space-between;gap:10px;">
          <div style="flex:1;display:flex;flex-direction:column;gap:6px;">
            <div class="skeleton skeleton-line skeleton-line--lg" style="width:55%;"></div>
            <div class="skeleton skeleton-line skeleton-line--sm" style="width:40%;"></div>
          </div>
          <div class="skeleton skeleton-line skeleton-line--sm" style="width:65px;"></div>
        </div>
        <div class="skeleton skeleton-line skeleton-line--w-full"></div>
        <div class="skeleton skeleton-line skeleton-line--w-half"></div>
        <div style="display:flex;justify-content:space-between;margin-top:2px;">
          <div class="skeleton skeleton-line skeleton-line--sm" style="width:55px;"></div>
          <div class="skeleton skeleton-line" style="width:80px;height:32px;border-radius:20px;"></div>
        </div>
      </div>
    </div>

  </main>

  <div th:replace="~{fragments/navbar :: navbar}"></div>

</div>

<!-- AI Match panel -->
<div class="match-panel" id="match-panel">
  <div class="match-panel__grip" onclick="closeMatchPanel()"></div>
  <div class="match-panel__header">
    <div class="match-panel__title" id="match-panel-title">AI Matches</div>
    <button class="match-panel__close" onclick="closeMatchPanel()" aria-label="Close">&#x2715;</button>
  </div>
  <div class="match-panel__list" id="match-panel-list"></div>
</div>
<div class="match-panel-backdrop" id="match-panel-backdrop" onclick="closeMatchPanel()"></div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/api.js}"></script>
<script th:src="@{/js/explore.js}"></script>
</body>
</html>
