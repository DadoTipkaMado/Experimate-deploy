<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!--
  NAVBAR FRAGMENT
  ───────────────
  Used in: layout/base.html
  Variables expected from controller:
    - ${currentPage}  String  one of: "map" | "community" | "tours" | "explore"

  To mark the active item, frend adds to their controller:
    model.addAttribute("currentPage", "map");

  Thymeleaf then adds the --active modifier class automatically.
-->
<nav th:fragment="navbar" class="navbar" aria-label="Main navigation">

  <a href="/" class="navbar__brand">Experi<span>Mate</span></a>

  <!-- MAP -->
  <a th:href="@{/map}"
     th:classappend="${currentPage == 'map'} ? ' navbar__item--active'"
     class="navbar__item"
     aria-label="Map">
    <div class="navbar__icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
        <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/>
        <line x1="9" y1="3" x2="9" y2="18"/>
        <line x1="15" y1="6" x2="15" y2="21"/>
      </svg>
    </div>
    <span class="navbar__label">Map</span>
    <div class="navbar__pip"></div>
  </a>

  <!-- COMMUNITY -->
  <a th:href="@{/community}"
     th:classappend="${currentPage == 'community'} ? ' navbar__item--active'"
     class="navbar__item"
     aria-label="Community">
    <div class="navbar__icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
    </div>
    <span class="navbar__label">Community</span>
    <div class="navbar__pip"></div>
  </a>

  <!-- TOURS (merged Meet + Listings) -->
  <a th:href="@{/tours}"
     th:classappend="${currentPage == 'tours'} ? ' navbar__item--active'"
     class="navbar__item"
     aria-label="Tours">
    <div class="navbar__icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
        <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
      </svg>
    </div>
    <span class="navbar__label">Days</span>
    <div class="navbar__pip"></div>
  </a>

  <!-- EXPLORE -->
  <a th:href="@{/explore}"
     th:classappend="${currentPage == 'explore'} ? ' navbar__item--active'"
     class="navbar__item"
     aria-label="Explore">
    <div class="navbar__icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </div>
    <span class="navbar__label">Explore</span>
    <div class="navbar__pip"></div>
  </a>

  <!-- ACCOUNT -->
  <a th:href="@{/account}"
     th:classappend="${currentPage == 'account'} ? ' navbar__item--active'"
     class="navbar__item"
     aria-label="Account">
    <div class="navbar__icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </div>
    <span class="navbar__label">Account</span>
    <div class="navbar__pip"></div>
  </a>

</nav>

<script>
  (function() {
    const path = window.location.pathname;
    const accountPaths = ['/account', '/settings', '/requests', '/ratings', '/profile'];
    const toursPaths   = ['/tours', '/listings'];
    document.querySelectorAll('.navbar__item').forEach(item => {
      const seg = (item.getAttribute('href') || '').split('/')[1] || '';
      if (!seg) return;
      const active =
        (seg === 'account' && accountPaths.some(p => path.startsWith(p))) ||
        (seg === 'tours'   && toursPaths.some(p => path.startsWith(p)))   ||
        (seg !== 'account' && seg !== 'tours' && path.startsWith('/' + seg));
      if (active) item.classList.add('navbar__item--active');
    });
  })();
</script>

</body>
</html>
