<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!--
  NAVBAR FRAGMENT
  ───────────────
  Used in: layout/base.html
  Variables expected from controller:
    - ${currentPage}  String  one of: "map" | "community" | "tours" | "explore"

  To mark the active item, frend adds to their controller:
    model.addAttribute("currentPage", "map");

  Thymeleaf then adds the --active modifier class automatically.
-->
<nav th:fragment="navbar" class="navbar" aria-label="Main navigation">

  <a href="/map" class="navbar__brand">Experi<span>Mate</span></a>

  <!-- MAP -->
  <a th:href="@{/map}"
     th:classappend="${currentPage == 'map'} ? ' navbar__item--active'"
     class="navbar__item"
     aria-label="Map">
    <div class="navbar__icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
        <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/>
        <line x1="9" y1="3" x2="9" y2="18"/>
        <line x1="15" y1="6" x2="15" y2="21"/>
      </svg>
    </div>
    <span class="navbar__label">Map</span>
    <div class="navbar__pip"></div>
  </a>

  <!-- COMMUNITY -->
  <a th:href="@{/community}"
     th:classappend="${currentPage == 'community'} ? ' navbar__item--active'"
     class="navbar__item"
     aria-label="Community">
    <div class="navbar__icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
    </div>
    <span class="navbar__label">Community</span>
    <div class="navbar__pip"></div>
  </a>

  <!-- EXPLORE -->
  <a th:href="@{/explore}"
     th:classappend="${currentPage == 'explore'} ? ' navbar__item--active'"
     class="navbar__item"
     aria-label="Discover">
    <div class="navbar__icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
        <path d="M3 10.5 12 3l9 7.5"/>
        <path d="M5 9.5V20a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V9.5"/>
        <path d="M9.5 21v-6h5v6"/>
      </svg>
    </div>
    <span class="navbar__label">Discover</span>
    <div class="navbar__pip"></div>
  </a>

  <!-- TOURS (Meet management) -->
  <a th:href="@{/tours}"
     th:classappend="${currentPage == 'tours'} ? ' navbar__item--active'"
     class="navbar__item"
     aria-label="Meets">
    <div class="navbar__icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
    </div>
    <span class="navbar__label">Meets</span>
    <div class="navbar__pip"></div>
  </a>

  <!-- ACCOUNT -->
  <a th:href="@{/account}"
     th:classappend="${currentPage == 'account'} ? ' navbar__item--active'"
     class="navbar__item"
     id="navbar-account"
     aria-label="Account">
    <div class="navbar__icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </div>
    <span class="navbar__label">Account</span>
    <div class="navbar__pip"></div>
  </a>

</nav>

<script>
  (function() {
    const path = window.location.pathname;
    const accountPaths = ['/account', '/settings', '/requests', '/ratings', '/profile'];
    const toursPaths   = ['/tours', '/listings'];
    document.querySelectorAll('.navbar__item').forEach(item => {
      const seg = (item.getAttribute('href') || '').split('/')[1] || '';
      if (!seg) return;
      const active =
        (seg === 'account' && accountPaths.some(p => path.startsWith(p))) ||
        (seg === 'tours'   && toursPaths.some(p => path.startsWith(p)))   ||
        (seg !== 'account' && seg !== 'tours' && path.startsWith('/' + seg));
      if (active) item.classList.add('navbar__item--active');
    });

    // Notification dot on Account when there are pending requests
    if (localStorage.getItem('pending_requests') === '1') {
      const accountItem = document.querySelector('.navbar__item[href="/account"]');
      if (accountItem) {
        const dot = document.createElement('div');
        dot.style.cssText = 'position:absolute;top:6px;right:14px;width:7px;height:7px;border-radius:50%;background:#ff9944;border:1.5px solid var(--bg,#0a0a0a);';
        accountItem.style.position = 'relative';
        accountItem.appendChild(dot);
      }
    }
  })();
</script>

</body>
</html>
