<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!--
  TOPBAR FRAGMENT
  ───────────────
  Used in: layout/base.html
  Variables expected from controller:
    - ${cityName}   String  e.g. "Zagreb"   (optional, defaults to "–")
    - ${userEmoji}  String  e.g. "👤"       (optional)
-->
<header th:fragment="topbar" class="topbar">

  <!-- Logo -->
  <a th:href="@{/map}" class="topbar__logo">
    Experi<span>mate</span>
  </a>

  <div class="topbar__right">

    <!-- City label — frend injects ${cityName} from session/model -->
    <div class="topbar__city"
         th:text="${cityName} ?: 'Zagreb'">
      Zagreb
    </div>

    <!-- Avatar — links to account page -->
    <a th:href="@{/account}" class="topbar__avatar" aria-label="My account">
      <img th:if="${userPhotoUrl != null and !userPhotoUrl.isEmpty()}"
           th:src="${userPhotoUrl}"
           alt="Profile"
           style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;">
      <span th:unless="${userPhotoUrl != null and !userPhotoUrl.isEmpty()}"
            th:text="${userEmoji} ?: '👤'">👤</span>
    </a>

  </div>

</header>

</body>
</html>
