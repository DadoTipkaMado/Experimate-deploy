<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!--
  TOPBAR FRAGMENT
  ───────────────
  Used in: layout/base.html
  Variables expected from controller:
    - ${cityName}   String  e.g. "Zagreb"   (optional, defaults to "–")
    - ${userEmoji}  String  e.g. "👤"       (optional)
-->
<header th:fragment="topbar" class="topbar">

  <!-- Logo -->
  <a th:href="@{/map}" class="topbar__logo">
    Experi<span>Mate</span>
  </a>

  <div class="topbar__right">

    <!-- Avatar — links to account page -->
    <a th:href="@{/account}" class="topbar__avatar" id="topbar-avatar" aria-label="My account">
      <span>👤</span>
    </a>

  </div>

</header>

<script>
  function renderTopbarAvatar() {
    const el = document.getElementById('topbar-avatar');
    if (!el) return;
    const userId = localStorage.getItem('userId');
    let initials = localStorage.getItem('user_initials');
    let hue      = parseInt(localStorage.getItem('user_hue') || '0', 10);

    // Derive from JWT if initials weren't saved at login
    if (!initials) {
      try {
        const token = localStorage.getItem('jwt');
        if (token) {
          const username = JSON.parse(atob(token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))).sub;
          if (username) {
            initials = username[0].toUpperCase();
            hue = username.split('').reduce((a,c) => a + c.charCodeAt(0), 0) % 360;
          }
        }
      } catch {}
    }

    const photo = userId ? localStorage.getItem('photo_' + userId) : null;
    if (photo) {
      const img = document.createElement('img');
      img.src = photo;
      img.alt = 'Profile';
      img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:50%;';
      img.onerror = function() {
        localStorage.removeItem('photo_' + userId);
        el.innerHTML = '';
        if (initials) {
          el.innerHTML = `<span style="font-weight:800;font-size:13px;color:hsl(${hue},60%,72%);font-family:sans-serif;">${initials}</span>`;
          el.style.background = `hsl(${hue},35%,22%)`;
          el.style.border = `1.5px solid hsl(${hue},40%,35%)`;
        } else {
          el.innerHTML = '<span>👤</span>';
        }
      };
      el.innerHTML = '';
      el.appendChild(img);
    } else if (initials) {
      el.innerHTML = `<span style="font-weight:800;font-size:13px;color:hsl(${hue},60%,72%);font-family:sans-serif;">${initials}</span>`;
      el.style.background = `hsl(${hue},35%,22%)`;
      el.style.border = `1.5px solid hsl(${hue},40%,35%)`;
    } else {
      el.innerHTML = '<span>👤</span>';
    }
  }
  renderTopbarAvatar();
</script>

</body>
</html>
