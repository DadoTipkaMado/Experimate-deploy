<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>Profile — Experimate</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <style>
    .profile-hero {
      padding: 28px 18px 22px;
      border-bottom: 1px solid var(--border);
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      position: relative; overflow: hidden;
    }
    .profile-hero::before {
      content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 300px; height: 200px;
      background: radial-gradient(ellipse, rgba(0,201,167,0.07) 0%, transparent 70%);
      pointer-events: none;
    }
    .profile-avatar {
      width: 80px; height: 80px; border-radius: 50%;
      background: var(--surface-2); border: 2px solid var(--border-2);
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; position: relative; z-index: 1; overflow: hidden;
    }
    .profile-name {
      font-family: var(--font-display); font-weight: 800; font-size: 22px;
      position: relative; z-index: 1; letter-spacing: -0.01em;
    }
    .profile-handle { font-size: 11px; color: var(--text-2); letter-spacing: 0.08em; position: relative; z-index: 1; margin-top: -4px; }
    .profile-rating {
      padding: 5px 14px; border-radius: var(--radius-pill);
      background: var(--accent-dim); border: 1px solid var(--accent-border);
      font-size: 12px; color: var(--accent); letter-spacing: 0.06em;
      position: relative; z-index: 1;
    }
    .profile-stats { display: flex; gap: 28px; position: relative; z-index: 1; margin-top: 4px; }
    .profile-stat { text-align: center; }
    .profile-stat__num { font-family: var(--font-display); font-weight: 800; font-size: 20px; color: var(--text); }
    .profile-stat__label { font-size: 9px; color: var(--text-3); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }
    .profile-bio {
      font-size: 11px; line-height: 1.75; color: rgba(239,239,239,0.65);
      padding: 16px 18px; border-bottom: 1px solid var(--border);
    }
    .profile-section-label {
      padding: 14px 18px 6px;
      font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--text-3);
    }
    .profile-listings { display: flex; flex-direction: column; gap: 10px; padding: 0 18px 32px; }
    .profile-listing-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .profile-listing-card__city { font-family: var(--font-display); font-weight: 700; font-size: 15px; color: var(--text); }
    .profile-listing-card__date { font-size: 10px; color: var(--text-3); letter-spacing: 0.05em; }
    .profile-listing-card__desc { font-size: 11px; color: rgba(239,239,239,0.55); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .profile-listing-card__foot { display: flex; align-items: center; justify-content: space-between; }
    .profile-empty { display: flex; flex-direction: column; align-items: center; padding: 40px 24px; gap: 10px; text-align: center; }
    .profile-empty__icon { font-size: 32px; opacity: 0.2; }
    .profile-empty__sub { font-size: 11px; color: var(--text-3); line-height: 1.6; }
    .not-found { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 24px; gap: 12px; text-align: center; }
  </style>
</head>
<body>
<div class="app-shell">

  <div th:replace="~{fragments/topbar :: topbar}"></div>

  <main class="page-content" id="profile-main">
    <!-- Skeleton -->
    <div class="profile-hero" id="profile-hero-sk">
      <div class="profile-avatar" style="background:var(--surface-2);"></div>
      <div class="skeleton skeleton-line skeleton-line--lg" style="width:140px;"></div>
      <div class="skeleton skeleton-line skeleton-line--sm" style="width:90px;"></div>
      <div class="skeleton skeleton-line" style="width:70px;height:26px;border-radius:20px;"></div>
    </div>
  </main>

  <div th:replace="~{fragments/navbar :: navbar}"></div>

</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/api.js}"></script>
<script>
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  // Parse username from URL: /profile/{username}
  const _profileUsername = window.location.pathname.split('/').filter(Boolean).pop();

  function fmtDate(iso) {
    const d = new Date(iso);
    return `${String(d.getDate()).padStart(2,'0')} ${MONTHS[d.getMonth()]} · ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  function goToMap(btn) {
    sessionStorage.setItem('mapFlyTo', JSON.stringify({ lat: parseFloat(btn.dataset.lat), lng: parseFloat(btn.dataset.lng), zoom: 16 }));
    window.location.href = '/map';
  }

  Promise.all([UserAPI.getAll(), TourListingAPI.getAll()])
    .then(([users, listings]) => {
      const user = (users || []).find(u => u.username === _profileUsername);
      const main = document.getElementById('profile-main');

      if (!user) {
        main.innerHTML = `
          <div class="not-found">
            <div style="font-size:40px;opacity:0.15;">🧭</div>
            <div style="font-family:var(--font-display);font-weight:700;font-size:16px;color:var(--text-2);">User not found</div>
            <div style="font-size:11px;color:var(--text-3);">@${_profileUsername} doesn't exist.</div>
            <a href="/explore" class="btn btn--ghost" style="margin-top:8px;height:40px;padding:0 20px;font-size:11px;">Back to Explore</a>
          </div>`;
        return;
      }

      const now = new Date();
      const userListings = (listings || []).filter(l =>
        l.host?.username === user.username && !l.reserved && new Date(l.meetingDate) > now
      ).sort((a, b) => new Date(a.meetingDate) - new Date(b.meetingDate));

      const initials = ((user.firstName?.[0] ?? '') + (user.lastName?.[0] ?? '')).toUpperCase() || '?';
      const hue = (user.username ?? '').split('').reduce((acc, c) => acc + c.charCodeAt(0), 0) % 360;
      const photoUrl = user.profilePhotoUrl || localStorage.getItem('photo_' + user.id);
      const avatarInner = photoUrl
        ? `<img src="${photoUrl}" style="width:100%;height:100%;object-fit:cover;" alt="">`
        : `<span style="font-family:var(--font-display);font-weight:800;font-size:28px;color:hsl(${hue},60%,72%);">${initials}</span>`;
      const avatarStyle = photoUrl ? '' : `background:hsl(${hue},35%,22%);border-color:hsl(${hue},40%,35%);`;

      const isOwnProfile = Auth.getUsername() === user.username;
      const backLink = document.referrer.includes('/explore') ? '/explore' : '/explore';

      main.innerHTML = `
        <div style="display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid var(--border);">
          <a href="${backLink}" style="color:var(--text-3);text-decoration:none;font-size:20px;line-height:1;">‹</a>
          <div style="font-family:var(--font-display);font-weight:700;font-size:14px;color:var(--text);">Profile</div>
          ${isOwnProfile ? `<a href="/account/edit" style="margin-left:auto;font-size:10px;color:var(--accent);text-decoration:none;letter-spacing:0.06em;">Edit</a>` : ''}
        </div>

        <div class="profile-hero">
          <div class="profile-avatar" style="${avatarStyle}">${avatarInner}</div>
          <div class="profile-name">${user.firstName} ${user.lastName}</div>
          <div class="profile-handle">@${user.username}</div>
          <div class="profile-rating">★ ${user.rating > 0 ? Number(user.rating).toFixed(1) : '—'}</div>
          <div class="profile-stats">
            <div class="profile-stat">
              <div class="profile-stat__num">${userListings.length}</div>
              <div class="profile-stat__label">Tours</div>
            </div>
          </div>
        </div>

        ${user.bio ? `<div class="profile-bio">${user.bio}</div>` : ''}

        <div class="profile-section-label">Upcoming tours</div>
        <div class="profile-listings" id="profile-listings"></div>
      `;

      const listingsEl = document.getElementById('profile-listings');
      if (!userListings.length) {
        listingsEl.innerHTML = `
          <div class="profile-empty">
            <div class="profile-empty__icon">🗺️</div>
            <div class="profile-empty__sub">No upcoming tours from this host.</div>
          </div>`;
        return;
      }

      const currentUserId = Auth.getUserId();
      listingsEl.innerHTML = userListings.map(listing => {
        const hasCoords = listing.lat != null && listing.lng != null;
        const mapBtn = hasCoords
          ? `<button class="btn btn--ghost" style="height:34px;font-size:10px;" data-lat="${listing.lat}" data-lng="${listing.lng}" onclick="goToMap(this)">📍 Map</button>`
          : '';
        const reserveBtn = currentUserId && !isOwnProfile
          ? `<a href="/tours" class="btn btn--primary" style="height:34px;font-size:10px;">Request</a>`
          : '';
        return `
          <div class="profile-listing-card">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;">
              <div class="profile-listing-card__city">${listing.city}</div>
              <div class="profile-listing-card__date">${fmtDate(listing.meetingDate)}</div>
            </div>
            <div class="profile-listing-card__desc">${listing.tourDescription}</div>
            <div class="profile-listing-card__foot">
              <div style="display:flex;align-items:center;gap:5px;">
                <div style="width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 5px var(--accent);"></div>
                <div style="font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);">Available</div>
              </div>
              <div style="display:flex;gap:6px;">${mapBtn}${reserveBtn}</div>
            </div>
          </div>`;
      }).join('');
    })
    .catch(() => {
      document.getElementById('profile-main').innerHTML = `
        <div style="padding:40px 24px;text-align:center;font-size:11px;color:var(--text-3);">
          Could not load profile. Check your connection.
        </div>`;
    });
</script>
</body>
</html>
