<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <title>Profile — Experimate</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <style>
    /* ── Nav bar ── */
    .profile-nav {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 18px; border-bottom: 1px solid var(--border);
    }
    .profile-nav__back {
      color: var(--text-3); text-decoration: none;
      font-size: 22px; line-height: 1; padding: 2px 4px;
    }
    .profile-nav__title {
      font-family: var(--font-display); font-weight: 700; font-size: 14px; color: var(--text);
    }
    .profile-nav__edit {
      margin-left: auto;
      font-size: 10px; color: var(--accent); text-decoration: none; letter-spacing: 0.06em;
    }

    /* ── Hero ── */
    .profile-hero {
      padding: 36px 20px 28px;
      border-bottom: 1px solid var(--border);
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      position: relative; overflow: hidden; text-align: center;
    }
    .profile-hero::before {
      content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 320px; height: 220px;
      background: radial-gradient(ellipse, rgba(0,201,167,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .profile-avatar {
      width: 96px; height: 96px; border-radius: 50%;
      background: var(--surface-2); border: 2px solid var(--border-2);
      display: flex; align-items: center; justify-content: center;
      font-size: 34px; position: relative; z-index: 1; overflow: hidden;
      flex-shrink: 0;
    }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-name {
      font-family: var(--font-display); font-weight: 800; font-size: 22px;
      position: relative; z-index: 1; letter-spacing: -0.01em; color: var(--text);
    }
    .profile-handle {
      font-size: 11px; color: var(--text-3); letter-spacing: 0.08em;
      position: relative; z-index: 1; margin-top: -6px;
    }
    .profile-rating {
      padding: 5px 16px; border-radius: var(--radius-pill);
      background: var(--accent-dim); border: 1px solid var(--accent-border);
      font-size: 12px; color: var(--accent); letter-spacing: 0.06em;
      position: relative; z-index: 1;
    }
    .profile-stats {
      display: flex; gap: 36px;
      position: relative; z-index: 1; margin-top: 4px;
    }
    .profile-stat { text-align: center; }
    .profile-stat__num {
      font-family: var(--font-display); font-weight: 800; font-size: 22px; color: var(--text);
    }
    .profile-stat__label {
      font-size: 9px; color: var(--text-3); letter-spacing: 0.1em;
      text-transform: uppercase; margin-top: 2px;
    }

    /* ── Bio ── */
    .profile-bio {
      padding: 20px 20px; border-bottom: 1px solid var(--border);
    }
    .profile-bio__label {
      font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--text-3); margin-bottom: 8px;
    }
    .profile-bio__text {
      font-size: 12px; line-height: 1.8; color: rgba(239,239,239,0.6);
    }

    /* ── Section ── */
    .profile-section-label {
      padding: 20px 20px 8px;
      font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--text-3);
    }
    .profile-listings { display: flex; flex-direction: column; gap: 12px; padding: 0 18px 40px; }

    /* ── Listing cards ── */
    .profile-listing-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .profile-listing-card__head {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 8px;
    }
    .profile-listing-card__city {
      font-family: var(--font-display); font-weight: 700; font-size: 15px; color: var(--text);
    }
    .profile-listing-card__date { font-size: 10px; color: var(--text-3); letter-spacing: 0.05em; flex-shrink: 0; }
    .profile-listing-card__desc {
      font-size: 11px; color: rgba(239,239,239,0.5); line-height: 1.65;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .profile-listing-card__foot {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .profile-listing-card__status {
      display: flex; align-items: center; gap: 6px;
    }
    .profile-listing-card__dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 5px var(--accent); flex-shrink: 0;
    }
    .profile-listing-card__status-label {
      font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent);
    }
    .profile-listing-card__actions { display: flex; gap: 6px; }

    /* ── Empty / error states ── */
    .profile-empty {
      display: flex; flex-direction: column; align-items: center;
      padding: 48px 24px; gap: 10px; text-align: center;
    }
    .profile-empty__icon { font-size: 32px; opacity: 0.18; }
    .profile-empty__sub { font-size: 11px; color: var(--text-3); line-height: 1.6; }
    .not-found {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 80px 24px; gap: 12px; text-align: center;
    }
    .not-found__icon { font-size: 40px; opacity: 0.15; }
    .not-found__title { font-family: var(--font-display); font-weight: 700; font-size: 16px; color: var(--text-2); }
    .not-found__sub { font-size: 11px; color: var(--text-3); }
  </style>
</head>
<body>
<div class="app-shell">

  <div th:replace="~{fragments/topbar :: topbar}"></div>

  <main class="page-content" id="profile-main">
    <!-- Skeleton -->
    <div class="profile-nav">
      <a href="/explore" class="profile-nav__back">‹</a>
      <div class="profile-nav__title">Profile</div>
    </div>
    <div class="profile-hero" id="profile-hero-sk">
      <div class="profile-avatar"></div>
      <div class="skeleton skeleton-line skeleton-line--lg" style="width:140px;"></div>
      <div class="skeleton skeleton-line skeleton-line--sm" style="width:90px;"></div>
      <div class="skeleton skeleton-line" style="width:72px;height:26px;border-radius:20px;"></div>
    </div>
  </main>

  <div th:replace="~{fragments/navbar :: navbar}"></div>

</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/api.js}"></script>
<script>
  const _profileUsername = window.location.pathname.split('/').filter(Boolean).pop();

  function goToMap(btn) {
    sessionStorage.setItem('mapFlyTo', JSON.stringify({ lat: parseFloat(btn.dataset.lat), lng: parseFloat(btn.dataset.lng), zoom: 16 }));
    window.location.href = '/map';
  }

  Promise.all([UserAPI.getAll(), TourListingAPI.getAll()])
    .then(([users, listings]) => {
      const user = (users || []).find(u => u.username === _profileUsername);
      const main = document.getElementById('profile-main');

      if (!user) {
        main.innerHTML = `
          <div class="not-found">
            <div class="not-found__icon">🧭</div>
            <div class="not-found__title">User not found</div>
            <div class="not-found__sub">@${_profileUsername} doesn't exist.</div>
            <a href="/explore" class="btn btn--ghost" style="margin-top:8px;height:40px;padding:0 20px;font-size:11px;">Back to Explore</a>
          </div>`;
        return;
      }

      const now = new Date();
      const userListings = (listings || []).filter(l =>
        l.host?.username === user.username && !l.reserved && new Date(l.meetingDate) > now
      ).sort((a, b) => new Date(a.meetingDate) - new Date(b.meetingDate));

      const initials = ((user.firstName?.[0] ?? '') + (user.lastName?.[0] ?? '')).toUpperCase() || '?';
      const hue = (user.username ?? '').split('').reduce((acc, c) => acc + c.charCodeAt(0), 0) % 360;
      const photoUrl = UserAPI.photoUrl(user.profilePhotoUrl) || localStorage.getItem('photo_' + user.id);
      const avatarInner = photoUrl
        ? `<img src="${photoUrl}" alt="">`
        : `<span style="font-family:var(--font-display);font-weight:800;font-size:32px;color:hsl(${hue},60%,72%);">${initials}</span>`;
      const avatarStyle = photoUrl ? '' : `background:hsl(${hue},35%,22%);border-color:hsl(${hue},40%,35%);`;

      const isOwnProfile = Auth.getUsername() === user.username;

      const bioSection = user.bio ? `
        <div class="profile-bio">
          <div class="profile-bio__label">About</div>
          <div class="profile-bio__text">${user.bio}</div>
        </div>` : '';

      const editLink = isOwnProfile
        ? `<a href="/account/edit" class="profile-nav__edit">Edit</a>`
        : '';

      main.innerHTML = `
        <div class="profile-page">
          <div class="profile-nav">
            <a href="/explore" class="profile-nav__back">‹</a>
            <div class="profile-nav__title">Profile</div>
            ${editLink}
          </div>

          <div class="profile-hero">
            <div class="profile-avatar" style="${avatarStyle}">${avatarInner}</div>
            <div class="profile-name">${user.firstName} ${user.lastName}</div>
            <div class="profile-handle">@${user.username}</div>
            <div class="profile-rating">★ ${user.rating > 0 ? Number(user.rating).toFixed(1) : '—'}</div>
            <div class="profile-stats">
              <div class="profile-stat">
                <div class="profile-stat__num">${userListings.length}</div>
                <div class="profile-stat__label">Tours</div>
              </div>
            </div>
          </div>

          ${bioSection}

          <div class="profile-section-label">Upcoming tours</div>
          <div class="profile-listings" id="profile-listings"></div>
        </div>
      `;

      const listingsEl = document.getElementById('profile-listings');
      if (!userListings.length) {
        listingsEl.innerHTML = `
          <div class="profile-empty">
            <div class="profile-empty__icon">🗺️</div>
            <div class="profile-empty__sub">No upcoming tours from this host.</div>
          </div>`;
        return;
      }

      const currentUserId = Auth.getUserId();
      listingsEl.innerHTML = userListings.map(listing => {
        const hasCoords = listing.lat != null && listing.lng != null;
        const mapBtn = hasCoords
          ? `<button class="btn btn--ghost" style="height:34px;font-size:10px;" data-lat="${listing.lat}" data-lng="${listing.lng}" onclick="goToMap(this)">📍 Map</button>`
          : '';
        const reserveBtn = currentUserId && !isOwnProfile
          ? `<a href="/tours" class="btn btn--primary" style="height:34px;font-size:10px;">Request</a>`
          : '';
        return `
          <div class="profile-listing-card">
            <div class="profile-listing-card__head">
              <div class="profile-listing-card__city">${listing.city}</div>
              <div class="profile-listing-card__date">${fmtDatetime(listing.meetingDate)}</div>
            </div>
            <div class="profile-listing-card__desc">${listing.tourDescription}</div>
            <div class="profile-listing-card__foot">
              <div class="profile-listing-card__status">
                <div class="profile-listing-card__dot"></div>
                <div class="profile-listing-card__status-label">Available</div>
              </div>
              <div class="profile-listing-card__actions">${mapBtn}${reserveBtn}</div>
            </div>
          </div>`;
      }).join('');
    })
    .catch(() => {
      document.getElementById('profile-main').innerHTML = `
        <div class="profile-empty">
          <div class="profile-empty__sub">Could not load profile. Check your connection.</div>
        </div>`;
    });
</script>
</body>
</html>
