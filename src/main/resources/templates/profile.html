<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <title>Profile — Experimate</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <style>
    /* ── Nav ── */
    .profile-nav {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 18px; position: relative; z-index: 2;
    }
    .profile-nav__back { color: var(--text-3); text-decoration: none; font-size: 22px; line-height: 1; padding: 2px 4px; }
    .profile-nav__title { font-family: var(--font-display); font-weight: 700; font-size: 14px; color: var(--text); }
    .profile-nav__edit { margin-left: auto; font-size: 10px; color: var(--accent); text-decoration: none; letter-spacing: 0.06em; padding: 5px 12px; border: 1px solid var(--accent-border); border-radius: var(--radius-pill); background: var(--accent-dim); }

    /* ── Cover ── */
    .profile-cover {
      height: 110px; position: relative; overflow: hidden; flex-shrink: 0;
      margin-top: -56px; /* pull up behind nav */
    }
    .profile-cover__gradient { position: absolute; inset: 0; }
    .profile-cover__overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 40%, var(--bg) 100%); }

    /* ── Hero ── */
    .profile-hero {
      padding: 0 20px 20px;
      display: flex; flex-direction: column; align-items: center;
      text-align: center; gap: 6px;
      border-bottom: 1px solid var(--border);
      position: relative; z-index: 1;
    }
    .profile-avatar-wrap {
      margin-top: -44px; position: relative;
    }
    .profile-avatar {
      width: 88px; height: 88px; border-radius: 50%;
      background: var(--surface-2);
      border: 3px solid var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; overflow: hidden; position: relative;
    }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-avatar__ring {
      position: absolute; inset: -4px; border-radius: 50%;
      border: 2.5px solid transparent;
      background: linear-gradient(var(--bg), var(--bg)) padding-box,
                  linear-gradient(135deg, var(--accent), var(--warm)) border-box;
    }
    .profile-name { font-family: var(--font-display); font-weight: 800; font-size: 22px; letter-spacing: -0.01em; color: var(--text); margin-top: 8px; }
    .profile-handle { font-size: 11px; color: var(--text-3); letter-spacing: 0.08em; }

    /* ── Trait pills ── */
    .profile-traits { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
    .profile-trait {
      font-size: 10px; letter-spacing: 0.06em; padding: 4px 12px;
      border-radius: 20px; font-family: var(--font-mono);
    }
    .profile-trait--teal { background: rgba(0,201,167,0.12); border: 1px solid rgba(0,201,167,0.3); color: #00c9a7; }
    .profile-trait--warm { background: rgba(255,107,53,0.12); border: 1px solid rgba(255,107,53,0.3); color: var(--warm); }
    .profile-trait--muted { background: var(--surface-2); border: 1px solid var(--border-2); color: var(--text-2); }

    /* ── Stats row ── */
    .profile-stats {
      display: flex; width: 100%; margin-top: 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); overflow: hidden;
    }
    .profile-stat { flex: 1; text-align: center; padding: 12px 8px; border-right: 1px solid var(--border); }
    .profile-stat:last-child { border-right: none; }
    .profile-stat__num { font-family: var(--font-display); font-weight: 800; font-size: 20px; color: var(--text); line-height: 1; }
    .profile-stat__num--accent { color: var(--accent); }
    .profile-stat__label { font-size: 9px; color: var(--text-3); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 3px; }

    /* ── Action row ── */
    .profile-actions { display: flex; gap: 8px; width: 100%; margin-top: 14px; }

    /* ── Bio ── */
    .profile-bio { padding: 18px 20px; border-bottom: 1px solid var(--border); }
    .profile-bio__label { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-3); margin-bottom: 8px; }
    .profile-bio__text { font-size: 12px; line-height: 1.8; color: var(--text-2); }
    .profile-bio__empty { font-size: 12px; color: var(--text-3); font-style: italic; }

    /* ── Listings ── */
    .profile-section-label { padding: 18px 20px 8px; font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-3); }
    .profile-listings { display: flex; flex-direction: column; gap: 12px; padding: 0 18px 40px; }
    .profile-listing-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .profile-listing-card__head { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .profile-listing-card__city { font-family: var(--font-display); font-weight: 700; font-size: 15px; color: var(--text); }
    .profile-listing-card__date { font-size: 10px; color: var(--text-3); letter-spacing: 0.05em; flex-shrink: 0; }
    .profile-listing-card__desc { font-size: 11px; color: var(--text-2); line-height: 1.65; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .profile-listing-card__foot { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .profile-listing-card__dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 5px var(--accent); flex-shrink: 0; }
    .profile-listing-card__status-label { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); }
    .profile-listing-card__actions { display: flex; gap: 6px; }

    /* ── Empty / not found ── */
    .profile-empty { display: flex; flex-direction: column; align-items: center; padding: 36px 24px; gap: 10px; text-align: center; }
    .profile-empty__icon { font-size: 28px; opacity: 0.18; }
    .profile-empty__sub { font-size: 11px; color: var(--text-3); line-height: 1.6; }
    .not-found { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 24px; gap: 12px; text-align: center; }
    .not-found__icon { font-size: 40px; opacity: 0.15; }
    .not-found__title { font-family: var(--font-display); font-weight: 700; font-size: 16px; color: var(--text-2); }
    .not-found__sub { font-size: 11px; color: var(--text-3); }
  </style>
</head>
<body>
<div class="app-shell">

  <div th:replace="~{fragments/topbar :: topbar}"></div>

  <main class="page-content" id="profile-main" style="overflow-y:auto;">
    <!-- Skeleton -->
    <div class="profile-nav">
      <div class="profile-nav__title">Profile</div>
    </div>
    <div style="height:110px;background:var(--surface-2);"></div>
    <div style="padding:0 20px 20px;display:flex;flex-direction:column;align-items:center;gap:10px;border-bottom:1px solid var(--border);">
      <div class="skeleton" style="width:88px;height:88px;border-radius:50%;margin-top:-44px;"></div>
      <div class="skeleton skeleton-line skeleton-line--lg" style="width:140px;"></div>
      <div class="skeleton skeleton-line skeleton-line--sm" style="width:90px;"></div>
    </div>
  </main>

  <div th:replace="~{fragments/navbar :: navbar}"></div>

</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/api.js}"></script>
<script th:inline="none">
  const _profileUsername = window.location.pathname.split('/').filter(Boolean).pop();

  function goToMap(btn) {
    sessionStorage.setItem('mapFlyTo', JSON.stringify({ lat: parseFloat(btn.dataset.lat), lng: parseFloat(btn.dataset.lng), zoom: 16 }));
    window.location.href = '/map';
  }

  function _seedTraits(username) {
    const pool = ['Curious','Adventurous','Calm','Thoughtful','Warm','Creative','Bold','Organised','Spontaneous','Empathetic'];
    const h = username.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
    return [pool[h % pool.length], pool[(h * 3 + 1) % pool.length], pool[(h * 7 + 5) % pool.length]]
      .filter((v, i, a) => a.indexOf(v) === i).slice(0, 3);
  }

  function _traitClass(i) {
    return ['profile-trait--teal', 'profile-trait--warm', 'profile-trait--muted'][i % 3];
  }

  Promise.all([UserAPI.getByUsername(_profileUsername).catch(() => null), TourListingAPI.getAll()])
    .then(([user, listings]) => {
      const main = document.getElementById('profile-main');

      if (!user) {
        main.innerHTML = `
          <div class="not-found">
            <div class="not-found__icon">🧭</div>
            <div class="not-found__title">User not found</div>
            <div class="not-found__sub">@${_profileUsername} doesn't exist.</div>
            <a href="/explore" class="btn btn--ghost" style="margin-top:8px;height:40px;padding:0 20px;font-size:11px;">Back to Explore</a>
          </div>`;
        return;
      }

      const now = new Date();
      const userListings = (listings || [])
        .filter(l => l.host?.username === user.username && !l.reserved && new Date(l.meetingDate) > now)
        .sort((a, b) => new Date(a.meetingDate) - new Date(b.meetingDate));

      const initials = ((user.firstName?.[0] ?? '') + (user.lastName?.[0] ?? '')).toUpperCase() || '?';
      const hue = (user.username ?? '').split('').reduce((acc, c) => acc + c.charCodeAt(0), 0) % 360;
      const photoUrl = UserAPI.photoUrl(user.profilePhotoUrl) || localStorage.getItem('photo_' + user.id);

      const avatarInner = photoUrl
        ? `<img src="${photoUrl}" alt="">`
        : `<span style="font-family:var(--font-display);font-weight:800;font-size:30px;color:hsl(${hue},60%,72%);">${initials}</span>`;
      const avatarBg = photoUrl ? '' : `background:hsl(${hue},35%,22%);border-color:hsl(${hue},40%,35%);`;

      const isOwnProfile = Auth.getUsername() === user.username;

      // Traits: use quiz data for own profile if available, seeded for others
      let traits = _seedTraits(user.username);
      if (isOwnProfile) {
        try {
          const stored = JSON.parse(localStorage.getItem('personality_traits') || 'null');
          if (Array.isArray(stored) && stored.length) traits = stored.slice(0, 3);
        } catch(e) {}
      }
      const traitPills = traits.map((t, i) =>
        `<span class="profile-trait ${_traitClass(i)}">${t}</span>`
      ).join('');

      const ratingDisplay = user.rating > 0 ? Number(user.rating).toFixed(1) : '—';

      const editLink = isOwnProfile ? `<a href="/account/edit" class="profile-nav__edit">Edit profile</a>` : '';

      const bioSection = `
        <div class="profile-bio">
          <div class="profile-bio__label">About</div>
          ${user.bio
            ? `<div class="profile-bio__text">${user.bio}</div>`
            : isOwnProfile
              ? `<div class="profile-bio__empty">No bio yet. <a href="/account/edit" style="color:var(--accent);text-decoration:none;">Add one →</a></div>`
              : `<div class="profile-bio__empty">This user hasn't written a bio yet.</div>`
          }
        </div>`;

      const actionRow = (!isOwnProfile && userListings.length > 0) ? `
        <div class="profile-actions">
          <a href="/tours?host=${user.username}" class="btn btn--primary" style="flex:1;height:42px;font-size:12px;">
            View ${userListings.length} Meet${userListings.length !== 1 ? 's' : ''}
          </a>
        </div>` : '';

      main.innerHTML = `
        <div class="profile-page">
          <div class="profile-nav">
            <div class="profile-nav__title">@${user.username}</div>
            ${editLink}
          </div>

          <div class="profile-cover">
            <div class="profile-cover__gradient" style="background:linear-gradient(135deg,hsl(${hue},45%,14%) 0%,hsl(${hue},30%,18%) 50%,hsl(${(hue+40)%360},35%,12%) 100%);"></div>
            <div style="position:absolute;top:20px;left:30%;width:160px;height:160px;border-radius:50%;background:hsl(${hue},60%,30%);opacity:0.12;filter:blur(40px);"></div>
            <div class="profile-cover__overlay"></div>
          </div>

          <div class="profile-hero">
            <div class="profile-avatar-wrap">
              <div class="profile-avatar" style="${avatarBg}">
                ${avatarInner}
              </div>
              <div class="profile-avatar__ring"></div>
            </div>
            <div class="profile-name">${user.firstName} ${user.lastName}</div>
            <div class="profile-handle">@${user.username}</div>

            <div class="profile-traits">${traitPills}</div>

            <div class="profile-stats">
              <div class="profile-stat">
                <div class="profile-stat__num">${userListings.length}</div>
                <div class="profile-stat__label">Days</div>
              </div>
              <div class="profile-stat">
                <div class="profile-stat__num profile-stat__num--accent">★ ${ratingDisplay}</div>
                <div class="profile-stat__label">Rating</div>
              </div>
              <div class="profile-stat">
                <div class="profile-stat__num" style="font-size:13px;padding-top:3px;">${user.username.length > 8 ? user.username.slice(0,8) + '…' : user.username}</div>
                <div class="profile-stat__label">Handle</div>
              </div>
            </div>

            ${actionRow}
          </div>

          ${bioSection}

          <div class="profile-section-label">Upcoming Days</div>
          <div class="profile-listings" id="profile-listings"></div>
        </div>
      `;

      const listingsEl = document.getElementById('profile-listings');
      if (!userListings.length) {
        listingsEl.innerHTML = `
          <div class="profile-empty">
            <div class="profile-empty__icon">🗺️</div>
            <div class="profile-empty__sub">${isOwnProfile ? 'You have no upcoming days. <a href="/listings/new" style="color:var(--accent);text-decoration:none;">Create one →</a>' : 'No upcoming days from this host.'}</div>
          </div>`;
        return;
      }

      listingsEl.innerHTML = userListings.map(listing => {
        const hasCoords = listing.lat != null && listing.lng != null;
        const mapBtn = hasCoords
          ? `<button class="btn btn--ghost" style="height:34px;font-size:10px;" data-lat="${listing.lat}" data-lng="${listing.lng}" onclick="goToMap(this)">📍 Map</button>`
          : '';
        const reserveBtn = !isOwnProfile
          ? `<a href="/tours?listing=${listing.id}" class="btn btn--primary" style="height:34px;font-size:10px;">Request</a>`
          : '';
        return `
          <div class="profile-listing-card">
            <div class="profile-listing-card__head">
              <div class="profile-listing-card__city">${listing.city}</div>
              <div class="profile-listing-card__date">${fmtDatetime(listing.meetingDate)}</div>
            </div>
            <div class="profile-listing-card__desc">${listing.tourDescription}</div>
            <div class="profile-listing-card__foot">
              <div style="display:flex;align-items:center;gap:6px;">
                <div class="profile-listing-card__dot"></div>
                <div class="profile-listing-card__status-label">Available</div>
              </div>
              <div class="profile-listing-card__actions">${mapBtn}${reserveBtn}</div>
            </div>
          </div>`;
      }).join('');
    })
    .catch(() => {
      document.getElementById('profile-main').innerHTML = `
        <div class="profile-empty">
          <div class="profile-empty__sub">Could not load profile. Check your connection.</div>
        </div>`;
    });
</script>
</body>
</html>
