<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <title>Meets — Experimate</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <style>
    .tours-header {
      padding: 22px 18px 0;
      border-bottom: 1px solid var(--border);
    }

    /* ── MY MEETUPS ── */
    .meet-card {
      display: flex; align-items: center; gap: 12px; padding: 14px;
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    }
    .meet-card__date {
      width: 44px; height: 48px; background: var(--surface-2);
      border: 1px solid var(--border-2); border-radius: var(--radius-sm);
      display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .meet-card__day { font-family: var(--font-display); font-weight: 800; font-size: 19px; line-height: 1; color: var(--text); }
    .meet-card__month { font-size: 8px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-2); margin-top: 2px; }
    .meet-card__info { flex: 1; min-width: 0; }
    .meet-card__who { font-family: var(--font-display); font-weight: 600; font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
    .meet-card__where { font-size: 10px; color: var(--text-2); letter-spacing: 0.04em; }
    .meet-card__booked { font-size: 9px; color: var(--text-3); letter-spacing: 0.04em; margin-top: 2px; }
    .meet-card__cancel {
      font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase;
      min-height: 44px; padding: 0 14px; border-radius: var(--radius-pill);
      display: inline-flex; align-items: center; justify-content: center;
      border: 1px solid rgba(255,80,80,0.2); background: transparent;
      color: rgba(255,100,100,0.6); cursor: pointer; flex-shrink: 0;
      transition: border-color var(--t-fast), color var(--t-fast);
    }
    .meet-card__cancel:hover { border-color: rgba(255,80,80,0.5); color: rgba(255,100,100,0.9); }
    .meet-empty { display: flex; flex-direction: column; align-items: center; padding: 48px 24px; gap: 12px; text-align: center; }
    .meet-empty__icon { font-size: 36px; opacity: 0.25; }
    .meet-empty__title { font-family: var(--font-display); font-weight: 700; font-size: 15px; color: var(--text-2); }
    .meet-empty__sub { font-size: 11px; color: var(--text-3); letter-spacing: 0.04em; line-height: 1.6; max-width: 220px; }
    .meet-card__rate {
      font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase;
      min-height: 44px; padding: 0 14px; border-radius: var(--radius-pill);
      display: inline-flex; align-items: center; justify-content: center;
      border: 1px solid var(--accent-border); background: var(--accent-dim);
      color: var(--accent); cursor: pointer; flex-shrink: 0;
      transition: background var(--t-fast), color var(--t-fast);
    }
    .meet-card__rate:hover { background: var(--accent); color: #000; }
    .badge--rated { font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); padding: 5px 10px; border-radius: var(--radius-pill); border: 1px solid var(--accent-border); background: var(--accent-dim); flex-shrink: 0; }
    .meet-card__here { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; min-height: 44px; padding: 0 14px; border-radius: var(--radius-pill); display: inline-flex; align-items: center; justify-content: center; border: 1px solid var(--accent-border); background: var(--accent-dim); color: var(--accent); flex-shrink: 0; cursor: pointer; transition: background var(--t-fast), color var(--t-fast); }
    .meet-card__here:hover { background: var(--accent); color: #000; }
    .meet-card__here:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── MY LISTINGS ── */
    .listing-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .listing-card__city { font-family: var(--font-display); font-weight: 800; font-size: 17px; color: var(--text); letter-spacing: -0.01em; }
    .listing-card__date { font-size: 10px; color: var(--text-2); letter-spacing: 0.06em; }
    .listing-card__desc { font-size: 11px; color: var(--text-2); line-height: 1.65; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .empty-icon { width: 52px; height: 52px; border-radius: 14px; background: var(--surface-2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--text-3); }

    /* ── REQUESTS ── */
    .req-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .req-card--pending { border-left: 3px solid #ff9944; }
    .req-card__who { font-family: var(--font-display); font-weight: 700; font-size: 13px; color: var(--text); }
    .req-card__meta { font-size: 10px; color: var(--text-2); letter-spacing: 0.04em; }
    .req-card__actions { display: flex; gap: 8px; }
    .req-btn {
      flex: 1; height: 36px; border-radius: var(--radius-pill);
      font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase;
      border: 1px solid; cursor: pointer; transition: background var(--t-fast), color var(--t-fast);
    }
    .req-btn--accept { background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent); }
    .req-btn--accept:hover { background: var(--accent); color: #000; }
    .req-btn--decline { background: transparent; border-color: var(--border-2); color: var(--text-3); }
    .req-btn--decline:hover { border-color: rgba(255,80,80,0.3); color: rgba(255,80,80,0.7); }
    .req-status-badge { font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 10px; border-radius: var(--radius-pill); }
    .req-status-badge--accepted { background: var(--accent-dim); border: 1px solid var(--accent-border); color: var(--accent); }
    .req-status-badge--declined { background: rgba(255,80,80,0.08); border: 1px solid rgba(255,80,80,0.2); color: rgba(255,80,80,0.6); }

    /* ── CANCEL MODAL ── */
    .modal-backdrop {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.75); align-items: center; justify-content: center;
      padding: 24px;
    }
    .modal-backdrop--visible { display: flex; }
    .modal-card {
      background: var(--surface); border: 1px solid var(--border-2);
      border-radius: var(--radius); padding: 24px 20px;
      width: min(360px, 100%); display: flex; flex-direction: column; gap: 14px;
    }
    .modal-title { font-family: var(--font-display); font-weight: 700; font-size: 16px; color: var(--text); }
    .modal-sub { font-size: 11px; color: var(--text-3); line-height: 1.6; margin-top: -6px; }
    .modal-card textarea {
      background: var(--surface-2); border: 1px solid var(--border-2);
      border-radius: var(--radius-sm); padding: 13px 16px;
      color: var(--text); font-family: var(--font-mono); font-size: 13px;
      width: 100%; box-sizing: border-box; resize: vertical; min-height: 90px; line-height: 1.65;
      transition: border-color var(--t-fast), box-shadow var(--t-fast);
    }
    .modal-card textarea:focus { outline: none; border-color: var(--accent-border); box-shadow: 0 0 0 3px rgba(0,201,167,0.08); }
    .modal-actions { display: flex; gap: 10px; }
    .modal-actions .btn { flex: 1; height: 44px; }

    /* ── RATING MODAL ── */
    .star-picker { display: flex; gap: 6px; justify-content: center; padding: 8px 0; }
    .star-picker__star { font-size: 28px; cursor: pointer; opacity: 0.25; transition: opacity var(--t-fast), transform var(--t-fast); user-select: none; }
    .star-picker__star--active { opacity: 1; }
    .star-picker__star:hover { transform: scale(1.15); }

    /* ── COUNTDOWN BAR ── */
    .countdown-bar {
      display: none; position: fixed; bottom: calc(var(--navbar-h) + 0px); left: 0; right: 0; z-index: 90;
      background: var(--accent); color: #000;
      padding: 9px 18px; gap: 8px;
      align-items: center; justify-content: space-between;
      font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.05em;
    }
    .countdown-bar--visible { display: flex; }
    .countdown-bar__timer { font-weight: 700; font-size: 14px; letter-spacing: 0.08em; flex-shrink: 0; }

    /* ── ACTIVE TOUR TAKEOVER ── */
    .tour-takeover {
      display: none; position: fixed; inset: 0; z-index: 600;
      background: var(--bg);
      flex-direction: column; align-items: center; justify-content: center;
      gap: 18px; padding: 40px 32px; text-align: center;
    }
    .tour-takeover--visible { display: flex; }
    .tour-takeover__pulse {
      width: 80px; height: 80px; border-radius: 50%;
      background: var(--accent-dim); border: 2px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; margin: 8px 0;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0,201,167,0.4); }
      50% { box-shadow: 0 0 0 14px rgba(0,201,167,0); }
    }
  </style>
</head>
<body>
<div class="app-shell">

  <div th:replace="~{fragments/topbar :: topbar}"></div>

  <main class="page-content">

    <div class="tours-header">
      <div class="page-title">Meets</div>
      <div class="page-subtitle" style="margin-bottom:14px;">Manage your days</div>
      <div class="tab-bar">
        <div class="tab-bar__item tab-bar__item--active" onclick="switchTab(this,'meets')">My Meets</div>
        <div class="tab-bar__item" onclick="switchTab(this,'listings')">My Listings</div>
        <div class="tab-bar__item" id="tab-requests-item" onclick="switchTab(this,'requests')">Requests</div>
      </div>
    </div>

    <!-- ── MY MEETS TAB ── -->
    <div id="tab-meets" style="display:flex;flex-direction:column;gap:0;">

      <div style="padding:14px 18px;border-bottom:1px solid var(--border);">
        <div class="tab-bar">
          <div class="tab-bar__item tab-bar__item--active" onclick="switchMeetsTab(this,'guest')">Joined</div>
          <div class="tab-bar__item" onclick="switchMeetsTab(this,'host')">Hosting</div>
        </div>
      </div>

      <!-- Guest -->
      <div id="meets-panel-guest" style="display:flex;flex-direction:column;gap:14px;padding:14px 18px 32px;">
        <div class="section-label">Upcoming</div>
        <div id="meetups-upcoming"></div>
        <div class="section-label" style="margin-top:8px;">Past</div>
        <div id="meetups-past"></div>
      </div>

      <!-- Host -->
      <div id="meets-panel-host" style="display:none;flex-direction:column;gap:14px;padding:14px 18px 32px;">
        <div class="section-label">Upcoming guests</div>
        <div id="host-upcoming"></div>
        <div class="section-label" style="margin-top:8px;">Past hosted</div>
        <div id="host-past"></div>
      </div>

    </div>

    <!-- ── MY LISTINGS TAB ── -->
    <div id="tab-listings" hidden style="display:flex;flex-direction:column;gap:10px;padding:14px 18px 32px;">
      <a href="/listings/new" class="btn btn--primary" style="height:44px;font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px;text-decoration:none;margin-bottom:4px;">
        <span style="font-size:18px;line-height:1;">+</span> New Meet
      </a>
      <div id="my-listings-panel"></div>
    </div>

    <!-- ── REQUESTS TAB ── -->
    <div id="tab-requests" hidden style="display:flex;flex-direction:column;gap:10px;padding:14px 18px 32px;">
      <div id="requests-panel"></div>
    </div>

  </main>

  <div th:replace="~{fragments/navbar :: navbar}"></div>

</div>

<!-- ── COUNTDOWN BAR ── -->
<div id="countdown-bar" class="countdown-bar">
  <span id="countdown-label"></span>
  <span id="countdown-timer" class="countdown-bar__timer"></span>
</div>

<!-- ── ACTIVE TOUR TAKEOVER ── -->
<div id="tour-takeover" class="tour-takeover">
  <div style="font-family:var(--font-display);font-weight:800;font-size:30px;color:var(--text);letter-spacing:-0.02em;">Day is live</div>
  <div class="tour-takeover__pulse">🤝</div>
  <div id="takeover-info" style="font-size:14px;color:var(--text-2);line-height:1.75;"></div>
  <div style="font-size:11px;color:var(--text-3);max-width:250px;line-height:1.65;margin-top:-4px;">You're live! Tap End Day when you're both done.</div>
  <button id="end-tour-btn" class="btn btn--primary" style="height:52px;padding:0 40px;font-size:14px;margin-top:12px;" onclick="endActiveTour()">End Day</button>
</div>

<!-- ── CANCEL MODAL ── -->
<div id="cancel-modal" class="modal-backdrop">
  <div class="modal-card">
    <div class="modal-title">Cancel day?</div>
    <div class="modal-sub">Let us know why you're cancelling. This is required before proceeding.</div>
    <textarea id="cancel-reason" placeholder="Reason for cancellation..." maxlength="300"></textarea>
    <div class="modal-actions">
      <button onclick="closeCancelModal()" class="btn btn--ghost">Keep it</button>
      <button onclick="confirmCancel()" class="btn btn--danger">Cancel day</button>
    </div>
  </div>
</div>

<!-- ── RATING MODAL ── -->
<div id="rating-modal" class="modal-backdrop">
  <div class="modal-card">
    <div class="modal-title">Rate your Mate</div>
    <div class="modal-sub" id="rating-host-label" style="color:var(--text-2);margin-top:0;"></div>
    <div class="star-picker" id="star-picker">
      <span class="star-picker__star" data-val="1" onclick="setRating(1)">★</span>
      <span class="star-picker__star" data-val="2" onclick="setRating(2)">★</span>
      <span class="star-picker__star" data-val="3" onclick="setRating(3)">★</span>
      <span class="star-picker__star" data-val="4" onclick="setRating(4)">★</span>
      <span class="star-picker__star" data-val="5" onclick="setRating(5)">★</span>
    </div>
    <textarea id="rating-review" placeholder="Leave a review (optional)..." maxlength="500" style="min-height:80px;"></textarea>
    <div class="modal-actions">
      <button onclick="closeRatingModal()" class="btn btn--ghost">Cancel</button>
      <button onclick="submitRating()" class="btn btn--primary" id="rating-submit-btn">Submit</button>
    </div>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/api.js}"></script>
<script>
  let _userCache = {};

  /* ── Tab switcher ── */
  function switchTab(el, tab) {
    document.querySelectorAll('.tours-header .tab-bar__item').forEach(t => t.classList.remove('tab-bar__item--active'));
    el.classList.add('tab-bar__item--active');
    ['meets','listings','requests'].forEach(id => {
      const el = document.getElementById('tab-' + id);
      if (el) el.hidden = (id !== tab);
      if (el && id === tab) el.style.display = 'flex';
    });
  }

  function switchMeetsTab(el, panel) {
    el.closest('.tab-bar').querySelectorAll('.tab-bar__item').forEach(t => t.classList.remove('tab-bar__item--active'));
    el.classList.add('tab-bar__item--active');
    document.getElementById('meets-panel-guest').style.display = panel === 'guest' ? 'flex' : 'none';
    document.getElementById('meets-panel-host').style.display  = panel === 'host'  ? 'flex' : 'none';
  }

  /* ── Countdown bar + Active tour takeover ── */
  let _countdownInterval = null;
  let _activeTourResId   = null;

  function initCountdownAndTakeover(asGuest) {
    if (!Auth.getToken()) return;
    const stored = localStorage.getItem('activeTour');
    if (stored) {
      try { const active = JSON.parse(stored); _activeTourResId = active.resId; showTakeover(active); return; }
      catch(e) { localStorage.removeItem('activeTour'); }
    }
    const mine = (asGuest || []).filter(r => r.status !== 'CANCELLED' && r.status !== 'EXPIRED');
    const now  = new Date();
    const ONE_HOUR = 60 * 60 * 1000;
    const soon = mine.filter(r => { const diff = new Date(r.tourListing.meetingDate) - now; return diff > 0 && diff <= ONE_HOUR; })
                     .sort((a, b) => new Date(a.tourListing.meetingDate) - new Date(b.tourListing.meetingDate));
    if (!soon.length) return;
    const next = soon[0];
    const meetTime = new Date(next.tourListing.meetingDate);
    const hostName = next.tourListing.host ? next.tourListing.host.firstName + ' ' + next.tourListing.host.lastName : 'your Mate';
    document.getElementById('countdown-label').textContent = `${next.tourListing.city} · ${hostName} in`;
    document.getElementById('countdown-bar').classList.add('countdown-bar--visible');
    function tick() {
      const remaining = meetTime - new Date();
      if (remaining <= 0) { clearInterval(_countdownInterval); document.getElementById('countdown-bar').classList.remove('countdown-bar--visible'); return; }
      const totalSecs = Math.floor(remaining / 1000);
      const h = Math.floor(totalSecs / 3600), m = Math.floor((totalSecs % 3600) / 60), s = totalSecs % 60;
      document.getElementById('countdown-timer').textContent = h > 0
        ? `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
        : `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }
    tick();
    _countdownInterval = setInterval(tick, 1000);
  }

  function showTakeover(active) {
    document.getElementById('takeover-info').innerHTML = `<strong style="color:var(--text);">${active.city}</strong><br>with ${active.hostName}`;
    document.getElementById('tour-takeover').classList.add('tour-takeover--visible');
  }

  function endActiveTour() {
    const btn = document.getElementById('end-tour-btn');
    btn.disabled = true; btn.textContent = 'Ending...';
    ReservationAPI.endTour(_activeTourResId)
      .then(() => {
        localStorage.removeItem('activeTour');
        document.getElementById('tour-takeover').classList.remove('tour-takeover--visible');
        showToast('Meet ended! Rate your Mate below.', 'success');
        setTimeout(() => window.location.reload(), 1200);
      })
      .catch(err => { btn.disabled = false; btn.textContent = 'End Day'; showToast(err.message || 'Could not end day — try again.', 'error'); });
  }

  /* ── Check-in ── */
  function checkIn(btn) {
    const resId = parseInt(btn.dataset.resId, 10);
    btn.disabled = true; btn.textContent = '...';
    ReservationAPI.checkIn(resId)
      .then(res => {
        if (res.guestCheckedIn && res.hostCheckedIn) {
          const card = btn.closest('.meet-card');
          const city = card?.querySelector('.meet-card__where')?.textContent?.trim() || '';
          const hostName = (card?.querySelector('.meet-card__who')?.textContent || '').replace('👤 ', '').trim();
          const active = { resId, city, hostName };
          localStorage.setItem('activeTour', JSON.stringify(active));
          _activeTourResId = resId;
          showTakeover(active);
          showToast('Both checked in — day is live!', 'success');
        } else {
          btn.textContent = 'Waiting for your Mate…';
          showToast('Checked in! Waiting for your Mate.', 'success');
        }
      })
      .catch(err => { btn.disabled = false; btn.textContent = "I'm here"; showToast(err.message || 'Check-in failed — try again.', 'error'); });
  }

  /* ── Cancel modal ── */
  let _cancelResId = null, _cancelBtn = null;

  function openCancelModal(btn) {
    _cancelResId = parseInt(btn.dataset.resId, 10);
    _cancelBtn = btn;
    document.getElementById('cancel-reason').value = '';
    document.getElementById('cancel-modal').classList.add('modal-backdrop--visible');
  }
  function closeCancelModal() {
    document.getElementById('cancel-modal').classList.remove('modal-backdrop--visible');
    _cancelResId = null; _cancelBtn = null;
  }
  function confirmCancel() {
    const reason = document.getElementById('cancel-reason').value.trim();
    if (!reason) { showToast('Please provide a reason.'); return; }
    if (_cancelBtn) _cancelBtn.disabled = true;
    ReservationAPI.cancelTour(_cancelResId)
      .then(() => { _cancelBtn.closest('.meet-card').remove(); closeCancelModal(); showToast('Reservation cancelled.', 'success'); })
      .catch(err => { if (_cancelBtn) _cancelBtn.disabled = false; closeCancelModal(); showToast(err.message || 'Could not cancel — please try again.', 'error'); });
  }
  document.getElementById('cancel-modal').addEventListener('click', function(e) { if (e.target === this) closeCancelModal(); });

  /* ── Rating modal ── */
  let _ratingResId = null, _ratingHostUsername = null, _ratingBtn = null, _ratingScore = 0;

  function openRatingModal(btn) {
    _ratingResId = parseInt(btn.dataset.resId, 10);
    _ratingHostUsername = btn.dataset.hostUsername;
    _ratingBtn = btn;
    _ratingScore = 0;
    document.getElementById('rating-review').value = '';
    document.getElementById('rating-host-label').textContent = btn.dataset.hostName || _ratingHostUsername;
    setRating(0);
    document.getElementById('rating-modal').classList.add('modal-backdrop--visible');
  }
  function closeRatingModal() {
    document.getElementById('rating-modal').classList.remove('modal-backdrop--visible');
    _ratingResId = null; _ratingHostUsername = null; _ratingBtn = null; _ratingScore = 0;
  }
  function setRating(val) {
    _ratingScore = val;
    document.querySelectorAll('.star-picker__star').forEach(s => s.classList.toggle('star-picker__star--active', parseInt(s.dataset.val) <= val));
  }
  async function submitRating() {
    if (_ratingScore === 0) { showToast('Please select a star rating.', 'warn'); return; }
    const submitBtn = document.getElementById('rating-submit-btn');
    submitBtn.disabled = true; submitBtn.textContent = 'Submitting...';
    try {
      const users = await UserAPI.getAll();
      const host  = users.find(u => u.username === _ratingHostUsername);
      if (!host) throw new Error('Host not found.');
      await RatingAPI.create({ ratedId: host.id, score: _ratingScore, review: document.getElementById('rating-review').value.trim() || null });
      localStorage.setItem('rated_' + _ratingResId, '1');
      if (_ratingBtn) _ratingBtn.outerHTML = `<div class="badge--rated">Rated ✓</div>`;
      showToast('Rating submitted!', 'success');
      closeRatingModal();
    } catch (e) {
      showToast(e.message || 'Could not submit rating — try again.', 'error');
    } finally {
      submitBtn.disabled = false; submitBtn.textContent = 'Submit';
    }
  }
  document.getElementById('rating-modal').addEventListener('click', function(e) { if (e.target === this) closeRatingModal(); });

  /* ── Render My Meets (guest) ── */
  function renderMeetups(asGuest) {
    const upcomingEl = document.getElementById('meetups-upcoming');
    const pastEl     = document.getElementById('meetups-past');
    if (!Auth.getToken()) {
      upcomingEl.innerHTML = `<div class="meet-empty"><div class="meet-empty__title">Not signed in</div><a href="/login" class="btn btn--ghost" style="margin-top:8px;">Sign in →</a></div>`;
      pastEl.innerHTML = '';
      return;
    }
    const mine = (asGuest || []).filter(r => r.status !== 'CANCELLED' && r.status !== 'EXPIRED');
    const now  = new Date();
    const upcoming = mine.filter(r => new Date(r.tourListing.meetingDate) >= now);
    const past     = mine.filter(r => new Date(r.tourListing.meetingDate) < now);

    const mkCard = (res, isPast) => {
      const d = new Date(res.tourListing.meetingDate);
      const alreadyRated = !!localStorage.getItem('rated_' + res.id);
      const hostUsername = res.tourListing.host?.username ?? '';
      const hostName = res.tourListing.host ? res.tourListing.host.firstName + ' ' + res.tourListing.host.lastName : '?';
      const actionEl = isPast
        ? (alreadyRated ? `<div class="badge--rated">Rated ✓</div>` : `<button class="meet-card__rate" data-res-id="${res.id}" data-host-username="${hostUsername}" data-host-name="${hostName}" onclick="openRatingModal(this)">Rate</button>`)
        : `<div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex-shrink:0;">
             <button class="meet-card__here" data-res-id="${res.id}" onclick="checkIn(this)">I'm here</button>
             <button class="meet-card__cancel" data-res-id="${res.id}" onclick="openCancelModal(this)">Cancel</button>
           </div>`;
      return `
        <div class="meet-card anim-fade-up"${isPast ? ' style="opacity:0.55;"' : ''}>
          <div class="meet-card__date">
            <div class="meet-card__day">${String(d.getDate()).padStart(2,'0')}</div>
            <div class="meet-card__month">${_MONTHS[d.getMonth()]}</div>
          </div>
          <div class="meet-card__info">
            <div class="meet-card__who" style="display:flex;align-items:center;gap:7px;white-space:normal;">${userAvatar(hostUsername, 26, _userCache[hostUsername])}<span>${hostName}</span></div>
            <div class="meet-card__where">${res.tourListing.city}</div>
            <div class="meet-card__booked">Joined ${fmtDate(res.dateOfReservation)}</div>
          </div>
          ${actionEl}
        </div>`;
    };
    upcomingEl.innerHTML = upcoming.length ? upcoming.map(r => mkCard(r, false)).join('') : '<div style="font-size:11px;color:var(--text-3);padding:4px 0;">No upcoming meets.</div>';
    pastEl.innerHTML     = past.length     ? past.map(r => mkCard(r, true)).join('')     : '<div style="font-size:11px;color:var(--text-3);padding:4px 0;">No past meets yet.</div>';
  }

  /* ── Render My Meets (host) ── */
  function renderHostMeetups(asHost) {
    const upcomingEl = document.getElementById('host-upcoming');
    const pastEl     = document.getElementById('host-past');
    if (!Auth.getToken()) return;
    const mine = (asHost || []).filter(r => r.status !== 'CANCELLED' && r.status !== 'EXPIRED');
    const now  = new Date();
    const upcoming = mine.filter(r => new Date(r.tourListing.meetingDate) >= now).sort((a,b) => new Date(a.tourListing.meetingDate) - new Date(b.tourListing.meetingDate));
    const past     = mine.filter(r => new Date(r.tourListing.meetingDate) < now).sort((a,b)  => new Date(b.tourListing.meetingDate) - new Date(a.tourListing.meetingDate));
    const mkCard = (res, isPast) => {
      const d = new Date(res.tourListing.meetingDate);
      const guestName   = res.guest ? res.guest.firstName + ' ' + res.guest.lastName : '?';
      const guestHandle = res.guest?.username ?? '';
      return `
        <div class="meet-card anim-fade-up"${isPast ? ' style="opacity:0.55;"' : ''}>
          <div class="meet-card__date">
            <div class="meet-card__day">${String(d.getDate()).padStart(2,'0')}</div>
            <div class="meet-card__month">${_MONTHS[d.getMonth()]}</div>
          </div>
          <div class="meet-card__info">
            <div class="meet-card__who" style="display:flex;align-items:center;gap:7px;white-space:normal;">${userAvatar(guestHandle, 26, _userCache[guestHandle])}<span>${guestName} <span style="font-size:9px;color:var(--text-3);font-family:var(--font-mono);">@${guestHandle}</span></span></div>
            <div class="meet-card__where">${res.tourListing.city}</div>
            <div class="meet-card__booked">${fmtDate(res.tourListing.meetingDate)} · ${fmtTime(res.tourListing.meetingDate)}</div>
          </div>
          ${!isPast ? `<button class="meet-card__here" data-res-id="${res.id}" onclick="checkIn(this)">I'm here</button>` : '<div class="badge--rated" style="opacity:0.5;">Past</div>'}
        </div>`;
    };
    upcomingEl.innerHTML = upcoming.length ? upcoming.map(r => mkCard(r, false)).join('') : '<div style="font-size:11px;color:var(--text-3);padding:4px 0;">No upcoming Mates.</div>';
    pastEl.innerHTML     = past.length     ? past.map(r => mkCard(r, true)).join('')     : '<div style="font-size:11px;color:var(--text-3);padding:4px 0;">No past hosted meets yet.</div>';
  }

  /* ── Render My Listings ── */
  function renderMyListings(myListings) {
    const el = document.getElementById('my-listings-panel');
    if (!Auth.getToken()) { el.innerHTML = `<div style="font-size:11px;color:var(--text-3);">Sign in to manage your listings.</div>`; return; }
    const mine = (myListings || []).sort((a, b) => new Date(a.meetingDate) - new Date(b.meetingDate));
    if (!mine.length) {
      el.innerHTML = `<div style="text-align:center;padding:40px 0;color:var(--text-3);font-size:12px;">No listings yet — create your first one above.</div>`;
      return;
    }
    el.innerHTML = mine.map(listing => {
      const isPast = new Date(listing.meetingDate) < new Date();
      const dotColor = listing.reserved || isPast ? 'var(--text-3)' : 'var(--accent)';
      const dotGlow  = !listing.reserved && !isPast ? 'box-shadow:0 0 5px var(--accent);' : '';
      const statusLabel = listing.reserved ? 'Booked' : isPast ? 'Past' : 'Available';
      return `
        <div class="listing-card" id="my-listing-${listing.id}" style="opacity:${isPast ? '0.5' : '1'};">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;">
            <div style="min-width:0;">
              <div class="listing-card__city">${listing.city}</div>
              <div class="listing-card__date" style="margin-top:3px;">${fmtDatetime(listing.meetingDate)}</div>
            </div>
            <div style="display:flex;align-items:center;gap:5px;flex-shrink:0;">
              <div style="width:6px;height:6px;border-radius:50%;background:${dotColor};${dotGlow}"></div>
              <div style="font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:${dotColor};">${statusLabel}</div>
            </div>
          </div>
          <div class="listing-card__desc">${listing.tourDescription}</div>
          <div style="display:flex;justify-content:flex-end;">
            <button class="meet-card__cancel" data-listing-id="${listing.id}" onclick="deleteMyListing(this)">Delete</button>
          </div>
        </div>`;
    }).join('');
  }

  function deleteMyListing(btn) {
    const id = parseInt(btn.dataset.listingId, 10);
    if (!confirm('Delete this listing? This cannot be undone.')) return;
    btn.disabled = true;
    TourListingAPI.delete(id)
      .then(() => { document.getElementById('my-listing-' + id)?.remove(); showToast('Listing deleted.', 'success'); })
      .catch(err => { btn.disabled = false; showToast(err.message || 'Could not delete listing.', 'error'); });
  }

  /* ── Render Requests (incoming) ── */
  function renderRequests(allRequests) {
    const el = document.getElementById('requests-panel');
    if (!Auth.getToken()) { el.innerHTML = `<div style="font-size:11px;color:var(--text-3);">Sign in to see requests.</div>`; return; }
    const currentUsername = Auth.getUsername();
    const incoming = (allRequests || []).filter(r => r.tourListing?.host?.username === currentUsername);
    const pending  = incoming.filter(r => r.status === 'PENDING');
    const others   = incoming.filter(r => r.status !== 'PENDING');

    // Update badge on tab
    const tabItem = document.getElementById('tab-requests-item');
    if (pending.length > 0) {
      tabItem.innerHTML = `Requests <span style="background:var(--accent);color:#000;border-radius:10px;padding:1px 6px;font-size:9px;font-weight:700;margin-left:4px;">${pending.length}</span>`;
    }

    if (!incoming.length) {
      el.innerHTML = `
        <div class="meet-empty">
          <div class="meet-empty__icon">📬</div>
          <div class="meet-empty__title">No requests yet</div>
          <div class="meet-empty__sub">When someone requests to join your listing, it'll appear here.</div>
        </div>`;
      return;
    }

    const mkReqCard = (r) => {
      const guestName   = r.user ? r.user.firstName + ' ' + r.user.lastName : r.guest?.firstName + ' ' + r.guest?.lastName || '?';
      const guestHandle = r.user?.username ?? r.guest?.username ?? '';
      const city        = r.tourListing?.city ?? '';
      const date        = r.tourListing?.meetingDate ? fmtDate(r.tourListing.meetingDate) : '';
      const actionEl    = r.status === 'PENDING'
        ? `<div class="req-card__actions">
             <button class="req-btn req-btn--accept" onclick="handleRequest('accept',${r.id},this)">Accept</button>
             <button class="req-btn req-btn--decline" onclick="handleRequest('decline',${r.id},this)">Decline</button>
           </div>`
        : `<span class="req-status-badge req-status-badge--${r.status.toLowerCase()}">${r.status}</span>`;
      return `
        <div class="req-card${r.status === 'PENDING' ? ' req-card--pending' : ''}" id="req-${r.id}">
          <div style="display:flex;align-items:center;gap:10px;">
            ${userAvatar(guestHandle, 36, _userCache[guestHandle])}
            <div style="flex:1;min-width:0;">
              <div class="req-card__who">${guestName}</div>
              <div class="req-card__meta">@${guestHandle} · ${city} · ${date}</div>
            </div>
          </div>
          ${actionEl}
        </div>`;
    };

    el.innerHTML = (pending.length ? `<div class="section-label" style="margin-bottom:6px;">Pending</div>` + pending.map(mkReqCard).join('') : '')
                 + (others.length  ? `<div class="section-label" style="margin:14px 0 6px;">Previous</div>` + others.map(mkReqCard).join('') : '');
  }

  async function handleRequest(action, id, btn) {
    btn.disabled = true;
    try {
      if (action === 'accept') {
        await BookingRequestAPI.accept(id);
        document.querySelector(`#req-${id} .req-card__actions`).innerHTML = '<span class="req-status-badge req-status-badge--accepted">Accepted</span>';
        showToast('Request accepted!', 'success');
      } else {
        await BookingRequestAPI.decline(id);
        document.querySelector(`#req-${id} .req-card__actions`).innerHTML = '<span class="req-status-badge req-status-badge--declined">Declined</span>';
        showToast('Request declined.', 'default');
      }
      // Update pending count badge
      const remaining = document.querySelectorAll('.req-btn--accept').length;
      const tabItem = document.getElementById('tab-requests-item');
      if (remaining === 0) tabItem.textContent = 'Requests';
      else tabItem.innerHTML = `Requests <span style="background:var(--accent);color:#000;border-radius:10px;padding:1px 6px;font-size:9px;font-weight:700;margin-left:4px;">${remaining}</span>`;
    } catch(err) {
      btn.disabled = false;
      showToast(err.message || 'Could not process request.', 'error');
    }
  }

  /* ── Auto-switch tab ── */
  (function() {
    const tab = sessionStorage.getItem('openTab');
    if (tab) {
      sessionStorage.removeItem('openTab');
      const item = document.querySelector(`.tours-header .tab-bar__item[onclick*="${tab}"]`);
      if (item) item.click();
    }
  })();

  /* ── Load data ── */
  Promise.all([
    ReservationAPI.getMine(),
    BookingRequestAPI.getAll(),
    UserAPI.getAll().catch(() => []),
    TourListingAPI.getMine().catch(() => []),
  ])
    .then(([myReservations, allRequests, allUsers, myListings]) => {
      (allUsers || []).forEach(u => { if (u.username) _userCache[u.username] = u; });
      const asGuest = myReservations?.asGuest ?? [];
      const asHost  = myReservations?.asHost  ?? [];
      renderMeetups(asGuest);
      renderHostMeetups(asHost);
      renderMyListings(myListings ?? []);
      renderRequests(allRequests ?? []);
      initCountdownAndTakeover(asGuest);
    })
    .catch(() => showToast('Could not load data — check your connection.', 'error'));
</script>
</body>
</html>
