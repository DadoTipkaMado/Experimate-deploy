<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <title>Meets — Experimate</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <style>

    /* ── Segmented tab bar ── */
    .seg-tabs {
      display: flex; padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      gap: 6px; background: var(--bg); position: sticky; top: 0; z-index: 10;
    }
    .seg-tab {
      flex: 1; height: 36px; border-radius: var(--radius-pill);
      border: 1px solid var(--border-2); background: transparent;
      color: var(--text-3); font-family: var(--font-mono); font-size: 10px;
      letter-spacing: 0.07em; text-transform: uppercase; cursor: pointer;
      transition: all var(--t-fast); position: relative;
    }
    .seg-tab--active {
      background: var(--surface-2); border-color: var(--accent-border);
      color: var(--accent);
    }
    .seg-tab__badge {
      position: absolute; top: -4px; right: -4px;
      background: var(--accent); color: #000;
      border-radius: 10px; padding: 1px 5px;
      font-size: 8px; font-weight: 800; letter-spacing: 0;
    }

    /* ── Inline filter chips ── */
    .filter-chips-row {
      display: flex; gap: 6px; padding: 10px 16px 2px; flex-wrap: wrap;
    }
    .fchip {
      height: 28px; padding: 0 12px;
      border: 1px solid var(--border-2); border-radius: var(--radius-pill);
      background: transparent; color: var(--text-3);
      font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.07em;
      text-transform: uppercase; cursor: pointer;
      transition: all var(--t-fast);
    }
    .fchip--active {
      background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent);
    }
    .fchip-divider {
      width: 1px; background: var(--border-2); margin: 4px 2px; align-self: stretch;
    }

    /* ── Meet card (redesigned) ── */
    .meet-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      transition: border-color var(--t-fast);
    }
    .meet-card--upcoming { border-left: 3px solid var(--accent); }
    .meet-card--past { opacity: 0.6; }
    .meet-card__body {
      display: flex; align-items: center; gap: 12px; padding: 14px 14px 12px;
    }
    .meet-card__avatar {
      width: 46px; height: 46px; border-radius: 50%; flex-shrink: 0;
      background: var(--surface-2); border: 1px solid var(--border-2);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; font-family: var(--font-display); font-weight: 800;
    }
    .meet-card__avatar img { width: 100%; height: 100%; object-fit: cover; }
    .meet-card__info { flex: 1; min-width: 0; }
    .meet-card__name {
      font-family: var(--font-display); font-weight: 700; font-size: 14px;
      color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .meet-card__handle { font-size: 10px; color: var(--text-3); margin-top: 1px; }
    .meet-card__meta {
      display: flex; align-items: center; gap: 6px; margin-top: 6px; flex-wrap: wrap;
    }
    .meet-card__city {
      font-size: 11px; color: var(--text-2); display: flex; align-items: center; gap: 4px;
    }
    .meet-card__dot { width: 3px; height: 3px; border-radius: 50%; background: var(--border-2); }
    .meet-card__date { font-size: 11px; color: var(--text-3); }
    .meet-card__foot {
      display: flex; gap: 8px; padding: 0 14px 13px;
    }
    .meet-card__btn {
      flex: 1; height: 36px; border-radius: var(--radius-pill);
      font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.07em;
      text-transform: uppercase; cursor: pointer; border: 1px solid;
      transition: all var(--t-fast);
    }
    .meet-card__btn--primary { background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent); }
    .meet-card__btn--primary:hover { background: var(--accent); color: #000; }
    .meet-card__btn--ghost { background: transparent; border-color: var(--border-2); color: var(--text-3); }
    .meet-card__btn--ghost:hover { border-color: var(--border-3); color: var(--text-2); }
    .meet-card__btn--danger { background: transparent; border-color: rgba(255,80,80,0.2); color: rgba(255,100,100,0.7); }
    .meet-card__btn--danger:hover { border-color: rgba(255,80,80,0.5); color: rgba(255,100,100,1); }
    .meet-card__btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .badge--rated {
      font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--accent); padding: 0 12px; height: 36px; border-radius: var(--radius-pill);
      border: 1px solid var(--accent-border); background: var(--accent-dim);
      display: inline-flex; align-items: center;
    }

    /* ── Listing card ── */
    .listing-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
    }
    .listing-card--past { opacity: 0.6; }
    .listing-card__body { padding: 14px; }
    .listing-card__top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .listing-card__city {
      font-family: var(--font-display); font-weight: 700; font-size: 15px; color: var(--text);
    }
    .listing-card__badge {
      font-size: 9px; font-family: var(--font-mono); letter-spacing: 0.07em;
      text-transform: uppercase; padding: 3px 10px; border-radius: var(--radius-pill);
      flex-shrink: 0; margin-top: 2px;
    }
    .listing-card__badge--open { color: var(--text-3); border: 1px solid var(--border-2); background: transparent; }
    .listing-card__badge--booked { color: var(--accent); border: 1px solid var(--accent-border); background: var(--accent-dim); }
    .listing-card__date { font-size: 11px; color: var(--text-2); margin-top: 4px; }
    .listing-card__desc {
      font-size: 11px; color: var(--text-3); margin-top: 8px; line-height: 1.6;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .listing-card__foot { display: flex; gap: 8px; padding: 0 14px 13px; }

    /* ── Request card ── */
    .req-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
    }
    .req-card--pending { border-left: 3px solid #ff9944; }
    .req-card__body { display: flex; align-items: center; gap: 12px; padding: 14px; }
    .req-card__info { flex: 1; min-width: 0; }
    .req-card__name { font-family: var(--font-display); font-weight: 700; font-size: 14px; color: var(--text); }
    .req-card__meta { font-size: 10px; color: var(--text-3); margin-top: 2px; }
    .req-card__foot { display: flex; gap: 8px; padding: 0 14px 13px; }
    .req-btn {
      flex: 1; height: 38px; border-radius: var(--radius-pill);
      font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.07em; text-transform: uppercase;
      border: 1px solid; cursor: pointer; transition: all var(--t-fast);
    }
    .req-btn--accept { background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent); }
    .req-btn--accept:hover { background: var(--accent); color: #000; }
    .req-btn--decline { background: transparent; border-color: var(--border-2); color: var(--text-3); }
    .req-btn--decline:hover { border-color: rgba(255,80,80,0.3); color: rgba(255,80,80,0.7); }
    .req-status-badge {
      font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase;
      padding: 4px 12px; border-radius: var(--radius-pill);
    }
    .req-status-badge--accepted { background: var(--accent-dim); border: 1px solid var(--accent-border); color: var(--accent); }
    .req-status-badge--declined { background: rgba(255,80,80,0.08); border: 1px solid rgba(255,80,80,0.2); color: rgba(255,80,80,0.6); }

    /* ── Empty state ── */
    .meet-empty {
      display: flex; flex-direction: column; align-items: center;
      padding: 56px 24px; gap: 12px; text-align: center;
    }
    .meet-empty__icon {
      width: 60px; height: 60px; border-radius: 18px;
      background: var(--surface-2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center; color: var(--text-3);
    }
    .meet-empty__title { font-family: var(--font-display); font-weight: 700; font-size: 16px; color: var(--text-2); }
    .meet-empty__sub { font-size: 12px; color: var(--text-3); line-height: 1.65; max-width: 220px; }

    /* ── FAB ── */
    .fab {
      position: fixed; bottom: calc(var(--navbar-h) + 16px); right: 18px; z-index: 80;
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--accent); border: none; color: #000;
      font-size: 26px; line-height: 1; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(0,201,167,0.35);
      transition: transform var(--t-fast), box-shadow var(--t-fast);
    }
    .fab:hover { transform: scale(1.06); box-shadow: 0 6px 24px rgba(0,201,167,0.45); }
    .fab:active { transform: scale(0.96); }

    /* ── Tab content panels ── */
    .tab-panel { display: none; flex-direction: column; gap: 10px; padding: 14px 16px 100px; }
    .tab-panel--active { display: flex; }

    /* ── Meet detail sheet ── */
    .detail-backdrop {
      display: none; position: fixed; inset: 0; z-index: 400;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }
    .detail-backdrop--open { display: block; }
    .detail-sheet {
      position: fixed; bottom: -100%; left: 0; right: 0; z-index: 401;
      background: var(--surface); border-radius: 20px 20px 0 0;
      border: 1px solid var(--border-2); border-bottom: none;
      max-height: 85dvh; overflow-y: auto;
      transition: bottom 0.3s cubic-bezier(0.32,0.72,0,1);
      padding-bottom: calc(var(--navbar-h) + 16px);
    }
    .detail-sheet--open { bottom: 0; }
    .detail-sheet__handle { width: 36px; height: 3px; background: var(--border-2); border-radius: 2px; margin: 14px auto 0; }
    .detail-sheet__hero {
      display: flex; flex-direction: column; align-items: center;
      padding: 20px 20px 22px; gap: 6px; border-bottom: 1px solid var(--border);
    }
    .detail-sheet__avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--surface-2); overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-weight: 800;
      box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
    }
    .detail-sheet__avatar img { width: 100%; height: 100%; object-fit: cover; }
    .detail-sheet__name { font-family: var(--font-display); font-weight: 800; font-size: 20px; color: var(--text); }
    .detail-sheet__handle { font-size: 12px; color: var(--text-3); letter-spacing: 0.04em; margin-bottom: 6px; }
    .detail-sheet__body { padding: 16px 20px; display: flex; flex-direction: column; gap: 14px; }
    .detail-row { display: flex; align-items: flex-start; gap: 12px; }
    .detail-row__icon { width: 32px; height: 32px; border-radius: 9px; background: var(--surface-2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--text-3); flex-shrink: 0; margin-top: 1px; }
    .detail-row__label { font-size: 10px; color: var(--text-3); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 2px; }
    .detail-row__value { font-size: 14px; color: var(--text); line-height: 1.5; }
    .detail-sheet__foot { padding: 12px 20px 0; display: flex; flex-direction: column; gap: 8px; border-top: 1px solid var(--border); }

    /* ── Countdown bar ── */
    .countdown-bar {
      display: none; position: fixed; bottom: calc(var(--navbar-h)); left: 0; right: 0; z-index: 90;
      background: var(--accent); color: #000;
      padding: 10px 18px; gap: 8px;
      align-items: center; justify-content: space-between;
      font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.05em;
    }
    .countdown-bar--visible { display: flex; }
    .countdown-bar__timer { font-weight: 700; font-size: 15px; letter-spacing: 0.08em; flex-shrink: 0; }

    /* ── Active tour takeover ── */
    .tour-takeover {
      display: none; position: fixed; inset: 0; z-index: 600;
      background: var(--bg);
      flex-direction: column; align-items: center; justify-content: center;
      gap: 18px; padding: 40px 32px; text-align: center;
    }
    .tour-takeover--visible { display: flex; }
    .tour-takeover__pulse {
      width: 88px; height: 88px; border-radius: 50%;
      background: var(--accent-dim); border: 2px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; margin: 8px 0;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0,201,167,0.4); }
      50% { box-shadow: 0 0 0 16px rgba(0,201,167,0); }
    }

    /* ── Modals ── */
    .modal-backdrop {
      display: none; position: fixed; inset: 0; z-index: 700;
      background: rgba(0,0,0,0.75); align-items: flex-end; justify-content: center;
    }
    .modal-backdrop--visible { display: flex; }
    .modal-card {
      background: var(--surface); border: 1px solid var(--border-2);
      border-radius: 20px 20px 0 0; padding: 20px 20px 40px;
      width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 14px;
    }
    .modal-handle { width: 36px; height: 3px; background: var(--border-2); border-radius: 2px; margin: 0 auto 6px; }
    .modal-title { font-family: var(--font-display); font-weight: 700; font-size: 17px; color: var(--text); }
    .modal-sub { font-size: 12px; color: var(--text-3); line-height: 1.6; margin-top: -6px; }
    .modal-card textarea {
      background: var(--surface-2); border: 1px solid var(--border-2);
      border-radius: var(--radius-sm); padding: 13px 16px;
      color: var(--text); font-family: var(--font-body); font-size: 13px;
      width: 100%; box-sizing: border-box; resize: none; min-height: 90px; line-height: 1.65;
      transition: border-color var(--t-fast);
    }
    .modal-card textarea:focus { outline: none; border-color: var(--accent-border); }
    .modal-actions { display: flex; gap: 10px; }
    .modal-actions .btn { flex: 1; height: 46px; }

    /* ── Star picker ── */
    .star-picker { display: flex; gap: 8px; justify-content: center; padding: 8px 0; }
    .star-picker__star { font-size: 32px; cursor: pointer; opacity: 0.2; transition: opacity var(--t-fast), transform var(--t-fast); user-select: none; }
    .star-picker__star--active { opacity: 1; }
    .star-picker__star:hover { transform: scale(1.12); }

    /* ── Light mode ── */
    body.light-mode .meet-card__btn--danger { border-color: rgba(185,28,28,0.25); color: rgba(185,28,28,0.75); }
    body.light-mode .req-btn--decline:hover { border-color: rgba(185,28,28,0.35); color: rgba(185,28,28,0.78); }
    body.light-mode .req-status-badge--declined { background: rgba(185,28,28,0.08); border-color: rgba(185,28,28,0.22); color: rgba(185,28,28,0.80); }
  </style>
</head>
<body>
<div class="app-shell">

  <div th:replace="~{fragments/topbar :: topbar}"></div>

  <main class="page-content">

    <!-- ── Header ── -->
    <div style="padding:18px 18px 0; display:flex; align-items:center; justify-content:space-between;">
      <div>
        <div class="page-title" style="margin:0;">Meets</div>
        <div class="page-subtitle" style="margin:0;">Your days, your people</div>
      </div>
    </div>

    <!-- ── Segmented tabs ── -->
    <div class="seg-tabs">
      <button class="seg-tab seg-tab--active" id="tab-btn-meets"     onclick="switchMeetsTab('meets')">Meets</button>
      <button class="seg-tab"                 id="tab-btn-listings"  onclick="switchMeetsTab('listings')">Listings</button>
      <button class="seg-tab"                 id="tab-btn-requests"  onclick="switchMeetsTab('requests')">
        Requests
        <span class="seg-tab__badge" id="req-badge" style="display:none;"></span>
      </button>
    </div>

    <!-- ── MY MEETS ── -->
    <div class="tab-panel tab-panel--active" id="panel-meets">
      <!-- Inline filter chips -->
      <div class="filter-chips-row" id="meets-chips" style="padding-bottom:10px;">
        <button class="fchip fchip--active" id="fchip-joined"   onclick="setMeetFilter('role','joined')">Joined</button>
        <button class="fchip"              id="fchip-hosting"  onclick="setMeetFilter('role','hosting')">Hosting</button>
        <div class="fchip-divider"></div>
        <button class="fchip fchip--active" id="fchip-upcoming" onclick="setMeetFilter('timeframe','upcoming')">Upcoming</button>
        <button class="fchip"              id="fchip-past"     onclick="setMeetFilter('timeframe','past')">Past</button>
      </div>
      <div id="meets-list" style="display:flex;flex-direction:column;gap:10px;"></div>
    </div>

    <!-- ── MY LISTINGS ── -->
    <div class="tab-panel" id="panel-listings">
      <div id="listings-list" style="display:flex;flex-direction:column;gap:10px;"></div>
    </div>

    <!-- ── REQUESTS ── -->
    <div class="tab-panel" id="panel-requests">
      <div class="filter-chips-row" style="padding:0 0 10px;">
        <button class="fchip fchip--active" id="fchip-incoming" onclick="setReqFilter('flowDirection','incoming')">Incoming</button>
        <button class="fchip"              id="fchip-outgoing" onclick="setReqFilter('flowDirection','outgoing')">Outgoing</button>
        <div class="fchip-divider"></div>
        <button class="fchip fchip--active" id="fchip-pending"  onclick="setReqFilter('status','PENDING')">Pending</button>
        <button class="fchip"              id="fchip-declined" onclick="setReqFilter('status','DECLINED')">Declined</button>
      </div>
      <div id="requests-list" style="display:flex;flex-direction:column;gap:10px;"></div>
    </div>

  </main>

  <!-- ── FAB ── -->
  <a href="/listings/new" class="fab" title="New Meet">+</a>

  <div th:replace="~{fragments/navbar :: navbar}"></div>

</div>

<!-- ── MEET DETAIL SHEET ── -->
<div class="detail-backdrop" id="detail-backdrop" onclick="closeMeetDetail()"></div>
<div class="detail-sheet" id="detail-sheet">
  <div class="detail-sheet__handle"></div>
  <div class="detail-sheet__hero">
    <div class="detail-sheet__avatar" id="ds-avatar"></div>
    <div class="detail-sheet__name" id="ds-name"></div>
    <div class="detail-sheet__handle" id="ds-handle"></div>
  </div>
  <div class="detail-sheet__body">
    <div class="detail-row">
      <div class="detail-row__icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
      <div><div class="detail-row__label">Location</div><div class="detail-row__value" id="ds-city"></div></div>
    </div>
    <div class="detail-row">
      <div class="detail-row__icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
      <div><div class="detail-row__label">Date &amp; time</div><div class="detail-row__value" id="ds-date"></div></div>
    </div>
    <div class="detail-row">
      <div class="detail-row__icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></div>
      <div><div class="detail-row__label">About this meet</div><div class="detail-row__value" id="ds-desc" style="font-size:13px;color:var(--text-2);line-height:1.65;"></div></div>
    </div>
  </div>
  <div class="detail-sheet__foot" id="ds-foot"></div>
</div>

<!-- ── COUNTDOWN BAR ── -->
<div id="countdown-bar" class="countdown-bar">
  <span id="countdown-label"></span>
  <span id="countdown-timer" class="countdown-bar__timer"></span>
</div>

<!-- ── ACTIVE TOUR TAKEOVER ── -->
<div id="tour-takeover" class="tour-takeover">
  <div style="font-family:var(--font-display);font-weight:800;font-size:30px;color:var(--text);letter-spacing:-0.02em;">Day is live</div>
  <div class="tour-takeover__pulse">🤝</div>
  <div id="takeover-info" style="font-size:14px;color:var(--text-2);line-height:1.75;"></div>
  <div style="font-size:12px;color:var(--text-3);max-width:250px;line-height:1.65;margin-top:-4px;">Tap End Day when you're both done.</div>
  <button id="end-tour-btn" class="btn btn--primary" style="height:52px;padding:0 40px;font-size:14px;margin-top:12px;" onclick="endActiveTour()">End Day</button>
</div>

<!-- ── CANCEL MODAL ── -->
<div id="cancel-modal" class="modal-backdrop">
  <div class="modal-card">
    <div class="modal-handle"></div>
    <div class="modal-title">Cancel this meet?</div>
    <div class="modal-sub" style="color:rgba(255,160,60,0.9);">⚠️ Cancelling wastes your Mate's time. Repeated cancellations will result in account sanctions. Please explain why:</div>
    <textarea id="cancel-reason" placeholder="Reason for cancellation…" maxlength="300"></textarea>
    <div class="modal-actions">
      <button onclick="closeCancelModal()" class="btn btn--ghost">Keep it</button>
      <button onclick="confirmCancel()" class="btn btn--danger">Cancel day</button>
    </div>
  </div>
</div>

<!-- ── RATING MODAL ── -->
<div id="rating-modal" class="modal-backdrop">
  <div class="modal-card">
    <div class="modal-handle"></div>
    <div class="modal-title">Rate your Mate</div>
    <div class="modal-sub" id="rating-host-label" style="color:var(--text-2);margin-top:0;"></div>
    <div class="star-picker" id="star-picker">
      <span class="star-picker__star" data-val="1" onclick="setRating(1)">★</span>
      <span class="star-picker__star" data-val="2" onclick="setRating(2)">★</span>
      <span class="star-picker__star" data-val="3" onclick="setRating(3)">★</span>
      <span class="star-picker__star" data-val="4" onclick="setRating(4)">★</span>
      <span class="star-picker__star" data-val="5" onclick="setRating(5)">★</span>
    </div>
    <textarea id="rating-review" placeholder="Leave a review (optional)…" maxlength="500" style="min-height:80px;"></textarea>
    <div class="modal-actions">
      <button onclick="closeRatingModal()" class="btn btn--ghost">Cancel</button>
      <button onclick="submitRating()" class="btn btn--primary" id="rating-submit-btn">Submit</button>
    </div>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/api.js}"></script>
<script>
  let _userCache = {};
  let _activeTab = 'meets';
  let _loadedData = {};
  let _pages = {};
  let _meetDetails = {};

  let _meetFilter    = { role: 'joined', timeframe: 'upcoming' };
  let _reqFilter     = { flowDirection: 'incoming', status: 'PENDING' };

  const _M = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  /* ── Tab switching ── */
  function switchMeetsTab(tab) {
    _activeTab = tab;
    ['meets','listings','requests'].forEach(t => {
      document.getElementById('panel-' + t).classList.toggle('tab-panel--active', t === tab);
      document.getElementById('tab-btn-' + t).classList.toggle('seg-tab--active', t === tab);
    });
  }

  /* ── Inline chip filters ── */
  function setMeetFilter(key, value) {
    _meetFilter[key] = value;
    if (key === 'role') {
      document.getElementById('fchip-joined').classList.toggle('fchip--active', value === 'joined');
      document.getElementById('fchip-hosting').classList.toggle('fchip--active', value === 'hosting');
    } else {
      document.getElementById('fchip-upcoming').classList.toggle('fchip--active', value === 'upcoming');
      document.getElementById('fchip-past').classList.toggle('fchip--active', value === 'past');
    }
    renderMeets();
  }

  function setReqFilter(key, value) {
    _reqFilter[key] = value;
    if (key === 'flowDirection') {
      document.getElementById('fchip-incoming').classList.toggle('fchip--active', value === 'incoming');
      document.getElementById('fchip-outgoing').classList.toggle('fchip--active', value === 'outgoing');
    } else {
      document.getElementById('fchip-pending').classList.toggle('fchip--active', value === 'PENDING');
      document.getElementById('fchip-declined').classList.toggle('fchip--active', value === 'DECLINED');
    }
    renderRequests();
  }

  /* ── Avatar helper ── */
  function mkAvatar(username, user, size) {
    const sz = size || 46;
    const photoUrl = user?.profilePhotoUrl ? UserAPI.photoUrl(user.profilePhotoUrl) : null;
    const initials = user ? ((user.firstName?.[0] ?? '') + (user.lastName?.[0] ?? '')).toUpperCase() : (username?.[0] ?? '?').toUpperCase();
    const hue = (username ?? '').split('').reduce((a, c) => a + c.charCodeAt(0), 0) % 360;
    if (photoUrl) {
      return `<div class="meet-card__avatar" style="width:${sz}px;height:${sz}px;"><img src="${photoUrl}" alt="${initials}"></div>`;
    }
    return `<div class="meet-card__avatar" style="width:${sz}px;height:${sz}px;background:hsl(${hue},35%,22%);border-color:hsl(${hue},40%,32%);font-size:${Math.round(sz*0.37)}px;color:hsl(${hue},60%,72%);">${initials}</div>`;
  }

  /* ── Meet detail sheet ── */
  function openMeetDetail(id) {
    const d = _meetDetails[id];
    if (!d) return;
    const { res, isJoined, isPast } = d;
    const listing = res.tourListing;
    const person  = isJoined ? listing.host : res.guest;
    const username = person?.username ?? '';
    const name     = person ? person.firstName + ' ' + person.lastName : '?';
    const user     = _userCache[username];
    const date     = new Date(listing.meetingDate);
    const dateStr  = `${String(date.getDate()).padStart(2,'0')} ${_M[date.getMonth()]} ${date.getFullYear()} · ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;

    const avatarEl = document.getElementById('ds-avatar');
    const photoUrl = user?.profilePhotoUrl ? UserAPI.photoUrl(user.profilePhotoUrl) : null;
    const initials = ((person?.firstName?.[0] ?? '') + (person?.lastName?.[0] ?? '')).toUpperCase() || '?';
    const hue = username.split('').reduce((a, c) => a + c.charCodeAt(0), 0) % 360;
    if (photoUrl) {
      avatarEl.innerHTML = `<img src="${photoUrl}" alt="${initials}">`;
      avatarEl.style.cssText = '';
    } else {
      avatarEl.innerHTML = `<span style="font-size:26px;color:hsl(${hue},60%,72%);">${initials}</span>`;
      avatarEl.style.background = `hsl(${hue},35%,22%)`;
      avatarEl.style.boxShadow  = `0 0 0 2px var(--bg), 0 0 0 4px hsl(${hue},50%,45%)`;
    }

    document.getElementById('ds-name').textContent   = name;
    document.getElementById('ds-handle').textContent = '@' + username;
    document.getElementById('ds-city').textContent   = listing.city ?? '—';
    document.getElementById('ds-date').textContent   = dateStr;
    document.getElementById('ds-desc').textContent   =
      listing.tourDescription || '—';

    const foot = document.getElementById('ds-foot');
    const btnBase = 'width:100%;height:48px;font-size:12px;border-radius:var(--radius-pill);border:1px solid;cursor:pointer;font-family:var(--font-mono);letter-spacing:0.07em;text-transform:uppercase;transition:all var(--t-fast);';

    // Show on map button (always, if coords available)
    const lat = listing.lat ?? listing.latitude, lng = listing.lng ?? listing.longitude;
    const mapBtn = (lat && lng)
      ? `<button style="${btnBase}background:var(--surface-2);border-color:var(--border-2);color:var(--text-2);"
           onclick="showOnMap(${lat},${lng})">
           <span style="display:flex;align-items:center;justify-content:center;gap:6px;">
             <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>
             Show on map
           </span>
         </button>`
      : '';

    if (isPast && isJoined) {
      const alreadyRated = !!localStorage.getItem('rated_' + res.id);
      foot.innerHTML = mapBtn + (alreadyRated
        ? `<div class="badge--rated" style="align-self:center;margin:4px 0 8px;">Rated ✓</div>`
        : `<button style="${btnBase}background:var(--accent-dim);border-color:var(--accent-border);color:var(--accent);"
             data-res-id="${res.id}" data-host-username="${username}" data-host-name="${name}"
             onclick="closeMeetDetail();openRatingModal(this)">★ Rate your Mate</button>`);
    } else if (!isPast && isJoined) {
      foot.innerHTML = mapBtn + `<button style="${btnBase}background:transparent;border-color:rgba(255,80,80,0.25);color:rgba(255,100,100,0.8);"
        data-res-id="${res.id}" onclick="closeMeetDetail();openCancelModal(this)">Cancel meet</button>`;
    } else if (!isPast && !isJoined) {
      foot.innerHTML = mapBtn + `<button style="${btnBase}background:var(--accent-dim);border-color:var(--accent-border);color:var(--accent);"
        data-res-id="${res.id}" onclick="checkIn(this)">I'm here ✓</button>`;
    } else {
      foot.innerHTML = mapBtn;
    }

    document.getElementById('detail-backdrop').classList.add('detail-backdrop--open');
    document.getElementById('detail-sheet').classList.add('detail-sheet--open');
    document.body.style.overflow = 'hidden';
  }

  function closeMeetDetail() {
    document.getElementById('detail-backdrop').classList.remove('detail-backdrop--open');
    document.getElementById('detail-sheet').classList.remove('detail-sheet--open');
    document.body.style.overflow = '';
  }

  function showOnMap(lat, lng) {
    sessionStorage.setItem('mapFlyTo', JSON.stringify({ lat, lng, zoom: 16 }));
    window.location.href = '/map';
  }

  /* ── Empty state ── */
  function emptyState(icon, title, sub, cta) {
    return `<div class="meet-empty">
      <div class="meet-empty__icon">${icon}</div>
      <div class="meet-empty__title">${title}</div>
      <div class="meet-empty__sub">${sub}</div>
      ${cta || ''}
    </div>`;
  }

  /* ── Render Meets ── */
  let _cardListings = {};

  function renderMeets() {
    const el = document.getElementById('meets-list');
    const { role, timeframe } = _meetFilter;
    const isJoined = role === 'joined';
    const isPast   = timeframe === 'past';

    let items = isJoined
      ? (isPast ? _loadedData.joinedPast : _loadedData.joinedUpcoming)
      : (isPast ? _loadedData.hostedPast : _loadedData.hostedUpcoming);
    items = (items || []).filter(r => r.status !== 'CANCELLED');

    if (!items.length) {
      const icon = `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`;
      const msg = isPast
        ? (isJoined ? 'No past meets yet.' : 'No past hosted meets yet.')
        : (isJoined ? 'No upcoming meets.' : 'No upcoming Mates.');
      const cta = !isPast && isJoined
        ? `<a href="/map" class="btn btn--ghost" style="height:38px;padding:0 20px;font-size:12px;margin-top:4px;">Browse the map →</a>`
        : '';
      el.innerHTML = emptyState(icon, msg, isJoined ? 'Join a meet from the map or Explore tab.' : 'Create a listing to start hosting.', cta);
      return;
    }

    el.innerHTML = items.map((res, i) => {
      const d = new Date(res.tourListing.meetingDate);
      const dateStr = `${String(d.getDate()).padStart(2,'0')} ${_M[d.getMonth()]} · ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      _cardListings[res.id] = { listing: res.tourListing, isOwn: !isJoined, reserved: true };
      _meetDetails[res.id]  = { res, isJoined, isPast };

      if (isJoined) {
        const host = res.tourListing.host;
        const hostUsername = host?.username ?? '';
        const hostName = host ? host.firstName + ' ' + host.lastName : '?';
        const alreadyRated = !!localStorage.getItem('rated_' + res.id);
        const foot = isPast
          ? (alreadyRated
              ? `<div class="meet-card__foot"><div class="badge--rated">Rated ✓</div></div>`
              : `<div class="meet-card__foot"><button class="meet-card__btn meet-card__btn--primary" data-res-id="${res.id}" data-host-username="${hostUsername}" data-host-name="${hostName}" onclick="openRatingModal(this)">★ Rate your Mate</button></div>`)
          : `<div class="meet-card__foot"><button class="meet-card__btn meet-card__btn--danger" data-res-id="${res.id}" onclick="openCancelModal(this)">Cancel</button></div>`;
        return `
          <div class="meet-card${isPast ? ' meet-card--past' : ' meet-card--upcoming'} anim-fade-up" style="animation-delay:${i*0.04}s">
            <div class="meet-card__body" style="cursor:pointer;" onclick="openMeetDetail(${res.id})">
              ${mkAvatar(hostUsername, _userCache[hostUsername])}
              <div class="meet-card__info">
                <div class="meet-card__name">${hostName}</div>
                <div class="meet-card__handle">@${hostUsername}</div>
                <div class="meet-card__meta">
                  <span class="meet-card__city"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${res.tourListing.city}</span>
                  <div class="meet-card__dot"></div>
                  <span class="meet-card__date">${dateStr}</span>
                </div>
              </div>
            </div>
            ${foot}
          </div>`;
      } else {
        const guest = res.guest;
        const guestUsername = guest?.username ?? '';
        const guestName = guest ? guest.firstName + ' ' + guest.lastName : '?';
        return `
          <div class="meet-card${isPast ? ' meet-card--past' : ' meet-card--upcoming'} anim-fade-up" style="animation-delay:${i*0.04}s">
            <div class="meet-card__body" style="cursor:pointer;" onclick="openMeetDetail(${res.id})">
              ${mkAvatar(guestUsername, _userCache[guestUsername])}
              <div class="meet-card__info">
                <div class="meet-card__name">${guestName}</div>
                <div class="meet-card__handle">@${guestUsername}</div>
                <div class="meet-card__meta">
                  <span class="meet-card__city"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${res.tourListing.city}</span>
                  <div class="meet-card__dot"></div>
                  <span class="meet-card__date">${dateStr}</span>
                </div>
              </div>
            </div>
            ${isPast ? '' : `<div class="meet-card__foot"><button class="meet-card__btn meet-card__btn--primary" data-res-id="${res.id}" onclick="checkIn(this)">I'm here ✓</button></div>`}
          </div>`;
      }
    }).join('');
  }

  /* ── Render Listings ── */
  function renderListings() {
    const el = document.getElementById('listings-list');
    const items = _loadedData.myListings || [];
    if (!items.length) {
      const icon = `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;
      el.innerHTML = emptyState(icon, 'No listings yet', 'Create a listing to host your first Meet Day.',
        `<a href="/listings/new" class="btn btn--primary" style="height:38px;padding:0 20px;font-size:12px;margin-top:4px;">+ New Meet</a>`);
      return;
    }
    const now = new Date();
    el.innerHTML = items.map((l, i) => {
      const d = new Date(l.meetingDate);
      const isPast = d < now;
      const isFull = (l.currentGuestCount ?? 0) >= (l.maxGuests ?? 1);
      const badgeCls = isFull ? 'listing-card__badge--booked' : 'listing-card__badge--open';
      const badgeLabel = isPast ? 'Past' : (isFull ? 'Booked' : 'Open');
      const foot = isPast
        ? `<div class="listing-card__foot"><button class="meet-card__btn meet-card__btn--ghost" style="font-size:10px;" onclick="_redoListing(${l.id})">Re-do this meet</button></div>`
        : '';
      return `
        <div class="listing-card${isPast ? ' listing-card--past' : ''} anim-fade-up" style="animation-delay:${i*0.04}s">
          <div class="listing-card__body">
            <div class="listing-card__top">
              <div class="listing-card__city">${l.city}</div>
              <span class="listing-card__badge ${badgeCls}">${badgeLabel}</span>
            </div>
            <div class="listing-card__date">${String(d.getDate()).padStart(2,'0')} ${_M[d.getMonth()]} ${d.getFullYear()} · ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}</div>
            ${l.tourDescription ? `<div class="listing-card__desc">${escapeHtml(l.tourDescription)}</div>` : ''}
          </div>
          ${foot}
        </div>`;
    }).join('');
  }

  function _redoListing(listingId) {
    const l = (_loadedData.myListings || []).find(x => x.id === listingId);
    if (!l) return;
    sessionStorage.setItem('redo_listing', JSON.stringify({ city: l.city, tourDescription: l.tourDescription || '', lat: l.lat, lng: l.lng, maxGuests: l.maxGuests || 1 }));
    window.location.href = '/listings/new';
  }

  /* ── Render Requests ── */
  function renderRequests() {
    const el = document.getElementById('requests-list');
    const { flowDirection, status } = _reqFilter;
    const isIncoming = flowDirection === 'incoming';
    const items = isIncoming
      ? (status === 'PENDING' ? _loadedData.incomingPending : _loadedData.incomingDeclined)
      : (status === 'PENDING' ? _loadedData.outgoingPending : _loadedData.outgoingDeclined);

    const count = (_loadedData.incomingPending || []).length;
    const badge = document.getElementById('req-badge');
    if (count > 0) { badge.textContent = count; badge.style.display = ''; }
    else badge.style.display = 'none';

    if (!(items || []).length) {
      const icon = `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`;
      const msg = `No ${status.toLowerCase()} ${isIncoming ? 'incoming' : 'outgoing'} requests`;
      el.innerHTML = emptyState(icon, msg, isIncoming ? 'When someone requests your listing, it\'ll appear here.' : 'Requests you\'ve sent will appear here.');
      return;
    }

    el.innerHTML = (items || []).map((r, i) => {
      const isInc = isIncoming;
      const person = isInc ? r.user : r.tourListing?.host;
      const username = person?.username ?? '';
      const name = person ? person.firstName + ' ' + person.lastName : '?';
      const city = r.tourListing?.city ?? '';
      const date = r.tourListing?.meetingDate ? `${String(new Date(r.tourListing.meetingDate).getDate()).padStart(2,'0')} ${_M[new Date(r.tourListing.meetingDate).getMonth()]}` : '';
      const foot = isInc && r.status === 'PENDING'
        ? `<div class="req-card__foot">
             <button class="req-btn req-btn--accept" onclick="handleRequest('accept',${r.id},this)">Accept</button>
             <button class="req-btn req-btn--decline" onclick="handleRequest('decline',${r.id},this)">Decline</button>
           </div>`
        : `<div class="req-card__foot"><span class="req-status-badge req-status-badge--${r.status.toLowerCase()}">${r.status}</span></div>`;
      return `
        <div class="req-card${r.status === 'PENDING' ? ' req-card--pending' : ''} anim-fade-up" style="animation-delay:${i*0.04}s" id="req-${r.id}">
          <div class="req-card__body">
            ${mkAvatar(username, _userCache[username], 44)}
            <div class="req-card__info">
              <div class="req-card__name">${name}</div>
              <div class="req-card__meta">@${username}${city ? ' · ' + city : ''}${date ? ' · ' + date : ''}</div>
            </div>
          </div>
          ${foot}
        </div>`;
    }).join('');
  }

  async function handleRequest(action, id, btn) {
    btn.disabled = true;
    try {
      if (action === 'accept') {
        await BookingRequestAPI.accept(id);
        document.getElementById(`req-${id}`)?.remove();
        showToast('Request accepted!', 'success');
      } else {
        await BookingRequestAPI.decline(id);
        document.getElementById(`req-${id}`)?.remove();
        showToast('Request declined.', 'default');
      }
      const remaining = document.querySelectorAll('.req-btn--accept').length;
      const badge = document.getElementById('req-badge');
      if (remaining === 0) badge.style.display = 'none';
      else badge.textContent = remaining;
    } catch(err) {
      if (action === 'accept' && err.message?.toLowerCase().includes('already booked')) {
        try { await BookingRequestAPI.decline(id); } catch(_) {}
        document.getElementById(`req-${id}`)?.remove();
        showToast('This Mate already has a meet on that date — request removed.', 'default');
      } else {
        btn.disabled = false;
        showToast(err.message || 'Could not process request.', 'error');
      }
    }
  }

  /* ── Countdown + Takeover ── */
  let _countdownInterval = null;
  let _activeTourResId   = null;

  function initCountdownAndTakeover(joinedUpcoming) {
    if (!Auth.getToken()) return;
    const stored = localStorage.getItem('activeTour');
    if (stored) {
      try { const active = JSON.parse(stored); _activeTourResId = active.resId; showTakeover(active); return; }
      catch(e) { localStorage.removeItem('activeTour'); }
    }
    const now = new Date();
    const ONE_HOUR = 60 * 60 * 1000;
    const soon = (joinedUpcoming || [])
      .filter(r => r.status !== 'CANCELLED')
      .filter(r => { const diff = new Date(r.tourListing.meetingDate) - now; return diff > 0 && diff <= ONE_HOUR; })
      .sort((a, b) => new Date(a.tourListing.meetingDate) - new Date(b.tourListing.meetingDate));
    if (!soon.length) return;
    const next = soon[0];
    const meetTime = new Date(next.tourListing.meetingDate);
    const hostName = next.tourListing.host ? next.tourListing.host.firstName + ' ' + next.tourListing.host.lastName : 'your Mate';
    document.getElementById('countdown-label').textContent = `${next.tourListing.city} · ${hostName} in`;
    document.getElementById('countdown-bar').classList.add('countdown-bar--visible');
    function tick() {
      const rem = meetTime - new Date();
      if (rem <= 0) { clearInterval(_countdownInterval); document.getElementById('countdown-bar').classList.remove('countdown-bar--visible'); return; }
      const s = Math.floor(rem / 1000);
      const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), ss = s % 60;
      document.getElementById('countdown-timer').textContent = h > 0
        ? `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`
        : `${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
    }
    tick(); _countdownInterval = setInterval(tick, 1000);
  }

  function showTakeover(active) {
    document.getElementById('takeover-info').innerHTML = `<strong style="color:var(--text);">${active.city}</strong><br>with ${active.hostName}`;
    document.getElementById('tour-takeover').classList.add('tour-takeover--visible');
  }

  function endActiveTour() {
    const btn = document.getElementById('end-tour-btn');
    btn.disabled = true; btn.textContent = 'Ending…';
    ReservationAPI.endTour(_activeTourResId)
      .then(() => {
        localStorage.removeItem('activeTour');
        document.getElementById('tour-takeover').classList.remove('tour-takeover--visible');
        showToast('Meet ended! Rate your Mate below.', 'success');
        setTimeout(() => window.location.reload(), 1200);
      })
      .catch(err => { btn.disabled = false; btn.textContent = 'End Day'; showToast(err.message || 'Could not end day — try again.', 'error'); });
  }

  /* ── Check-in ── */
  function checkIn(btn) {
    const resId = parseInt(btn.dataset.resId, 10);
    btn.disabled = true; btn.textContent = '…';
    ReservationAPI.checkIn(resId)
      .then(res => {
        if (res.guestCheckedIn && res.hostCheckedIn) {
          const card = btn.closest('.meet-card');
          const city = card?.querySelector('.meet-card__city')?.textContent?.trim() || '';
          const hostName = card?.querySelector('.meet-card__name')?.textContent?.trim() || 'your Mate';
          const active = { resId, city, hostName };
          localStorage.setItem('activeTour', JSON.stringify(active));
          _activeTourResId = resId;
          showTakeover(active);
          showToast('Both checked in — day is live!', 'success');
        } else {
          btn.textContent = 'Waiting…';
          showToast('Checked in! Waiting for your Mate.', 'success');
        }
      })
      .catch(err => { btn.disabled = false; btn.textContent = "I'm here ✓"; showToast(err.message || 'Check-in failed.', 'error'); });
  }

  /* ── Cancel modal ── */
  let _cancelResId = null, _cancelBtn = null;

  function openCancelModal(btn) {
    _cancelResId = parseInt(btn.dataset.resId, 10); _cancelBtn = btn;
    document.getElementById('cancel-reason').value = '';
    document.getElementById('cancel-modal').classList.add('modal-backdrop--visible');
  }
  function closeCancelModal() {
    document.getElementById('cancel-modal').classList.remove('modal-backdrop--visible');
    _cancelResId = null; _cancelBtn = null;
  }
  function confirmCancel() {
    const reason = document.getElementById('cancel-reason').value.trim();
    if (!reason) { showToast('Please provide a reason.'); return; }
    if (_cancelBtn) _cancelBtn.disabled = true;
    ReservationAPI.cancelTour(_cancelResId)
      .then(() => { _cancelBtn.closest('.meet-card').remove(); closeCancelModal(); showToast('Reservation cancelled.', 'success'); })
      .catch(err => { if (_cancelBtn) _cancelBtn.disabled = false; closeCancelModal(); showToast(err.message || 'Could not cancel — try again.', 'error'); });
  }
  document.getElementById('cancel-modal').addEventListener('click', function(e) { if (e.target === this) closeCancelModal(); });

  /* ── Rating modal ── */
  let _ratingResId = null, _ratingHostUsername = null, _ratingBtn = null, _ratingScore = 0;

  function openRatingModal(btn) {
    _ratingResId = parseInt(btn.dataset.resId, 10);
    _ratingHostUsername = btn.dataset.hostUsername;
    _ratingBtn = btn; _ratingScore = 0;
    document.getElementById('rating-review').value = '';
    document.getElementById('rating-host-label').textContent = btn.dataset.hostName || _ratingHostUsername;
    setRating(0);
    document.getElementById('rating-modal').classList.add('modal-backdrop--visible');
  }
  function closeRatingModal() {
    document.getElementById('rating-modal').classList.remove('modal-backdrop--visible');
    _ratingResId = null; _ratingHostUsername = null; _ratingBtn = null; _ratingScore = 0;
  }
  function setRating(val) {
    _ratingScore = val;
    document.querySelectorAll('.star-picker__star').forEach(s => s.classList.toggle('star-picker__star--active', parseInt(s.dataset.val) <= val));
  }
  async function submitRating() {
    if (_ratingScore === 0) { showToast('Please select a star rating.', 'warn'); return; }
    const submitBtn = document.getElementById('rating-submit-btn');
    submitBtn.disabled = true; submitBtn.textContent = 'Submitting…';
    try {
      const users = await UserAPI.getAll();
      const host  = users.find(u => u.username === _ratingHostUsername);
      if (!host) throw new Error('Host not found.');
      await RatingAPI.create({ ratedId: host.id, score: _ratingScore, review: document.getElementById('rating-review').value.trim() || null });
      localStorage.setItem('rated_' + _ratingResId, '1');
      if (_ratingBtn) _ratingBtn.outerHTML = `<div class="badge--rated">Rated ✓</div>`;
      showToast('Rating submitted!', 'success');
      closeRatingModal();
    } catch(e) {
      showToast(e.message || 'Could not submit rating — try again.', 'error');
    } finally {
      submitBtn.disabled = false; submitBtn.textContent = 'Submit';
    }
  }
  document.getElementById('rating-modal').addEventListener('click', function(e) { if (e.target === this) closeRatingModal(); });

  /* ── Auto-switch tab from sessionStorage ── */
  (function() {
    const tab = sessionStorage.getItem('openTab');
    if (tab && ['meets','listings','requests'].includes(tab)) {
      sessionStorage.removeItem('openTab');
      switchMeetsTab(tab);
    }
  })();

  /* ── Load all data ── */
  const _empty = { content: [], last: true };
  Promise.all([
    ReservationAPI.getMine({ filter: 'joined',  timeframe: 'upcoming' }).catch(() => _empty),
    ReservationAPI.getMine({ filter: 'joined',  timeframe: 'past'     }).catch(() => _empty),
    ReservationAPI.getMine({ filter: 'hosted',  timeframe: 'upcoming' }).catch(() => _empty),
    ReservationAPI.getMine({ filter: 'hosted',  timeframe: 'past'     }).catch(() => _empty),
    BookingRequestAPI.getMine({ status: 'PENDING'  }).catch(() => _empty),
    BookingRequestAPI.getMine({ status: 'DECLINED' }).catch(() => _empty),
    BookingRequestAPI.getMine({ flowDirection: 'outgoing', status: 'PENDING'  }).catch(() => _empty),
    BookingRequestAPI.getMine({ flowDirection: 'outgoing', status: 'DECLINED' }).catch(() => _empty),
    UserAPI.getAll().catch(() => []),
    TourListingAPI.getMine({ size: 1000, direction: 'DESC' }).catch(() => []),
  ]).then(([juP, jpP, huP, hpP, ipP, idP, opP, odP, allUsers, myListings]) => {
    (allUsers || []).forEach(u => { if (u.username) _userCache[u.username] = u; });
    const toArr = r => Array.isArray(r) ? r : (r?.content ?? []);
    _loadedData = {
      joinedUpcoming:   toArr(juP),
      joinedPast:       toArr(jpP),
      hostedUpcoming:   toArr(huP),
      hostedPast:       toArr(hpP),
      incomingPending:  toArr(ipP),
      incomingDeclined: toArr(idP),
      outgoingPending:  toArr(opP),
      outgoingDeclined: toArr(odP),
      myListings:       toArr(myListings),
    };
    renderMeets();
    renderListings();
    renderRequests();
    initCountdownAndTakeover(_loadedData.joinedUpcoming);
  }).catch(() => showToast('Could not load data — check your connection.', 'error'));
</script>
</body>
</html>
