<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <title>New Tour — Experimate</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    .new-listing-header { padding: 22px 18px 18px; border-bottom: 1px solid var(--border); }
    .new-listing-form { display: flex; flex-direction: column; gap: 18px; padding: 20px 18px 40px; }
    .form-field { display: flex; flex-direction: column; gap: 7px; }
    .form-field label { font-size: 10px; color: var(--text-2); letter-spacing: 0.08em; text-transform: uppercase; }
    .form-field input, .form-field textarea {
      background: var(--surface); border: 1px solid var(--border-2);
      border-radius: var(--radius-sm); padding: 13px 16px;
      color: var(--text); font-family: var(--font-mono); font-size: 13px;
      width: 100%; box-sizing: border-box;
      transition: border-color var(--t-fast), box-shadow var(--t-fast);
    }
    .form-field input:focus, .form-field textarea:focus {
      outline: none; border-color: var(--accent-border);
      box-shadow: 0 0 0 3px rgba(0,201,167,0.08);
    }
    .form-field input.input--error { border-color: rgba(255,80,80,0.5); }
    .form-field textarea { resize: vertical; min-height: 140px; line-height: 1.65; }
    .form-field__hint { font-size: 9px; color: var(--text-3); letter-spacing: 0.04em; }
    .form-field__error { font-size: 9px; color: rgba(255,100,100,0.85); letter-spacing: 0.04em; display: none; }
    .form-field__error--visible { display: block; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-error {
      background: rgba(255,80,80,0.08); border: 1px solid rgba(255,80,80,0.2);
      border-radius: var(--radius-sm); padding: 10px 14px;
      font-size: 11px; color: rgba(255,100,100,0.9);
    }
    .form-actions { display: flex; gap: 10px; }
    .form-actions .btn { flex: 1; height: 46px; }

    /* Location picker */
    .location-search-wrap { position: relative; }
    #location-search::placeholder { color: var(--text-3); }
    #location-suggestions {
      position: absolute; top: 100%; left: 0; right: 0; z-index: 200;
      background: var(--surface-2); border: 1px solid var(--border-2);
      border-top: none; border-radius: 0 0 var(--radius-sm) var(--radius-sm);
      display: none; max-height: 220px; overflow-y: auto;
    }
    .location-suggestion {
      padding: 10px 14px; font-size: 11px; color: var(--text-2);
      cursor: pointer; border-bottom: 1px solid var(--border); line-height: 1.4;
      transition: background var(--t-fast);
    }
    .location-suggestion:last-child { border-bottom: none; }
    .location-suggestion:hover, .location-suggestion--active { background: var(--surface); color: var(--text); }
    .location-suggestion__name { font-weight: 600; color: var(--text); }
    .location-suggestion__sub { font-size: 10px; color: var(--text-3); margin-top: 1px; }
    #location-map {
      height: 180px; border-radius: var(--radius-sm); margin-top: 8px;
      border: 1px solid var(--accent-border); overflow: hidden; display: none;
    }
    .leaflet-container { background: #0a0a0a; }
    .leaflet-control-attribution { display: none; }
    .location-status {
      font-size: 9px; color: var(--text-3); letter-spacing: 0.04em;
      display: flex; align-items: center; gap: 6px; margin-top: 4px;
    }
    .location-status__dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text-3); flex-shrink: 0;
      transition: background var(--t-fast);
    }
    .location-status--set .location-status__dot { background: var(--accent); box-shadow: 0 0 4px var(--accent); }
    .location-status--set { color: var(--accent); }
  </style>
</head>
<body>
<div class="app-shell">

  <div th:replace="~{fragments/topbar :: topbar}"></div>

  <main class="page-content">
    <div class="new-listing-header">
      <div class="page-title">New Tour</div>
      <div class="page-subtitle">Create an experience with a Mate</div>
    </div>

    <form id="listing-form" class="new-listing-form">

      <div id="form-error" class="form-error" style="display:none;"></div>

      <div class="form-field">
        <label for="city">City</label>
        <input type="text" id="city" name="city" placeholder="e.g. Zagreb" required>
        <span class="form-field__error" id="city-error">Please enter a city name.</span>
      </div>

      <!-- Separate date and time inputs -->
      <div class="form-row">
        <div class="form-field">
          <label for="meetingDateInput">Meeting date</label>
          <input type="text" id="meetingDateInput" placeholder="DD/MM/YYYY"
                 data-date-format="date" autocomplete="off" required>
          <span class="form-field__error" id="date-error">Date must be today or in the future.</span>
          <span class="form-field__hint">Format: DD/MM/YYYY</span>
        </div>
        <div class="form-field">
          <label for="meetingTimeInput">Meeting time</label>
          <input type="text" id="meetingTimeInput" placeholder="HH:MM" autocomplete="off" required>
          <span class="form-field__hint">24-hour clock</span>
        </div>
      </div>
      <!-- Hidden combined field sent to server -->
      <input type="hidden" id="meetingDate" name="meetingDate">

      <div class="form-field">
        <label for="tourDescription">Description</label>
        <textarea id="tourDescription" name="tourDescription"
                  placeholder="Describe the experience — what will guests see, do, and feel?"
                  required minlength="200" maxlength="2000"
                  oninput="(function(n){var el=document.getElementById('desc-counter');el.textContent=n+'/2000';el.style.color=n===0?'var(--text-3)':n>=200?'var(--accent)':'rgba(255,80,80,0.7)';})(this.value.length)"></textarea>
        <div style="display:flex;justify-content:space-between;">
          <span class="form-field__hint">Min 200 characters — describe to Mates what they'll see, do, and experience</span>
          <span class="form-field__hint" id="desc-counter" style="color:var(--text-3);">0/2000</span>
        </div>
      </div>

      <!-- Location search picker -->
      <div class="form-field">
        <label>Meeting location <span style="color:rgba(255,80,80,0.7);">*</span></label>
        <div class="location-search-wrap">
          <input type="text" id="location-search" autocomplete="off"
                 placeholder="Search address, landmark, or neighbourhood…">
          <div id="location-suggestions"></div>
        </div>
        <span class="form-field__error" id="location-error">Please select a meeting location.</span>
        <div id="location-map"></div>
        <div class="location-status" id="location-status">
          <div class="location-status__dot"></div>
          <span id="location-status-text">Search and select a location above</span>
        </div>
      </div>
      <input type="hidden" id="listingLat">
      <input type="hidden" id="listingLng">

      <div class="form-actions">
        <a href="/tours" class="btn btn--ghost">Cancel</a>
        <button type="submit" class="btn btn--primary">Publish</button>
      </div>

    </form>
  </main>

  <div th:replace="~{fragments/navbar :: navbar}"></div>

</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/api.js}"></script>
<script>
  /* ── CITY VALIDATION ── */
  const cityInput = document.getElementById('city');
  const cityError = document.getElementById('city-error');
  cityInput.addEventListener('blur', () => {
    if (!cityInput.value.trim()) {
      cityInput.classList.add('input--error');
      cityError.classList.add('form-field__error--visible');
    } else {
      cityInput.classList.remove('input--error');
      cityError.classList.remove('form-field__error--visible');
    }
  });
  cityInput.addEventListener('input', () => {
    cityInput.classList.remove('input--error');
    cityError.classList.remove('form-field__error--visible');
  });

  /* ── DATE VALIDATION ── */
  const meetingDateInput = document.getElementById('meetingDateInput');
  const meetingTimeInput = document.getElementById('meetingTimeInput');
  const dateError        = document.getElementById('date-error');

  meetingDateInput.addEventListener('blur', () => {
    const val = meetingDateInput.value.trim();
    if (!val) return;
    const parts = val.split('/');
    if (parts.length !== 3 || parts[2].length !== 4) return;
    const date = new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
    const today = new Date(); today.setHours(0, 0, 0, 0);
    if (date < today) {
      meetingDateInput.value = '';
      meetingDateInput.classList.add('input--error');
      dateError.classList.add('form-field__error--visible');
      showToast('Meeting date must be today or in the future.');
    } else {
      meetingDateInput.classList.remove('input--error');
      dateError.classList.remove('form-field__error--visible');
    }
  });

  meetingDateInput.addEventListener('input', () => {
    meetingDateInput.classList.remove('input--error');
    dateError.classList.remove('form-field__error--visible');
  });

  /* ── TIME AUTO-FORMAT HH:MM ── */
  meetingTimeInput.addEventListener('keydown', e => {
    if (['Backspace','Delete','Tab','ArrowLeft','ArrowRight'].includes(e.key)) return;
    if (!/^\d$/.test(e.key)) { e.preventDefault(); return; }
  });
  meetingTimeInput.addEventListener('input', () => {
    let digits = meetingTimeInput.value.replace(/\D/g, '');
    if (digits.length > 4) digits = digits.slice(0, 4);
    meetingTimeInput.value = digits.length > 2
      ? digits.slice(0, 2) + ':' + digits.slice(2)
      : digits;
  });

  /* ── LOCATION SEARCH (Nominatim) ── */
  const locationSearch  = document.getElementById('location-search');
  const suggestionsEl   = document.getElementById('location-suggestions');
  const locationMapEl   = document.getElementById('location-map');
  const statusEl        = document.getElementById('location-status');
  const statusText      = document.getElementById('location-status-text');
  const locationError   = document.getElementById('location-error');
  let locationMap = null, locationMarker = null, searchTimer = null;

  function setLocation(lat, lng, label) {
    document.getElementById('listingLat').value = lat.toFixed(6);
    document.getElementById('listingLng').value = lng.toFixed(6);
    locationSearch.value = label;
    suggestionsEl.style.display = 'none';
    statusEl.classList.add('location-status--set');
    statusText.textContent = label;
    locationError.classList.remove('form-field__error--visible');

    // Show map preview
    locationMapEl.style.display = 'block';
    if (!locationMap) {
      locationMap = L.map('location-map', { zoomControl: false, attributionControl: false });
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(locationMap);
    }
    locationMap.setView([lat, lng], 15);
    if (locationMarker) {
      locationMarker.setLatLng([lat, lng]);
    } else {
      locationMarker = L.circleMarker([lat, lng], {
        radius: 8, color: '#00c9a7', fillColor: '#00c9a7', fillOpacity: 0.7, weight: 2,
      }).addTo(locationMap);
    }
    // Auto-fill city if blank
    const cityField = document.getElementById('city');
    if (!cityField.value.trim() && label) {
      const firstPart = label.split(',')[0].trim();
      cityField.value = firstPart;
    }
  }

  function clearLocation() {
    document.getElementById('listingLat').value = '';
    document.getElementById('listingLng').value = '';
    statusEl.classList.remove('location-status--set');
    statusText.textContent = 'Search and select a location above';
    locationMapEl.style.display = 'none';
  }

  async function searchLocation(query) {
    if (query.length < 3) { suggestionsEl.style.display = 'none'; return; }
    try {
      const res = await fetch(
        `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=5&addressdetails=1`,
        { headers: { 'Accept-Language': 'en' } }
      );
      const results = await res.json();
      if (!results.length) { suggestionsEl.style.display = 'none'; return; }

      suggestionsEl.innerHTML = results.map((r, i) => {
        const name = r.name || r.display_name.split(',')[0];
        const sub  = r.display_name.replace(name + ', ', '').slice(0, 60);
        return `<div class="location-suggestion" data-lat="${r.lat}" data-lon="${r.lon}" data-label="${r.display_name.split(',').slice(0,2).join(',').trim()}" onclick="pickSuggestion(this)">
          <div class="location-suggestion__name">${name}</div>
          <div class="location-suggestion__sub">${sub}</div>
        </div>`;
      }).join('');
      suggestionsEl.style.display = 'block';
    } catch(e) { suggestionsEl.style.display = 'none'; }
  }

  function pickSuggestion(el) {
    setLocation(parseFloat(el.dataset.lat), parseFloat(el.dataset.lon), el.dataset.label);
  }

  locationSearch.addEventListener('input', () => {
    clearTimeout(searchTimer);
    clearLocation();
    const q = locationSearch.value.trim();
    if (!q) { suggestionsEl.style.display = 'none'; return; }
    searchTimer = setTimeout(() => searchLocation(q), 500);
  });

  // Close suggestions on outside click
  document.addEventListener('click', e => {
    if (!e.target.closest('.location-search-wrap')) suggestionsEl.style.display = 'none';
  });

  /* ── SUBMIT → API ── */
  document.getElementById('listing-form').addEventListener('submit', async e => {
    e.preventDefault();
    const errorEl = document.getElementById('form-error');
    errorEl.style.display = 'none';

    if (!Auth.getToken()) { window.location.href = '/login'; return; }

    const dateVal = meetingDateInput.value.trim();
    const timeVal = meetingTimeInput.value.trim();
    if (!dateVal || !timeVal) { showToast('Please fill in both date and time.'); return; }
    if (!/^\d{2}:\d{2}$/.test(timeVal)) { showToast('Time must be in HH:MM format.'); return; }

    const dateParts = dateVal.split('/');
    if (dateParts.length !== 3 || dateParts[2].length !== 4 || dateParts.some(p => !p)) {
      showToast('Date must be in DD/MM/YYYY format.');
      meetingDateInput.focus();
      return;
    }

    const latVal = document.getElementById('listingLat').value;
    const lngVal = document.getElementById('listingLng').value;
    if (!latVal || !lngVal) {
      locationError.classList.add('form-field__error--visible');
      locationSearch.focus();
      showToast('Please select a meeting location.');
      return;
    }

    // Convert DD/MM/YYYY HH:MM → YYYY-MM-DDTHH:MM:00
    const [dd, mm, yyyy] = dateParts;
    const meetingDate = `${yyyy}-${mm}-${dd}T${timeVal}:00`;

    const btn = document.querySelector('#listing-form button[type="submit"]');
    btn.disabled = true; btn.textContent = 'Publishing...';
    try {
      await TourListingAPI.create({
        city:            document.getElementById('city').value,
        meetingDate,
        tourDescription: document.getElementById('tourDescription').value,
        latitude:  parseFloat(latVal),
        longitude: parseFloat(lngVal),
      });
      btn.textContent = 'Published ✓';
      showToast('Tour published!');
      setTimeout(() => window.location.href = '/tours', 800);
    } catch (err) {
      errorEl.textContent = err.message || 'Could not publish — please try again.';
      errorEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Publish';
    }
  });
</script>
</body>
</html>
