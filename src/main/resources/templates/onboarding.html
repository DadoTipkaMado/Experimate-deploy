<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <title>Your Vibe — ExperiMate</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800;900&family=DM+Mono:wght@300;400;500&display=swap">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:   #00c9a7;
      --warm:     #ff6b35;
      --bg:       #0a0a0a;
      --surface:  #141414;
      --border:   #222;
      --text:     #efefef;
      --text-2:   #9a9a9a;
      --text-3:   #505050;
      --font-d:   'Syne', sans-serif;
      --font-m:   'DM Mono', monospace;
      --t:        0.22s ease;
    }

    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: var(--font-m); overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Shell ── */
    .shell {
      height: 100dvh; display: flex; flex-direction: column;
      max-width: 480px; margin: 0 auto; position: relative; overflow: hidden;
    }

    /* ── Ambient orbs ── */
    .orb {
      position: fixed; border-radius: 50%; filter: blur(100px);
      pointer-events: none; z-index: 0;
    }
    .orb-1 { width: 500px; height: 500px; background: var(--accent); opacity: 0.04; top: -160px; left: -120px; }
    .orb-2 { width: 380px; height: 380px; background: var(--warm);   opacity: 0.04; bottom: -80px; right: -100px; }

    /* ── Progress bar ── */
    .progress-wrap {
      position: relative; z-index: 10; padding: 20px 24px 0; flex-shrink: 0;
      display: flex; align-items: center; gap: 14px;
      animation: fadeDown 0.4s cubic-bezier(0.32, 0.72, 0, 1) both;
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .q-instruction {
      position: relative; z-index: 10; padding: 14px 28px 0; flex-shrink: 0;
      font-size: 10px; color: var(--accent); opacity: 0.65; letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    .progress-bar {
      flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: var(--accent); border-radius: 2px;
      transition: width 0.4s cubic-bezier(0.32, 0.72, 0, 1);
      box-shadow: 0 0 10px rgba(0,201,167,0.5), 0 0 20px rgba(0,201,167,0.2);
    }
    .progress-label {
      font-size: 10px; color: var(--text-3); letter-spacing: 0.1em;
      white-space: nowrap; flex-shrink: 0;
    }
    .skip-btn {
      background: none; border: none; cursor: pointer; font-family: var(--font-m);
      font-size: 10px; color: var(--text-3); letter-spacing: 0.06em;
      padding: 4px; transition: color var(--t);
    }
    .skip-btn:hover { color: var(--text-2); }

    /* ── Question stage ── */
    .stage {
      flex: 1; position: relative; overflow: hidden; z-index: 1;
    }

    .q-card {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; justify-content: center;
      padding: 32px 28px 24px;
      transition: transform 0.38s cubic-bezier(0.32, 0.72, 0, 1),
                  opacity  0.28s ease;
    }
    .q-card--enter-right  { transform: translateX(100%); opacity: 0; }
    .q-card--enter-left   { transform: translateX(-100%); opacity: 0; }
    .q-card--active       { transform: translateX(0); opacity: 1; }
    .q-card--exit-left    { transform: translateX(-100%); opacity: 0; pointer-events: none; }
    .q-card--exit-right   { transform: translateX(100%); opacity: 0; pointer-events: none; }

    .q-prefix {
      font-size: 10px; color: var(--text-3); letter-spacing: 0.14em;
      text-transform: uppercase; margin-bottom: 16px;
    }
    .q-text {
      font-family: var(--font-d); font-weight: 800;
      font-size: clamp(24px, 6.5vw, 34px);
      line-height: 1.12; letter-spacing: -0.025em;
      color: var(--text); margin-bottom: 40px;
    }
    .q-text em { font-style: normal; color: var(--accent); }

    /* ── Scale buttons ── */
    .scale {
      display: flex; flex-direction: column; gap: 9px;
    }
    .scale-btn {
      display: flex; align-items: center; gap: 14px;
      padding: 13px 16px; border-radius: 14px;
      background: linear-gradient(160deg, #1c1c1c 0%, #141414 55%, #0e0e0e 100%);
      border: 1px solid #2a2a2a;
      border-top-color: rgba(255,255,255,0.09);
      border-bottom-color: rgba(0,0,0,0.55);
      box-shadow:
        inset 0 1.5px 0 rgba(255,255,255,0.10),
        inset 0 -1px 0 rgba(0,0,0,0.40),
        0 4px 12px rgba(0,0,0,0.45),
        0 1px 4px rgba(0,0,0,0.35);
      cursor: pointer;
      transition: border-color var(--t), box-shadow var(--t), transform 0.14s;
      text-align: left; width: 100%;
    }
    .scale-btn:active { transform: scale(0.98); }
    .scale-btn:hover  { border-top-color: rgba(255,255,255,0.14); box-shadow: inset 0 1.5px 0 rgba(255,255,255,0.13), 0 6px 16px rgba(0,0,0,0.5); }
    .scale-btn--selected {
      border-color: rgba(0,201,167,0.5);
      border-top-color: rgba(0,201,167,0.3);
      border-left: 3px solid var(--accent);
      background: linear-gradient(160deg, rgba(0,201,167,0.10) 0%, rgba(0,201,167,0.04) 100%);
      box-shadow:
        inset 0 1.5px 0 rgba(0,201,167,0.18),
        0 0 0 3px rgba(0,201,167,0.10),
        0 4px 12px rgba(0,0,0,0.45);
    }
    .scale-btn__dot {
      width: 18px; height: 18px; border-radius: 50%;
      border: 1.5px solid var(--border); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: border-color var(--t), background var(--t);
    }
    .scale-btn--selected .scale-btn__dot {
      border-color: var(--accent); background: var(--accent);
    }
    .scale-btn__dot::after {
      content: ''; width: 7px; height: 7px; border-radius: 50%;
      background: #000; opacity: 0;
      transition: opacity 0.12s;
    }
    .scale-btn--selected .scale-btn__dot::after { opacity: 1; }
    .scale-btn__label {
      font-family: var(--font-m); font-size: 12px; color: var(--text-2);
      transition: color var(--t);
    }
    .scale-btn--selected .scale-btn__label { color: var(--text); }
    .scale-btn__num {
      margin-left: auto; font-size: 10px; color: var(--text-3);
      letter-spacing: 0.06em; flex-shrink: 0;
    }

    /* ── Back button ── */
    .back-btn {
      background: none; border: none; cursor: pointer; padding: 4px;
      color: var(--text-3); display: flex; align-items: center; flex-shrink: 0;
      transition: color var(--t);
    }
    .back-btn:hover { color: var(--text-2); }
    .back-btn--hidden { visibility: hidden; pointer-events: none; }

    /* ── Analyzing screen ── */
    .analyzing {
      display: none; position: absolute; inset: 0; z-index: 20;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 24px; padding: 40px 32px; background: var(--bg); text-align: center;
    }
    .analyzing--visible { display: flex; animation: fadeIn 0.5s ease both; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .analyzing__radar {
      width: 180px; height: 180px;
      filter: drop-shadow(0 0 30px rgba(0,201,167,0.20));
    }
    .radar-ring { stroke-dasharray: 200; stroke-dashoffset: 200; animation: drawRing 1.2s ease forwards; }
    .radar-ring:nth-child(1) { animation-delay: 0.1s; }
    .radar-ring:nth-child(2) { animation-delay: 0.3s; }
    .radar-ring:nth-child(3) { animation-delay: 0.5s; }
    .radar-poly { stroke-dasharray: 600; stroke-dashoffset: 600; opacity: 0; animation: drawPoly 1.0s ease forwards; animation-delay: 0.8s; }
    @keyframes drawRing { to { stroke-dashoffset: 0; } }
    @keyframes drawPoly { to { stroke-dashoffset: 0; opacity: 1; } }

    .analyzing__title {
      font-family: var(--font-d); font-weight: 800; font-size: 22px;
      color: var(--text); letter-spacing: -0.02em;
    }
    .analyzing__dots::after {
      content: ''; animation: dots 1.6s steps(4, end) infinite;
    }
    @keyframes dots {
      0%  { content: ''; }   25% { content: '.'; }
      50% { content: '..'; } 75% { content: '...'; }
    }
    .analyzing__sub {
      font-size: 11px; color: var(--text-3); letter-spacing: 0.06em; line-height: 1.6;
    }

    /* ── Result screen ── */
    .result {
      display: none; position: absolute; inset: 0; z-index: 20;
      flex-direction: column; align-items: center; overflow: hidden;
      padding: 40px 28px 40px; background: var(--bg); text-align: center;
    }
    .result--visible { display: flex; animation: slideUp 0.55s cubic-bezier(0.32,0.72,0,1) both; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

    .result__eyebrow {
      font-size: 9px; color: var(--accent); letter-spacing: 0.18em;
      text-transform: uppercase; margin-bottom: 12px;
    }
    .result__title {
      font-family: var(--font-d); font-weight: 900;
      font-size: clamp(28px, 8vw, 40px);
      letter-spacing: -0.03em; line-height: 1.05;
      color: var(--text); margin-bottom: 24px;
    }
    .result__radar {
      width: 200px; height: 200px; margin-bottom: 24px;
      filter: drop-shadow(0 0 24px rgba(0,201,167,0.15));
    }
    .result__traits {
      display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
      margin-bottom: 32px;
    }
    .trait-pill {
      padding: 6px 14px; border-radius: 20px; font-size: 11px;
      letter-spacing: 0.06em; font-family: var(--font-m);
      animation: popIn 0.3s cubic-bezier(0.32,0.72,0,1) both;
    }
    .trait-pill--accent { background: rgba(0,201,167,0.12); border: 1px solid rgba(0,201,167,0.3); color: var(--accent); }
    .trait-pill--warm   { background: rgba(255,107,53,0.10); border: 1px solid rgba(255,107,53,0.25); color: var(--warm); }
    .trait-pill--muted  { background: var(--surface); border: 1px solid var(--border); color: var(--text-2); }
    @keyframes popIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .result__desc {
      font-size: 13px; color: var(--text-2); line-height: 1.75;
      max-width: 300px; margin-bottom: 36px;
    }
    .btn-continue {
      width: 100%; max-width: 320px; height: 52px; border-radius: 26px;
      background: var(--accent); border: none; color: #000;
      font-family: var(--font-d); font-weight: 800; font-size: 14px;
      letter-spacing: 0.05em; cursor: pointer;
      transition: opacity var(--t), transform 0.14s;
      margin-bottom: 16px;
    }
    .btn-continue:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-skip-result {
      background: none; border: none; font-family: var(--font-m); font-size: 11px;
      color: var(--text-3); cursor: pointer; letter-spacing: 0.04em; transition: color var(--t);
    }
    .btn-skip-result:hover { color: var(--text-2); }

    .result__note {
      font-size: 9px; color: var(--text-3); letter-spacing: 0.06em;
      line-height: 1.6; max-width: 260px; margin-top: 20px;
    }

    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, #1e1e1e 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }
  </style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="shell" id="shell">

  <!-- Progress -->
  <div class="progress-wrap" id="progress-wrap">
    <button class="back-btn back-btn--hidden" id="back-btn" onclick="prevQuestion()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:10%"></div>
    </div>
    <span class="progress-label" id="progress-label">1 / 10</span>
    <button class="skip-btn" onclick="skipQuiz()">Skip</button>
  </div>

  <div class="q-instruction">How much does this sound like you?</div>

  <!-- Question stage -->
  <div class="stage" id="stage"></div>

  <!-- Analyzing overlay -->
  <div class="analyzing" id="analyzing">
    <svg class="analyzing__radar" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <polygon class="radar-ring" points="100,82.5 116.65,89.2 110.3,111.15 89.7,111.15 83.35,89.2" fill="none" stroke="rgba(0,201,167,0.18)" stroke-width="1"/>
      <polygon class="radar-ring" points="100,65 133.3,89.2 120.6,128.3 79.4,128.3 66.7,89.2"        fill="none" stroke="rgba(0,201,167,0.25)" stroke-width="1"/>
      <polygon class="radar-ring" points="100,30 166.6,78.4 141.1,156.6 58.9,156.6 33.4,78.4"        fill="none" stroke="rgba(0,201,167,0.32)" stroke-width="1"/>
      <polygon class="radar-poly" id="analyzing-poly"
        points="100,50 148,84 128,140 72,140 52,84"
        fill="rgba(0,201,167,0.15)" stroke="rgba(0,201,167,0.8)" stroke-width="1.5" stroke-linejoin="round"/>
    </svg>
    <div>
      <div class="analyzing__title">Analyzing your vibe<span class="analyzing__dots"></span></div>
      <div class="analyzing__sub" style="margin-top:8px;">Building your personality profile</div>
    </div>
  </div>

  <!-- Result overlay -->
  <div class="result" id="result">
    <div class="result__eyebrow">Your personality profile</div>
    <div class="result__title" id="result-title">You're a —</div>
    <svg class="result__radar" id="result-radar" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <!-- grid rings -->
      <line x1="100" y1="100" x2="100" y2="30"      stroke="rgba(239,239,239,0.06)" stroke-width="1"/>
      <line x1="100" y1="100" x2="166.6" y2="78.4"  stroke="rgba(239,239,239,0.06)" stroke-width="1"/>
      <line x1="100" y1="100" x2="141.1" y2="156.6" stroke="rgba(239,239,239,0.06)" stroke-width="1"/>
      <line x1="100" y1="100" x2="58.9"  y2="156.6" stroke="rgba(239,239,239,0.06)" stroke-width="1"/>
      <line x1="100" y1="100" x2="33.4"  y2="78.4"  stroke="rgba(239,239,239,0.06)" stroke-width="1"/>
      <polygon points="100,82.5 116.65,89.2 110.3,111.15 89.7,111.15 83.35,89.2" fill="none" stroke="rgba(239,239,239,0.08)" stroke-width="1"/>
      <polygon points="100,65 133.3,89.2 120.6,128.3 79.4,128.3 66.7,89.2"       fill="none" stroke="rgba(239,239,239,0.10)" stroke-width="1"/>
      <polygon points="100,30 166.6,78.4 141.1,156.6 58.9,156.6 33.4,78.4"       fill="none" stroke="rgba(239,239,239,0.13)" stroke-width="1"/>
      <!-- labels -->
      <text x="100" y="17"  text-anchor="middle" font-family="'DM Mono',monospace" font-size="7" fill="rgba(239,239,239,0.3)" letter-spacing="0.06em">OPEN</text>
      <text x="176" y="76"  text-anchor="start"  font-family="'DM Mono',monospace" font-size="7" fill="rgba(239,239,239,0.3)" letter-spacing="0.06em">EXTRA</text>
      <text x="148" y="169" text-anchor="middle" font-family="'DM Mono',monospace" font-size="7" fill="rgba(239,239,239,0.3)" letter-spacing="0.06em">AGREE</text>
      <text x="44"  y="169" text-anchor="middle" font-family="'DM Mono',monospace" font-size="7" fill="rgba(239,239,239,0.3)" letter-spacing="0.06em">CONSC</text>
      <text x="6"   y="76"  text-anchor="start"  font-family="'DM Mono',monospace" font-size="6.5" fill="rgba(239,239,239,0.3)" letter-spacing="0.04em">NEURO</text>
      <!-- result polygon (filled by JS) -->
      <polygon id="result-poly" points="100,100 100,100 100,100 100,100 100,100"
        fill="rgba(0,201,167,0.15)" stroke="rgba(0,201,167,0.75)" stroke-width="1.5" stroke-linejoin="round"/>
      <circle cx="100" cy="100" r="3" fill="rgba(0,201,167,0.5)"/>
    </svg>
    <div class="result__traits" id="result-traits"></div>
    <p class="result__desc" id="result-desc"></p>
    <button class="btn-continue" onclick="finishOnboarding()">Find my Mates →</button>
    <button class="btn-skip-result" onclick="window.location.href='/map'">Skip for now</button>
    <p class="result__note">Your personality data is private and used only to rank who you see in Explore. You can delete it any time in Settings.</p>
  </div>

</div>

<script src="/js/api.js"></script>
<script th:inline="none">
  const SCALE = [
    { val: 1, label: 'Not me at all'   },
    { val: 2, label: 'Kinda not me'    },
    { val: 3, label: 'Sort of both'    },
    { val: 4, label: "That's kinda me" },
    { val: 5, label: 'Totally me'      },
  ];

  const TRAITS_MAP = {
    openness:          { hi: ['Curious',      'Creative',    'Open-minded'],  lo: ['Grounded',    'Practical',   'Focused']    },
    conscientiousness: { hi: ['Organised',    'Reliable',    'Thorough'],     lo: ['Spontaneous', 'Flexible',    'Easy-going'] },
    extraversion:      { hi: ['Enthusiastic', 'Social',      'Energetic'],    lo: ['Calm',        'Reflective',  'Thoughtful'] },
    agreeableness:     { hi: ['Warm',         'Empathetic',  'Collaborative'],lo: ['Direct',      'Independent', 'Honest']     },
    neuroticism:       { hi: ['Sensitive',    'Expressive',  'Emotional'],    lo: ['Stable',      'Resilient',   'Steady']     },
  };

  // Vertex order: top=O, right=E, bottom-right=A, bottom-left=C, left=N
  const VERTICES  = [[100, 30], [166.6, 78.4], [141.1, 156.6], [58.9, 156.6], [33.4, 78.4]];
  const DIM_KEYS  = ['openness', 'extraversion', 'agreeableness', 'conscientiousness', 'neuroticism'];

  let QUESTIONS = [];   // filled by backend
  let current   = 0;
  let answers   = [];

  // ── Loading skeleton ──────────────────────────────────────────────
  function showLoadingSkeleton() {
    const stage = document.getElementById('stage');
    stage.innerHTML = `
      <div class="q-card q-card--active" style="pointer-events:none">
        <div class="q-prefix">Loading questions…</div>
        <div class="q-text" style="opacity:0.3">
          <div class="skeleton" style="height:28px;border-radius:6px;margin-bottom:8px;width:80%"></div>
          <div class="skeleton" style="height:28px;border-radius:6px;width:60%"></div>
        </div>
        <div class="scale" style="margin-top:40px">
          ${[1,2,3,4,5].map(() => `<div class="skeleton" style="height:48px;border-radius:12px"></div>`).join('')}
        </div>
      </div>`;
  }

  // ── Render question ───────────────────────────────────────────────
  function renderQuestion(idx, direction) {
    if (idx >= QUESTIONS.length) return;
    const stage  = document.getElementById('stage');
    const text   = QUESTIONS[idx];
    const entered = direction === 'next' ? 'q-card--enter-right' : 'q-card--enter-left';
    const exited  = direction === 'next' ? 'q-card--exit-left'  : 'q-card--exit-right';

    const existing = stage.querySelector('.q-card--active');
    if (existing) {
      existing.style.pointerEvents = 'none';
      existing.classList.remove('q-card--active');
      existing.classList.add(exited);
      setTimeout(() => existing.remove(), 400);
    }

    const card = document.createElement('div');
    card.className = `q-card ${entered}`;
    card.innerHTML = `
      <div class="q-text">${highlight(text)}</div>
      <div class="scale">
        ${SCALE.map(s => `
          <button class="scale-btn" data-val="${s.val}" onclick="selectAnswer(${idx}, ${s.val}, this)">
            <div class="scale-btn__dot"></div>
            <span class="scale-btn__label">${s.label}</span>
            <span class="scale-btn__num">${s.val}</span>
          </button>`).join('')}
      </div>`;
    stage.appendChild(card);

    if (answers[idx] !== null && answers[idx] !== undefined) {
      const btn = card.querySelector(`[data-val="${answers[idx]}"]`);
      if (btn) btn.classList.add('scale-btn--selected');
    }

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        card.classList.remove(entered);
        card.classList.add('q-card--active');
      });
    });

    updateProgress(idx);
  }

  function highlight(text) {
    return text.replace(/^([^,.]+)/, '<em>$1</em>');
  }

  function updateProgress(idx) {
    const pct = ((idx + 1) / QUESTIONS.length) * 100;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-label').textContent = `${idx + 1} / ${QUESTIONS.length}`;
    document.getElementById('back-btn').classList.toggle('back-btn--hidden', idx === 0);
  }

  // ── Interactions ──────────────────────────────────────────────────
  function selectAnswer(idx, val, btn) {
    answers[idx] = val;
    btn.closest('.scale').querySelectorAll('.scale-btn').forEach(b => b.classList.remove('scale-btn--selected'));
    btn.classList.add('scale-btn--selected');
    if (current === QUESTIONS.length - 1) {
      setTimeout(() => showAnalyzing(), 380);
    } else {
      setTimeout(() => nextQuestion(), 280);
    }
  }

  function nextQuestion() {
    if (answers[current] == null) return;
    current++;
    renderQuestion(current, 'next');
  }

  function prevQuestion() {
    if (current === 0) return;
    current--;
    renderQuestion(current, 'back');
  }

  // ── Analyzing + API submit ────────────────────────────────────────
  async function showAnalyzing() {
    document.getElementById('progress-wrap').style.opacity = '0';
    document.getElementById('analyzing').classList.add('analyzing--visible');

    const startTime = Date.now();
    let response;
    try {
      response = await OnboardingAPI.submit(answers);
    } catch (err) {
      // 409 = already completed; backend doesn't allow re-submission yet.
      // Fall back to stored personality scores so the result screen still shows.
      const stored = localStorage.getItem('personality_scores');
      if (stored) {
        const vector = JSON.parse(stored);
        const elapsed = Date.now() - startTime;
        if (elapsed < 2600) await new Promise(r => setTimeout(r, 2600 - elapsed));
        showResult(vector, null);
        return;
      }
      document.getElementById('analyzing').classList.remove('analyzing--visible');
      document.getElementById('progress-wrap').style.opacity = '';
      alert(err.message || 'Could not save results — please try again.');
      return;
    }

    document.getElementById('analyzing-poly').setAttribute('points', buildPolyPoints(response.vector));

    const elapsed = Date.now() - startTime;
    if (elapsed < 2600) await new Promise(r => setTimeout(r, 2600 - elapsed));

    showResult(response.vector, response.onboardingSummary);
  }

  // ── Radar polygon builder ─────────────────────────────────────────
  function buildPolyPoints(vector) {
    const cx = 100, cy = 100;
    return DIM_KEYS.map((key, i) => {
      const t = ((vector[key] ?? 0) + 1) / 2;
      const [vx, vy] = VERTICES[i];
      return `${(cx + (vx - cx) * (0.15 + t * 0.85)).toFixed(1)},${(cy + (vy - cy) * (0.15 + t * 0.85)).toFixed(1)}`;
    }).join(' ');
  }

  // ── Show result ───────────────────────────────────────────────────
  function showResult(vector, summary) {
    document.getElementById('analyzing').classList.remove('analyzing--visible');
    document.getElementById('analyzing').style.display = 'none';

    const pillColors = { accent: 'trait-pill--accent', warm: 'trait-pill--warm', muted: 'trait-pill--muted' };
    const pills = [];
    Object.keys(TRAITS_MAP).forEach(key => {
      const s      = vector[key] ?? 0;
      const bucket = s >= 0.25 ? 'hi' : s <= -0.25 ? 'lo' : null;
      if (bucket) {
        const type = key === 'extraversion' || key === 'openness' ? 'accent' : key === 'agreeableness' ? 'warm' : 'muted';
        pills.push({ label: TRAITS_MAP[key][bucket][0], type });
      }
    });

    const e = vector.extraversion >= 0.25 ? 'Enthusiastic' : 'Thoughtful';
    const o = vector.openness     >= 0.25 ? 'Explorer'     : 'Steady Mate';
    document.getElementById('result-title').textContent = `You're a${/^[aeiou]/i.test(e) ? 'n' : ''} ${e} ${o}`;

    document.getElementById('result-traits').innerHTML = pills
      .map((p, i) => `<span class="trait-pill ${pillColors[p.type]}" style="animation-delay:${i*0.07}s">${p.label}</span>`)
      .join('');

    // Use AI-generated summary if available, fall back to generic copy
    document.getElementById('result-desc').textContent = summary ||
      `ExperiMate will match you with locals whose vibe genuinely overlaps with yours.`;

    document.getElementById('result-poly').setAttribute('points', buildPolyPoints(vector));

    localStorage.setItem('personality_scores', JSON.stringify(vector));
    localStorage.setItem('personality_traits', JSON.stringify(pills.map(p => p.label)));
    localStorage.setItem('personality_done', '1');

    document.getElementById('result').classList.add('result--visible');
  }

  function finishOnboarding() { window.location.href = '/explore'; }

  function skipQuiz() {
    if (!localStorage.getItem('jwt')) { window.location.href = '/login'; return; }
    OnboardingAPI.cancel().catch(() => {}).finally(() => { window.location.href = '/map'; });
  }

  // ── Init — fetch questions from backend, check status ─────────────
  async function init() {
    if (!localStorage.getItem('jwt')) { window.location.href = '/login'; return; }

    showLoadingSkeleton();

    try {
      const [statusRes, questionsRes] = await Promise.all([
        OnboardingAPI.getStatus(),
        OnboardingAPI.getQuestions(),
      ]);

      // Already completed — skip straight to explore
      if (statusRes.status === 'COMPLETED') {
        window.location.href = '/explore';
        return;
      }

      QUESTIONS = questionsRes.map(q => q.text);
      answers   = new Array(QUESTIONS.length).fill(null);

      renderQuestion(0, 'next');
    } catch (err) {
      document.getElementById('stage').innerHTML = `
        <div class="q-card q-card--active" style="justify-content:center;text-align:center;gap:16px">
          <div class="q-prefix" style="color:var(--warm)">Could not load questions</div>
          <div style="font-size:12px;color:var(--text-2)">${err.message || 'Check your connection and try again.'}</div>
          <button onclick="init()" style="margin-top:16px;width:100%;height:50px;border-radius:25px;background:var(--accent);border:none;color:#000;font-family:var(--font-d);font-weight:800;font-size:13px;letter-spacing:0.06em;cursor:pointer;">Retry</button>
        </div>`;
    }
  }

  init();
</script>
</body>
</html>
