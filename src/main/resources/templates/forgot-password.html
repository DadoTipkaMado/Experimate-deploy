<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <title>Reset Password — Experimate</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: unset !important; overflow: unset !important; background: var(--bg) !important; }
    body { display: flex !important; align-items: center !important; justify-content: center !important; min-height: 100vh !important; color: var(--text) !important; color-scheme: dark; padding: 32px 0; }

    .orb { position: fixed; border-radius: 50%; filter: blur(90px); opacity: 0.13; pointer-events: none; animation: drift linear infinite; }
    .orb-1 { width: 400px; height: 400px; background: var(--accent); top: -100px; left: -80px; animation-duration: 20s; }
    .orb-2 { width: 260px; height: 260px; background: var(--warm); bottom: -60px; right: -40px; animation-duration: 26s; animation-delay: -9s; }
    @keyframes drift { 0% { transform: translate(0,0) scale(1); } 33% { transform: translate(20px,-15px) scale(1.04); } 66% { transform: translate(-15px,20px) scale(0.97); } 100% { transform: translate(0,0) scale(1); } }

    .auth-card {
      position: relative; width: min(380px, 92vw);
      background: rgba(20,20,20,0.75); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border-2); border-radius: 20px; padding: 36px 32px;
      display: flex; flex-direction: column; gap: 20px;
      box-shadow: 0 0 0 1px rgba(0,201,167,0.06), 0 32px 64px rgba(0,0,0,0.5);
      animation: card-in 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes card-in { from { opacity:0; transform:translateY(24px) scale(0.97); } to { opacity:1; transform:translateY(0) scale(1); } }

    .auth-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 26px; color: var(--text); letter-spacing: -0.03em; }
    .auth-logo span { color: var(--accent); }
    .auth-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 19px; color: var(--text); }
    .auth-subtitle { font-size: 13px; color: var(--text-2); margin-top: 4px; line-height: 1.6; }
    .auth-field { display: flex; flex-direction: column; gap: 6px; }
    .auth-field label { font-size: 11px; color: var(--text-2); letter-spacing: 0.08em; text-transform: uppercase; }
    .auth-field input {
      background: var(--surface); border: 1px solid var(--border-2); border-radius: 10px;
      padding: 13px 16px; color: var(--text); font-family: var(--font-mono);
      font-size: 13px; width: 100%; transition: border-color 0.14s ease, box-shadow 0.14s ease;
    }
    .auth-field input:focus { outline: none; border-color: var(--accent-border); box-shadow: 0 0 0 3px rgba(0,201,167,0.12); }
    .auth-field input.input--error { border-color: rgba(255,80,80,0.5); }
    .auth-field__hint { font-size: 10px; color: var(--text-3); }
    .auth-error { background: rgba(255,80,80,0.08); border: 1px solid rgba(255,80,80,0.2); border-radius: 10px; padding: 10px 14px; font-size: 11px; color: rgba(255,100,100,0.9); display: none; }
    .auth-success { background: var(--accent-dim); border: 1px solid var(--accent-border); border-radius: 10px; padding: 13px 16px; font-size: 13px; color: var(--accent); display: none; }
    .auth-footer { font-size: 13px; color: var(--text-2); text-align: center; }
    .auth-footer a { color: var(--accent); text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }
    .divider { border: none; border-top: 1px solid var(--border-2); margin: 0; }
    .btn-reset { height: 46px; margin-top: 4px; background: var(--accent) !important; color: #000 !important; }
    .btn-reset:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="auth-card">
    <div>
      <div class="auth-logo">Experi<span>Mate</span></div>
    </div>
    <div>
      <div class="auth-title">Reset password</div>
      <div class="auth-subtitle">Verify your identity with your username and date of birth, then set a new password.</div>
    </div>

    <div class="auth-error" id="error-msg"></div>
    <div class="auth-success" id="success-msg"></div>

    <form id="reset-form" style="display: flex; flex-direction: column; gap: 14px;" novalidate>
      <div class="auth-field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required>
      </div>

      <div class="auth-field">
        <label for="dateOfBirth">Date of birth</label>
        <input type="text" id="dateOfBirth" name="dateOfBirth" placeholder="DD/MM/YYYY" autocomplete="off" required>
        <span class="auth-field__hint">Must match what you entered at registration</span>
      </div>

      <hr class="divider">

      <div class="auth-field">
        <label for="newPassword">New password</label>
        <input type="password" id="newPassword" name="newPassword" autocomplete="new-password" required>
      </div>

      <div class="auth-field">
        <label for="confirmPassword">Confirm new password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" autocomplete="new-password" required>
      </div>

      <button type="submit" id="reset-btn" class="btn btn--primary btn-reset">Reset password</button>
    </form>

    <div class="auth-footer">
      <a href="/login">← Back to sign in</a>
    </div>
  </div>

  <script>
    (function() {
      // ── DOB auto-format ───────────────────────────────────────────
      const dob = document.getElementById('dateOfBirth');
      dob.addEventListener('keydown', function(e) {
        if (['Backspace','Delete','Tab','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) return;
        if (!/^\d$/.test(e.key)) { e.preventDefault(); return; }
      });
      let _dobPadTimer = null;
      dob.addEventListener('input', function(e) {
        clearTimeout(_dobPadTimer);
        const adding = !e.inputType || e.inputType.startsWith('insert');
        let digits = this.value.replace(/\D/g, '');
        if (digits.length > 8) digits = digits.slice(0, 8);
        if (adding) {
          if (digits.length === 1 && parseInt(digits) > 3) {
            digits = '0' + digits;
          } else if (digits.length === 3 && parseInt(digits[2]) > 1) {
            digits = digits.slice(0, 2) + '0' + digits.slice(2);
          } else if (digits.length === 1 || digits.length === 3) {
            const snap = digits;
            _dobPadTimer = setTimeout(() => {
              let cur = dob.value.replace(/\D/g, '');
              if (cur === snap) {
                if (cur.length === 1) cur = '0' + cur;
                else if (cur.length === 3) cur = cur.slice(0, 2) + '0' + cur.slice(2);
                dob.value = cur.length > 4
                  ? cur.slice(0,2) + '/' + cur.slice(2,4) + '/' + cur.slice(4)
                  : cur.length > 2 ? cur.slice(0,2) + '/' + cur.slice(2) : cur;
              }
            }, 400);
          }
        }
        if (digits.length > 4) {
          this.value = digits.slice(0,2) + '/' + digits.slice(2,4) + '/' + digits.slice(4);
        } else if (digits.length > 2) {
          this.value = digits.slice(0,2) + '/' + digits.slice(2);
        } else {
          this.value = digits;
        }
      });
      dob.addEventListener('blur', function() {
        const parts = this.value.split('/');
        if (parts[0]?.length === 1) parts[0] = parts[0].padStart(2, '0');
        if (parts[1]?.length === 1) parts[1] = parts[1].padStart(2, '0');
        this.value = parts.join('/');
      });

      // ── Form submit ───────────────────────────────────────────────
      const form    = document.getElementById('reset-form');
      const btn     = document.getElementById('reset-btn');
      const errorEl = document.getElementById('error-msg');
      const successEl = document.getElementById('success-msg');

      function showError(msg) {
        errorEl.textContent = msg;
        errorEl.style.display = 'block';
        successEl.style.display = 'none';
      }

      function showSuccess(msg) {
        successEl.textContent = msg;
        successEl.style.display = 'block';
        errorEl.style.display = 'none';
        form.style.display = 'none';
      }

      form.addEventListener('submit', async function(e) {
        e.preventDefault();
        errorEl.style.display = 'none';

        const username    = document.getElementById('username').value.trim();
        const dateOfBirth = document.getElementById('dateOfBirth').value.trim();
        const newPassword = document.getElementById('newPassword').value;
        const confirm     = document.getElementById('confirmPassword').value;

        if (newPassword !== confirm) {
          showError('Passwords do not match.');
          document.getElementById('confirmPassword').classList.add('input--error');
          return;
        }
        document.getElementById('confirmPassword').classList.remove('input--error');

        btn.disabled    = true;
        btn.textContent = 'Resetting...';

        try {
          const res = await fetch('/api/auth/reset-password', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ username, dateOfBirth, newPassword }),
          });

          if (!res.ok) {
            const data = await res.json().catch(() => ({}));
            throw new Error(data.message || 'Could not reset password. Check your details and try again.');
          }

          showSuccess('Password reset! You can now sign in with your new password.');
        } catch (err) {
          showError(err.message);
          btn.disabled    = false;
          btn.textContent = 'Reset password';
        }
      });
    })();
  </script>
</body>
</html>
