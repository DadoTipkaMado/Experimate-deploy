<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <title>Reset Password — Experimate</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); padding: 24px 0; box-sizing: border-box; }
    .auth-card {
      width: min(360px, 92vw);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      display: flex; flex-direction: column; gap: 20px;
    }
    .auth-logo { font-family: var(--font-display); font-weight: 800; font-size: 22px; color: var(--text); letter-spacing: -0.02em; }
    .auth-logo span { color: var(--accent); }
    .auth-title { font-family: var(--font-display); font-weight: 700; font-size: 17px; color: var(--text); }
    .auth-subtitle { font-size: 11px; color: var(--text-3); letter-spacing: 0.04em; margin-top: 4px; line-height: 1.6; }
    .auth-field { display: flex; flex-direction: column; gap: 6px; }
    .auth-field label { font-size: 10px; color: var(--text-2); letter-spacing: 0.08em; text-transform: uppercase; }
    .auth-field input {
      background: var(--surface-2);
      border: 1px solid var(--border-2);
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      width: 100%; box-sizing: border-box;
      transition: border-color var(--t-fast);
    }
    .auth-field input:focus { outline: none; border-color: var(--accent-border); }
    .auth-field__hint { font-size: 9px; color: var(--text-3); letter-spacing: 0.04em; }
    .auth-error {
      background: rgba(255,80,80,0.08);
      border: 1px solid rgba(255,80,80,0.2);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 11px; color: rgba(255,100,100,0.9);
    }
    .auth-success {
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 11px; color: var(--accent);
      letter-spacing: 0.03em;
    }
    .auth-footer { font-size: 11px; color: var(--text-3); text-align: center; }
    .auth-footer a { color: var(--accent); text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 0; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div>
      <div class="auth-logo">Experi<span>mate</span></div>
    </div>
    <div>
      <div class="auth-title">Reset password</div>
      <div class="auth-subtitle">Enter your username and date of birth to verify your identity, then set a new password.</div>
    </div>

    <div th:if="${error}" class="auth-error" th:text="${error}"></div>
    <div th:if="${success}" class="auth-success" th:text="${success}"></div>

    <form th:unless="${success}" th:action="@{/forgot-password}" method="post" style="display: flex; flex-direction: column; gap: 14px;">
      <div class="auth-field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required>
      </div>

      <div class="auth-field">
        <label for="dateOfBirth">Date of birth</label>
        <input type="text" id="dateOfBirth" name="dateOfBirth" placeholder="DD/MM/YYYY" data-date-format="date" autocomplete="off" required>
        <span class="auth-field__hint">Must match what you entered at registration</span>
      </div>

      <hr class="divider">

      <div class="auth-field">
        <label for="newPassword">New password</label>
        <input type="password" id="newPassword" name="newPassword" autocomplete="new-password" required>
      </div>

      <div class="auth-field">
        <label for="confirmPassword">Confirm new password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" autocomplete="new-password" required>
      </div>

      <button type="submit" class="btn btn--primary" style="height: 44px; margin-top: 4px;">Reset password</button>
    </form>

    <div class="auth-footer">
      <a th:href="@{/login}">← Back to sign in</a>
    </div>
  </div>
</body>
</html>
