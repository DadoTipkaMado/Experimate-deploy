<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <title>Reset Password — Experimate</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: unset !important; overflow: unset !important; background: #0a0a0a !important; }
    body { display: flex !important; align-items: center !important; justify-content: center !important; min-height: 100vh !important; color: #efefef !important; color-scheme: dark; padding: 32px 0; }

    .orb { position: fixed; border-radius: 50%; filter: blur(90px); opacity: 0.13; pointer-events: none; animation: drift linear infinite; }
    .orb-1 { width: 400px; height: 400px; background: #00c9a7; top: -100px; left: -80px; animation-duration: 20s; }
    .orb-2 { width: 260px; height: 260px; background: #ff6b35; bottom: -60px; right: -40px; animation-duration: 26s; animation-delay: -9s; }
    @keyframes drift { 0% { transform: translate(0,0) scale(1); } 33% { transform: translate(20px,-15px) scale(1.04); } 66% { transform: translate(-15px,20px) scale(0.97); } 100% { transform: translate(0,0) scale(1); } }

    .auth-card {
      position: relative; width: min(380px, 92vw);
      background: rgba(20,20,20,0.75); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border: 1px solid #222; border-radius: 20px; padding: 36px 32px;
      display: flex; flex-direction: column; gap: 20px;
      box-shadow: 0 0 0 1px rgba(0,201,167,0.06), 0 32px 64px rgba(0,0,0,0.5);
      animation: card-in 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes card-in { from { opacity:0; transform:translateY(24px) scale(0.97); } to { opacity:1; transform:translateY(0) scale(1); } }

    .auth-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 26px; color: #efefef; letter-spacing: -0.03em; }
    .auth-logo span { color: #00c9a7; }
    .auth-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 19px; color: #efefef; }
    .auth-subtitle { font-size: 13px; color: #555; margin-top: 4px; line-height: 1.6; }
    .auth-field { display: flex; flex-direction: column; gap: 6px; }
    .auth-field label { font-size: 11px; color: #888; letter-spacing: 0.08em; text-transform: uppercase; }
    .auth-field input {
      background: #1c1c1c; border: 1px solid #2e2e2e; border-radius: 8px;
      padding: 12px 14px; color: #efefef; font-family: 'DM Mono', monospace;
      font-size: 13px; width: 100%; transition: border-color 0.14s ease, box-shadow 0.14s ease;
    }
    .auth-field input:focus { outline: none; border-color: #00c9a7; box-shadow: 0 0 0 3px rgba(0,201,167,0.12); }
    .auth-field__hint { font-size: 10px; color: #444; }
    .auth-error { background: rgba(255,80,80,0.08); border: 1px solid rgba(255,80,80,0.2); border-radius: 8px; padding: 10px 14px; font-size: 11px; color: rgba(255,100,100,0.9); }
    .auth-success { background: rgba(0,201,167,0.08); border: 1px solid rgba(0,201,167,0.25); border-radius: 8px; padding: 12px 14px; font-size: 13px; color: #00c9a7; }
    .auth-footer { font-size: 13px; color: #555; text-align: center; }
    .auth-footer a { color: #00c9a7; text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }
    .divider { border: none; border-top: 1px solid #222; margin: 0; }
    .btn-reset { height: 46px; margin-top: 4px; background: #00c9a7 !important; color: #000 !important; }
    .btn-reset:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="auth-card">
    <div>
      <div class="auth-logo">Experi<span>mate</span></div>
    </div>
    <div>
      <div class="auth-title">Reset password</div>
      <div class="auth-subtitle">Verify your identity with your username and date of birth, then set a new password.</div>
    </div>

    <div th:if="${error}" class="auth-error" th:text="${error}"></div>
    <div th:if="${success}" class="auth-success" th:text="${success}"></div>

    <form th:unless="${success}" th:action="@{/forgot-password}" method="post" style="display: flex; flex-direction: column; gap: 14px;">
      <div class="auth-field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required>
      </div>

      <div class="auth-field">
        <label for="dateOfBirth">Date of birth</label>
        <input type="text" id="dateOfBirth" name="dateOfBirth" placeholder="DD/MM/YYYY" autocomplete="off" required>
        <span class="auth-field__hint">Must match what you entered at registration</span>
      </div>

      <hr class="divider">

      <div class="auth-field">
        <label for="newPassword">New password</label>
        <input type="password" id="newPassword" name="newPassword" autocomplete="new-password" required>
      </div>

      <div class="auth-field">
        <label for="confirmPassword">Confirm new password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" autocomplete="new-password" required>
      </div>

      <button type="submit" id="reset-btn" class="btn btn--primary btn-reset">Reset password</button>
    </form>

    <div class="auth-footer">
      <a href="/login">← Back to sign in</a>
    </div>
  </div>

  <script>
    const form = document.querySelector('form');
    if (form) {
      form.addEventListener('submit', function() {
        const btn = document.getElementById('reset-btn');
        if (btn) { btn.disabled = true; btn.textContent = 'Resetting...'; }
      });
    }
  </script>
</body>
</html>
