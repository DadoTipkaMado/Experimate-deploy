<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>Meet — Experimate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" th:href="@{/icons/apple-touch-icon.png}">
  <style>
    .meet-header {
      padding: 22px 18px 0;
      border-bottom: 1px solid var(--border);
    }
    .meet-card {
      display: flex; align-items: center; gap: 12px;
      padding: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: border-color var(--t-base), transform var(--t-base);
      text-decoration: none; color: inherit;
    }
    .meet-card:hover { border-color: var(--border-2); transform: translateY(-1px); }
    .meet-card__date {
      width: 44px; height: 48px;
      background: var(--surface-2);
      border: 1px solid var(--border-2);
      border-radius: var(--radius-sm);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .meet-card__day { font-family: var(--font-display); font-weight: 800; font-size: 19px; line-height: 1; color: var(--text); }
    .meet-card__month { font-size: 8px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-2); margin-top: 2px; }
    .meet-card__info { flex: 1; min-width: 0; }
    .meet-card__who { font-family: var(--font-display); font-weight: 600; font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
    .meet-card__where { font-size: 10px; color: var(--text-2); letter-spacing: 0.04em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .meet-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 70px 24px; text-align: center; gap: 12px; }
    .meet-empty__icon { font-size: 36px; opacity: 0.25; }
    .meet-empty__title { font-family: var(--font-display); font-weight: 700; font-size: 15px; color: var(--text-2); }
    .meet-empty__sub { font-size: 11px; color: var(--text-3); letter-spacing: 0.04em; line-height: 1.6; max-width: 220px; }
    .meet-empty__cta { margin-top: 8px; }
    .no-dm-notice {
      display: flex; align-items: center; gap: 10px;
      margin: 0 18px;
      padding: 10px 14px;
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      border-radius: var(--radius-sm);
      font-size: 10px; color: var(--accent);
      letter-spacing: 0.05em; line-height: 1.5;
    }
    .no-dm-notice__icon { font-size: 16px; flex-shrink: 0; }
  </style>
</head>
<body>
<div class="app-shell">

  <div th:replace="~{fragments/topbar :: topbar}"></div>

  <main class="page-content">

    <div class="meet-header">
      <div class="page-title">Meet</div>
      <div class="page-subtitle" style="margin-bottom: 16px;">Your scheduled IRL meetups</div>
      <div class="tab-bar">
        <div class="tab-bar__item tab-bar__item--active" onclick="switchTab(this, 'upcoming')">Upcoming</div>
        <div class="tab-bar__item" onclick="switchTab(this, 'past')">Past</div>
      </div>
    </div>

    <div class="no-dm-notice" style="margin-top: 16px;">
      <div class="no-dm-notice__icon">🤝</div>
      <div>Experimate is IRL only — no messages, just meetups.</div>
    </div>

    <div id="tab-upcoming" style="padding: 14px 18px; display: flex; flex-direction: column; gap: 8px; flex: 1;">
      <!-- populated by JS -->
    </div>

    <div id="tab-past" hidden style="padding: 14px 18px; display: flex; flex-direction: column; gap: 8px; flex: 1;">
      <!-- populated by JS -->
    </div>

  </main>

  <div th:replace="~{fragments/navbar :: navbar}"></div>

</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/api.js}"></script>
<script>
  function renderMeet(upcoming, past) {
    const upcomingEl = document.getElementById('tab-upcoming');
    const pastEl     = document.getElementById('tab-past');

    if (!Auth.getToken()) {
      upcomingEl.innerHTML = `<div class="meet-empty"><div class="meet-empty__icon">🔒</div><div class="meet-empty__title">Not signed in</div><div class="meet-empty__sub">Sign in to see your meetups.</div><a href="/login" class="btn btn--ghost meet-empty__cta">Sign in →</a></div>`;
      pastEl.innerHTML = '';
      return;
    }

    const mkCard = (res, isPast) => {
      const d = new Date(res.tourListing.meetingDate);
      return `
        <div class="meet-card anim-fade-up">
          <div class="meet-card__date">
            <div class="meet-card__day">${String(d.getDate()).padStart(2,'0')}</div>
            <div class="meet-card__month">${_MONTHS[d.getMonth()]}</div>
          </div>
          <div class="meet-card__info">
            <div class="meet-card__who">👤 ${res.tourListing.host ? res.tourListing.host.firstName + ' ' + res.tourListing.host.lastName : '?'}</div>
            <div class="meet-card__where">${res.tourListing.city}</div>
          </div>
          <div class="badge badge--${isPast ? 'past' : 'confirmed'}">${isPast ? 'Past' : 'Confirmed'}</div>
        </div>`;
    };

    upcomingEl.innerHTML = upcoming.length
      ? upcoming.map(r => mkCard(r, false)).join('')
      : `<div class="meet-empty"><div class="meet-empty__icon">📅</div><div class="meet-empty__title">No upcoming meetups</div><div class="meet-empty__sub">Reserve a tour to schedule your first meetup.</div><a href="/tours" class="btn btn--ghost meet-empty__cta">Browse Tours →</a></div>`;

    pastEl.innerHTML = past.length
      ? past.map(r => mkCard(r, true)).join('')
      : `<div class="meet-empty"><div class="meet-empty__icon">📅</div><div class="meet-empty__title">No past meetups yet</div><div class="meet-empty__sub">Your completed meetups appear here.</div><a href="/explore" class="btn btn--ghost meet-empty__cta">Find a local →</a></div>`;
  }

  Promise.all([
    ReservationAPI.getMine({ timeframe: 'upcoming' }),
    ReservationAPI.getMine({ timeframe: 'past' }),
  ]).then(([upcoming, past]) => renderMeet(upcoming || [], past || []))
    .catch(() => renderMeet([], []));
</script>
</body>
</html>
