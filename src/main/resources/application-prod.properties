server.port=${PORT:8080}

spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.base-url=${APP_BASE_URL}
app.mail.from=${MAIL_FROM}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

jwt.secret=${JWT_SECRET}

spring.ai.anthropic.api-key=${SPRING_AI_ANTHROPIC_API_KEY}

push.vapid.public-key=${PUSH_VAPID_PUBLIC_KEY}
push.vapid.private-key=${PUSH_VAPID_PRIVATE_KEY}
push.vapid.subject=${PUSH_VAPID_SUBJECT}

logging.level.org.springframework.security=INFO

springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false
